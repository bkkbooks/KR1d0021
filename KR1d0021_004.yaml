body:
  text: 周官集注卷四翰林院侍講銜方苞撰師氏掌以媺詔王以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長國子公卿大夫之子弟師氏教之而世子亦齒焉以學君臣父子長幼之道大司徒以六德六行六藝教萬民而師氏保氏分為二職者師氏所教十五二十入大學者也保氏所教八歲十三入小學者也或以六德六行或以三德三行而變其名義者司徒以鄉三物教萬民而賓興之要其終而言之也自十五入學至四十而仕則成人之事備矣故知仁聖義忠和之德無不詳也孝友睦姻任恤之行無不著也師氏所教乃國子始入學者六德未可遽求必使知人之所得於天而粹然至善者為道之本而後六德可馴致也崇髙富貴易于浮惰必使知勤敏為行之本而後六行可漸推也有父兄在睦姻任恤之行不可得而見也第使知親父母尊賢良事師長而百行有基矣者六藝則小學所必親故無異教也于孝行之外别教孝德而曰以知逆惡者非知人之逆惡自知其逆惡也師氏主教太子太子之事父母也師保奉之動必以禮于孝行無由顯悖故特教以孝之實得於心者使知于父母之教陽奉而隂違則為逆偷為不義則為惡而太子之逆惡不可糾結也故伸其教於國子猶周公之抗世子法於伯禽也師氏無教太子之文者古者太子入學與胄子齒故以國子該之也國子本宜學於大學以太子故教於虎門之左則教太子不必言矣賢良即同學之秀出者師教以道藝者師氏大樂正小樂正之類是也長司其政令者諸子宫正宫伯之類是也知仁聖義忠和之德乃養以道藝而後成者此曰以為道本則知以天命五常之德粹然至善者言也孝行以敬為先而此獨曰以親父母者王公之子於父母多尊而不親也以此經次第觀之首曰以三德教國子似以太子羣王子而言繼曰掌國中失之事以教國子弟似兼王之族姓而言繼曰凡國之貴遊子弟學焉乃言公卿大夫之子弟舊說相承既久今姑仍之居虎門之左司王朝虎門路寢門也王日視朝於路寢之門外司察也察王之視朝有善道可行則前以詔王掌國中失之事以教國子弟中得禮也失失禮也不曰凡中失之事而曰國中失之事者以先世王太子王子弟善敗之跡告之使知鑒戒也凡國之貴游子弟學焉遊謂無職司師氏保氏所教皆未冠與太子齒相次以共學者故國之選俊不與若太子既冠成人則必博選天下孝悌博聞有道術者使與居處出入而不專於貴遊子弟矣凡祭祀賓客㑹同喪紀軍旅王舉則從舉猶行也故書作與讀去聲職專於教太子及國子而王舉則從者祭祀軍旅喪紀國子必從太子而㑹同賓客諸子亦作羣子以從王故師氏保氏帥之以觀於政事亦所以為教也聽治亦如之謂王於野外聽朝使其屬帥四夷之𨽻各以其兵服守王之門外且蹕門外中門之外東方南方其服布其兵劍西方北方其服旃其兵弓矢王門以夷𨽻守之者使王朝夕出入惕於德失政散則四夷弗賓又使荒裔之人知朝廷禮義之盛以為聲教也朝在野外則守內列內列藩營之在內者保氏掌諫王惡未有媺而詔之故曰以媺詔王有惡而後諫故曰掌諫王惡天子師保有公孤師氏中大夫保氏下大夫蓋專為教太子設者而其職首曰以媺詔王諫王惡何也使太子益嚴於師保也王且以媺詔王之惡且諫則所以詔諫太子者不可玩忽明矣春秋傳晉侯問楚子鍾儀對曰其為太子也師保奉之以朝於嬰齊而夕於側也則職專於教太子可知而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賓客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容戴記祭祀之容齊齊皇皇賓客之容穆穆皇皇朝廷之容濟濟翔翔喪紀之容纍纍顛顛軍旅之容暨暨詻詻車馬之容匪匪翼翼凡祭祀賓客㑹同喪紀軍旅王舉則從聽治亦如之使其屬守王闈闈宫中之巷門司諫掌糾萬民之德而勸之朋友正其行而强之道藝巡問而觀察之以時書其德行道藝辨其能而可任于國事者興賢興能學校之政備矣復設司諫之官以察萬民之德者恐野有遺賢也如農夫之孝弟强果者胥徒之淳實廉幹者幼未知學不得列於庠序而賓興之故勸之朋友使近學士正其行使知大人之事强之道藝使務學以自廣久之而德修行進道通藝習則可任國事矣惟其未列於庠序故勸之朋友惟所習者小人之事故正其行惟時過而學故道藝必强之而後能此先王所以立賢無方而國無廢事也管仲治齊鄉長五屬大夫復事公親問賢才猶用周官遺意然聰明質仁為義好學者與拳勇股肱之力同問則知其時學校之政已廢矣故曰王者之迹熄也以非學士故第以能而可任於國事為言其德行道藝出衆而為賢者未易數覯也以考鄉里之治以詔廢置以行赦宥廢置以吏言赦宥以民言罷民之出圜土而反於國中者三年不齒其坐嘉石而役諸司空者鄉里任之則宥而赦之司諫巡問觀察果能改其前行之惡然後行赦宥也司救掌萬民之邪惡過失而誅讓之以禮防禁而救之邪惡其性質不良而未麗於罪者過失則已形於事者古者重刑且責讓之未即罪也凡民之有邪惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空罰謂撻擊之也加明刑者去冠飾而書其邪惡之狀著之背也嘉石朝士所掌其有過失者三讓而罰三罰而歸于圜土亦加明刑晝任以事夜收之獄其收教之期視坐嘉石者每加以其罪已著也凡歲時有天患民病則以節巡國中及郊野而以王命施惠鄭剛中謂鄉師及此職皆以王命施惠欲恩歸於王非聖人制法意也蓋列其職曰以王命施惠則遇民囏厄立可賑救無奏請期報之難而所在有司不得阻格耳鄭剛中曰鄉師巡國及野以王命施惠歲之常也故不持節此則有天災人患而特遣巡視故執節以為信調人掌司萬民之難而諧和之難相與為仇讎凡過而殺傷人者以民成之鳥獸亦如之過本無意也成平也以鄉里之民共和解之凡和難父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讎視父師長之讎視兄弟主友之讎視從父兄弟和之使辟不得就而讎之主謂大夫君父兄之讎而可和者以過而殺傷也弗辟則與之瑞節而以執之弗辟必怙勢而弱其敵者也故官持瑞節執而放諸異國邦國用玉節周制九服外薄四海用瑞節者徵信于所放之國也若執而治其罪則無事瑞節凡殺人有反殺者使邦國交讎之反復也復殺之者欲除害弱敵也邦國交讎之諸侯得之即加戮也凡殺人而義者不同國令勿讎讎之則死殺人而義者如夫為寄豭穿窬夜入人室之類令勿讎而仍不使同國者恐相遇而不能忍也雖不同國而仍令勿讎讎之則死者恐其迹之他國也父之讎雖已和尚使辟諸海外亦恐迹而得之凡有鬭怒者成之不可成者則書之先動者誅之媒氏掌萬民之判凡男女自成名以上皆書年月日名焉判半也主合其半成夫婦也喪服𫝊曰夫妻判合成名謂子生三月父母名之令男三十而娶女二十而嫁凡娶判妻入子者皆書之判妻出婦也入子或媵女既入夫家未御而夫死改適人者或曰再嫁而攜其子入夫家者書之息爭端也中春之月令㑹男女于是時也奔者不禁若無故而不用令者罰之司男女之無夫家者而㑹之無故而不用令謂非喪禍而娶不以仲春也周之仲春丑月也故詩曰逮冰未泮奔謂聽其相從而不必備禮也男女之無夫家者謂鰥寡也若始婚者第可言未嫁娶不可謂無夫家覆出此文明㑹而不禁其奔者惟鰥寡也始婚者媒妁通之父母主之豈得自相㑹哉世人多以此病周官然聖人曲成萬物而使不納於邪義即在此單丁女戶無主婚者或因怨曠以致淫逸或相爭奪以成獄訟豈若天子之吏以王命㑹之而聽其奔為正大而無弊乎凡嫁子娶妻入幣純帛無過五兩純當作緇庶人納幣用緇帛士大夫乃以𤣥纁束帛天子加穀玉諸侯加大璋五兩十端也葉氏曰先王之世詳婚姻之禮而薄其物此婚姻所以及時男女所以得正也禁遷葬者與嫁殤者遷葬或出母改適無子而前子欲遷以祔父或曰民徙家而遷舊喪以祔新喪也殤十九以下未嫁而死者生不相接死而合之非禮也凡男女之隂訟聽之于勝國之社其附于刑者歸之于士隂訟中冓之事此經首言始婚者次言娶判妻入子者次言鰥寡節次甚明但其文恐有錯簡若移若無故而不用令者罰之于令男子三十而娶女子二十而嫁之下移司男女之無夫家者而㑹之于令㑹男女之下則無可疑矣然就本文亦可通司市掌市之治教政刑度量禁令禁物靡亡者使有利者使阜害者使亡靡者使微以及僞飾之禁過市之罰屬游飲食之禁皆所以教也治謂在民出入交易之事政謂在官幾征斂散之法度丈尺也量豆區斗斛之屬以次敘分地而經市經界也次敘見內宰職以陳肆辨物而平市陳猶列也物同使列肆於一區則美惡相挍易辨而市價自平矣即肆長職所謂名相近者相逺實相近者相爾也以政令禁物靡而均市物靡者易售而無用爭取靡者則常貨或滯而市不均矣以商賈阜貨而行布布謂泉也以度量成賈而徵儥儥買也物有定價則買者有所徵以質劑結信而止訟以賈民禁僞而除詐賈民胥師賈師之屬僞以物言詐以人言以刑罰禁暴而去盜以泉府同貨而斂賒民貨不售斂而買之民無貨賒貰而豫之則以貨來者同得售而不至于折閲貨之積者同得散布而民賴其用故曰同貨大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主主言其多者也大市者鄉邑之民以百物交易必日昃逺邑乃可至商賈市以朝者商以貨來而賈居之或求貨于賈成議轉物每窮日之力必以朝乃便販夫販婦市以夕者所販乃朝夕所求之物市之者亦近市之人也凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌于思次以令市市師涖焉而聽大治大訟胥師賈師涖于介次而聽小治小訟市入市者入也鞭度一物二用其幹刻丈尺繫鞘于上以為鞭展成謂既成議者則展其物以待判決奠賈謂未售者則定其賈以待求索即賈師所掌也上旌懸之市師司市也凡萬民之期于市者辟布者量度者刑戮者各于其地之敘期謂欲賣買期決于市也辟開通也泉府掌以征布斂不售之貨于市辟布疑謂民之欲受泉而納財物者量度者謂處斗斛及丈尺之牙儈凡得貨賄六畜者亦如之三日而舉之亦如之亦各于地之敘也舉之謂登諸冊籍使踰時而求者可驗也春秋傳仲尼使舉是禮也以為多文辭管子時簡稽馬牛之肥瘠其老而死者皆舉之凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微使有使阜起其價以徵之也使亡使微抑其價以郤之也害謂竒器異物無當于民用者作無益害有益故使之無靡者尚可用但費財而導侈故使之微周官詳于市政即此一節足以消游惰阜百物備天災厚民俗非細故也凡通貨賄以璽節出入之璽節印章也國凶荒札喪則市無征而作布古者作錢幣以救凶荒以耕九餘三穀粟之積者多也若無穀粟則泉布無權後世兵火水旱貴人富商有抱其金玉錦繡而死者政無常經民非本富故也凡市僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二潛溪鄧氏曰在民若以水和米麻代絲之類在商若以石為玉冀産為揚産之類在賈若飾今為古飾陳為新之類在工陶中窳銅和錫之類市刑小刑憲罰中刑徇罰大刑撲罰其附于刑者歸于士憲罰播其肆也徇遍巡以示衆也撲撻也國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷鄧氏曰刑人赦者士師協日刑殺君欲免之則㑹其期而赦之蓋非是無過市也舉國君則王可知凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事市司司市也質人掌成市之貨賄人民牛馬兵器珍異人民奴婢也平物賈者賈師質人專掌質劑所謂成者兩人交易入質劑于質人則一成而不可變其欺僞相負者後得質訟治之各有程期書曰臣妾逋逃詩曰人有民人女覆奪之即奴婢也古者盜賊之子女始為奴豈罪𨽻舂槀之外或以賜羣臣故得相鬻與百里奚自鬻于秦養牲者則鬻身者周時亦間有之但秦漢間始名為奴婢耳凡賣儥者質劑焉大市以質小市以劑掌稽市之書契大市人民牛馬之屬用長券小市兵器珍異之屬用短券民自貿易則曰質劑官取豫于市則曰書契賈師掌國之賣儥則官有取豫于市可知矣同其度量一其淳制巡而考之犯禁者舉而罰之犯禁者不獨罰之且書其所犯于冊籍使懼而不敢再也淳制見內宰職凡治質劑者國中一旬郊二旬野三旬都三月邦國期期內聽期外不聽野甸稍也㕓人掌斂市絘布總布質布罰布㕓布而入于泉府絘布列肆之稅總布或曰總當為儳無肆立持者之稅也或曰讀如租􅖽之􅖽守斗斛銓衡者之稅也質布犯質劑者所罰罰布犯市令者所罰㕓布諸物邸舍之稅既有㕓布絘布不應又為列肆之稅絘從次思次介次皆聽治訟之所也豈訟于市者必先入布如束矢鈞金之類與總布疑即民買賒官物之泉肆長分收而總㑹于㕓人故以總名凡屠者斂其皮角筋骨入于玉府以當㕓布有餘則以布斂之凡珍異之有滯者斂而入于膳府珍異四時食物也胥師各掌其次之政令而平其貨賄憲刑禁焉察其詐僞飾行儥慝者而誅罰之儥當作賣慝惡物也賣慝而曰飾行者今市中賣僞物多使老弱疾者詐為有急而使人不疑所謂飾行也聽其小治小訟而斷之賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其賈然後令市辨其物之良苦使各有等差良苦相均始得其平凡天患禁貴儥者使有恆賈三代聖王所以恤民惠商其法曲備而穀物之積所在皆有之故遇天患可禁貴賣者後世救荒則以增價招商為善政時勢各有宜也儥當作賣四時之珍異亦如之薦宗廟之物凡國之賣儥各帥其屬而嗣掌其月嗣以次更代也凡師役㑹同亦如之司暴掌憲市之禁令禁其鬭囂者與其暴亂者出入相陵犯者以屬遊飲食于市者若不可禁則搏而戮之以屬游羣聚而游也司稽掌巡市而察其犯禁者與其不物者而搏之不物衣服視占不與衆同及所操物不如品式掌執市之盜賊以徇且刑之徒徇者不必刑若盜賊則必以徇且刑之所謂附于刑者歸于士也市之大刑撲罰又曰凡有罪者撻戮而罰之則歸于士者惟盜賊可知矣胥各掌其所治之政執鞭度而巡其前掌其坐作出入之禁令襲其不正者市有坐作之禁令者有司稽巡當起立襲掩捕也凡有罪者撻戮而罰之罰使出布肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相爾也而平正之爾亦近也均是物也而其賈或倍蓰十百千萬故必辨其名實斂其總布掌其戒禁賈師職曰凡國之賣儥各帥其屬而嗣掌其月賈師之屬肆長也買賒官物之布必肆長斂之可知矣其或日終而總計之或旬終而總計之以㑹于㕓人故曰總布與泉府掌以市之征布斂市之不售貨之滯于民用者以其賈買之物楬而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之抵故賈也于此見聖人愛民之實而後世平準均輸藉以浚民者不得假託也買貨必從所司者官收滯貨本以利民必實有需用然後豫之若逺商大賈轉貨逐利則不豫也貨之滯者踰時必騰躍故設禁如此凡賒者祭祀無過旬日喪紀無過三月賒貰也凡民之貸者與其有司辨而授之以國服為之息民有急貸于官第歸其本而服國事以當其息也禹貢三百里納秸服周官服公事者他如服勞服役皆以任其力為義而鄭氏以王莽之受息釋之誤矣貴與馬氏曰賒貸者三代之法也三代之時非直周公之聖可行雖中主能行之三代之後非直王莽之矯詐介甫之執愎不可行雖賢哲亦不能行其故何也蓋三代之時寰宇悉以封建天子所治不過千里公侯則自百里以至五十里卿大夫又各有食邑分土而治上之所以治其民者不啻祖父之于子孫家主之于臧獲雖諸侯卿大夫不必皆賢然既世守其地與民則不容不視為一體故姦弊無由生而良法可以世守自封建變為郡縣人君宰制六合穹然于上郡守縣令更代無常發政施令不過受成于胥吏不獨賒貸一事凡瑣細繁密之制執而行之必反為民病世儒治周官不能識其大本求其精意而好舉其制之瑣細繁密者以為疑所謂不通時變也凡國事之財用取具焉歲終則㑹其出入而納其餘凡國事之財用取具于泉府以在市而通百物也外府泉府為通職外府職曰凡祭祀賓客喪紀㑹同軍旅共其財用之幣齎賜豫之財用蓋九職貢物所無而為邦用所必需者則外府共其布泉府市其物也納其餘入于職幣也司門掌授管鍵以啓閉國門管籥也鍵謂牡用管以啓用鍵以閉幾出入不物者正其貨賄凡財物犯禁者舉之正當讀征謂稅其物也財物犯禁者如木不中伐布帛不中數量用器不中度之類言舉而不言罰者門近于市矣故舉之使受罰于質人也陳及之曰即司市所謂飾僞之禁在民商賈工者各十有二是也以其財養死政之老與其孤謂門關之委積死政死國事者祭祀之牛牲繫焉監門養之散祭祀之牲繫于門監門門徒也凡歲時之門受其餘受祭門之餘凡四方之賓客造焉則以告造至也司關掌國貨之節以聨門市貨節璽節也司貨賄之出入者掌其治禁與其征㕓㕓人斂㕓布司關復有征㕓者或留貨于關以待野鄙之交易而不入于門市也凡貨不出于關者舉其貨罰其人暫舉其貨俟詰問或撻其人或罰以布而仍還其貨也司圜職凡圜土之刑人也不虧體其罰人也不虧財司市職有罪者撻戮而罰之凡罰多以財言也若舉為悉沒其貨則財之虧逾量矣而復罰以財必無是法也王氏曰出下疑脫入字凡所達貨賄者則以節傳出之商或取貨于山澤野鄙而無司市之璽節至關關為之璽節及𫝊以出之其有璽節者亦為之𫝊𫝊如後世移過文書國凶札則無關門之征猶幾凡四方之賓客叩關則為之告叩猶至也有外內之送令則以節傳出內之外自侯國都鄙而入者內自王都而出者送令謂奉貢獻及齎文書者掌節掌守邦節而辨其用以輔王命邦節即下所列諸節也王有命則别其節以授使者舊說謂珍圭牙璋穀圭琬圭琰圭非也圭璋之用典瑞辨之此職所辨者節也蓋圭璋以達王命以節輔之守邦國者用玉節守都鄙者用角節諸侯于其國中公卿大夫王子弟于其采邑有命亦以節輔之凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之英蕩函器盛此節者邦國之使節使邦國者所執也小行人所達謂之天下之節則邦國都鄙使者所執也非王官所掌而式法亦自掌節出英蕩為函器則不得云輔别本作簜干寶曰英刻書也簜竹箭也刻書所事以助使節之信門關用符節貨賄用璽節道路用旌節皆有期以反節道路主治五涂之官謂鄉遂大夫也凡由門者司門為之節由關者司關為之節其商則司市為之節以徵令及家徙則鄉遂大夫為之節變司市言貨賄者貨賄非必由市也變鄉遂言道路者公邑小都大都之吏皆主治五涂各有民也疑符節璽節乃刻竹書所由加印行者自執之旌節則道路之官使人持之以送行者非朝聘及賫貢賦無所用之凡通達于天下者必有節以𫝊輔之在境內惟家徙及轉貨乃有節暫出者不必有也無節者有幾則不達詰逋逃及姦宄也遂人掌邦之野郊外曰野遂人所掌惟造縣鄙形體之法及治溝洫兼甸稍縣都其他政令惟掌六遂公邑及家稍縣都之政令則縣師掌之以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁以歲時稽其人民而授之田野簡其兵器教之稼穡遂之鄰里酇鄙縣與鄉之比閭族黨州同法而異其名者師田行役各以旗物帥其衆庶而至異其名乃便識别耳凡治野以下劑致氓以田里安氓以樂昏擾氓以土宜教氓稼穡以興鋤利氓以時器勸氓以疆豫任氓以土均平政變民言氓異內外也致猶㑹也雖受上田中田及㑹之以下劑為率謂可任者家二人也樂如酺蠟之類昏謂嫁娶之禮興鋤者地有豐凶興起羣氓使彼此相助則交得其利若移用其民以救其時事及五黨相賙之類是也彊當作疆古者疆埸有瓜口衆者多豫之所以任其力政讀為征以土之肥墝均平其稅及力役之征辨其野之土上地中地下地以頒田里上地夫一㕓田百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之萊謂休不耕者餘夫亦如之謂所受之田亦有萊也鄉受田無餘夫之文以輸將服公事者皆近取于鄉也鄉之上地無萊以近城郭人畜多易糞也凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿遂溝洫澮深廣見匠人徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌曰達于畿則家稍公邑縣都溝洫之制皆遂人主之曰治野以作溝洫畛涂言也故計所占之地而曰十夫其實耕者乃一井九夫之地耳匠人所謂方十里為成即此經千夫之地而耕地則九百夫匠人所謂方百里為同即此經萬夫之地十而耕地則九萬夫詩曰十千維耦蓋舉其成數猶三十三里少半里而曰終三十里也不足据以破周禮明齊王氏曰凡疏導之法挽漕之便皆于是在而封植以息爭端設險以限戎馬實寓其中矣自遂溝徑畛而下民自治之至洫涂澮必上之人創之合衆力修治若川與路則非一方之民所能辦必損府庫之積移用其民乃可成軍禮所謂大役任衆者也浚儀王氏曰禹盡力乎溝洫濬畎澮距川遂人五溝五涂之制因乎古也溝洫之成自禹至周非一人之力溝洫之壞自周至秦非一日之積以歲時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者以頒職作事以令貢賦以令師田以起政役老幼廢疾不可任者也其可任而施舍者蓋貴賤賢能也而不列言之者鄉近國中多君子遂逺郊多野人不惟貴者服公事者不若六鄉之多即賢能之興亦甚少故遂大夫及羣吏職皆無稽貴賤賢能之文而于遂人略言之職九職事兼學藝世事服事政役謂土功及輸將所用即師田徒旅而事則異故更列之下經所謂凡事致野役而師田作野民是也若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之役謂師田若有功作也遂之大旗熊虎也遂人遂大夫合用鳥隼之旗以致衆故得與大司徒同用大旗凡國祭祀共野牲令野職共野牲入于牧人以待事也凡賓客令野修道而委積委積于廬宿市令令遺人也凡賓客兼大司徒小司徒所令大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役致役致于司徒給墓上事及竁也綍舉棺索也大喪之正棺殯啓朝及引六鄉役之載及窆六遂役之凡事致野役而師田作野民帥而至掌其政治禁令凡事謂力政之事遂師各掌其遂之政令戒禁以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者周知其數而任之以徵財征作役事則聽其治訟辨其可食者如牧地則不可食也遂人辨上地中地下地之等而遂師則周知其數遂人令貢賦而遂師徵財征遂人起政役而遂師作役事遂人令師田而遂師掌軍旅田獵之政令或舉其綱或詳其目也不曰井牧而曰經者井法遂人之所掌也項氏曰可任者又有家三人二家五人家二人之異故辨之以知民力巡其稼穡而移用其民以救其時事四時耕耨斂艾芟地之宜早晚不同而有天期地澤風雨之急故移用其民使轉相助以救時急事也後世民自為耕猝有水旱富者尚能自救而貧者則坐視其田之蕪沒然後知先王設官以移用其民慮事周而興利博也讀法興賢詳于鄉經野勸農詳于遂亦互相備凡國祭祀審其誓戒共其野牲審聽冢宰小宰之誓戒以戒其屬吏及民也遂人共野牲遂師復共野牲者遂師各共之以致于遂人遂人總之以入于牧人也遂人不審戒誓而遂師審之者遂人掌野法而不親民治遂師則各有分地凡國祭祀有當執之事當共之物故也入野職野賦于玉府野職八職中貢物也野賦農田之入也所入蓋中玉府之用者農或以物産當邦賦如齒角骨物羽翮草物之類故入于玉府賓客則巡其道修庀其委積巡視其道路修治與否也庀具也大喪使帥其屬以幄帟先道野役及窆抱磿共丘籠及蜃車之役使帥其屬者太宰或司徒也以幄帟先備張神坐也磿者適歷執綍者名也千人分布六綍疏數有度名為適歷遂師抱持役版以巡察之籠承土器也蜃車或曰柩路也載柳四輪迫地而行有似于蜃因取名焉或曰蜃者掌蜃職所謂闉壙之蜃車乃載蜃者軍旅田獵平野民掌其政令比敘其事而賞罰平正其行列部伍也未至師先以軍法部署而行賞罰帥而至則賞罰一聽于大司馬若大司徒遂大夫各掌其遂之政令以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事掌其政令戒禁聽其治訟功事九職之事民功也令為邑者歲終則㑹政致事舊說不言其遂之吏而言為邑者容公邑及卿大夫王子弟之采邑政令禁戒遂大夫亦施焉非也小司徒通掌國中及四郊都鄙故所令及羣吏而三年大比所考止六鄉四郊之吏都鄙甸稍之吏尚别使縣師考之則非遂大夫所及明矣按遂人掌造縣鄙形體之法豈六鄉近國中雖分鄉州而無城邑六遂逺各有城邑而因以名其吏與正歲簡稼器修稼政三歲大比則帥其吏而興氓明其有功者屬其地治者興氓興賢能也因舉吏治有功者而聚敕其餘以職事稽夫家畜産以及政令徵比治訟之事自遂人遂師遂大夫以及縣正鄙師酇長每職必列不厭其復而興氓止于遂大夫職一見之簡挍賓興之法無一及焉何也政令徵比治訟之事自遂大夫以下羣吏所掌與鄉有同異故每職備列之興賢之典一同于六鄉覆列之則贅矣故第言帥其吏以興氓而知一準于六鄉也遂大夫之職與鄉大夫異者聽治訟也縣正與州長異者掌治訟也鄙師與黨正異者掌祭祀而不及于喪紀冠昏飲酒也酇長與族師異者治祭祀喪紀也里宰與閭胥異者不掌祭祀喪紀之數也鄰長與比長異者贊邑政也鄉大夫不聽治訟六官之長未遑鄉邑之治也故使鄉師聽之遂大夫遂師皆曰聽其治訟者遂師所聽獨財征役事之訟凡訟並歸遂大夫也遂之治訟分聽之者煩于鄉也鄉近王都國中之訟皆歸于鄉士矣遂大夫曰聽治訟縣正曰掌治訟者掌達之于遂大夫而不專決也鄉之中州長蒞大喪黨正掌喪紀冠昏閭胥掌喪紀之數遂之喪紀僅一見于酇長職冠昏飲酒則并無其文者鄉乃公卿大夫賢士所萃故喪紀冠昏飲酒禮義備焉遂則羣氓聚居分卑禮略不敢以煩有司也喪紀所關尤重其士大夫之家則酇長治之凡為邑者以四達戒其功事而誅賞廢興之四達或曰治民之事大通者有四夫家衆寡也六畜車輦也稼穡耕耨也旗鼓兵革也或曰考邑治必旁達四邑以相參而後賢不肖勤惰可見或曰為邑者縣正也下達于鄙師酇長里宰鄰長凡四等上達于遂大夫遂師遂人大司徒亦四等縣正各掌其縣之政令徵比以頒田里以分職事掌其治訟趨其稼事而賞罰之徵徵召也比案比也若將用野民師田行役移執事則帥而至治其政令移執事即遂師職所謂移用其民以救其時事也既役則稽功㑹事而誅賞稽功者每人而分考其程也㑹事者合計其功事以為役要也鄙師各掌其鄙之政令祭祀凡作民則掌其戒令以時數其衆庶而察其媺惡而誅賞察衆庶之媺惡將以助遂大夫興氓也鄙師所掌獨無農事者其大綱則遂大夫縣正董之其細目則酇長里宰親之歲終則㑹其鄙之政而致事酇長各掌其酇之政令以時挍登其夫家比其衆寡以治其喪紀祭祀之事挍差次之也若作其民而用之則以旗鼓兵革帥而至若歲時簡器與有司數之有司遂大夫所委屬吏也遂大夫簡器豈能遍數舊說誤凡歲時之戒令皆聽之趨其耕耨稽其女功聽謂受而行之也古者王內之政令內宰治之民家之女功酇長稽之所以上下男女各警其職而事無不舉教無不行也里宰掌比其邑之衆寡與其六畜兵器治其政令以歲時合耦于鋤以治稼穡趨其耕耨行其秩敘以待有司之政令而徵斂其財賦耜廣五寸二耜為耦耕必以耦人之少長老疾死喪不齊故以歲時合之鋤者里宰所治處于此合耦使相助因放而為名秩敘受耦相佐助之次第鄰長掌相糾相受凡邑中之政相贊徙于他邑則從而授之鄰長即耦耕之民故所掌無農事旅師掌聚野之鋤粟屋粟閒粟而用之屋粟有田不耕者所罰三夫之稅粟閒粟閒民無職事者所出一夫之征粟鋤粟民自相助之粟也古者以政成民建設長利不僅恃上之賑恤也易曰君子以勞民勸相春秋傳曰務穡勸分蓋使民自相助則所濟者博故司徒職五黨為州使之相賙司稼職均萬民之食而賙其急遂人職以興鋤利氓皆使民自相助也此經所謂鋤粟即所興以相助者鋤粟屋粟閒粟皆非公田所入故特設旅師以掌之各貯其鄉里以賑貸平民給新氓注疏謂主斂縣師所徵賦穀誤矣以質劑致民平頒其興積施其惠散其利而均其政令興積即三者之粟賑者貸者皆平頒之不得偏有多少施其惠者不責以償也散其利者春頒而秋斂之也貸者則有質劑均其政令者頒斂之期亦不得偏先後也凡用粟春頒而秋斂之凡新氓之治皆聽之使無征役以地之媺惡為之等新氓來徙家者治謂有所乞求也以地媺惡為之等計口而授以上中下之田也李倫曰無征役暫耳以地媺惡為之等者不易之地一年後征役之一易者二年再易者三年遺人委人所待羈旅以疾病事故滯留者旅師所掌乃新氓來徙家者將治而教之故官以師名稍人掌丘乘之政令丘出馬四丘出車一乘故曰丘乘蓋掌賦兵之政令也若有㑹同師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽于司馬縣師通掌邦國都鄙稍甸郊里將有軍旅㑹同田役之戒則受法于司馬以作其衆庶及馬牛車輦使皆備其旗鼓兵器以帥而至鄉之帥而至者州長也遂之帥而至者縣正也家邑則其吏公邑則其長也稍人掌丘乘之政令故以縣師之法作之而因通帥焉曰以至者以州長縣正之屬至也同猶調也凡起役皆更番以人數調之行役非畿內之士功也如仲山甫城齊召伯城謝之類故不聽于司空而聽于司馬大喪帥蜃車與其役以至掌其政令以聽于司徒委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物舊說委人所掌惟薪芻疏材而無粟米非也果爾則曰掌斂野之薪芻凡疏材木材凡畜聚之物可矣其曰斂野之賦者蓋甸稍之米粟亦委人掌之也知然者遺人所掌無甸稍之委積委人兼掌甸稍之聚而軍旅共其委積薪芻也薪芻疏材木材獨于甸稍斂之者居王畿之中而環郊遂便委輸也凡蓄聚之物謂瓜瓠葵芋禦冬之具以稍聚待賓客以甸聚待羇旅曰稍聚甸聚者獨共其薪芻而無粟米也遺人職郊里之委積以待賓客野鄙之委積以待羈旅而此職賓客共其芻薪軍旅共其委積薪芻則賓客無委積可知矣羈旅者賓客之細也舉賓客則羈旅可知軍旅用廣故甸稍之委積並蓄以待共而後不虞其乏匱也凡其余聚以待頒賜余當為餘以式法共祭祀之薪蒸木材賓客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡疏材共野委兵器與其野囿財用式法故事之多少也薪蒸給炊及燎木材給大次小次之張事野委謂委積之分貯四野者有守者故共其兵器野囿之財用謂苑囿藩籬之材凡軍旅之賓客館焉凡軍旅之士衆惟供其物而將帥之為賓客者則授館也詩曰敦彼獨宿亦在車下則士衆不可遍館明矣凡賓客㑹同師役遺人掌其道路之委積而委人復掌之者遺人掌其頒之令而委人則供其物也土均掌平土地之政以均地守以均地事以均地貢土地之政邦國都鄙所征于民也地貢所貢于王朝也均人曰均地政鄉遂公邑並征其財賦也土均曰均地貢邦國無粟米之征都鄙自委積而外所征亦貢物為多也若九職之事則無所用其均且均侯國之九職亦非王官所能及也此職地事與均人所謂地職略同而變職言事者畿內㑹同師田力役之事皆承職于王朝故均人曰地職土均兼掌邦國則師田力役賓旅有自為其國事而非王朝之職事者矣故統之曰地事也以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令政令刑禁施舍及民之禮俗喪紀祭祀皆以地媺惡制其輕重之法則地守地事地貢不必言矣草人掌土化之法以物地相其宜而為之種化土使媺漢時汜勝之術其遺也物地占其形色也種各有宜詳見管子地員篇凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬糞種燒獸骨為灰或搗蕡子以漬其種也騂剛色赤而性剛赤緹縓色也墳壤墳起而解散也渴澤故水處潟鹵也貆貒也勃壤粉解者埴壚黏疏者彊㯺强堅者輕爂輕脆者稻人掌稼下地下地水澤之地也以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田偃瀦者畜流水之陂也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝也其用水也自防之水門以入于溝自溝以入于遂舍于列而灌溉通焉水過大則以澮瀉之于川而毋使害稼也所芟草積田中恐其根附土復生故舍水于列中以涉播揚而反之使其根在上則槁而澌腐可以糞田凡稼澤夏以水殄草而芟荑之此始變澤地為田之法也澤中草盛根著于土雖芟荑復生甚易惟夏月積水土柔可因水力而絶其本根然後芟荑蘊崇之則草不復生而可稼也澤草所生種之芒種楊愼曰即江湖間葑田也葑菰根繁而糾結上著泥土可耕種郭璞江賦播匪藝之芒種挺自然之嘉蔬蓋謂此耳滇南亦有葑田名曰海芒種稻有芒者旱暵共其雩斂喪紀共其葦事雩斂雩事所發斂也稻急水故稻人共之葦所以闉壙土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求王巡守則夾王車道說也地慝若瘴蠱及所産惡物害人者原其生以詔地求謂物生有時地所無及物未生則不求王志長曰地事謂形勝厄塞邊腹衝僻之類辨地物而原其生如湍水人輕濁水人重幽燕沉徑吳楚剽疾之類而物産亦在其中誦訓掌道方志以詔觀事掌道方慝以詔辟忌以知地俗王巡守則夾王車方志四方記舊事之書如春秋傳所謂不出鄭志是也觀事省方觀民設教之事也方慝其政俗之惡而宜革者辟忌避其語言所忌山虞掌山林之政令物為之厲而為之守禁物為之厲每物有蕃界也為之守禁為守者設禁令也守者即其地之民占伐林木者林自有衡此兼言林者山內之林即山虞兼掌之或曰林衡亦受法于山虞也仲冬斬陽木仲夏斬隂木陽木春夏生者隂木秋冬生者或曰生山南為陽木生山北為隂木冬斬陽夏斬隂則堅濡調凡服耜斬季材以時入之服牝服即車箱有鑿孔以軫子貫之故謂之牝服季猶稚也服與耜尚柔刃宜用稚材或曰季木之老者車農器最勞非稚木可任令萬民時斬材有期日王制草木零落然後入山林凡邦工入山林而掄材不禁掄猶擇也春秋之斬木不入禁萬民春秋需材僅可斬四野之木不得入山林厲禁凡竊木者有刑罰閭師職不樹者無槨則宅舍無棄地此職竊木有刑罰則原野無耗材古之治天下至纎至悉也故蓄積足恃皆此類也若祭山林則為主而修除且蹕為主主辨護之若供時用相禮儀也修除治道路場壇若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉萊者將田于是則不除其草萊使禽獸得生息也弊田田者止也山虞有旗以主山得畫熊虎其仞數則短珥者取禽左耳以效功也林衡掌巡林麓之政令而平其守以時計林麓而賞罰之平其地之民守林麓之部分若斬木材則受法于山虞而掌其政令川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之澤與川連者則川衡兼掌之三時皆可漁惟别孕之時則官舍止其所守之地以伺察其犯禁者林材可時計網罟之入無可稽尋非止于其地不可祭祀賓客共川奠川奠邊豆之實魚鱐蜃蛤之屬山林不舉奠物者惟田獵以共乾豆川澤之奠物則不出于田獵也川衡澤虞不言祭則為主者于山林舉之則川澤從可知也田獵則于澤復特舉者澤水所鍾不特舉不知澤野之可以田也澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于玉府頒其餘于萬民獨澤言國者稻人掌稼下地則澤可稼者仍頒于民其餘乃澤虞之所守耳財物之入于玉府者犀角象齒珠貝之類也金玉生于山而山虞不言入其財物于玉府者草人取之入于職金而後職金以入于玉府也凡祭祀賓客共澤物之奠亦籩豆之實芹茆菱芡之屬喪紀共其葦蒲之事蒲以為席若大田獵則萊澤野及弊田植虞旌以屬禽澤鳥所集故注析羽之旌迹人掌邦田之地政為之厲禁而守之凡田獵者受令焉令謂田獵之時與地禁麛卵者與其毒矢射者草人掌金玉錫石之地而為之厲禁以守之若以時取之則物其地圖而授之巡其禁令草古礦字金未鎔玉在璞曰礦物地占其形色也角人掌以時徵齒角凡骨物于山澤之農以當邦賦之政令賦十一之稅也政令師田力役也觀此則九職貢物之外别無九賦益明矣山澤間皆有耕者特其田不井因使散處以守財物以度量受之以共財用骨入漆浣者以量受其餘以度度所中羽人掌以時徵羽翮之政于山澤之農以當邦賦之政令翮羽本凡受羽十羽為審百羽為摶十摶為縳爾雅一羽謂之針十羽謂之縳百羽謂之緷其名音俱相近掌葛掌以時徵絺綌之材于山農凡葛征徵草貢之材于澤農以當邦賦之政令以權度受之凡葛征謂征其已織者草貢檾紵之屬可緝績者古者王畿四面各五百里而骨物羽翮葛材草貢物皆輕細徵以當賦乃所以利民後世郡縣萬里而置均輸平準且凡物皆取焉轉輸出納吏得為奸而民困于無告矣掌染草掌以春秋斂染草之物以權量受之以待時而頒之染草茅搜槖蘆豕首紫茢之屬掌炭掌灰物炭物之徵令以時入之以權量受之以共邦之用凡炭灰之事凡炭灰蜃灰烟煤之類以共甃砌浣練黝堊之用掌荼掌以時聚荼以共喪事以著物也既夕禮茵著用荼徵野疏材之物以待邦事凡畜聚之物荼疏材之類因使掌焉徵于山澤入于委人掌蜃掌斂互物蜃物以共闉壙之蜃互物蚌蛤之屬闉猶塞也壙穿中也將井椁先塞下以蜃禦濕也春秋傳宋文公卒始厚葬用蜃炭祭祀共蜃器之蜃以飾祭器也鬯人職曰凡四方山川用蜃器春秋傳天王使石尚來歸脤盛以蜃器因名焉共白盛之蜃盛猶成也謂飾牆使白惟宗廟用之囿人掌囿游之獸禁牧百獸祭祀喪紀賓客共其生獸死獸之物以共喪祭賓客則不畜珍禽竒獸可知矣吳氏曰生獸死獸之物獸人共者田獵所獲也囿人共者苑囿所養也場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賓客共其果蓏享亦如之舊說享謂朝事之籩豆或曰每月朔薦非也祭祀已該此二節不宜曰亦如之外饔職于祭祀賓客後繼以邦饗耆老孤子士庶子槀人職凡饗耆老孤子士庶子共其食此職所共亦謂是與廩人掌九穀之數以待國之匪頒賙賜稍食匪讀為分謂委人所頒諸委積也賙賜王所賜豫給好用之式也稍食廩祿以歲之上下數邦用以知足否以詔穀用以治年之凶豐數猶計也王志長曰以稅入之多少制國用之數此成周賦法之所以善以國用之多少制取民之數此後世賦法之所以不善也凡萬民之食食者人四釜上也人三釜中也人二釜下也六斗四升曰釜皆謂一月所食若食不能人二釜則令邦移民就穀詔王殺邦用凡邦有㑹同師役之事則治其糧與其食古者師行無饋餉所謂治糧與食者令道所經有司共之委人職軍旅共其委積倉人職凡國之大事共道路之穀積是也注行道曰糧疏引乃裹糇糧以證之恐未安書曰峙乃糗糧非行者所自齎可知矣公劉遷豳之事未可為行師常法食疑謂蔬菜六畜凡食物也大祭祀則共其接盛接讀為一扱再扱之扱扱以授舂人舂之大祭祀之穀籍田所收藏于神倉者不以給小用春秋傳曰魯祭周公何以為盛周公盛魯公燾羣公廩解者曰燾謂下故上新各半也廩謂全用舊穀少覆以新然則謂之接盛者豈有取于新故之相接續與舍人掌平宫中之政分其財守以法掌其出入政謂用穀之政分其財守謂計當用之數分送宫正內宰使守而頒之出謂出米于廩人入謂還收其空缺者李耜卿曰財即米也喪大記納財朝一溢米暮一溢米凡祭祀共簠簋實之陳之賓客亦如之共其禮車米筥米芻禾方曰簠圓曰簋車米筥米芻禾之數見掌客職舂人共祭祀之米􅐪人為盛然後舍人實之簠簋而陳之舂人共賓客牢禮之米差擇之也舍人則實之筥載之車故曰共其禮喪紀共飯米熬穀飯含飯也熬穀舊說錯于棺旁以惑蚍蜉豈誘之出而掘去其窟穴與喪大記熬君四種八筐大夫三種六筐士二種四筐加魚臘焉士喪禮設熬旁一筐乃塗以歲時縣穜稑之種以共王后之春獻種縣之者欲其風氣燥達也掌米粟之出入辨其物九穀中黍稷稻粱苽大豆皆有米麻小豆小麥無米辨其物則知其用所宜歲終則㑹計其政倉人掌粟入之藏穀不去殼則可久藏辨九穀之物以待邦用若穀不足則止餘法用有餘則藏之以待凶而頒之餘法用謂賙賜之類道路之委積不可止也舊說誤凡國之大事共道路之穀積食飲之具委人軍旅共其委積此復共穀積者曰凡國之大事則兼大喪大祭不獨軍旅也倉人通掌畿內粟入道路之委積遺人令之倉人出之廩人治之委人共之故四職為聨事而委人倉人並曰共也司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為法而縣于邑閭巡野觀稼以年之上下出斂法掌均萬民之食而賙其急而平其興均萬民之食而賙其急使民自相賙也豐穰更事彼此相通則交得其利司徒職所謂五黨為州使之相賙是也平其興猶旅師所謂平頒其興積也先王之于農事始則移用其民以相救終復均調其食以相賙則天患之小者舉不足以病民矣舂人掌共米物米物者其質之美惡舂之精粗非一類也祭祀共其齍盛之米賓客共其牢禮之米凡饗食共其食米掌凡米事饎人掌凡祭祀共盛盛炊而共之共王及后之六食凡賓客共其簠簋之實饗食亦如之六食謂六穀之飯槀人掌共外內朝冗食者之食冗食謂留治文書及給事者謂之冗食以其人自有廩祿因給事內外朝不暇自為食而官共之也若饗耆老孤子士庶子共其食掌豢祭祀之犬不豢于饎人者共至尊潘灡戔餘不可䙝也李耜卿曰冢宰掌邦治舉其要耳其僚屬庶尹皆經理王宫之政至于遂生復性以寵綏斯民者未遑也故設司徒之職舉天王作君作師之事而致之于民乃順承天萬物資生故曰地官也教始于郊里故自小司徒至比長八職專主六鄉而牧田牛田在鄉者故封人牧人牛人充人四職次之鄉之政有二曰征役施舍曰德行道藝載師至均人五職詳征役施舍之事也師氏至媒氏六職詳德行道藝之教也然則教養之道備矣施之天下何以加兹故曰觀于鄉而知王道也王國面朝後市王門十二在六鄉之內十二關門則臨畿上今次于鄉之下遂之上者市雖在國容五百里疆界中凡五十里之市皆在焉門關則連于市以達貨賄者關市有譏用節為多故司市至司關十二職為一類而掌節附焉遂人至里宰專及田野之制稼穡之緒與六鄉互見為義旅師如鄉之閭師也稍人如鄉之縣師也委人土均如鄉之遺人均人也而鄉有封人載師縣師遂有稍人土均則通公邑都鄙邦國之政皆舉之矣草人稻人詳穡事養民之原也土訓誦訓通土俗教民之本也四職所掌鄉遂都鄙邦國皆有焉故次于土均之後也若夫山林川澤賦貢之所出國用賴焉故自山虞至場人十有五職又次之冡宰所列九賦九貢之目盡于此矣賓祭之所取軍旅喪紀之所共膳羞祿廩凡為九式用財者將于是乎在故廩人至槀人職終焉司徒敷教而教職惟鄉官師保等十數人其間所措理者養民之事居多先儒疑為司空之錯簡是不然夫先王之世辨物居方秀者為士而朴者為農下及工商各有常居皆有法守使之父以教其子兄以教其弟習其耳目而定其心思間其道藝而世其家業無非以道率民豈必東膠西序始名教哉孟子曰無恆産而有恆心者惟士為能故制民之産然後驅而之善若生者不得其情死者不盡其常矍矍然喪其降衷秉彝之心其鈍頑無恥者固相率而歸于悖戾不可復制即常性未移者亦頽墮委靡消沮而不復振則道之不行從可知矣此司徒一篇所以聨教養為一事也然則司空之職何與周禮為書委曲周詳無不備者獨至壇兆廟社之法井田長廣之方附庸閒田所餘之多寡山林川澤城郭宫室涂巷三分之乘除天時有生耕穫何以無失其序地理有宜髙下何以無拂其性山川沮澤民居有度焉興事任力逺近有量焉宫室之制器皿之宜舟車之用凡數事者雖略見于諸官而未詳其規度宜皆列職于司空而春秋戰國之世開阡陌盡地力相兼以力相侈以僭司空一篇尤其所深病而急欲去其籍者也其失蓋亦久矣後儒竄綴紛紜離散全經區區之心竊病其援周公以從已也周官集注卷四
