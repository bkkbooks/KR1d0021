body:
  text: 周官集注卷七翰林院侍講銜方苞撰夏官司馬第四夏于時為火于卦為離離為甲胄為戈兵離上之象曰王用岀征詩曰如火烈烈則莫我敢曷蓋非威明之極不能用兵以正天下故司馬為夏官主兵而以馬名官軍政莫重于馬也惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國政正也夏后氏命𦙍侯掌六師舉政典以示衆則邦政之掌于司馬舊矣凡國事無非政而獨于司馬言政者張皇六師然後禮樂征伐自天子出而政行于天下也政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人輿衆也行謂軍行列晉作六軍而有三行取名于此輿司馬行司馬即用官中之士特在官府則曰上士中士在軍則曰輿司馬行司馬耳司馬總六軍軍事繁重故史胥徒獨多黄文叔曰輿司馬掌車行司馬掌卒軍司馬兼掌之凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長言軍將皆命卿則以下軍帥不特置選于六官六鄉之吏德任者使兼官焉詩大雅常武整我六師此王六軍之見于經也春秋傳曰成國不過半天子之軍又王命曲沃伯以一軍為晉侯又晉作二軍此諸侯軍制之見于傳也一軍則二府六史胥十人徒百人在軍則置之罷則已司勲上士二人下士四人府二人史四人胥二人徒二十人勲功也軍無賞不足以作衆故首司勲馬質中士二人府一人史二人賈四人徒八人質平也主買馬以供軍用而平其賈直地官歳時稽鄉遂都鄙之牛馬辨其可任之物馬之在民者無不足之慮矣而公馬之缺則官買之馬質宜屬挍人今列此者挍人兼掌六馬而戎馬之用尤多其事尤急故先之量人下士二人府一人史四人徒八人小子下士二人史一人徒八人羊人下士二人史一人賈二人徒八人司爟下士二人徒六人爟故書為燋爟者民間理爨之火也掌固上士二人下士八人府二人史四人胥四人徒四十人國曰固野曰險易曰王公設險以守其國司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人候人上士六人下士十有二人史六人徒百有二十人候迎賔客之來者詩曰彼候人兮何戈與祋故列于夏官其灋必每方各上士一人下士二人餘六人則掌逹于朝或軍行則從也環人下士六人史二人徒十有二人以環名官取廵邏周札之義在軍則置之與秋官環人掌迎送之職異挈壺氏下士六人史二人徙十有二人世主挈壺水以為漏軍行必載漏故屬夏官射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人服不氏下士一人徒四人服不服之獸射鳥氏下士一人徒四人羅氏下士一人徒八人掌畜下士二人史二人胥二人徒二十人司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人司士𨽻夏官以司馬論辨官材習察其人然後用之各當也諸子下大夫二人中士四人府二人史二人胥二人徒二十人司右上士二人下士四人府四人史四人胥八人徒八十人虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人不言徒而曰虎士蓋勇而有志行者旅賁氏中士二人下士十有六人史二人徒八人以旅名者言為王心膂也夾王車而趨其地尤近職尤親故皆以命士為之且世職焉蓋必材武過人忠義素厲而後得與此選後世逆亂多由禁旅使宿衛皆世臣良士姦兇豈能煽哉節服氏下士八人徒四人節服氏𨽻夏官以與諸僕聮事凡王有行無不從也方相氏狂夫四人方相猶言放想可畏怖之貌或曰以其相視而攻疫者非一方也故月令于大難曰旁磔大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人𨽻僕下士二人府一人史二人胥四人徒四十人弁師下士二人工四人史二人徒四人弁者古冠之大稱司甲下大夫二人中士八人府四人史八人胥八人徒八十人司兵中士四人府二人史四人胥二人徒二十人司戈盾下士二人府一人史二人徒四人司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人繕人上士二人下士四人府一人史二人胥二人徒二十人稾人中士四人府二人史四人胥二人徒二十人箭幹謂之稾戎右中大夫二人上士二人右者參乘此充戎路之右田獵亦參乗焉戎右以中大夫齊右以下大夫道右以士者右取其武故戎右宜尊賔祭尚嚴故次之朝夕視朝武非所尚也右以戎兼田以祀兼賔而僕各異者右主捍衞其事可兼賔祀師田車行異節必各有專僕而後事可閑也齊右下大夫二人道右上士二人李子華曰自戎右而下無府史胥徒蓋臨事取之司右官非特置也大馭中大夫二人戎僕中大夫二人齊僕下大夫二人道僕上士十有二人田僕上士十有二人馭夫中士二十人下士四十人王朝朝暮夕駕税煩故道僕數最多田僕亦多者王田道車斿車并從也據挍人職馭夫當六十三人此疑脱王志長曰戎車之馭與大馭同為中大夫者重戎也而不得同稱馭者重祀也挍人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人主馬者必挍視之故以名官趣馬下士皁一人徒四人趣養馬者詩蹶維趣馬巫馬下士二人醫四人府一人史二人賈二人徒二十人巫馬知馬祖先牧馬社馬歩之神者馬疾若有犯焉則知之牧師下士四人胥四人徒四十人地官牧人掌牧六牲惟馬之為牲者則牧焉餘皆牧師所掌廋人下士閑二人史二人徒二十人廋之言數圉師乗一人徒二人圉人良馬匹一人駑馬麗一人養馬者曰圉四馬為乗麗耦也職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人主四方之貢土方氏上士五人下士十人府二人史五人胥五人徒五十人懐方氏中士八人府四人史四人胥四人徒四十人懐来也合方氏中士八人府四人史四人胥四人徒四十人訓方氏中士四人府四人史四人胥四人徒四十人形方氏中士四人府四人史四人胥四人徒四十人山師中士二人下士四人府二人史四人胥四人徒四十人王制云名山大澤不以封故天子立山川之師以遙掌之使貢故與職方連類在此土方氏形方氏及山師川師邍師所役皆司徒之事而以屬司馬者示有不稟職方之度而侵敗王略者則九伐隨之也川師中士二人下士四人府二人史四人胥四人徒四十人邍師中士四人下士八人府四人史八人胥八人徒八十人匡人中士四人史四人徒八人撢人中士四人史四人徒八人主撢序王志以語天下李泰伯曰天下之情欲上逹故訓方氏之職設人主之志欲下通故撢人之職設古者君民一體上下交孚而無壅遏之患如此都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人此王臣遥掌都事家司馬各使其臣以正于公司馬卿大夫之采地王不特置司馬各自使其家臣為之主軍賦以聽政于王之司馬公司馬即職文所謂國司馬也大司馬之職掌建邦國之九灋以佐王平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以糾邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國獨九灋曰邦國者四官所建皆王邦之典而侯國兼用之九灋則專為侯國而設也制畿即下經九畿設儀即司儀所掌九儀進賢謂諸侯有德者加命為牧伯興功謂諸侯有功者加地進律牧八州之牧監卒正連帥以下相監臨者分職謂王廵狩征伐大小之國各有所承之職事春秋傳所謂各修舊職是也均守即司徒職所謂均地守掌固職所謂通守政也八則者王國所以治都鄙而侯國亦用焉守均而則平則内和外固而國無不安矣五官之典皆備于九灋而以屬司馬何也不能四征不庭則五官之典皆不行于天下書曰其克詰爾戎兵以陟禹之迹江漢之詩言召虎南征疆土是徹蓋率由周公之典灋也以九伐之灋正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之眚病之也如貶其爵命薄其恩禮披其附庸之類與削異野荒民散不能自治其國邑故削之馮弱犯寡必雄桀驕蹇之侯也病之使不能張則自戢矣壇謂出其君置之空墠之地而更立賢者暴内即上賊賢害民陵外即上馮弱犯寡兼是二者故奪其位伐者聲罪致討侵者出其不意而扼其要塞詩所謂罙入其阻也要荒之國負恃險阻非奪其所恃終不可服故利用侵正執而治其罪也殘殺也犯令陵政則叛上之迹已著杜之者使鄰國不得交通環而攻之也殘止于誅其身滅則冺其宗社蓋舎亂人之類其或先世有元德顯功則建置族姓可矣正月之吉始和布政于邦國都鄙乃縣政象之灋于象魏使萬民觀政象挾日而斂之乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衞畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿籍其禮差之書也政職謂王巡狩征伐所承之職事自蠻服以上乃中國之九州夷服以下則大行人所謂蕃國世一見者李耜卿曰此經即施貢分職以任邦國也下經即簡稽鄉民以用邦國也九灋皆經理諸侯惟此二事乃王之所得于諸侯者故特詳之凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人此徴兵邦國之制朱子曰賦兵也古者以田賦出兵故謂兵為賦覆舉遂人職文者必知其可任之人數然後可定徵兵之數也侯國制畿施職制地令賦司徒職已具矣而復列于司馬者必司馬董正之然後疆埸不犯而政令無壅也中春教振旅司馬以旗致民平列陳如戰之陳兵者凶事不可空設故因蒐狩而習之凡師出曰治兵入曰振旅春教振旅入而專于農事也秋教治兵農事將畢可出而用之也辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲路鼓賁鼓晉鼓鐸鐲鐃俱見鼓人職鼙見鍾師職提謂馬上鼓有曲木提持立馬髦上者公司馬謂伍長鼓人職以賁鼓鼓軍事而王執路鼓軍將執晉鼓者教戰非即戎也諸侯執賁鼓者教以敵王所愾也以教坐作進退疾徐疏數之節見下經大閲遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社春田曰蒐甸祝掌四時之田表禡之祝號則表貉者甸祝也鄉師出田灋致衆庶而治其政令則誓民者鄉師也故通謂之有司記曰司徒搢扑北面誓之禁者虞衡守禽之厲禁也弊止也春田主用火因焚莱除陳草皆殺而火止獻禽衆獻其所獲也貉書亦或為禡中夏敎茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用茇野宿而草舍也所戒在夜故辨號名使聞聲可别撰擇數之也帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅帥謂軍將古者軍將為營治于國門如魯有東門襄仲宋有桐門右師皆上卿為軍將者縣鄙謂公邑大夫也家謂食采地者之臣也六鄉以州名六遂以邑名百官各象其事謂各書其職事于旗物而因以為號也夜事夜中守戰之事遂以苗田如蒐之灋車弊獻禽以享礿夏田為苗除禽獸之害稼者主用車皆殺而車止礿宗廟之夏祭也中秋敎治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅師都孤卿也治兵所載旗物與司常所建互異何也旜與物無事時所建也故王朝孤卿大夫士建之熊虎之旗鳥隼之旟龜蛇之旐軍旅所建也故師都鄉遂公邑之吏合卒伍簡車輦兵器建之及司馬治兵則師都鄉遂之吏有涖衆而不列陣者故所建異也師都之吏孤卿也軍吏亦孤卿也既有軍吏復有師都而所載各異何也孤卿之長師都而為軍吏者既載旗矣其王子弟及退居采地之孤卿則載旜也鄉遂之吏如州長縣正各帥其民而致者既列陳而作旗矣其鄉師遂師遂大夫黨正之屬掌政令刑禁而不帥車徒以驟趨于行陳者則載物也惟此經所謂郊野即司常職所謂縣鄙而所建所載皆旐蓋公邑之吏帥民而致皆身列陳故旗物無異耳知然者縣師掌邦國都鄙稍甸郊里之地有㑹同軍旅田役則受灋于司馬使各帥其車徒而至鄉之帥而至者州長遂之帥而至者縣正則公邑之帥而至者必其吏也鄉遂之吏有不列陳者故所載異公邑之吏無不列陳者故所載同也然則鄉遂之吏列陳者安載載旟也知然者大閲羣吏以旗物各帥其民而致則鄉遂之吏必仍載旟與公邑之吏載旐同矣其曰羣吏作旗羣吏弊旗即謂旟旐也惟或載旟或載旐故以旗包之也百官亦載旟何也從王而治軍旅故建軍旅之旗物以示威也茇舍治兵稱名各異何也茇舍鄉以州名野以邑名則野為遂明矣故縣鄙為公邑治兵鄉遂載物則郊野必公邑也其或曰縣鄙或曰郊野何也凡公邑皆謂之縣掌于縣師而其地在四鄙其曰郊野又以見逺郊及六遂之餘地亦間設公邑也治兵列師都而不及大夫有采者于百官包之也苃舍則以家包孤卿大夫王子弟也列縣鄙于家之前者公邑也先公邑與家而後鄉遂者茇舍之禮辨號名以習夜事逺者難辨故先之近者易辨故後之也經文鄉遂載物而謂列陳者仍載旟何也以覈其事實而知之也六卿涖其私邑曰師都監六鄉曰鄉大夫而治兵則為軍吏鄉大夫既為軍吏則載旗矣州長縣正以旗物各帥其民而致則必載平時所建之旟矣其載物者獨鄉遂之吏不列陳者耳猶司士所掌朝位三公北面孤東面卿大夫西面而周制常以六卿兼公孤則卿之兼公者必北面矣兼孤者必東面矣其西面者獨不兼公孤之卿耳鄉師于四時之田所治者政令刑禁爭訟也遂師所掌者禁令賞罰也遂大夫所掌無軍事黨正以灋治師田行役之政事此四職者皆涖衆而不列陳則所載旗物必别于列陳者可知矣惟鄉師職巡前後之屯而戮其犯命者近于軍事然曰巡前後之屯則不與圍禁明矣蓋仍治其徒庶之政令耳遂以獮田如蒐田之灋羅弊致禽以祀祊獮殺也羅網也祊當為方秋田主祭四方報成萬物詩曰以社以方春夏曰獻禽秋冬曰致禽者物成而獲多故屬而聚之然後取其上殺以獻也中冬教大閲前期羣吏戒衆庶修戰灋春辨鼓鐸鐲鐃夏辨號名秋辨旗物至冬大閲簡軍實而兼教上三者羣吏鄉師以下虞人萊所田之野為表百歩則一為三表又五十歩為一表田之日司馬建旗于後表之中羣吏以旗物鼔鐸鐲鐃各帥其民而致質明弊旗誅後至者莱芟除其草莱令車徒可列陳也表所以識行列也四表相去僅三百五十歩蓋表太逺則費時多田狩將不及事矣質正也乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之皆坐當聽誓羣吏諸軍帥也車徒當陳于後表之北記曰司徒搢扑北面誓之惟陳于後表之北故誓必北面誓畢然後司馬南面令鼔而車徒以次而前也中軍以鼙令鼔鼓人皆三鼔司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐中軍中軍之將也鼓人師帥旅帥也或曰鼔人職軍動則鼓其衆田役亦如之中士六人各直一軍司馬兩司馬也鳴鐲者伍長也摝鐸止行息氣也以春秋傳考之君雖在軍中軍别有主將蒐狩列職于司馬則中軍宜司馬也而太僕職凡軍旅田役贊王鼓豈王先鼓之而後司馬以鼙令與又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初鼓戒若戒攻敵也鼓一闋車一發徒一刺三而止象敵服鐃所以止鼓車徒皆行及表乃止第一表也車驟徒趨及表乃止第二表也車馳徒走及表乃止第三表也蓋羣吏致民于後表之中陳而皆坐尚未行也故至第一表曰車徒皆行由第一表至第二表象師之進故曰鼓進由第二表至第三表則極矣象伐國之附其城對敵之薄其陳故車發徒刺而鼓退也注疏並誤凡此坐作進退發刺之節四時所同而獨于大閲言之者民事至冬而畢然後車徒可詳簡也注天子六軍三三而居一偏皆中軍自閲非也以理推之司馬主中軍監臨羣吏其五軍之帥亦各閲其屬每軍各立四表如中軍之式諸侯師都之吏則各帥其屬分𨽻六軍中軍不徧閲也蓋古者兵車一乗用士七十五人而大閲之表相去僅百歩必單乗如牆而進始能容其驟趨馳走而及表而止乃得截然齊一雖各閲其屬分班鱗次猶恐難徧况以中軍徧閲六軍乎知必分班以進者每軍萬人若車徒平列逺者當在三數里之外其坐作進退發刺之節雖本軍耳目不能盡及也太閲時疑徧閲六軍之士而車不盡閲魯頌公車千乗公徒三萬以灋考之三萬人僅充三百餘乘之用天子萬乘若盡閲之則無地以陳無人以供𫝊載魯人大蒐于紅自根牟至于商衛革車千乗合魯東西封畧以為言則知非盡陳于所蒐之地矣魯蒐盡陳革車以三桓變舊制分公室各自為軍恐數有虚冒故備陳而數之先王之世不料民而知其多寡况車數乎蓋鄉遂之吏嵗時挍登車輦其灋已悉矣司徒職惟田竭作蓋更番而教之雖大閲豈能盡試鄉遂都鄙正羡之卒謂之大者惟此備六軍之數若三時之田雖六軍不必備也遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百歩有司巡其前後險野人為主易野車為主冬田為狩言守取之無所擇也和之義當為面為角國䇿見棺之前和凡物皆得稱注軍門曰和非也以敘和出以次第出左右兩和門也左右陳車徒以下皆列陳之事蓋車徒既出軍門而趨圍禁則左右陳之有司平其行列每百人為卒則植旗其間以分所占之地必廣狹如一古者天子不合圍故六軍分為二陣而驅逆之車當旁禁地之前後各有屯百歩以待田畢屯車徒而後各獻其所獲也有司謂鄉師也其職曰巡前後之屯而戮其犯命者險野人為主謂列陣用徒而以車承其闕也易野車為主謂列陣用車而以徒承其闕也既陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田所逆逆要令不得出圍也設此車者田僕中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小獸私之獲者取左耳羣司馬謂兩司馬也枚如箸衘之有繣結項中軍灋以此止語獲禽者取左耳以計功及所弊鼓皆駴車徒皆譟及所弊至田所當止之處也鼓譟象克敵而喜疾擊鼓曰駴譟讙也徒乃弊致禽饁獸于郊入獻禽以享烝徒乃弊徒止也致禽饁獸于郊聚所獲禽因以祭四方之神于郊月令季秋天子既田命主祠祭禽于四方是也入又以禽祭宗廟及師大合軍以行禁令以救無辜伐有罪師謂司馬奉王命以征伐也行禁令因伐有罪而明王禁于羣侯也若大師則掌其戒令涖大卜帥執事涖釁主及軍器大師王出征伐也主謂遷廟主及社主軍器鼓鐸之屬及致建大常比軍衆誅後至者稍人帥衆而致于大司馬王親征則邦國亦以師從凡帥衆而至者大司馬皆以致于王故建大常及戰巡陳眡事而賞罰若師有功則左執律右秉鉞以先愷樂獻于社若師不功則厭而奉主車律軍灋之書也易曰師出以律兵事以嚴終故既勝猶執律秉鉞也先猶道也兵樂曰愷厭謂厭冠喪服也主車載遷廟主與社主者王弔勞士庶子則相師敗王親弔士庶子之死者勞其傷者大役與慮事屬其植受其要以待攷而賞誅大役築城邑也慮事者封人而司馬亦與焉植楨幹之屬所用以分地而築也屬謂賦丈尺與所用人數要簿書也大㑹同則帥士庶子而掌其政令若大射則合諸侯之六耦疏謂賔射亦六耦但不用諸侯恐未安經于諸侯曰大賔客因其朝覲㑹同而與之射故謂之賔射所以别于王臣之燕射也此經獨舉大射者明諸侯公孤卿大夫士咸與而司馬所合獨諸侯之六耦也若賔射惟諸侯與則司馬合耦不必言矣射人職王以六耦射三侯曰合諸侯之六耦則公孤卿大夫士耦皆以六可知矣大祭祀饗食羞牲魚授其祭牲魚牲及魚也祭謂尸賔食祭大喪平士大夫喪祭奉詔馬牲平者正其職與位王喪以馬祭蓋遣奠也奉詔者奉其牲以告于神小司馬之職掌以下文闕凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之灋軍司馬闕輿司馬闕行司馬闕司勲掌六鄉賞地之灋以等其功賞田在逺郊屬六鄉等猶差也王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多王功輔成王業國功保國全家民功灋施于民事功盡瘁勤事治功制灋成治戰功剋敵制勝凡有功者銘書于王之大常祭于大烝司勲詔之報享之禮冬祭為盛故有功者與焉詔謂詔司常書之及烝則使祝告于廟大功司勲藏其貳貳猶副也覆出司勲明銘書者司常也如曰大功藏其貳則似銘書以歸于司常而自藏其貳矣李耜卿曰既曰凡有功又曰大功則統而觀之六功有大小析而言之每功有輕重也掌賞地之政令凡賞無常輕重眡功凡頒賞地參之一食惟加田無國正參之一食歸其二于公也春秋傳卑而貢重者甸服也蓋大府職家稍之賦以待匪頒邦縣之賦以待幣帛邦都之賦以待祭祀委人職以稍聚待賔客遺人職縣都之委積以待凶荒非歸其二于公用弗給也故畿内食采者所受之地與外諸侯同而服物官吏則每減焉以所食者参之一也加田加賜之田國正謂稅也馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬皆買以給官府之用者其用各有等其材各有宜故以三物量之物異則賈從之故謂之質綱惡馬綱謂以縻索縶維而調習之凡受馬于有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否更償也旬之内死如其齒毛及賈而償其馬旬之外則以其物償物皮筋骨也不及價則附益之過此則歸死馬于官而已入馬耳防抵偽也馬及行則以任齊其行若有馬訟則聽之及行始駕也量其力所能任及行道逺近以類相從而閑習之所謂齊其行也馬訟謂買賣之言相負者禁原蠶者原再也天文辰為馬蠶書蠶為龍精月值大火則浴其種是蠶與馬同氣物莫能兩大故禁再蠶為傷馬與李耜卿曰惟牧馬之地及牧者之家不得再蠶也量人掌建國之灋以分國為九州營國城郭營后宫量市朝道巷門渠造都邑亦如之以分國為九州者周更定九州析冀以為幽并并徐于青而豫州之境西至華山則虞夏以来建國必有舊屬于此而新屬于彼者故曰分也營國以下専言王國舊說兼侯國非也凡建侯國大司徒制其域封人封其四疆而已城郭後宫市朝道巷門渠之細非王官所能及也其國自有匠人營之封人中士四人下士八人以有出疆之職也量人下士二人兼供喪祭軍旅之役豈能徧營六服之國邑哉詩載召伯營申及于寢廟乃宣王特厚元舅非封國常制營軍之壘舍量其市朝州涂軍社之所里軍壁曰壘軍有朝者或王親在行或主兵者三公及諸侯入為卿士者軍有州者二千五百人為師其數如一州之衆軍有涂者部曲區分各有道以相湊也軍社社主在軍者里所以定分界也量市朝州涂軍社之所届也詩瞻卬昊天云如何里亦當訓界國語季氏有内外朝戴記大夫有私朝疑皆僭禮記者習而不察邦國之地與天下之涂數皆書而藏之書地謂方圜山川之廣狭書涂謂支湊之逺近凡祭祀饗賔制其從獻脯燔之數量祭禮獻酒以燔從饗賔獻有脯從故總言之數多少也量長短也掌喪祭奠竁之俎實竁之俎實謂所包遣奠凡宰祭與鬱人受斚歴而皆飲之冡宰容攝祭斚酒器或曰讀如嘏尸之嘏歴與瀝通曽子問宗子有故在他國攝主不假不敢受福也宰攝祭故不敢飲福而神惠不可虚故量人鬱人飲之分絶遠則無嫌也周書顧命大保飲福嗣君在而亞獻故不嫌小子掌祭祀羞羊肆羊殽肉豆肆體薦全烝也殽體解節折也豆肉者切肉也而掌珥于社稷祈于五祀凡沈辜侯禳飾其牲沈謂祭川爾雅曰祭川曰浮沉辜磔牲以祭即宗伯職所謂疈辜也釁邦器及軍器凡師田斬牲以左右徇陳羊性狠故斬以徇以警不用命者祭祀贊羞受徹焉若司馬羞牲魚之等則贊之及徹則受之羊人掌羊牲凡祭祀飾羔祭祀割羊牲登其首羔稚羊飾之以繢登升也升首于室報陽也未祭之前則飾之祭之時則割之于羔曰飾于羊牲曰割互見也凡祈珥共其羊牲賔客共其灋羊灋羊飱饔積膳灋當共者凡沈辜侯禳釁積共其羊牲積故書為眦讀為漬謂釁國器漬軍器也或曰積謂積柴之祀若牧人無牲則受布于司馬使其賈買牲而共之牧人無牲時或耗敗也司爟掌行火之政令四時變國火以救時疾春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞梄之火冬取槐檀之火季春出火民咸從之季秋内火民亦如之戴記季春出火為田也左傳火未出而作火以鑄刑器先儒据此遂謂季春出火以陶冶季秋内之其實不然夏月土潤溽暑以燒石則粉解以陶器則燥裂伐薪為炭陶成百物皆宜于冬春且氷以火出而畢賦所以解鬱蒸救時疾也而又布火以助盛陽于天時人事俱不相應蓋季春始燠野則出火于窰家則出火于室而不用季秋始肅然後内而用之耳雍并幽冀之地民俗臥必以火始季秋春盡乃止此經曰民咸從之民亦如之豈謂此與時則施火令謂㷊莱之時凡祭祀則祭爟祭爟祭先代出火者禮如祭㸑凡國失火野焚萊則有刑罰焉野焚萊有罰者春田用火主除陳生新二月後擅放火則有罰也掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守士庶子家居或宿衛王宫而番代者則與于守政黄文叔曰霍光謂函谷京師之固武庫精兵所聚故以丞相弟為闗都尉子為武庫令猶識古以士庶子宿衞王宫及守固之意設其飾器分其財用均其稍食任其萬民用其材器飾器謂所樹矛㦸干櫓皆有幡飾也士庶子衆庶守者别給財用稍食所以厚下而勸忠也財用曰分視地守之劇易而有多寡也稍食曰均計功力之多少以為等差也民之材器謂用以塹築及為藩落者器民所自具材就其地取之然必以當邦賦凡守者受灋焉以通守政有移甲與其役財用唯是得通與國有司帥之以贊其不足者通守政即均人所謂均地守使易劇相通而得其平此平時之守灋也至移甲役財用則其地猝有警掌固必逹于司馬使國中有司持符節以徴之他境故與帥而贊之舊説國有司即掌固或謂司甲役財用者皆非也晝三巡之夜亦如之夜三鼜以號戒此立灋使有地治者巡之非掌固自巡也若造都邑則治其固與其守灋凡國都之竟有溝樹之固郊亦如之竟界也王國及三等都邑之界也郊謂近郊逺郊以近國故阻固之設尤數焉民皆有職焉若有山川則因之民皆有職勞逸必均也司險掌九州之圖以周知其山林川澤之阻而達其道路達道路者山林之阻則開鑿之川澤之阻則橋梁之設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路五溝五涂遂人所治也而于司險復曰設者凡井田溝涂之設一以盡地利一以為阻固故必使遂人與司險共議其形勢之錯連水流之輸委道路之支湊猶邦之六典大宰建之而大史亦與共建也不言都邑者曰國之五溝五涂則通乎畿内矣于掌固言都邑者守灋之詳皆具于掌固也不言侯國者溝涂之細非王官所能遥制也其國自有司險掌固設而修之易曰王公設險以守其國山川丘陵之險天作地成非人力所能設也周公設司險掌固之官所恃惟溝樹耳每見山澤豪民居阻溝樹盗賊即不敢犯井田雖難驟復苟城邑要塞多設溝樹則居者有以自固而戎馬失其利此為民長慮者所宜先務也國有故則藩塞阻路而止行者以其屬守之唯有節者達之有故喪災及兵也掌固所守城郭溝池樹渠之固所在皆有之故必與士庶子衆庶同其力司險所守要害之道則以其屬足矣掌疆闕候人各掌其方之道治與其禁令以設候人道治道路之治也其官上士六人下士十有二人必每方各以上士一人下士二人掌之餘六人則掌達于朝或軍行則從也所設候人即徒百有二十人若有方治則帥而致于朝及歸送之于竟方治逺方有事來王國求治者環人掌致師察軍慝環四方之故巡邦國搏諜賊訟敵國揚軍旅降圍邑致師謂將戰使勇士犯敵以致其必戰之志環四方之故謂環伺四面或有掩襲衝突之變故巡邦國謂從王敵愾之邦國也察軍慝察已國之姦人為敵間者搏諜賊執敵人為諜者訟敵國謂徃而喻之以理揚軍旅謂揚已國之軍威降圍邑謂服者則受之諸所列皆臨敵時事前五者先為不可勝後三者蓋欲不戰而屈人之師挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧軍中穿井成則挈壺縣其上將舍則挈轡縣其處頒糧則挈畚縣其處令衆知之壺所以盛飲畚所以盛糧轡解則不行故以為表凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜縣壺為漏以次集行夜者更易擊柝為守備代亦更也喪禮未大斂官代哭以水守壺者為沃漏也以火守壺者夜則火視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉及冬則以火爨鼎水而沸之而沃之冬水凍漏不下故以火炊水沸以沃之謂沃漏也射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摰三公執璧孤執皮帛卿執羔大夫雁位將射始入見君之位也三公北面正答君也孤無職故居西方賔位卿大夫皆有職故在東近君居主位也六摰已見宗伯職復見此者明因射而朝則各有摰也以射而朝則有摰知日朝而聽事無摰也不言諸侯之摰者来朝已有幣獻故射無摰諸侯在朝則皆北面詔相其灋謂諸侯朝覲未歸而王與射于朝也大射在學此在路門之外朝舊説以為賔射但謂賔射兼諸侯與王臣恐未安此經曰掌國之三公孤卿大夫之位似謂王與朝臣燕射也記曰朝不坐燕不與故無士位復别言諸侯在朝謂王與諸侯賔射也若賔射兼諸侯與王臣則當曰掌賔射之位三公諸侯皆北面孤卿東面大夫西面矣惟大射三公諸侯孤卿大夫士及諸侯所貢士皆與故司裘共侯軍僕共乏皆獨舉大射以其禮為最盛也曰諸侯在朝以别于大射之在郊也曰在朝皆北面以别于大詢之東面又以見大射與王臣列序不皆北面也若有國事則掌其戒令詔相其事掌其治達國事如鄉大夫以鄉射之禮詢衆庶諸子春秋合國子之倅于射宫或王以喪疾不得主祭而使諸臣㑹射以選賢也治者治其儀灋達謂以聞于王也惟王不親故有治達以射灋治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豻侯一獲一容樂以采蘩五節二正治射儀謂肄之也每侯持旌告獲者一人故三侯則三獲容即乏也據告獲者容身于中則曰容據矢至此乏極不過則曰乏三侯虎熊豹也二侯熊豹也一侯麋也豻胡犬也正所射也詩曰終日射侯不出正兮畫五正之侯中朱次白次蒼次黄𤣥居外三正損𤣥黄二正去白蒼而畫以朱緑九節者先歌五節七節者先歌三節五節者先歌一節後四節以為發矢之度舊説燕射三耦非也王以六耦射三侯則凡王射皆六耦可知矣不言三公之耦與侯從諸侯可知也王射三侯者王一侯外諸侯一侯内公孤卿大夫一侯也諸侯射二侯者君一侯卿大夫士一侯也張布謂之侯侯中謂之鵠鵠中謂之正正方二尺正中謂之𣙗方六寸或曰謂之質方四寸若王大射則以貍歩張三侯貍歩謂一舉足乃半歩也上經既曰王以六耦射三侯而此復獨舉大射何也明上經著王三侯諸侯二侯卿大夫士一侯之别然惟王之大射三公諸侯孤卿大夫士咸與乃張三侯若王與諸侯賔射則惟張虎侯熊侯與公孤卿大夫燕射則惟張虎侯豹侯也獨舉張三侯而不及六耦則賔射燕射皆六耦可知也特言貍歩則賔射燕射用全歩可知也惟大射張侯用貍歩者選賢以執祀事專取其容體比于禮其節比于樂而不以及逺為賢也王射則令去侯立于後以矢行告卒令取矢鄉射禮司馬命獲者執旌以負侯蓋未射時獲者負侯而立故射則令去侯而居于乏以避矢也大射禮正立于公後以矢行告于公下曰留上曰揚左右曰方卒射畢也負侯者服不氏取矢者射鳥氏祭侯則為位祭侯獻服不為位為服不受獻之位也大射禮服不侯西北三歩北面拜受爵與大史數射中射中射者中侯之算也大史凡射事飾中舍算佐司馬治射正射正射之儀灋也祭祀則贊射牲相孤卿大夫之灋儀國語曰郊禘之事天子必自射其牲上古六畜未擾必射以祭故後世親射其牲以存古者始佃之禮君牽牲卿大夫序從故相其灋儀㑹同朝覲作大夫介凡有爵者朝覲㑹同大宗伯為上相故所作惟介凡有爵者謂命士以上也大師令有爵者乗王之倅車王乗戎路副車十二乗皆行祥車曠左故王之所乗不敢虚其位有大賔客則作卿大夫從上所作惟羣介此徧作卿大夫從王者戒大史及大夫介大史協禮事上介佐宗伯故并戒之大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罰之僕人大僕也僕人與射人俱掌王之朝位故以遷尸苛罰見春官世婦職射人作擯介習察其德器與儀容喪事作卿大夫知其材力所稱也服不氏掌養猛獸而教擾之凡祭祀共猛獸共其中膳羞者如狼臅膏熊蹯之類賔客之事則抗皮射則贊張侯以旌居乏而待獲抗舉也朝聘布皮帛主舉而藏之待獲謂待射者中舉旌以唱獲射鳥氏掌射鳥祭祀以弓矢敺烏鳶凡賔客㑹同軍旅亦如之射鳥謂中膳羞者烏鳶喜鈔盜便汚人射則取矢矢在侯髙則以并夾取之并夾鍼箭具矢著侯之髙處手所不及則以并夾取之羅氏掌羅烏鳥蜡則作羅襦烏卑居鵲之屬蜡蜡祭也作用也襦讀為繻羅之細密者薛氏曰記曰羅氏致鹿與女以戒諸侯曰好田好女者亡其國非真以鹿致也蓋作羅以示之非真以女致也作襦以示之中春羅春鳥獻鳩以養國老行羽物中春鷹化為鳩故以養老助生氣也行謂頒賜陳及之曰天子所養之老三獻鳩以養者國老也司徒以保息養之者庶民之老也司門以財養之者死政者之老也若外饔酒正槁人所謂耆老則總三者而言之掌畜掌養鳥而阜蕃教擾之祭祀共卵鳥歳時貢鳥物共膳獻之鳥卵鳥謂其卵可薦者鵝鶩之屬也鳥物其羽毛可備服飾器用者膳王后世子之膳羞也獻賔客之禽獻也于鳥言共膳獻則六畜不必言矣故牛人雞人羊人犬人職皆不列王后世子之膳羞司士掌羣臣之版以治其政令歳登下其損益之數辨其年歳與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數以詔王治版名籍也損益謂用功過黜陟者縣鄙鄉遂公邑之屬曰周知其數而不曰掌其版者在朝之羣臣則可以詳其名籍若邦國之卿大夫士都家縣鄙之小吏則廢置黜陟各由其長其數可周知而名籍不能徧記也以詔王治者詔王以涖官之法即下以德詔爵等以徳詔爵以功詔禄以能詔事以乆奠食能者先試以事事乆而不廢乃定其稍食其功既著然後正授以爵禄教士以司徒而爵與事皆詔于司士者司馬辨論官材然後文武各當其任也爵禄事皆言詔食獨不言詔者爵禄事必待王命食則因其職事而定之耳易彦祥曰以能詔事以乆奠食謂府史胥徒惟賜無常因其功能不若禄食有貴賤多少常格正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上司士擯此王日視朝于路門外之位王族故士故為士晚留宿衛者未嘗仕雖同族不得在王宫大右司右也大僕從者小臣祭僕御僕𨽻僕也擯謂詔王出揖公卿大夫以下朝者孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右大僕前王入内朝皆退特揖每人而揖之也不言三公不必言也大夫爵同者衆揖之羣士東面故旁三揖王還還入路門也門左揖大僕大右羣僕也門右揖王族故士虎士也此數官之位逼介路門左右王始出未揖公卿不得先揖卑者故還入門而後揖之大僕前内朝其所掌也朝者皆退反其官府治處也易彦祥曰在王門左右者其位皆南向而在王後故還而揖之掌國中之士治凡其戒令曰掌國中之士治者不及鄉遂都鄙也于羣臣之版則通掌之于邦國都家縣鄙之數卿大夫士庶子之數則周知之而士治則獨掌國中也注疏兼卿大夫未安羣吏之治蓋冡宰詔而誅賞之掌擯士者膳其摯擯士者告見初為士者于王膳其摯入于膳人也凡祭祀掌士之戒令詔相其灋事祀五帝及大神示享先王百官之戒誓具修皆冢宰掌之凡祭祀之戒具小宰掌之而司士又掌士之戒令者士衆且卑冢宰小宰不能徧戒也及賜爵呼昭穆而進之賜爵謂祭末旅酬無算爵也祭統曰凡賜爵昭與昭齒穆與穆齒凡羣有司皆以齒帥其屬而割牲羞俎豆内外饔所掌割烹解全牲而烹之也既熟司士割制其體而後諸子載之于俎凡㑹同作士從賔客亦如之作士適四方使為介大喪作士掌事適四方使者獨承使事也春秋傳天王使石尚來歸脹天子之士也為介介大夫也㑹同朝覲大賔客大喪作卿大夫者皆射人而士則司士作之者惟司士能周知羣士材性之所宜也于祭祀曰掌戒令于喪曰掌事而㑹同賔客第作以從者不與執事使之觀禮而巳作六軍之士執披凡士之有守者令哭無去守披所以持棺防欹側也以絳帛為之其一端結于栁纁戴之中而出其一端于外使人引之曰六軍之士者皆比長以上有爵者天子喪用千人而于六軍擇之則必作其有爵者可知矣國有故則致士而頒其守國有大事王宫之士庶子則宫伯作之國子則諸子帥而致之太子羣士則司士致而頒其守鄉邑之士庶子則掌固頒其守古者國之守政士無不與焉以其識義理而能為民之倡且未仕而已教以與國同憂也凡邦國三歳則稽士任而進退其爵禄侯國之卿命于天子故司士稽其任而進退之其曰士任者侯國卿大夫入天子之國曰某士春秋傳曰晉士起歸時事于宰旅是也諸子掌國子之倅掌其戒令與其教治辨其等正其位公卿大夫士之適子為國子則倅者其衆子也故以諸子名官而燕義又曰庶子也等謂才藝高下正其位謂在朝則以父䕃高下為列在學則以齒也國有大事則帥國子而致于大子惟所用之李耜卿曰凡大兵大喪當警備非常及王出疆巡守征伐皆當令宿故帥而致于大子惟所用之此所謂守曰監國也若有兵甲之事則授之車甲合其卒伍置其有司以軍灋治之司馬弗正軍灋百人為卒五人為伍國子屬大子司馬雖有軍事不賦之李耜卿曰此所謂從曰撫軍也凡國正弗及上司馬弗正謂軍賦此謂凡鄉遂之中甸徒力征皆不及也大祭祀正六牲之體正謂載之于俎凡樂事正舞位授舞器位謂其綴兆行列大喪正羣子之服位㑹同賔客作羣子從服者公卿大夫之子為王服斬衰曰羣子兼國子與其倅也知然者師氏保氏大司樂之屬别無正國子服位作國子以從之文也凡國之政事國子存游倅使之修德學道春合諸學秋合諸射以攷其藝而進退之凡國之政事謂力役社田追胥之類國子當為諸子文誤也曰游倅者以其無職事而優游于庠序以學道藝也學大學也射射宫凡國之政事存游倅者國子則司馬弗正國政不及其倅則國政不及而甲兵之事猶聽于司馬掌固頒士庶子之職與其守是也進退之者進則與國子選俊同升于太學以待辨材授官退則仍歸于鄉學或𨽻于宫正宫伯以宿衛也知國子之倅平時不肄業于大學者諸子職曰春合諸學秋合諸射以考其藝而進退之大胥職曰掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲則平時修德學道于家塾鄉學可知矣周官掌士庶子之治教者不一天官則宫正宫伯也地官則師氏保氏也春官則大司樂樂師大胥小胥也夏官則諸子也掌固也其職之分事之聮各有義焉宫正宫伯所掌獨宿衛之士庶子也師氏保氏所掌王同姓及公卿之適子也其職曰以教國子弟則王之同姓也曰凡國之貴游子弟學焉則不能徧于大夫士之子明矣大司樂樂師大胥小胥則國子國子之倅及國之選俊皆𨽻焉其曰國子者公卿大夫元士之適子也其曰學士者兼國之選俊也其曰以待致諸子者致國子之學于師氏保氏者及其倅也諸子所掌獨國子之倅者其適子或學于師氏保氏或入于成均也諸子掌國子之倅而國有大事則帥國子而致于太子有甲兵之事則治以軍灋者師氏保氏大司樂樂師所掌者國子之教也使帥而共祀事治甲兵則褻矣故别以屬諸子也師氏保氏㑹同喪紀王舉必從而正國子服位作國子以從别屬諸子者其職主于詔王美諫王惡則無暇及乎其餘矣司右掌羣右之政令李子華曰戎右齊右道右天子乗車之右皆中大夫下大夫非司右之屬也司右所掌乃兵車之右故凡國中有勇力者屬焉有事則于是乎取之凡軍旅㑹同合其車之卒伍而比其乗屬其右屬合也繫也凡兵車皆有右而乗者有貴賤所當有劇易則右之材力亦宜有差等故必比次其乗以屬其右而後用各稱其材也凡國之勇力之士能用五兵者屬焉掌其政令司馬灋曰弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長或曰車上之五兵二矛無弓矢歩卒之五兵有弓矢而無夷矛虎賁氏掌先後王而趨以卒伍虎士八百人其先後王而趨也以兵灋部署百人為卒五人為伍各有局分而不亂也軍旅㑹同亦如之舍則守王閑王在國則守王宫舍王出所止宿處閑梐互也國有大故則守王門大喪亦如之及葬從遣車而哭大故謂兵災適四方使則從士大夫若道路不通有徴事則奉書以使于四方道路不通謂逢兵㓂若水潦也徴事徴師役也旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪夾王車者下士十有六人中士帥之凡祭祀㑹同賔客則服而趨㑹同賔客王齊服服衮冕則士亦齊服服𤣥端或曰謂服其常服也喪紀則衰葛執戈盾軍旅則介而趨葛葛絰也武士尚輕節服氏掌祭祀朝覲衮冕六人維王之大常維持也掌祭祀朝覲衮冕句六人維王之大常句蓋掌祭祀朝覲之衮冕而以六人持王之大常也諸侯則四人其服亦如之其服亦如之疑注語而誤為經文也蓋注家誤以衮冕六人為句而疑諸侯四人何以不言所服妄綴此語而不知義不可通衮冕惟上公加賜乃有之諸侯不得服也况以諸侯之下士服之乎古者軍旅同服或以防姦宄祭祀朝覲無故而亂灋服之常義無所取也郊祀裘冕二人執戈送逆尸從車裘大裘也郊祀以稷配故有尸春秋傳曰晉祀夏郊董伯為尸從車從尸車也王祭祀賔客之服大僕正之燕服小臣正之復設節服氏蓋朝夕王所而時視衣服之節適者也列職無此文者義已具于其官也獨列祭祀朝覲之維大常郊祀之從尸車者見從王而供别役惟此三事其餘㑹同師田視朝巡狩燕饗弔臨視學養老諸禮事及燕出入皆不供他事而惟節服是司也方相氏掌蒙熊皮黄金四目𤣥衣朱裳執戈揚盾帥百𨽻而時難以索室敺疫時難者以時而難月令季春中秋季冬皆難是也索室敺疫者索于室中而敺其疫厲之鬼也大喪先匶及墓入壙以戈擊四隅敺方良方良即罔兩木石之怪也周官集注卷七
