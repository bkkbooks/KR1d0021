  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0021_WYG_000-1a, image: WYG0101/WYG0101-0001a.png}
body:
  text: 周官集注禮類一周禮之屬提要臣等謹案周官集注十二卷國朝方苞撰苞字鳳九號靈臯亦號望溪桐城人康熙丙戌㑹試中式舉人官至內閣學士兼禮部侍郎後落職修書特賜侍講銜致仕是編集諸家之說詮釋周禮謂其書皆六官程式非記禮之文後儒因漢志周官五篇列於禮家相沿誤稱周禮故改題本號以復其初其注仿朱子之例采合衆說者不復標目全引一家之說者乃著其名凡其顯然舛誤之說皆置不論惟似是而非者乃略為考正有推極義類旁見側出者亦仿朱子之例以圈外别之訓詁簡明持論醇正於初學頗為有禆其書成於康熙庚子後苞所著望溪集指周官之文為劉歆竄改以媚王莽厯指某節某句為歆所增言之鑿鑿如目睹其筆削者自以為學力既深鑒别真僞發千古之所未言而究不免於臆斷轉不及此書之謹嚴矣乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周官集注原序朱子既稱周官遍布周密乃周公運用天理熟爛之書又謂頗有不見其端緒者學者疑焉是殆非一時之言也蓋公之兼三王以施四事者具在是書其於人事之始終百物之聚散思之至精而不疑於所行然後以禮樂兵刑食貨之政散布六官而聯為一體其筆之於書也或一事而諸職各載其一節以互相備或舉下以該上或因彼以見此其設官分職之精意半寓於空曲交㑹之中而為文字所不載迫而求之誠有茫然不見其端緒者及久而相說以解然後知其首尾皆備而脈絡自相灌輸故歎其遍布而周密也余嘗析其疑義以示生徒猶苦舊說難自别擇乃竝纂録合為一編大指在發其端緒使學者易求故凡名物之纖悉推說之衍蔓者槩無取焉蓋是經之作非若後世雜記制度之書也其經緯萬端以盡人物之性乃周公夜以繼日窮思而後得之者學者必探其根源知制可更而道不可異有或易此必蔽虧於天理而人事將有所窮然後能神而明之隨在可濟於實用其然則是編所為發其端緒者特治經者所假道而又豈病其過略也哉康熙庚子冬十有一月桐城方苞序總說孟子曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦程子曰有關雎麟趾之意然後可行周官之法度張子曰周禮惟大宰職難看蓋無許大心胸記得此復忘彼其他五官便易看止一職也朱子曰周官遍布周密乃周公運用天理熟爛之書又曰制度之書惟周禮儀禮可信周禮必竟是出於一手又曰惟周禮為周道盛時聖賢制作之書若國語戴記皆衰周文字其間有雜入一時僭竊之禮又曰周禮好看廣大精密周家之法度在焉又曰看周禮第一要見得聖人公平意思又曰胡氏父子以為是王莽令劉歆撰此恐不然周禮是周公遺典也又曰五峰以周禮為非周公致太平之書謂如天官冢宰却管甚宫閫之事其意只是見後世宰相請託宫闈交結近習以為不可殊不知此正人君治國平天下之本豈可以後世之弊而併廢聖人之良法美意哉又如王后不當交通外朝之說他亦是懲後世之弊儀禮中分明載此禮又曰今人不信周官若據某言却不恁地蓋古人立法無所不有天下有是事他便立此一官只是要不失正耳且如女巫之職掌宫中巫祝之事凡宫中祈祝皆在此人如此便無後世巫蠱之事矣又曰天官是正人主之身兼統百官地官主教民之事大綱己具矣春夏秋冬之官各有所掌如太史等官屬之宗伯蓋以祝史之事用之祭祀職方氏等官屬之司馬以司馬主封疆之政最是大行人等官屬之司冦難曉按儀禮覲禮諸侯行禮既畢出乃右肉袒於廟門之東王曰伯父無事歸寧乃邦然後再拜稽首出自屏此所謂懷諸侯則天下畏之也所以屬之司冦如此等處皆是合著如此非聖人私意張南軒曰凡井田封建取士建官禮樂刑政雖起于上世莫備于周是皆周公心思之所經緯本諸三代而達之者也周公之心孟子發明之至矣李景齊曰仲長統以為周禮禮之經禮記禮之傳蓋禮記多春秋戰國間事未若是書之純于周禮也孫氏曰周官晚出孔孟既無明言不幸劉歆用之而大壞王安石用之而益壞儒生學士真以為無用于後世矣然究觀其書以道制欲以義防利以德勝威以禮措刑藹然唐虞三代之意非春秋戰國以後所能髣佛也學者欲知先王經制之備舍此書將焉取之條例一漢藝文志列周官五篇于禮家後人因謂之周禮其實乃成周分職命事之書也春秋傳曰先君周公作周禮而所稱則是書所無蓋周公監于二代以定五禮必有成書謂之周禮用别于夏殷散亡既久其存者如儀禮十七篇猶其支流若是書則六官程式非記禮之文故復其舊仍曰周官一諸儒掇取五官近似者以補冬官甚無義理李耜卿云若本無冬官則地官鄉師職之匠師儀禮大射禮之工人士梓人覲禮之嗇夫何代之官當係何所足破羣疑今一仍其舊即一官之屬偶有意為錯簡者亦不敢割附他職一依朱子集注例凡承用注疏及掇取諸儒一二語串合己意者皆不復識别全述諸儒及時賢語則標其姓字正解本文者居前總論居後不分世代為次一注疏及諸儒之說必似是而非者乃辨正焉于先鄭及注疏皆分標之諸儒舉姓字若主是說者多則曰舊說一推極義類旁見側出者以圈外别之或前注通論大體而中有字句應辨析者辭義奇零無可附麗雖正解本文亦綴于後或以圈外别之一諸儒取後世政法與周官比證其有所發明者别為周官餘論是編直指本義故弗採録其深切治體者略舉數端以著聖人經理民物之實用俾學者勿徒以資文學也一字義已詁者不再見制度名物之詳見他職及諸經者曰見某篇一字具二義則各詁本文下
