body:
  text: 周官集注卷六翰林院侍講銜方苞撰大胥掌學士之版以待致諸子春入學舍采合舞秋頒學合聲學士之版合國子及鄉之選俊而言也而所致惟諸子何也蓋國子或入太學大司樂教之或在虎門師氏保氏教之國子之倅或宿衛于王宮宮伯掌之或修業于鄉學諸子掌之國子之在虎門及國子之倅修業于鄉學者春合舞秋合聲則並入太學與衆學士比校而大胥掌致之舍即釋也菜蘋蘩之屬釋之以禮先師頒學分示以所當學如春秋以禮樂冬夏以詩書之類以六樂之會正舞位以序出入舞者不曰節而曰會者舞之節必與聲會也荀卿曰目不自見耳不自聞也而治俯仰詘伸進退遲速莫不廉制盡筋骨之力以要鼓鍾之節而靡有悖逆者此言舞與聲會之難也入入于綴兆也出退休也凡奏樂合舞人有定數學士習舞則更代而遍故出入無常比樂官展樂器凡祭祀之用樂者以鼓徵學士饗燕之樂則歌舞皆以工序宮中之事清溪李氏曰兼序宮中之事其意深矣商書曰敢有恆舞于宮酣歌于室此所以大為之防也小胥掌學士之徵令而比之觥其不敬者巡舞列而撻其怠慢者徵則召之使來令則使之有為正樂縣之位王宮縣諸侯軒縣卿大夫判縣士特縣辨其聲樂縣謂鍾磬之屬縣于筍虡者宮縣四面象宮室軒縣去南面如軒判縣又空北面特縣縣于東方或階間凡縣鍾磬半為堵全為肆編鍾磬十六枚而縣一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬士亦半天子之士縣磬而已不言鼓鏄者鼓鎛惟縣一十二辰之零鍾亦惟縣一于正樂縣之位該之矣編縣貴賤有等全半有數故特見之大師掌六律六同以合隂陽之聲陽聲黃鍾大蔟姑洗蕤賔夷則無射陰聲大吕應鍾南呂函鍾小呂夾鍾皆文之以五聲宮商角徵羽皆播之以八音金石土革絲木匏竹以合陰陽之聲者聲之陰陽各有合黃鍾子之氣也十一月建焉而辰在星紀大呂丑之氣也十二月建焉而辰在玄枵太蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南呂酉之氣也八月建焉而辰在壽星蕤賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中呂已之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以陰陽六體為之黃鍾初九也下生林鍾之初六林鍾又上生大蔟之九二大蔟又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又下生大呂之六四大呂又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九無射又下生中呂之上六同位者象夫妻異位者象子母所謂律娶妻而呂生子也黃鍾長九寸其實一籥下生者三分去一上生者三分益一五下六上乃一終矣文之者以調五聲使之相次如錦繡之有文章播猶揚也金鍾鎛也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹簫管也天籟人聲本有陰陽而以同律合之也教六詩曰風曰賦曰比曰興曰雅曰頌風言上之教化動于民者雅正也正樂之歌也頌者容也美盛德之形容賦者敷陳其事而直言之比者以彼物比此物興者先言他物以引其所詠之辭詩之起莫先于風謠有風則有賦比興之三體由是有雅頌之二部故以為序以六德為之本以六律為之音注疏謂有知仁聖義中和之德始可教以樂歌非也教國子以樂德且不備知仁聖義况以求瞽矇乎蓋以中和祗庸孝友為詩教之本使知凡播于樂歌者皆以興起人之六德也以六律為詩之音所謂律和聲比音而樂之也知此為教瞽矇者學士之于詩則小學之教已成矣大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓􅉧登歌歌者在堂上貴人聲也下管吹管者在堂下也特言管者貴人氣也拊形如鼓以韋為之著以粳朄小鼓也擊拊瞽乃歌鼓朄管乃作故大師帥瞽登歌則令奏擊拊及堂下奏管播衆樂器時又令奏鼓朄也先儒或謂大師令奏而擊拊者乃小師非也與下令奏鼓朄不應同文而異義大饗亦如之疏謂祭饗賔射之鍾鼓皆大祝令之非也大祝所令獨逆牲逆尸侑尸之鍾鼓耳樂事之鍾鼓乃大司樂樂師令之大射帥瞽而歌射節大師執同律以聽軍聲而詔吉凶兵書曰王者出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士強角則軍擾多變失士心宮則軍和士卒同心徵則將急數怒軍士勞羽則兵弱少威明大喪帥瞽而廞作匶諡廞興也興言王之行或曰陳也陳其生時行迹也曰作諡義已備矣而加柩者記曰卒哭而諱生事畢而鬼事始也疑夏殷以前皆卒哭始諱至周則在柩即作諡而諱名故以柩諡顯此義也不曰既殯作諡而曰作柩諡者大喪兼王及后世子在棺曰柩舉柩則義足以包其人及為在殯時也凡國之瞽矇正焉小師掌教鼓鼗柷敔塤簫管弦歌出音曰鼓鼗如鼓而小持其柄而搖之旁耳還自擊柷如漆筒方二尺四寸深一尺八寸中有椎樂始作橦其底及左右擊以起樂敔如伏虎背有七十二刻别有木長尺櫟之以止樂塤燒土為之大如雁卵鋭上平底有六孔以發聲簫編以竹長尺四寸頌簫尺二寸象鳥翼有吹處大者二十四管小者十六管管如笛而小六孔併兩而吹之弦謂琴瑟歌依詠詩也知鼓非樂器者以六鼓之聲音皆鼓人教之也大祭祀登歌擊拊下管擊應鼓徹歌應鼙也應與􅉧及朔皆小鼓其所用别未聞小師亦登歌擊拊者或大師有故而攝猶國之大事小宗伯既佐大宗伯而肆師復佐之國之小事小宗伯既掌事而肆師復掌之皆攝也令奏擊拊既攝則并攝鼓朄不必言矣下管擊應鼓則其本職事也周官人數多寡皆量職事以制之師氏保氏各一人事不分也大師二人一以備軍事也小師四人雖或攝大師仍有自共其職者故事不缺大饗亦如之大喪與廞凡小祭祀小樂事鼓􅉧王饗諸侯徹亦歌雍戴記徹以振羽諸侯自相饗也掌六樂聲音之節與其和王昭禹曰六樂之作其先後曲直則有節而大小清濁相應而不相陵則和矣國語曰聲應相保曰和又曰大昭小鳴和之道也瞽矇掌播鼗柷敔塤簫管弦歌瞽矇所播止此者塤與簫管之空可按弦有徽可循柷敔一聲鼗可執而搖之若他鼓及鍾磬擊之必于其所非無目者所能任也故視瞭掌之諷誦詩世奠繫鼓琴瑟諷誦詩蓋以諷諫國語瞍賦矇誦是也世奠繫先世所定譜牒國語曰教之世為之昭明德而廢幽昏焉故人君燕間瞽矇誦詩并世繫以勸戒之又鼓琴瑟以和平其心志也掌九德六詩之歌以役大師視瞭掌凡樂事播鼗擊頌磬笙磬兼播鼗者或樂節應用鼗而瞽矇方各奏他音則攝代也磬在東方者曰笙在西方者曰頌頌或作庸大射禮樂人宿縣于阼階東笙磬西面其南笙鍾其南鏄皆南陳又曰西階之西頌磬東面其南鍾其南鎛皆南陳掌大師之縣凡樂事相瞽觀此則知凡宿縣皆大師涖之而大祭祀則大司樂以聲展之也大喪廞樂器大旅亦如之凡瞽矇所掌者眂瞭皆代廞之磬師鍾師無廞器之文而眂瞭擊笙磬頌磬且掌大師之縣則廞之者亦視瞭與賓射皆奏其鍾鼓鼜愷獻亦如之賔射皆奏則祭祀不必言矣典同掌六律六同之和以辨天地四方陰陽之聲以為樂器律述氣者也同助陽宣氣與之同大師所掌者制律以合聲典同所掌者依律辨聲以為衆器也四方之聲如管子及呂氏月令所載凡聲高聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石髙謂鍾形上大䃂讀為衮謂聲上藏衮然旋如裏也正謂上下直下謂鍾形下大陂謂偏侈險謂偏弇達謂其形微大贏聲有餘也微謂其形微小韽聲小不成也回謂其形微圜衍聲淫衍無鴻殺也侈謂中央約筰聲迫筰出去疾也弇中央寬也鬱聲鬱勃不出也甄猶掉也石謂叩之如石黃氏曰考工記鍾人固曰已厚則石已薄則播侈則柞弇則鬱然磬人亦曰已上則磨其旁已下則磨其專豈非謂聲之甚髙甚下者乎然則髙正下陂險達微回侈弇薄厚皆言聲也䃂緩肆散斂贏韽衍筰鬱甄石皆其聲之形容也不然則聲之病也不得專以鍾言之凡為樂器以十有二律為之數度以十有二聲為之齊量數度廣長也齊量侈弇之所容齊與食醫所和之齊同義謂其分之所際也蓋以十有二律之數為衆器之度以十有二聲之齊為衆器之量度必以律之數者記所謂百度得數而有常也中之所容雖同而形之回筰弇侈異則音亦異焉故必以十有二聲為之齊凡和樂亦如之和謂調其故器也或曰上所言制器之法也器成而和衆聲以為樂仍以十有二律為之數度以十有二聲為之齊量磬師掌教擊磬擊編鍾磬亦編獨于鍾言之者鍾有不編不編者鍾師掌之劉原父曰宮縣有特磬十二鎛鍾十二皆依辰次陳之以應其方之律磬師于磬則兼教之教縵樂燕樂之鍾磬及祭祀奏縵樂燕樂房中之樂縵樂疑即琴瑟别為縵樂者衆音皆合奏以成樂而琴瑟可獨奏也若雜聲則不宜用之祭祀或曰弦歌或曰縵樂豈與詩相和者為弦歌如清廟之瑟有聲而無詩者則曰縵樂與鍾師掌金奏金奏擊金以為奏樂之節也凡樂事以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏以鍾鼓者九夏之奏惟以鍾鼓為節不比以他音也夏大也樂之大歌有九春秋傳穆叔如晉晉侯享之金奏肆夏之三穆叔曰三夏天子所以享元侯也國語曰金奏肆夏繁遏渠王夏肆夏昭夏之奏見大司樂職舊説四方賓來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏祴夏公出入奏驁夏義並無考凡祭祀饗食奏燕樂凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩皆以鍾鼓奏之射之歌節已具射人職復見此者若泛云凡射掌金奏則似别有射之金奏而不見其即以為騶虞貍首采蘋采繁之歌節矣猶六摯已具宗伯職復見于射人明以射而朝則各有摯也掌鼙鼓縵樂鼓如春秋傳莊王鼓之之鼓謂磬師奏縵樂時擊鼙以和之鼙之聲歡軍中所以令鼓也投壺禮命弦者曰間若一豈射之歌奏以琴瑟節之而又以鼙和此獨承上而言射節與笙師掌教吹竽笙塤籥簫箎笛管舂牘應雅以教祴樂教視瞭也竽三十六簧宮管在中長四尺二寸笙長四尺十三簧宮管在左籥如笛三孔其中則中聲其上下二孔則聲之清濁所由生也箎長尺四寸圍三寸七孔一孔上出徑三分凡八孔橫吹之笛長三尺四寸六孔舂牘以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地應亦以竹長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫祴樂祴夏之樂牘應雅教其舂者謂以築地塤簫管小師教之復列是職者豈祴樂中三器之音節與凡樂異與凡祭祀饗射共其鍾笙之樂燕樂亦如之與鍾聲相應之笙大喪廞其樂器及葬奉而藏之惟笙師鎛師籥師司干職有奉葬器之文蓋笙師所掌竹匏土木之音備矣鎛師掌金奏之鼓金革之音備矣籥師所掌文舞之器備矣司干所掌武舞之器僃矣絲石獨無文者視瞭兼為瞽矇廞樂器則絃磬編鍾鼗鼓皆備矣喪事弛縣凡廞皆明器也視瞭職無奉而藏之之文者視瞭卑賤為諸官陳之而奉則非其事也大旅則陳之注疏並釋以喪禮非也蓋國有故旅上帝及四望則陳所掌教樂器其不涖縣以涖縣者大師也鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賓射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之守鼜常時國中之夜鼓也鎛師所掌即鼓人所教而别為二職何也鼓人所鼓軍旅田役以及祭祀百物之神皆地官之事也鎛師所鼓祭祀饗食賓射大獻皆禮官之事也惟鼓鼜二職並列然鎛師鼓愷樂守鼜而鼓人無之則知鏄師所掌皆王朝之事其夜鼜惟王親在行則然若鼓人則凡軍旅通掌其鼓與鼜也鍾師所掌者金奏之節鎛師所掌者金奏之鼓節而擊之者則視瞭視瞭職賓射皆奏其鼓鍾鼜愷獻亦如之是也如二師自奏則賓射鼜愷之鼓既列職于鎛師復列職于視瞭不可通矣二師無教擊鍾擊鎛之文者磬師職曰教擊磬擊編鍾則特縣之鍾鍾師教之特縣之鎛鎛師教之不必言矣郊廟朝廷之樂事鼓人不與故金奏之鼓鏄師兼掌之從所便也故金奏掌于鍾師鎛師而四金師田所用則鼓人兼掌之或曰視瞭所奏者凡樂之鼓鍾也鍾師所掌獨金奏之鍾鏄師所掌獨金奏之鼓皆自擊之鎛師職凡祭祀鼓其金奏之樂則非金奏不鼓可知矣但于賓射鼜愷二職並列終不可通大喪廞其樂器奉而藏之韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之大饗亦如之明小賓客之饗食及燕射皆不用也于大朝覲會同奏之以示王化所被之遠致此之難蓋君與臣交警之也旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉散樂方隅土風所成之樂王朝亦僃之以知民風也四方以舞仕即能舞是樂者以屬旄人選舞人或于中取之凡祭祀賓客舞其燕樂作燕樂時乃舞及四方四夷之樂籥師掌教國子舞羽吹籥文舞有持羽吹籥者所謂籥舞也禮記秋冬學羽籥詩云左手執籥右手秉翟祭祀則鼓羽籥之舞賓客饗食則亦如之大喪廞其樂器奉而藏之鼓無專掌九夏之鼓鍾師掌之縵樂之鼙亦屬焉金奏愷樂之鼓鎛師掌之夜鼜之鼓鼓人鎛師分掌之祭祀饗食樂事之鼓大司樂樂師令之籥師所鼓獨羽籥之舞耳籥章掌土鼓豳籥土鼓以瓦為匡革被二面豳籥豳人吹籥之聲章明堂位曰土鼓蕢桴葦籥伊耆氏之樂也中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之豳詩豳風七月也吹之者以籥為之聲七月言寒暑之事故迎氣則歌之凡國祈年于田祖吹豳雅擊土鼓以樂田畯田祖始耕田者謂神農也豳雅亦七月也其詩有于耜舉趾饁彼南畝故祈年則歌之謂之雅者以其言男女之正也田畯古司嗇也國祭蠟則吹豳頌擊土鼓以息老物郊特牲天子大蠟八伊耆氏始為蠟歲十二月合聚萬物而索饗之也萬物至是而老故祀以息之而國亦養老焉豳頌亦七月也其詩有穫稻作酒躋堂稱兕故祭蠟息老物則歌之謂之頌者以其言歲終人功之成也朱子曰一詩不宜析為雅頌雅之甫田大田頌之載芟良耜或其類也豳詩王業之本而不陳于宗廟何也所言乃田家之事不可與六代之樂並又不可與燕樂縵樂夷樂雜陳用以逆暑迎寒索饗萬物協天時勸民事其義精而教溥矣二南女婦之事以為燕樂而用之于祭祀者后夫人即事于宗廟故歌以勸焉鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之四夷之樂東方曰韎南方曰任西方曰侏􅍣北方曰禁王者用四夷之樂一天下也下言與其聲歌則上云樂者主于舞典庸器掌藏樂器庸器及祭祀帥其屬而設筍虡陳庸器饗食賓射亦如之大喪廞筍虡庸器伐國所獲之器若崇鼎貫鼎胤之舞衣密須氏之鼓及以其兵物所鑄銘也此職設筍虡視瞭乃縣橫者為筍從者為虡禮記明器有鍾磬而無筍虡或異代之制或有而不縣也司干掌舞器祭祀舞者既陳則授舞器既舞則受之賓饗亦如之大喪廞舞器及葬奉而藏之舞器干戚之屬凡武舞所用者大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆兆者灼龜發于火其形可占者其象似玉瓦原之璺罅用是名之原田也杜子春云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆其經兆之體皆百有二十其頌皆千有二百頌謂繇也龜兆五而其體百有二十者舊説兆别分為二十四分蓋以木火土金水與春夏秋冬相乘一歲有二十四氣五行運于其間各有死生以此視其衰死王相以決吉凶清溪李氏曰自五而乘之再倍為二十五又倍為一百二十五其中有五純體焉體純則無生克而不占故止于百有二十頌千有二百者每體以十日占之掌三易之法一曰連山二曰歸藏三曰周易易者揲蓍求卦以占也連山首艮歸藏首坤杜子春曰連山宓戲歸藏黃帝或曰夏殷之易也洪範卜五占用二蓋卜以五行筮以陰陽其經卦皆八其别皆六十有四掌三夢之法一曰致夢二曰觭夢三曰咸陟晝所思為夜則成夢出于有因故曰致角一仰一俯為觭觭夢蓋反覆異常者無心感物謂之咸陟升也精神感而上通與鬼神合其吉凶夢之變盡于此三者矣其經運十其别九十占夢之術雖亡但視祲别為一職所掌十輝與占夢全無交涉注恐誤以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳命者命龜之辭也征謂征伐巡狩亦曰征春秋傳先王卜征五年而歲習其祥是也象謂災變雲物易曰天垂象春秋傳曰天事恆象與所與共事也謀有所謀為也果事成與否也至行者歸期也詩曰卜筮偕止會言近止雨因旱而卜也瘳問疾愈否也以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政如孔子贊易之贊蓋掌三兆三易三夢者各獻其占而大卜則發揮其所以然之理而宣蓍之凡國大貞卜立君卜大封則視高作龜大封封國也視髙以龜骨髙者可灼處示宗伯也卜用龜之腹骨骨近足者其部髙春灼後左夏灼前左秋灼前右冬灼後右作龜謂以火灼之凡卜法在禰廟廟門閾外闑西西面有席先陳龜于廟門外之西孰上次正龜于閾外席上又有涖卜命龜視髙作龜六節尊者宜逸卑者宜勞從下向上差之作龜視高勞事以大貞故大卜親之大宗伯涖卜其餘貞龜陳龜皆小宗伯為之士喪禮宗人受卜人龜示髙涖卜受視反之又曰卜人坐作龜大祭祀則視高命龜凡小事涖卜命龜告以所卜之事也士喪禮宗人即席西面坐命龜小事既大卜涖卜則陳龜貞龜命龜視髙皆卜師為之其作龜則卜人也國大遷大師則貞龜正龜于卜位士喪禮卜人抱龜燋先奠龜西面是也輕于大祭祀故不親命龜貞龜上有涖卜亦大宗伯為之陳龜亦宜小宗伯也其視髙命龜卜師作龜卜人凡旅陳龜陳龜士喪禮卜人先奠龜于西孰上南首是也輕于大遷大師故不親貞龜蒞卜仍大宗伯貞龜命龜視髙皆卜師作龜亦卜人凡喪事命龜重喪禮次大祭祀也命龜以上有陳龜貞龜亦小宗伯涖卜仍大宗伯視髙作龜卜人也知小事而外涖卜皆大宗伯者宗伯職凡祀大神享大鬼祭大示帥執事而卜日則喪事大師大遷大封立君涖卜不待言矣卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆名義俱未聞凡卜事視髙揚火以作龜致其墨大卜不視髙者皆卜師視髙致其墨者爇灼之明其兆李耜卿曰卜有龜焦者有不食墨者皆不待兆成而知其凶夫墨水也燋契火也火過而陽則焦水過而陰則不食墨凡卜辨龜之上下左右陰陽以授命龜者而詔相之上仰者下俯者左左倪也右右倪也陰後弇也陽前弇也詔相告以其辭及威儀龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之色謂天龜玄地龜黃東龜青西龜白南龜赤北龜黑龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在陰象緯也天龜俯地龜仰東龜前南龜卻西龜左北龜右各從其耦也杜子春讀果為裸凡取龜用秋時攻龜用春時各以其物入于龜室六龜各異室秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷上春釁龜祭祀先卜釁者殺牲以血之世本巫咸作筮卜未聞其人若有祭祀則奉龜以往旅亦如之喪亦如之菙氏掌共燋契以待卜事士喪禮曰楚焞置于燋在龜東楚焞即契所用灼龜也燋炬也凡卜以明火爇燋遂吹其焌契以授卜師遂役之明火以陽燧取火于日焌者契之鋭頭以契之鋭頭柱燋火而吹之也役之為卜師共揚火致墨等役占人掌占龜以八簭占八頌以八卦占簭之八故以視吉凶古者重卜先筮而後卜故筮人不必知卜而卜人必兼通于筮既得八事之頌猶恐于龜象未審復以筮義參決其吉凶所謂以八筮占八頌也然筮辭之吉凶各有其故皆原于八卦之象與德其或筮龜從違各異則又恐筮人之占未審故復以八卦之象與德究切其義所謂以八卦占筮之八故也不曰占筮之故而曰八故者八卦之象與德因事而異吉凶于八事各有所忤也凡卜簭君占體大夫占色史占墨卜人占坼體兆之象也色兆氣也墨兆廣也坼兆璺也體有吉凶色有善惡墨有大小坼有微明尊者視兆象而巳卑者以次詳其餘也周公卜武王占之曰體王其罔害凡卜象吉色善墨大坼明則逢吉此巳下皆據卜言兼云筮者凡卜皆先筮故連言之體謂兆之墨縱橫其形體象似金木水火土也龜之四隅依四時而灼之其兆直上向背者為木兆直下向足者為水兆邪向背者為火兆邪向下者為金兆橫者為土兆色兆中氣色似有雨及雨止之等墨據兆之正璺處坼就正墨傍有奇璺罅者凡卜簭既事則繫幣以比其命歲終則計其占之中否既卜筮史必書其命龜之事及兆于策繫其禮神之幣而藏焉書曰王與大夫盡辨以啓金縢之書乃得周公所自以為功代武王之説正命龜書也簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶此九巫皆當為筮字之誤也更謂筮遷都邑也咸猶僉也謂筮衆心歡否也式謂筮制作法式也目猶事衆易謂筮所改易比謂筮與民和比祠謂筮牲與日參謂筮御與右環謂筮可致師否也劉公是曰此乃前世通占者九人其遺法可傳者古者占筮之工通謂之巫更咸式目等皆其名也巫咸見于他書多矣易疑為昜古陽字所謂巫陽也其他雖未聞不害其有李耜卿曰漢書郊祀志晉巫所祀有巫祠之名亦其一徵凡國之大事先簭而後卜上春相簭凡國事共簭相謂更選擇其蓍也占夢掌其歲時觀天地之會辨陰陽之氣天地之會建厭所處之日辰陰陽之氣休王前後建謂斗柄所指謂之陽建故左旋于天厭謂日前一次謂之陰建故右旋于天堪輿天老曰假令正月陽建于寅陰建于戌以日月星辰占六夢之吉凶謂日月之行及合辰所在春秋傳昭三十一年十二月辛亥朔日有食之是夜也晉趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有適火勝金故弗克此以日月星辰占夢者史記衛平為宋元君占夢亦然後世術家有八會其遺象也用占夢則亡一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢正謂無所感動而自夢噩驚愕也思覺時所思念也寤寐覺也謂如覺所見而實夢也如狐突遇申生之類或曰疾而迷及寤而有夢傳所傳秦穆公趙簡子之夢是也季冬聘王夢獻吉夢于王王拜而受之聘問也平時王有夢或占或不占季冬則數將終歲更始王有夢必發幣而占之故曰聘也獻羣下之吉夢于王則王夢有凶必因占而詔以修省可知矣詩云牧人乃夢衆維魚矣旐維旟矣乃所獻吉夢與乃舍萌于四方以贈惡夢遂令始難驅疫舍萌猶釋菜也菜始生曰萌贈送也季冬大難以驅疫方相氏掌之視祲掌十輝之法以觀妖祥辨吉凶輝日光氣也一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰敘九曰隮十曰想祲陰陽氣相侵也象春秋傳有雲如衆赤鳥之類鐫如童子佩觹之觹謂日旁氣刺日也監雲氣臨日或曰冠珥也彌者白虹彌天敘者雲有次序如山在日上隮虹也詩曰朝隮于西想者雜氣有似可形想掌安宅敘降正歲則行事歲終則弊其事宅居也降下也人見妖祥則不安其居此官安之又次敘凶禍所降之事與其地使早為之備行事謂候氣占象也弊斷也謂計所占中否多少并稽召譴之淺深以驗挽回補救之力大小遲速也大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰策祝永長也貞正也謂求多歷年得正命也六祝舊説俱未安以義測之順祝天地宗廟之常祝也祭統曰備者百順之名禮器曰禮時為大順次之天地之祭宗廟之事順也年祝祈年之祝也吉祝冠婚嘉禮之祝也化祝天地有異災而祝其消化也瑞祝嘉祥見而告于天地宗廟也策祝册封諸侯而告于祖廟也此六祝皆國政之大者若弭災兵遠罪疾則小祝掌之掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰説鬼神不與人同心災厲乃作故以祈禮同之非時而祭于上帝曰類非時而祭于祖曰造禬都家宗人職所謂以禬國之凶荒民之札喪也攻如救日伐鼓以兵之類説則以辭責如變置社稷則必以辭責之董子救日食祝曰照照大明瀸滅無光奈何以陰侵陽以卑侵尊或曰如湯之禱旱以六事自責以説于天也類造禬禜皆有牲攻説用幣禜見鬯人職作六辭以通上下親疏遠近一曰祠二曰命三曰誥四曰會五曰禱六曰誄六祝之辭典祀所常用也此六辭因事而特告也上下天神地示也親疏由禰至祧墠也遠近四望五祀之類命誥會皆質神之辭命者命龜之辭誥者尚書逸祝册惟告周公其後是也會者昭衆神而要言春秋傳所謂司愼司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之是也誄者至于南郊稱天而誄之辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號神號若昊天上帝鬼號若皇祖伯某示號若后土地示幣號若玉曰嘉玉幣曰量幣牲號若牛曰一元大武之類齍號若黍曰薌合之類辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭九祭皆食祭也命祭者玉藻君若賜之食而君客之則命之祭然後祭是也衍當為延炮當為包聲誤也延祭者曲禮主人延客祭是也包猶兼也兼祭者有司徹宰夫贊者取白黑以授尸尸受兼祭于豆間是也周猶遍也遍祭者曲禮殽之序遍祭之是也振祭擩祭本同所以異者尸未食以菹擩于醢祭于豆間是謂擩祭尸將食取肝擩于鹽振祭嚌之加于肵爼蓋振者先擩復振而擩者則不振也絶祭繚祭本同所以異者繚祭以手從肺本循之至于末乃絶以祭絶祭則不循其本直絶肺以祭禮多者繚祭禮略者絶祭共授也王祭食宰夫授祭李耜卿曰凡此九祭祭祀及生人飲酒皆有焉命祭以祭祀言之特牲所謂尸坐祝命挼祭是也衍祭者尸卒食主人酳而尸祭注云酳猶衍也在生人則養老執爵而酳是也兼祭以生人言之公食大夫禮賓之兼祭庶羞是也遍祭以祭祀言之少牢尸十一飯所舉所祭周矣命衍炮周祭食之式其别有四也振擩絶繚祭食之儀亦有四者之别也共祭則凡祭皆有之故終焉辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀稽首首至地稽留然後舉也頓首頓地即舉空首先以兩手拱至地乃頭至手以不至地故名空首也振動戰栗變動之拜吉拜拜而後稽顙齊衰不杖以下喪拜也此殷之凶拜周以與頓首相近故謂之吉凶拜稽顙而後拜三年喪拜也奇拜一拜也或曰先屈一膝如漢時雅拜褒讀為報再拜也肅拜但俯下手類後世揖惟軍中有此在婦人為正拜臣拜君稽首敵者頓首君答臣下空首所謂拜手也一拜答臣下再拜拜神與尸享獻也謂朝獻饋獻右讀為侑勸尸食也九拜不專為祭祀以祭祀重故舉以言凡大禋祀肆享祭示則執明水火而號祝明水火司烜所取于日月者執以號祝明主人圭潔之德隋釁逆牲逆尸令鍾鼓右亦如之右亦當讀為侑李耜卿曰逆尸乃逆牲牲殺乃薦血釁薦血也薦血之後乃有膟䁝隋于主前之禮蓋以自下向上為言之序來瞽令臯舞相尸禮既祭令徹歌與舞必依祭節故大祝告以樂入之節而後樂師詔來瞽大祝告以舞之節而後樂師臯舞也大喪始崩以肆鬯渳尸相飯贊斂徹奠陳鬯以浴尸也不言相含者大宰贊含玉也冬官主斂事大祝贊之奠始死及大小斂之奠言甸人讀禱言語也甸人喪事代王受眚災大祝為禱辭語之付練祥掌國事付當為祔凡事皆國事也他職皆掌事此獨曰掌國事者未葬宗廟之祭不行既祔主各返廟則時祭皆行特嗣王不親而大祝掌其事故特稱國事以别白之也喪三年不祭惟祭天地社稷越紼而行事則宗廟之祭及羣祀嗣王不親明矣曾子問五祀既葬而行祝畢獻則祔以後七廟之祭畢舉可知矣量人有宰祭之文必宰攝也王親祭則掌事者冢宰宗伯宰攝則祝掌事示别也五祀祝自獻祀卑故無攝主也練祥以後則凡祀王皆親之祝自共其職事而不得曰掌國事矣國有大故天災彌祀社稷禱祠大故兵寇也彌遍也遍祀社稷及諸所禱既則祠以報焉大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝鄭剛中曰大師必載社主及遷廟主以行故有宜社造祖之祭此二者國內之禮駐軍必設軍社于其地以其事類告上帝此二者國外之禮前四事皆君舉而祝從惟至所征之地將有事于四望及軍歸獻社則大祝獨前行致告也曰國將有事者君不親也知然者宗伯職有司將事于四望則君不親明矣下經過大山川則用事焉君親之也故異文焉大會同造于廟宜于社過大山川則用事焉反行舍奠反行舍奠凡前所告皆奠也非時而祭曰奠或曰其禮略也建邦國先告后土用牲幣禁督逆祀命者頒祭號于邦國都鄙王光遠曰非所命而祀則禁之命之祀而不祀則督之小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌災兵遠罪疾侯當作候候嘉慶祈福祥之屬禳禳郤凶咎寧風旱之屬彌讀曰敉安也周官于候禳禱祠之事甚詳蓋人心冥頑惟遇疾病災危窮而反本易警發其善心故聖人以神道設教使恐懼修省以思救政則所益多矣大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠隋尸之祭也奠奠爵也李耜卿曰論禮之先後則逆齍盛當在沃尸盥之後贊奠當在贊隋之上此或文錯至上三者小祝專職下三者則贊為之各以其類不可以後先言矣凡事佐大祝大喪贊渳設熬置銘及葬設道齎之奠分禱五祀銘書死者名于旌士喪禮為銘各以其物亡則以緇長半幅頳末長終幅廣三寸書名于末曰某氏某之柩重木置于中庭取銘置于重齎猶送也送道之奠謂遣奠也分其牲體以禱五祀告王去此宮王七祀不及司命大厲者平生出入不以告也大師掌釁祈號祝有寇戎之事則保郊祀于社釁釁鼓也春秋傳君以軍行祓社釁鼓祝奉以從王氏曰保郊保神壝之在郊者社不在郊無所事保祀之而已保郊所以防患祀社所以弭兵也凡外內小祭祀小喪紀小會同小軍旅掌事焉喪祝掌大喪勸防之事及辟令啓及朝御匶乃奠勸防引柩也勸朂勉前引者防僃傾側辟開殯也令啓謂命役人開之朝謂將葬朝于祖考之廟而後行御匶謂發殯宮輴車載至廟執纛居前以御正匶也奠即朝廟之奠侵夜啓殯昧爽朝廟及祖飾棺乃載遂御及葬御匶出宮乃代及壙説載除飾小喪亦如之祖謂將葬設祭于庭象生時出則祖也飾棺設柳池紐之屬代謂喪祝二人相與更或曰至于外則鄉師遂師代之掌喪祭祝號王弔則與巫前喪祭虞也檀弓君臨臣喪以巫祝桃茢執戈掌勝國邑之社稷之祝號以祭祀禱祠焉若亳社是也存之者重神也勝國之社稷禱祠行焉且作其祝號則記所稱喪國之社屋之不受天陽非禮意也亳社北牖特以别于時王之社鄉明焉耳凡卿大夫之喪掌事而斂飾棺焉掌事掌弔臨含贈之事也其餘惟掌斂與飾棺他不與甸祝掌四時之田表貉之祝號舍奠于祖廟禰亦如之貉或讀為百或為禡兵祭也祭于立表之處故曰表貉釋奠告將田也七廟皆告故言祖及禰師甸致禽于虞中乃屬禽及郊饁獸舍奠于祖禰乃斂禽禱牲禱馬皆掌其祝號王大田獵則六師皆作故曰師田以别于小田獵也致禽于虞中使獲者各致于所表虞旗之中屬禽别其種類饁獸即小宗伯職所謂帥有司而饁獸于郊也入以奠于祖禰薦且告反也斂禽謂取三十入臘人禱禱也禱牲禱田多獲禽牲禱馬無疾詛祝掌盟詛類造攻説禬禜之祝號大事曰盟小事曰詛皆要誓于神秋官司盟掌盟載之法不掌祝號與辭類造禬禜攻説大祝所掌也復列此職者大祝掌其禮詛祝薦其辭作盟詛之載辭以敘國之信用以質邦國之劑信載辭載書之辭也國王國邦國侯國也信用者示所要之必用也敘者次其事之大小也敘國之信用如魯盟東門氏叔孫僑如之類質邦國之劑信如成王賜周公太公以盟之類司巫掌羣巫之政令若國大旱則帥巫而舞雩雩旱祭天子于上帝諸侯于上公之神國有大災則帥巫而造巫恆帥巫官之屬會常處以待命也祭祀則共匰主及道布及蒩館主木主匰承主器也主在廟藏于石室合祭則以匰承而至道布為神所設巾中霤禮以功布為道布屬于几是也蒩所以藉祭食館所以承蒩凡祭事守瘞凡喪事掌巫降之禮瘞若祭地示埋牲玉也守者待禮畢然後退降下也巫下神之禮後世既斂就巫下禓其遺法與男巫掌望祀望衍授號旁招以茅注望祀謂有牲粢盛者衍讀為延進也謂但用幣致其神疏望祀者類造禬禜遙望而祀之望衍者攻説之禮遙望延其神以言語責之義並無考授號授奉祭者以神之號使知為某神之至也神來無方故曰旁招冬堂贈無方無算春招弭以除疾病王弔則與祝前贈送也歲終以禮送不祥無方無定向也無算道里無數也招招福也弭如彌兵之彌除凶禍李耜卿曰方者如兆山川丘陵等各因其方此不祥之氣非可以方拘也算者秩祀之神名號有數不祥之氣非可以數計也女巫掌歲時祓除釁浴旱暵則舞雩祓除如三月上已如水上之類釁浴謂以香薰草藥沐浴使女巫舞旱祭崇陰也若王后弔則與祝前凡邦之大災歌哭而請與天官女祝前后歌者憂愁之歌若雲漢之詩是也大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治凡辨法者考焉不信者刑之曰建者廢興損益得與大宰共酌定也法則不言建者該于六典也辨法以法爭訟者凡邦國都鄙及萬民之有約劑者藏焉以二六官六官之所登約劑要盟之載辭及劵書也六官二字衍若約劑亂則辟法不信者刑之辟開也謂有抵冒盟誓者則啓視約劑徵其然否正歲年以序事頒之于官府及都鄙鄭剛中曰周建子而四時之事有仍用夏正者用建寅謂之歲用建子謂之年頒告朔于邦國不曰頒朔而曰頒告朔者并每月所行之政令布告于臣民也先儒以告于廟為告朔于侯國言之猶可于頒朔言之則贅矣春秋閠月不告月猶朝于廟既朝于廟而曰不告月則為以是月之政令告于臣民審矣閏月詔王居門終月門謂路寢門也明堂路寢及宗廟皆五室十二堂四門十二月聽朔于十二堂閏月各于時之門故于文王在門為閏大祭祀與執事卜日戒及宿之日與羣執事讀禮書而協事執事大卜之屬與之者當視墨戒謂散齋七日宿謂致齋三日祭之日執書以次位常位常謂所常居之處辨事者考焉不信者誅之謂抵冒其職事者大會同朝覲以書協禮事及將幣之日執書以詔王大師抱天時與大師同車天時謂時日支干孤虛王相及星辰變動軍衆用以行止者國語曰吾非瞽史焉知天道大師瞽官之長也大遷國抱法以前大喪執法以涖勸防遣之日讀誄凡喪事考焉瞽史知天道故王崩纍其行至于南郊稱天以誄之而作諡然後于遣奠之時讀焉小喪賜諡周官小喪皆主王宮言之卿大夫之喪小史賜諡讀誄則此謂賜羣王子諡也凡射事飾中舍算執其禮事中所以盛算舍釋也射中則釋一算鄉射禮曰君國中射則皮豎中于郊則閭中于竟則虎中天子之中未聞小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱志記也繫世帝繫諸侯卿大夫世本之屬奠定也先王死日為忌名為諱舊説有事專以宗廟言恐未安古者大夫殁君不舉其名王時巡舍于諸侯之祖廟亦當有忌諱記所謂以禮籍入正小史之事也李耜卿曰鄭剛中謂外史掌四方之志乃周志鄭志之類小史則專志天子諸侯所出之繫世又辨其廟祧之昭穆是也詔忌諱如男女辨姓東郭偃所謂君出自丁臣出自桓如此類皆所當詔大祭祀讀禮法史以書敘昭穆之爼簋大史與羣執事既讀禮法則小史命屬史以書敘羣廟之爼簋大喪大賓客大會同大軍旅佐大史凡國事之用禮法者掌其小事卿大夫之喪賜諡讀誄馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位辨其敘事以會天位歲謂太歲歲星者東方蒼龍之宿在天右行十二歲一周天太歲者歲星之神與歲星相應而行亦十二歲一周于地十有二月謂斗柄月建一辰十二月而周也十有二辰謂子丑寅卯等也十日謂甲乙丙丁等也二十八星謂東方角亢等二十八次也敘事若仲春辨秩東作仲夏辨秩南訛仲秋辨秩西成仲冬辨在朔易天位若星鳥正仲春星火正仲夏星昴正仲秋星虛正仲冬之類其在天各有所居之位必辨其敘事乃能與天位相合也冬夏致日春秋致月以辨四時之敘冬至日在牽牛景丈三尺夏至日在東井景尺五寸此長短之極極則氣至春分日在婁秋分日在角而月弦于牽牛東井亦以其景知氣至否春秋冬夏氣皆至則四時之敘正保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶星謂五星辰謂日月所會五星有贏縮圜角日有薄食暈珥月有盈虧朓側匿之變七者右行列舍天下禍福變移所在皆見焉志星辰日月之變動察天象之順逆也觀天下之遷考人事之轉移也必參以人事然後吉凶可判如鄭不復災熒惑退度遠宋之類先星辰于日月者所掌天星也致日致月者馮相氏掌十輝之法者視祲而保章氏兼掌其變動何也凡日月之變動必以所歷分星之度為占以星土辨九州之地所封封域皆有分星以觀妖祥星土星所主土也封域皆有分星春秋傳參為晉星商主大火國語歲之所在則我有周之分野之屬是也以大界言則曰九州而州中諸國之封域于星亦有分焉其書亡矣可言者獨十二次之分星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也分野之妖祥主用客星彗孛之氣為象薛氏曰十二次之星麗于九州則為星土諸侯之封域在此州者即為其國分星以十有二歲之相觀天下之妖祥歲星與日同次之月斗所建之辰也大歲所在即歲星所居歲星明光潤澤赤而角則其國昌赤黃而沉其野大穰故以其色相觀妖祥春秋傳曰越得嵗而吳伐之必受其凶又曰歲在顓頊之墟居其鶉首而有妖星告邑薑也以五雲之物辨吉凶水旱降豐荒之祲象物色也視日旁雲氣之色降下也以二至二分觀雲色青為蟲白為喪赤為兵荒黑為水黃為豐春秋傳曰凡分至啓閉必書雲物為備故也辨吉凶斷句水旱斷句辨吉凶兼天災人禍人禍之修救則下經所云救政序事具之矣若水旱則必預降豐荒之祲象使吏民得早為之備並降豐象者知何方豐何方凶然後可移用其民而均其食也以十有二風察天地之和命乖别之妖祥十有二辰皆有風吹其律以知和否春秋傳師曠曰吾驟歌北風又歌南風南風不競多死聲艮為條風震為明庶風巽為清明風離為景風坤為涼風兌為閶闔風乾為不周風坎為廣莫風四維之風主兩月乖微異也别相反或全不與時應也李耜卿曰日月星辰居常而有變動則天下之大異也星土之妖祥占在一國歲之相占在一歲五雲之物占在一時十有二風月可占蓋以大小久近為序凡此五物者以詔救政訪序事春秋傳梁山崩晉侯召伯宗伯宗問于重人而得其禮所謂訪序事也內史掌王之八枋之法以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰豫八曰奪大宰內史所掌八柄其次第各異何也太宰職曰以八柄詔王馭羣臣言所以用此八柄之道也故爵祿之後首曰豫以馭其幸示不可假以爵祿也次曰置以馭其行必論定而後官也其當官不職者則或宥以生或奪其祿或廢其身或詰其過乃用此八柄之次第也內史職曰掌王之八柄之法以詔王治則守成法以待用而已故爵祿之後繼以廢置用舍明而後天位天祿無曠也廢置之後繼以生殺豫奪賞罰行而後所廢所置競勸也先生殺而後豫奪者輕重之倫也此八柄自然之次第也大宰所詔無殺者古者刑不上大夫所以示禮下之誠也然曰生以馭其福則不宥以生者該此矣內史所掌無誄者古所謂誅詰責譴呵而已非法之所及也執國法及國令之二以考政事以逆會計法一定之法也令一時之令也掌敘事之法受納訪以詔王聽治敘大小之事受百官之獻納與王之咨訪以詔王聽治也凡命諸侯及孤卿大夫則策命之謂以簡䇿書王命春秋傳王命內史叔興父䇿命晉侯為侯伯不及士者豈士卑且衆王不能一一親命或命而不以䇿與詩曰韓侯受命王親命之則命有不親者矣凡四方之事書內史讀之諸侯書奏也或曰若萬民之利害為一書禮俗政事治教刑禁之逆順為一書悖逆暴亂作慝猶犯令者為一書札喪凶荒厄貧為一書康樂和親安平為一書小行人獻其書而內史于暇日讀之使王習察于四方之事也不曰讀四方之事書而曰凡四方之事書內史讀之者曰讀四方之事書則似內史自讀之曰凡四方之事書內史讀之則知內史之讀為王之聽之矣王制祿則贊為之以方出之賞賜亦如之贊為之辭也方版也內史掌書王命遂二之凡王之命皆書且副寫藏之也若專言上所書爵祿之命則曰掌二王命可矣覆舉內史見親其事而非付之屬史也小史職大祭祀讀禮法史以書敘昭穆之爼簋則其屬史也王之命內史親受而書之且二之則矯假以為不信者孰敢萌其慮哉漢唐以後中侍口銜天憲以亂國常則內史之職廢也外史掌書外令掌四方之志掌三皇五帝之書外令王令下畿外者四方之志若魯之春秋晉之乘楚之檮杌三皇五帝之書若春秋傳所謂三墳五典掌達書名于四方古謂字曰名使四方知書之文字能讀之若以書使于四方則書其令凡聘俯之常不皆有書或命以事或有所訪詰而後有書故書其令使後有考也不覆舉外史此令輕異于王命之必內史親書也不二之亦以所令輕也虎賁職奉書以使于四方御史掌邦國都鄙及萬民之治令以贊冢宰凡治者受法令焉治令之出冢宰贊王復設御史以贊冢宰惟恐有偏側缺失得以補察也令已定則皆于御史受之曰受法令者凡冢宰所掌一定之法施于邦國都鄙萬民者亦御史布之也掌贊書注贊為辭若尚書作誥文吳氏曰內史書王命外史書外令御史為二官之屬則贊二官之書魏氏曰御史所贊冢宰治令書寫藏其副凡數從政者凡總計之也數又一一分數之謂計公卿以下至胥徒現在空缺者巾車掌公車之政令辨其用與其旗物而等敘之以治其出入自五路至役車皆典于公而非私車也故謂之公車王之五路一曰玉路鍚樊纓十有再就建大常十有二斿以祀王在焉曰路玉路以玉飾諸末鍚馬面飾當盧額刻金為之詩所謂鏤鍚也樊讀如鞶帶之鞶馬大帶也纓當胸以革為之或曰夾馬頸者即鞅也自玉路至象路其樊及纓皆以五采罽飾之而就異焉大常九旗之畫日月者正幅為縿斿則屬焉金路鉤樊纓九就建大旗以賓同姓以封金路以金飾諸末鉤婁頷之鉤也詩曰鉤膺則宜在膺前金路無鍚有鉤亦以金為之大旗九旗之畫交龍者以賓以會賓客象路朱樊纓七就建大赤以朝異姓以封象路以象飾諸末象路無鉤以朱飾勒而已大赤九旗之通帛異姓王甥舅革路龍勒條纓五就建大白以即戎以封四衛革路鞔之以革而漆之無他飾龍駹也以白黑飾韋為勒其色雜故曰駹條讀為絛其樊及纓皆以絛絲飾之不言樊字脫也以此言絛知上三路飾樊及纓皆不用金玉象矣大白殷之旗四衛蠻服以內庶姓諸侯守衛王室者司馬職仲秋治兵王載大常與此異者田獵為祭祀故建祭祀之旗物以表敬非即戎比也木路前樊鵠纓建大麾以田以封蕃國木路不鞔以革漆之而巳前讀為緇翦之翦淺黑也以淺黑飾韋為樊鵠色飾韋為纓不言就數飾與革路同大麾不在九旗之列色黑夏后氏所建蕃國謂九州之外夷服鎮服蕃服田所建與司馬職異者豈出入在途及列陳皆載大常而圍禁則建大麾與或曰同姓以封異姓以封或曰以封四衛以封蕃國何也金路不獨以封同姓而同姓之封為多象路不獨以封異姓而異姓之封為多故不得為必然之辭若革路則惟以封四衛木路則惟以封蕃國也王后之五路重翟鍚面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋重翟重翟雉之羽為車前蔽也此后從王祭祀所乘厭翟鱗次翟羽使相厭也此從王賓饗諸侯所乘安車朝見于王所乘以在宮中故無前蔽凡婦人車皆坐乘獨此名安車者以他車有重翟厭翟等名此無異物可稱也勒面謂以如王龍勒之韋為馬面飾也雕者畫之不龍其韋總著馬勒直兩耳與兩鑣以繪為之鷖青黑色容車帷施于旁者一名裳幃一名潼容皆有容蓋故知重翟厭翟謂前蔽也詩曰翟茀以朝豈夫人始歸得攝盛與翟車貝面組總有握翟車不重不厭以翟飾車之側爾貝面以貝飾勒之當面也握帷幕也曰有握則無蓋矣此車后乘以桑輦車組挽有翣羽蓋輦車不言飾后宮中從容所乘但漆之而已組所以挽車也為輇輪人挽之而行有翣以禦風塵以羽作小蓋翳日也王之喪車五乘木車蒲蔽犬􅍜尾櫜疏飾小服皆疏木車不漆者以蒲為蔽以犬皮為覆笭又以其尾為戈戟之韜疏飾謂以粗布為二物之緣也小服刀劍短兵之衣此始遭喪所乘素車棼蔽犬􅍜素飾小服皆素素車以白土堊車也棼讀為薠薠麻以為蔽其􅍜服以素繪為緣此卒哭所乘薻車薻蔽鹿淺􅍜革飾薻水草蒼色以蒼土堊車以蒼繪為蔽以鹿夏皮毛淺者為覆笭又以治去其毛者緣之此既練所乘明齋王氏曰下駹車始以葦為蔽若用麻布與蒼繪則反精矣蓋即編薠麻與水草以為蔽耳駹車萑蔽然䄙髤飾駹車邊側有漆飾也以萑為蔽者漆則成藩即吉也然果然也猿屬髤赤多黑少之韋也此大祥所乘漆車藩蔽犴􅍜雀飾漆車黑車也藩漆席也犴胡犬雀黑多赤少之色韋也此禫所乘舊説下經大夫乘墨車即漆車然喪車無等不應士庶人在喪轉得乘大夫之車或車雖漆而與大夫之漆車異制或墨車别有謂而非漆之謂也服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車服車服事者之車考工記陳篆必正夏篆五采畫轂約也夏縵冒紘具五采也墨車漆而不畫棧車不革鞔而漆之役車方箱可載任器以共役后之車别見而孤卿以下不見婦人車者與夫同也鄭剛中曰庶人指府史胥徒非在官者亦徒行耳王氏曰周官不載三公之車服下同于孤也凡良車散車不在等者其用無常不在等者不在服車五乘之等列也作之有精粗故有良散之名此以給遊燕及恩惠之賜凡車之出入歲終則會之凡賜闕之凡授車必會其入賜則其人得私有之故去其籍也毁折入齎于職幣齎財也乘官車毁折者入財以償繕治之直大喪飾遣車遂廞之行之遣車見內豎職飾謂設其紘冒茵䄙之類舊説以金象革飾之乃造車之事及葬執蓋從車持旌蜃車既設帷荒不得設蓋是以執而隨之旌銘旌也于從車後别言持旌明旌在車前也及墓呼啓關陳車關墓門也車二車也小喪共匶路與其飾匶路載匶車飾棺飾注大喪謂王小喪兼后與世子非也春秋傳晉荀躒如周葬穆后叔向曰王一嵗而有三年之喪二焉魯齊歸薨叔向曰君有大喪國不廢搜則后世子不得為小喪明矣蓋謂羣王子三夫人以下路車以賜諸侯則羣王子夫人嬪婦得稱匶路明矣歲時更續共其弊車更者易其舊續者雖未經久而破壞以新車續之其弊車以共車人材或有中别用之大祭祀鳴鈴以應雞人典路掌王及后之五路辨其名物與其用説説謂舍車王后之五路巾車掌之此又掌之者專掌駕脫之節陳列之次也若有大祭祀則出路贊駕説大喪大賓客亦如之祭祀出路王當乘之也喪賓則陳之凡會同軍旅弔于四方以路從王乘一路餘路悉從易彥祥曰謂因會同軍旅而行弔事車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃萃猶副也五者皆兵車所謂五戎也戎路王在軍所乘也廣車橫陳之車也闕車所用補闕之車也蘋猶屏也所用對敵自隱蔽之車也輕車馳敵致師之車也春秋傳曰公喪戎路又曰其君之戎分為二廣又曰帥斿闕四十乘孫子八陳有蘋車又曰馳車千乘五者之制及萃數未盡聞五戎之正不言所掌者巾車所掌革路即戎路也其下四戎之正亦巾車掌之凡師共革車各以其萃會同亦如之巡守及兵車之會王乘戎路乘車之會王雖乘金路猶共以從不失備也大喪廞革車遣備革車則金玉象木不必言矣言廞革車則不徒戎路廣闕蘋輕皆有焉大射共三乏乏一名容持旌告獲者所以自蔽也王大射張三侯侯後一乏革車用皮乏亦用皮故因使共之賓射燕射别無共乏者則車僕兼共之明矣而獨舉大射何也按司裘王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯是熊侯諸侯所射豹侯卿大夫士所射也惟大射朝覲之諸侯王朝卿大夫士皆與乃張三侯共三乏若賓射卿大夫不與則惟共虎侯熊侯燕射諸侯不與則惟共虎侯豹侯也司裘共侯所掌皮也車僕共乏所掌革也司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物名者物異則名異也屬舊説謂徽識小旗也或曰各屬于其官府師都州里而藏之以待用也通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色全羽析羽皆五采繫之于旞旌之上所謂注旄于干首也凡旗之帛皆用絳干首皆有旄惟全羽析羽無帛及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌仲冬教大閲司馬主其禮王之旗畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而巳大夫士雜帛言以先王正道佐職也師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄉遂出軍賦象其守猛莫敢犯也州里縣鄙乃鄉遂之官蓋互約言之鳥隼象其勇健也龜蛇象其扞難辟害也道車象路也王以朝夕燕出入斿車木路也王以田以鄙全羽析羽五色象其文德也大閲王乘戎路建大常而道車斿車並從者如宣王會諸侯于東都而田于甫草必不廢視朝所謂視四方之聽朝是也道車在朝則建大赤此載旞者朝夕燕出入也斿車正田時建大麾此載旌者小田及巡行縣鄙也鄭剛中曰此旗物司常與大司馬或頒之或辨之然王與諸侯或建或載不出乎大常與旗至于旜則孤卿建之矣師都又載之物則大夫士建之矣鄉遂又載之旗則師都建之矣軍吏又載之旟則州里建之矣百官又載之旐則縣鄙建之矣郊野又載之何也蓋軍吏也孤卿也師都也三者不同名考其實則皆孤卿而已平日為孤卿有事則為軍將在朝為孤卿食采則在師都故所互建者旗也旜也所迭載者亦旗也旜也鄉遂也大夫士也百官也州里也四者不同名考其實皆大夫士而已判而言之則曰大夫曰士合而言之則曰百官鄉則有州遂則有里曰鄉遂者總名也曰州里者各舉其一以名之故所互建者物也旟也所迭載者亦物也旟也郊野也縣鄙也二者不同名考其實皆公邑之吏而已鄉遂餘地與夫封王子弟之餘地謂之公邑亦謂之間田自其地言之名曰郊野自天子使吏治言之名曰縣鄙故所互建者旐也所迭載者亦旐也王氏曰旞旌言載在車故也其餘言建不必皆在車覲禮上介皆奉其君之旗置于宮皆就其旗而立是也皆畫其象焉官府各象其事州里各象其名家各象其號杜子春云畫當為書鄭康成曰畫雲氣也注云三者旌旗之細又云徽識之書則云某某之事某某之名某某之號非也蓋官府各有事州里各有名家各有號并書于旌旗之上耳所謂象者即旌旗也如孤卿同建旜大夫士同建物而所書則别之曰某司徒之旜某司空之旜某大夫士之物所謂官府各象其事也州里之吏同建旟則書某州之旟其里之旟所謂州里各象其名也如魯三家同建旗則書季氏之旗孟氏之旗所謂家各象其號也各象其事者各書其事于象也名號亦然古文簡奧多如此觀司馬職王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與號焉則此經之義顯然矣州里鄉遂也于鄉舉大于遂舉細也縣鄙公邑也知然者司馬職中夏教苃舍曰縣鄙各以其名而又曰鄉以州名野以邑名則縣鄙為公邑明矣此不言縣鄙者各象其名如州里無疑也凡祭祀各建其旗會同賓客亦如之置旌門項平甫曰各建其旗所以屬衆諸侯助祭百官執事者各有之此官共旌掌舍設之大喪共銘旌建廞車之旌及葬亦如之銘旌王則大常葬時建之則在途解脫之可知矣凡軍事建旌旗及致民置旗弊之甸亦如之始置旗以致民民至仆之誅後至者凡射共獲旌獲旌告獲者所持大射服不氏唱獲嵗時共更旌取舊豫新都宗人掌都祭祀之禮凡都祭祀致福于國都或有山川及因國無主九皇六十四民之祀及王子弟自祭其祖皆歸脤于王舊説王子弟立祖王之廟非也鄭祖厲王魯有文王之廟乃僣禮逆祀耳楚公子圍之強橫其娶於鄭曰告於莊共之廟則周之舊典可徵矣正都禮與其服若有寇戎之事則保羣神之壝國有大故則令禱祠既祭反命于國令令都有司也家宗人掌家祭祀之禮凡祭祀致福大夫采地所祀與都同若王近屬則自祭其祖亦歸脤于王國有大故則令禱祠反命祭亦如之掌家禮與其衣服宮室車旗之禁令都宗人職令禱祠反命于國而此于反命下特起祭亦如之之文注謂王又命祭非也禱求也祠報也無緣又命祭蓋王國有大故而命禱祠于都家者以其域內有羣神之壝也上所謂都宗祀家祭祀之禮祖廟社稷五祀之常祀也都家各以其時用事不復待命于王若羣神之壝則或主分星或主山川或主因國帝王賢聖非都家所得擅祀也故不獨有故禱祠即每歲常祭至期必以王命令之祭畢必反命于家乃備言之者于都言之或疑家之禮有異也于家言之則都可知矣猶都曰正都禮與其服而家則條舉衣服宮室車旗也有寇戎保神壝則于都言之者不先舉羣神之壝則不知其為禱祠于羣神也凡以神仕者掌三辰之法以猶鬼神示之居辨其名物以冬日至致天神人鬼以夏日至致地示物魅以禬國之凶荒民之札喪此言以神仕都家者蓋都宗人家宗人皆官于王朝以制都家之祀事其私邑必各有巫祝若王朝以神仕者則大祝司巫之屬具矣猶鬼神示之居亦都家之鬼神示也若國之神位則小宗伯建之矣都家之地或為分星所在則其神也山川陵麓則其示也因國之無主後者則其鬼也其壇兆所宜必圖度而後定所謂猶其居也必掌三辰之法然後可以猶鬼神示之居者如春秋傳所載實沈為參神神降于莘曰其至之日亦其物戊子逢公以登而知妖星為告邑薑也王國天神地示人鬼之祭時地各異而此以冬日至致天神人鬼夏日至致地示物魅則為都家之祭明矣曰禬國之凶荒者示都家之統于王國而異于外諸侯也李耜卿曰宗伯掌邦禮雖兼治神人而事神為重故其設官先後皆以神事次之小宗伯立鬼神示之位肆師掌其玉帛牲牷所以二大宗伯也祭莫先于祼故首以鬱人鬯人司尊彝鋪筵設同几為依神也故司几筵次之陳其宗器故天府次之禮之以玉故典瑞又次之祭有尊卑服有等差故次司服先雞人于司尊彝者明禴祠蒸嘗欲及時事也先典命于司服者古者于禘發爵賜服所謂祭有十倫此其一也次典祀守祧未祭守之當祭巡之也次世婦至外宗贊王后內事也祭以追遠喪以愼終故冢人至職喪次之禮交動乎上樂交應乎下故大司樂至司干二十官次之貞之夢卜以知其情故有大卜八官假于祝巫以薦其信故有祝巫八官然後有大史四官詳于天道內史三官謹于人治而莫不有祭祀之聨事祭必乘大路載大常故繼以自巾車至司常四職都宗人家宗人祭有賜禽有事命禱故附見焉雖其間名分之嚴教育之方凶賓軍嘉之禮莫不備舉而無非推仁孝誠敬之心以及于天下默契天親之理以順其秩敘命討之公此天道之至教聖人之至德也周官集注卷六
