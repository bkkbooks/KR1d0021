body:
  text: 周官集注卷三翰林院侍講銜方苞撰地官司徒第二徒衆也地載萬物司徒任地教擾萬民故曰地官惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國擾馴習也以地官掌教者禮官所教秀民而已土地人民皆𨽻于地官而親民之吏屬焉必地官掌教乃能盡天下而無一人之不教古之聖人所以務明明徳于天下而非漢唐之治所及也教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鄉師每二人分掌三鄉之事相左右也鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人老尊稱也春秋傳劉文公自稱天子之老王畿附郭百里内為六鄉外為六遂三公與王論道因以道明民故使鄉民觀徳焉正師胥皆長也正之言政也師之言帥也胥有才知之稱自族師以下即其里之賢者民自推擇因而秩之所謂使民興能入使治之也何氏曰六鄉不過七萬五千家而官則萬九千餘何以祿之蓋比長即上農夫閭師則受二家之田族師則受四家之田皆自耕以給衣食黨正州長以上然後官賦之祿耳封人中士四人下士八人府二人史四人胥六人徒六十人聚土曰封春秋傳楚城沂使封人慮事以授司徒此職文凡封國設其社稷之壝封其四疆則宜為地官之屬明矣鼓人中士六人府二人史四人徒二十人其職兼掌金而曰鼓人者所掌四金皆以節鼓也舞師下士二人胥四人舞徒四十人鼓舞乃民間通用之樂必屬地官于教民乃便牧人下士六人府一人史二人徒六十人掌牧六牲以共祭祀亦地事也牛人中士二人下士四人府二人史四人胥二十人徒二百人司徒物土土爰稼穡故牛人屬焉宗伯典禮禮以時行故雞人屬焉司馬主兵軍行饗餽莫便于羊故羊人屬焉司宼掌刑獄有守禁故犬人屬焉而祭祀因各共其事王明齋曰牧人兼六牲而官為下士以職止芻牧故與雞人羊人犬人同爵牛人雖主一牲然其用不止于牲事所掌財賦為大故官為中士馬之用尤重于牛故挍人為下大夫也充人下士二人史二人胥四人徒四十人充博碩肥腯也牧人養牲于田野充人養牲于國中載師上士二人中士四人府二人史四人胥六人徒六十人載之言事也以地事任民而税之閭師中士二人史二人徒二十人鄉官有州黨族閭比以閭名官者徵民之税宜督其親民者故閭胥徵之而閭師掌其徵之令也凡貢物入大府糓入倉人縣師上士二人中士四人府二人史四人胥八人徒八十人徵野賦貢名曰縣師者自六鄉至邦國縣居中也遺人中士二人下士四人府二人史四人胥四人徒四十人均人中士二人下士四人府二人史四人胥四人徒四十人均猶平也主平水土之政令師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人保氏下大夫一人中士二人府二人史二人胥六人徒六十人與師氏同教國子而别置官與府史者所掌小學館舍異所司諫中士二人史二人徒二十人司救中士二人史二人徒二十人調人下士二人史二人徒十人調和合也媒氏下士二人史二人徒十人媒之言謀也謀合異姓使為㛰婣司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人質人中士二人下士四人府二人史四人胥二人徒二十人㕓人中士二人下士四人府二人史四人胥二人徒二十人民居及市中屋舍通曰㕓此所掌㕓在市中者胥師二十肆則一人皆二史賈師二十肆則一人皆二史司虣十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人自胥師及司稽皆司市所自辟除胥及肆長市中給繇役者泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人故書泉或作錢司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人主王城十二門司關上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人王畿面五百里界首面置三關亦十二關掌節上士二人中士四人府二人史四人胥二人徒二十人遂人中大夫二人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人注六遂之地自遠郊達于畿中有公邑家邑小都大都非也小司徒鄉大夫掌六鄉之政教禁令遂師遂大夫各掌其遂之政令禁戒而縣師職曰掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽又曰凡造都邑量其地辨其物而制其域以歲時徵野之賦貢則稍縣畺公邑私邑乃縣師所掌也六遂獨百里至二百里地遂人掌造縣鄙溝涂形體之灋故曰以達于畿非畿内通為遂地也縣師所掌地域人民田萊之數兼甸郊里者為受法于司馬以作衆庶㑹卒伍遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人鄉大夫遂大夫以下皆無府史胥徒者鄉大夫乃六卿不與民治州長遂大夫以下則其屬吏轉而相承身親其事無所用之旅師中士四人下士八人府二人史四人胥八人徒八十人孫氏曰先王之民入有保受出有節傳豈容浮游旅寄于四方今民以羈為名官以新甿為職豈非自狹徙寛移偏聚之民于廣闊之野上之人當勞來安集之乎稍人下士四人史二人徒十有二人委人中士二人下士四人府二人史四人徒四十人土均上士二人中士四人下士八人府二人史四人胥四人徒四十人草人下士四人史二人徒十有二人稻人上士二人中士四人下士八人府二人史四人胥十人徒百人土訓中士二人下士四人史二人徒八人誦訓中士二人下士四人史二人徒八人山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人虞度也度知山之大小及所生者林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞衡平也竹木生平地曰林山足曰麓川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人川流水也澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡澤水所鍾也水希曰藪于林麓總言之于澤藪分言之者麓多為林而澤藪地各異也迹人中士四人下士八人史二人徒四十人迹之言跡也知禽獸處春秋傳迹人來告逢澤有介麋焉卝人中士二人下士四人府二人史二人胥四人徒四十人卝之言礦也金玉未成器曰礦角人下士二人府一人徒八人羽人下士二人府一人徒八人掌葛下士二人府一人史一人胥二人徒二十人掌染草下士二人府一人史二人徒八人掌炭下士二人史二人徒二十人掌荼下士二人府一人史一人徒二十人掌蜃下士二人府一人史一人徒八人囿人中士四人下士八人府二人胥八人徒八十人場人每場下士二人府一人史一人徒二十人春夏為圃以種菜蔬至季秋始築為場廩人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人藏米曰廩藏榖曰倉舍人上士二人中士四人府二人史四人胥四人徒四十人倉人中士四人下士八人府二人史四人胥四人徒四十人司祿中士四人下士八人府二人史四人徒四十人司稼下士八人史四人徒四十人舂人奄二人女舂抌二人奚五人舂人職領以女奚數甚少蓋夫人親舂以供齍盛故女奚助以終事若牢禮饗食則女奴入舂稾者共之而女奚特差擇之耳抌抒臼也饎人奄二人女饎八人奚四十人故書饎作􅐪稾人奄八人女稾每奄二人奚五人稾讀為犒師之犒主宂食者故謂之犒稾人職領以女奚者婦人主饋且官吏人民給事宫中者必女奚共食乃便而因通給外朝之食也士庶子宿衛王宫故女奚共其食而耆老孤子之饗亦兼焉其事春秋各一舉不足特設官也大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國必知土地之宜人民之數然後可定民之居制民之産以安其身而教擾之安擾邦國之民即所以安擾邦國也以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物周之九州揚荆豫青兖雍幽冀并也東西為廣南北為輪積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水崖曰墳下平曰衍髙平曰原下濕曰隰名物者十等之名與所生之物而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野畿限也疆猶界也溝穿地以為阻固也封起土界也社稷后土及田正之神壝壇與堳埒也田主田神詩人謂之田祖木各有宜若以松為社則名松社之野以土㑹之灋辨五地之物生一曰山林其動物宜毛物其植物宜皁物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜覈物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晢而瘠五曰原隰其動物宜臝物其植物宜叢物其民豐肉而庳㑹計也九州之域各有五土故别其類而總計之謂之土㑹之灋毛物貂狐貒貉之屬縟毛者鱗物魚龍之屬津潤也羽物翟雉之屬覈物梅李之屬專圜也介物龜鼈之屬水居陸生者莢物薺莢王棘之屬晢白也瘠臞也臝物虎豹􅆛之屬淺毛者叢物萑葦之屬􅋻猶短也一曰皁物柞栗之屬膏物楊柳之屬理致且白如膏一曰膏當為櫜蓮芡之實有櫜韜因此五物者民之常而施十有二教焉一曰以祀禮教敬則民不苟二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不愉七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民愼徳十有二曰以庸制祿則民興功五地所生之民形貌旣殊則性質剛柔輕重遲速亦異故必因其常性而施教以變化之陽禮鄉射飲酒之禮也内宰以隂禮教六宫家人相怨多起于婦人故以隂禮教親曰樂禮者樂必依禮而作也儀謂拜跪揖讓坐立之儀以俗教安即下經所謂以本俗六安萬民也民得生養之樂有戚黨之懽然後勤于作業而不偷民畏刑然後能自易其惡以至于中故不暴恤謂災危相憂即下經黨相救州相賙之類誓以憂樂相同彼此共之則民知恤人即所以利已而不怠矣度謂宫室車服之制世事士農工商不遷其業也庸功也李耜卿曰上言五地此言五物者以形言曰地以地所生言曰物以土宜之灋辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事十有二土謂分野十二邦上繫十二次或曰即古十二州也土各有宜相占視也任謂就地所生因民所能辨十有二壤之物而知其種以教稼穡樹藝壤亦土也以萬物自生焉則言土土猶吐也以人所耕而樹藝焉則言壤壤和緩之貌藝猶蒔也以土均之灋辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政均平也五物五地之物也九等草人所辨騂剛赤緹之屬辨五物九等名曰土均之灋者田有一易再易地有五而當一十而當一必辨其等乃可均也制天下之地征以作民職王畿侯國之所同也令地貢者邦國之九貢也斂財賦者畿内九賦九功也以致邦國故曰令以徵畿内故曰斂不曰貢賦而曰財賦者曰財然後可以該諸職之貢物與門市之泉布也以均齊天下之政者土均職邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地之美惡為輕重而均齊之以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂土圭所以致四時日月之景也土深謂地形之髙下舊説周公營洛于陽城置中表四面各置一表距中表皆千里于晝漏半驗之景短于中表其地于日為近南景長于中表其地于日為近北中表景得正時東表日已跌是謂景夕西表日尚未中是謂景朝日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之土圭長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中潁川陽城皆然樹木溝上所以表助阻固也河間王氏曰西北多山東南多水惟地中平壤為天地之所合北極下半歲為晝夜赤道下一歲再冬夏惟地中為四時之所交日東近海多風日西連山恒雨惟地中乃風雨之所㑹日南近日多暑日北逺日多寒惟地中乃隂陽之所和于王畿曰封樹者規方千里包髙山大陵不可以溝限惟起封界樹木以表之故造都鄙則曰封溝以室數計畝制地其域狹也篇首總言制邦國都鄙之畿疆曰溝封後分言制都鄙之地域則曰封溝者邦國封疆廣狹不齊地勢所宜或可溝或止起封界與都鄙計畝制域封必以溝者異也凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一土其地者度榖土之多少也制其域者兼所包山林川澤也必以土圭土其地者知境内東西南北之髙下然後可以計榖土之多寡定國邑之面勢也詩曰揆之以日作于楚室是以土圭定國邑也又曰景山與京是以土圭度四野也以詩及春秋傳所言魯衛封略計之似周官封國之數為可據覈其實與孟子所言亦不甚相逺蓋周官所言者制其域也兼名山大川附庸閒田在其封内者而言也顓臾魯附庸而孔子曰在邦域之中是也所謂食者則其實封食其土利者也惟諸公土田陪敦諸男不能五十里與孟子不合然見于春秋公惟宋男惟許宿則建國甚稀至于分土惟三以諸侯之地方四百里計之為方百里者十六其食者三之一為方百里者五方十里者三十三方里者三十三山陵林麓川澤溝瀆城郭宫室塗巷三分去一餘方百里者三方十里者五十五方里者五十四以一易再易之田相減并藪牧疆潦之五而當一十而當一者計之其為榖土亦約百里耳蓋孟子言頒祿故止計榖土周官言所食則并其山澤之毛至邦域之數則包名山大川附庸閒田之在其封内者耳如今大州縣包絡山河動數百里而計畝徵賦入籍者不過數十里周官孟子封國異數正類此凡造都鄙制其地域而封溝之以其室數制之不易之地家百畝一易之地家二百畝再易之地家三百畝春秋侵伐及邊境則書四鄙傳曰都城過百雉又曰邑有先君之廟曰都葢都所居鄙則界也制其地者計榖土也制其域者兼疆潦藪牧也以室數制之者計城邑之室數于野授田王制凡居民量地以制邑度地以居民地邑民居必參相得也不易之地歲種之一易之地休一歲乃復種再易之地休二歲乃分地職奠地守制地貢而頒職事焉以為地灋而待政令注定地守謂衡麓虞候之所守非也山澤藪牧並列九職則衡麓虞候于作民職具之矣按夏官司險設國之五溝五涂而樹之林以為阻固皆有守禁掌固頒士庶子之守凡守者受灋焉以通守政若造都鄙則治其固與其守灋乃此經及均人土均職所謂地守也此經所謂分地職制地貢與上經所謂作民職令地貢義異民職九職也地職則其地所當承之職事如當津要則服輸將給賓客師旅近川防則共浚築以所職各異或一事而比邑共承之故曰分也上經令地貢侯國之貢也此則都邑之貢寰内食采者地非所專故不曰令而曰制也頒職事即下經所頒職事十有二也九職己具其中故知地職非九職也分地職奠地守制地貢皆地灋也而復言以為地灋者以待政令言之也都鄙有逺近其地有饒瘠其事有劇易故所以待王朝之政令者灋各有宜而不可以一致也春秋傳曰取于有閻之土以供王職取于相土之東都以㑹王之東蒐東蒐亦王事也而别言王職者時康叔入為司寇必其畿内采邑之職事也以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊散利貸種食也弛力息繇役也舍禁山澤不禁也去幾謂關市去税而幾之知然者司關職國凶札無關門之征猶幾也眚禮殺吉禮也殺哀殺凶禮也宗伯職以凶禮哀邦國殺哀者節喪弔禬恤之財用以賑凶荒也蕃樂閉藏樂器而不作也多昏使娶者不備禮也索鬼神求廢祀而修之詩所謂靡神不舉也饑饉則盜賊多不可以緩刑而縱之眚禮蕃樂似無與民事而以聚萬民者遇災而懼以勤恤民則民之心聚矣以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寛疾六曰安富慈幼若産子三人公與之母二人公與之餼十四以下不從征養老謂引年之禮窮謂鰥寡孤獨寛疾若廢疾非人不養者一人不從政之類民有田里樹畜則能自養矣而老者幼者孤獨鰥寡者以事故耗敗者疾病無依者上更有以保息之管子九惠之教一曰老老二曰慈幼四曰養疾七曰通窮八曰振困葢本于此陸贄曰先王制賦不以殖産厚其征安富之義也以本俗六安萬民一曰媺宫室二曰族墳墓三曰聨兄弟四曰聨師儒五曰聨朋友六曰同衣服此六者風俗之根本也媺善也墓大夫職令國民族葬父之黨為宗族母與妻黨為兄弟同師曰朋同志曰友同衣服謂雖有富者衣服不得獨異也媺宫室為本俗之首者有寢有廟民安其居然後樂事勸功而重去其鄉終于同衣服者民志定然後禮俗型也正月之吉始和布教于邦國都鄙乃縣教象之灋于象魏使萬民觀教象挾日而斂之乃施教灋于邦國都鄙使之各以教其所治民布教于邦國都鄙布以上諸大綱也施教灋于邦國都鄙施以下諸細目也令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓五家暱近故奇衺使之相保二十五家則宅舍多矣故有故而寄託者使之相受百家則財力贍矣故葬具喪役使之相共五百家則勢衆强矣故寇盜使之相救二千五百家則蓄積厚矣故祲札使之相賙萬二千五百家則秀民聚矣故使之賓其賢者興賢國典也而曰相賓者鄉飲酒禮主人就先生而謀賓介是使鄉人自相推擇而賓禮之也所謂使民興賢出使長之使民興能入使治之也相保相受相葬相救相賙相賓及十有二職三物八刑獨列于布教于邦國都鄙之後與諸職異者前所列土㑹土宜土均之灋皆地灋也土圭之灋以制王畿建邦國造都鄙也荒政有十二保息六本俗六以聚萬民養萬民安萬民也惟十有二教主于教民而皆教之大綱故與諸大政並列于前此四者乃教之細目親民之吏所奉守者故詳于施教灋于邦國都鄙使各以教其所治民之後也頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通財七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事前九事即九職所任增其三者國用制于冢宰故九職所任皆財賦所從出也司徒頒教則秀民之學藝巫史醫卜之世事庶人在官之服事者其職事不可缺矣以鄉三物教萬民而賓興之一曰六徳知仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數物猶事也興猶舉也教成鄉大夫舉其賢者能者以飲酒之禮賓之聖通而先識五常之徳惟禮不列者該于六行六藝也聖者知之無不通也以淺深别之也忠者信之積于中也和者信之達于外也以體用别之也睦親于九族婣和于外親任信于朋友恤振憂貧者五禮吉凶軍賓嘉六樂雲門大咸大韶大夏大􅇴大武五射白矢參連剡注襄尺井儀五御鳴和鸞逐水曲過軍表舞交衢逐禽左六書象形㑹意轉注處事假借諧聲九數方田粟米差分少廣商功均輸方程贏不足旁要漢時又有重差夕桀句股白矢者貫侯而見其鏃白參連者前放一矢後三矢連中故處詩所謂四矢反也剡注謂羽頭髙鏃低而去剡剡然襄尺謂臣與君射退一尺而立井儀謂四矢貫侯如井和在式鸞在衡韓詩外傳升車則馬動馬動則鸞鳴鸞鳴則和應逐水曲謂隨水勢之屈曲而不墜水也穀梁傳艾蘭以為防置旃以為轅門以葛覆質以為槷流旁握御轚者不得入是謂過軍表舞交衢謂行四達之道車旋應于舞節也逐禽左謂御驅逆之車逐禽使趨君之左以待射象形日月之類㑹意武信之類人言為信止戈為武㑹合人意也轉注考老之類建類一首而文意相授左右相注處事上下之類人在一上為上人在一下為下假借令長之類一字兩用諧聲江河之類方田以御田疇界域粟米以御質劑變易差分以御貴賤廩税少廣以御冪積方圓商功以御功程積實均輸以御逺近勞費贏朒以御隱雜互見方程以御錯糅正負勾股以御廣逺髙深以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑亂民亂名改作執左道以亂政者不任不恤亦有刑者背朋友之付託則不義安鄰里之危困則不仁此而不懲則民俗日以偷矣易不友曰不弟且退列于不睦不婣之下者曰不友則專于兄弟曰不弟則不遜弟于族婣鄉黨者該此矣八者所犯小則扑以教之所犯大及不悛則歸于士王東巖曰三物八刑皆言鄉者教法始于六鄉故也以五禮防萬民之僞而教之中以六樂防萬民之情而教之和六藝中有禮樂不過秀民習之耳此則通乎萬民故復列之禮者稱情以立文所以防民之僞而老莊荀氏乃以為化性而起僞葢溺于俗而不達于先王之禮意也凡萬民之不服教而有獄訟者與有地治者聽而斷之其附于刑者歸于士有地治謂鄉州及治都鄙者附麗也士司寇士師之屬祀五帝奉牛牲羞其肆享先王亦如之奉奉承之也羞進也肆腥解骨體所謂豚解也郊先全蒸後豚解宗廟之祭則無全蒸先豚解次爓而熟之謂之體解不言祭地者禮與祭天同大賓客令野修道委積令令遺人少曰委多曰積所以給賓客大喪帥六鄉之衆庶屬其六引而治其政令屬合聚也引謂引喪車索也六鄉主六引六遂主六紼在棺曰紼言繩體也行道曰引言用力也大軍旅大田役以旗致萬民而治其徒庶之政令旗畫熊虎若國有大故則致萬民于王門令無節者不行于天下古者謀及庶人故也大故即小司寇所掌詢國危詢國遷詢立君也王崩苟無他故及尋常寇兵無為致萬民于王門注誤節小行人所達六節大荒大札則令邦國移民通財舍禁弛力薄征緩刑大札大疫也于荒政十二之中獨舉其四者貢賦天子所制也故舍禁弛力薄征必待司徒之令刑章天子所定也故緩刑必待司徒之令若有利而自散之以及眚禮殺哀蕃樂多昏索鬼神皆邦國所得自主也不及去幾者其政微也不及除盜賊者盜賊承饑凶而作乃非常之變勢在必除無可疑也于荒政十二之外增其二者移本國之民與鄰國通財其事尤大非天子之命不敢專也故首列之歲終則令教官正治而致事正歲令于教官曰各共爾職修乃事以聽王命其有不正則國有常刑小宰所令于百官府者王宫之事也故于職曰修于灋曰考于事曰待而不用命者曰不共司徒所令于教官者教事也故于職曰共于事曰修而不用命者曰不正小司徒之職掌建邦之教灋以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令五官之長佐太宰建五典而教灋獨小司徒建者以主六鄉而親民事猶小宰之建宫刑也夫家謂男女旣配耦者以是知周之征役不及單丁女戸餘夫處女也九比九職之人數也貴謂卿大夫士賤謂庶人在官即鄉大夫職所謂服公事者征謂税之役謂繇役施當作弛或曰征役獨力役之征也乃頒比灋于六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以歲時入其數以施政教行徵令及三年則大比大比則受邦國之比要登升而載于冊也衆寡謂民之多少駕牛馬曰車人挽曰輦物謂弓矢甲楯楨榦旗物之屬即大比所謂兵器也旗物有度式什器有良苦故辨之注疏並誤頒比灋舉六鄉則甸稍縣都邦國視此矣受比要舉邦國則鄉郊甸稍縣都可知矣畿内則歲時入其數侯國則三年入其要内外詳略各有宜也乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦先王因農事而定軍令欲其恩足相恤義足相救服容相别音聲相識追逐寇也胥伺捕盜賊也追胥曰比者卒伍旣定則各以所居逺近相次而追胥也乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨惟田與追胥竭作一家男女七人以上則授之以上地所養者衆也五人以下則授之以下地所養者寡也可任謂丁壯任力役者羨饒也竭作盡行也田獵盡行更番調發使習于軍事也追胥盡行守望相助非逺違其閭井也凡用衆庶則掌其政教與其戒禁聽其辭訟施其賞罰誅其犯命者凡國之大事致民大故致餘子大事戎事也大故意外不測之變也餘子羨也乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事方里而井九夫所治之田也四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里以治溝洫則方十里為一成四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同井牧其田野者有井則有牧井牧相間然後六畜有所養而不傷稼穡也凡税斂之事如徵納之期收掌之人廩藏之所委輸存貯之數皆是也即税斂貢賦之事宜非貢賦外别有税斂上經㑹卒伍而令貢賦者征役有繁簡則貢賦有乘除也此經制井牧而令貢賦凡税斂之事者地邑有衝僻收穫有早晚道路輸將有逺近則税斂之事必隨地而制其宜也小司徒專掌六鄉而所載乃井邑丘甸縣都之制者比閭族黨州鄉之灋大司徒職具之矣故獨載井灋以示内而六鄉外而六遂以及都邑名雖各異其地灋則皆以九夫為井四井為邑積累而區分之也任土比民之灋錯見諸職大司徒職載邦國封疆都鄙室數次及比閭族黨州鄉之法小司徒職載井邑丘甸縣都之灋載師職載任土之法閭師職載任民作貢之灋縣師職載賦兵之灋遂人職載溝洫之灋其授田則大司徒職載不易一易再易之田所授多寡之數小司徒職載上地中地下地之人所任多寡之數皆各舉其一彼此互備也注謂此造都鄙采地制井田異于鄉遂非也井邑丘甸縣都以田數計之而出税灋也溝洫澮川以經界言之而通水道也此經曰九夫為井者以出税灋故止計所耕之地也遂人曰十夫有溝者以定經界故并計所占之地也井間之溝溝上之畛以及疆埸之𤓰八家之場圃皆取于所加百畝之中且四井為邑量地制邑亦必取于四井之中非每井而加百畝勢不能備然則遂人所謂十夫即此經所謂九夫而溝洫澮川之制井邑丘甸縣都之灋乃鄉遂都鄙之所同也審矣鄭氏之誤起于謂匠人溝澮之數與遂人不同不知實無二灋特考之未審耳詳見匠人為溝洫解康成為鄉遂用貢都鄙用助之説朱子終不敢易者一則以九與十起數之異也然匠人之灋止九夫與遂人十夫異耳其有溝有洫有澮有川同也九夫十夫取數雖異而占地大小相去無幾其不可為以十起數之溝澮者亦不可為以九起數之溝澮也且謂鄉遂多平曠則最宜于畫井矣謂都鄙包陵麓則最不宜于畫井矣况建國或在中原或阻山澤即鄉遂多平曠都鄙包陵麓之説亦不可通哉一則以四與五起數之異也然四與五之起數各異特以異鄉遂都鄙之號名耳必異其號名者以師田旗物易辨耳其實田制未嘗異也葢鄉遂以五起數計室數也都鄙以四起數計田數也以田之不易一易再易計之一家所占率二百畝是合二井而約八九家積至四甸千一百餘家在都鄙則名之曰縣在鄉遂則合九甸之地約二千五百家而名之曰州名之曰縣自是以上都鄙則合四縣而名之曰都鄕遂則合十有一縣之地約萬二千五百餘家而名之曰鄉名之曰遂室數田數未嘗不符何不可通行井灋哉經曰乃經土地而井牧其田野蓋通王畿邦國皆用此灋而中舉縣都以見例耳且制地授田出税賦役稽夫家畜産之灋見于司徒見于小司徒見于鄉師及鄉遂羣吏之職疊出互備不厭其繁使鄉遂用貢都鄙用助經界水道彼此各異是地灋之最大宜特書而詳見者乃竟無一語及此則為康成之臆説明矣至孟子所云尤不可以此注證葢遂當為野而鄉不可以為國中也成同之灋注乃以開方計之然畫井必因地勢非必萬夫之地截然齊一而為井春秋傳所謂牧臯隰井沃衍管子所謂五而當一十而當一其遺灋也乃分地域而辨其守施其職而平其政分地域謂建邦國造都鄙制鄉遂也辨其守辨其城郭溝涂之守灋也職謂九職政當作征税也知此經所謂施職與大司徒分地職異者大司徒旣曰分地職又曰頒職事所頒職事十有二其九即九職之事則分地職不得為九職明矣故曰地職葢以别于民職也此經上言分地域而辨其守下言平其政則為施九職之事明矣凡小祭祀奉牛牲羞其肆小賓客令野修道委積大軍旅帥其衆庶小軍旅巡役治其政令大喪帥邦役治其政教小祭祀王𤣥冕所祭小賓客諸侯之使臣大軍旅謂天子親行帥帥而致于大司徒也役謂築軍壘修城塹之役大喪曰帥邦役者對遂師道野役而為言也凡建邦國立其社稷正其畿疆之封畿職方所掌九畿也凡民訟以地比正之地訟以圖正之地比田畔邑居相鄰接者歲終則考其屬官之治成而誅賞令羣吏正要㑹而致事曰治成者所治職事之狀所以别于計簿之成也屬官謂官中大夫士及諸職執事王朝者羣吏謂鄉遂公邑之吏及家削縣都私邑之吏以不盡屬于司徒故别言之令羣吏正要㑹而致事者使達于治官不自考而誅賞之也正歲則帥其屬而觀教象之灋徇以木鐸曰不用灋者國有常刑令羣吏憲禁令修灋糾職以待邦治憲表縣之觀教象之灋則曰帥其屬以教灋縣于象魏在外之羣吏不能徧觀也憲禁令則曰令羣吏俾各縣于所治也縣師掌都鄙稍甸郊里之治三年大比以考羣吏詔廢置小司徒所令即縣師所考及大比六鄉四郊之吏平教治正政事攷夫屋及其衆寡六畜兵器以待政令四郊者六鄉之餘地宅田士田賈田官田牛田賞田牧田是也司馬灋畝百為夫夫三為屋屋三為井小司徒稽國中四郊都鄙之夫家九比之數而大比獨六鄕四郊之吏者家稍縣都之吏則考之者縣師也頒比灋于鄉大夫不及兵器至大比六鄉四郊之吏則有兵器者鄉大夫州長黨正職主于教族師以下始有簡兵器之文體有所宜事取其便也古者卒伍兵器皆自具而漢世有禁民挾弓矢者可謂昧于治體矣鄉師之職各掌其所治鄉之教而聽其治鄉師每二人共主三鄉故曰各掌其所治鄉也遂之教治獄訟皆遂大夫掌之而鄉則鄉師掌之者鄉大夫六卿也豈暇聽鄉之教治獄訟哉其于教則正月頒之鄉吏而已其于治則歲終令羣吏㑹政致事而已至獄訟則一聽之鄉師而不與者體當然也以國比之灋以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟曰國比之灋者五家為比乃國中屬民之灋而因以施于鄉邑也稽夫家辨征役施舍小司徒之職也而復列于鄉師者小司徒通掌國中及四郊都鄙而鄉師分掌六鄉遂師分掌六遂縣師掌都鄙也馬牛之物蓋該六畜車輦而言小司徒職旣曰六畜車輦而又曰辨其物故知為旗物及兵器役器也大役則帥民徒而至治其政令旣役則受州里之役要以攷司空之辟以逆其役事至至營作之地也役要所遣民徒之數辟功作章程凡邦事令作秩敘邦事凡有營作征行之事皆是也秩常食也敘功次也凡功作之事其食之多少功之次敘皆令監督者計而作之大祭祀羞牛牲共茅蒩大司徒職奉牛牲羞其肆鄉師復羞牛牲者若宗廟之祭大司徒羞豚解則鄉師羞體解又大神示之祀大司徒不與或鄉師共之也知非佐大司徒者宰夫從太宰視滌濯贊小宰比官府之具皆特文以見也蒩或讀為藉易曰藉用白茅或曰即士虞禮所謂苴刌茅長五寸束之以承隋祭之物者鄭剛中曰甸師所共之茅以縮酒也鄉師所共之茅以藉也大軍旅㑹同正治其徒役與其輂輦戮其犯命者輂馬駕輦人挽所以載任器也軍止則以為藩營司馬灋曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦徒役輂輦稍人帥以至鄉師正治之而已大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以涖匠師匠師事官之屬鄉師主役匠師主匠共主葬引纛翳也以指麾輓柩之役正其行列進退窆下棺也執斧恐或助匠師凡四時之田前期出田灋于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟田灋所起人徒及所具器物也大司馬職禁圍之地前後有屯百步車徒未列及旣弊後所止也故鄉師巡之凡四時之徵令有常者以木鐸徇于市朝徇于朝使羣吏布于六鄉也徇于市戒國中之民也以歲時巡國及野而賙萬民之囏阨以王命施惠以王命施惠者其職代王巡行見民囏阨即以王命發倉廩出泉布而無所壅遏不待奏請報可此聖人慮事之詳憂民之切也歲終則攷六鄉之治以詔廢置告王及冢宰以是知六鄉之吏小司徒不自考而誅賞之也六遂則遂大夫主之其餘縣師主之正歲稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賓器鄉共吉凶禮樂之器吉祭服凶弔服祭器簠簋鼎俎之屬喪器夷槃素俎楬豆輁軸之屬射器弓矢楅中之屬賓器尊俎笙瑟之屬鄉大夫備集此四者為州黨族閭有故而不共也鄉器旁使相共則民無廢事上下相補則體行而教成若國大比則攷教察辭稽器展事以詔誅賞此大比羣吏之治攷教乃攷其教之行否如教行于二十五家然後閭胥為得其職若三年大比興賢能考徳行道藝則鄉大夫之職也察辭視吏言事察其情實鄉大夫之職各掌其鄉之政教禁令正月之吉受教灋于司徒退而頒之于其鄉吏使各以教其所治以攷其徳行察其道藝州長黨正皆曰教治政令而鄉大夫則曰政教禁令者鄉大夫六鄕也用其體望以統六鄉而不與治民之事故曰受教灋于司徒退而頒之于其鄉吏使各以教其所治又曰令羣吏考灋于司徒各憲之于其所治之國蓋州長黨正始有民治故鄉大夫職不言治也非惟不治民亦不聽羣吏之治鄉師職各掌其所治鄉之教而聽其治是也遂大夫則兼聽治訟以無王朝之事也魏氏曰鄉大夫六卿也而同受司徒之灋葢在朝則冢宰重在鄉則大司徒重在軍則大司馬重王氏詳説曰鄉大夫云政教禁令州長云教治政令黨正云政令教治族師云戒令政事閭胥云閭之徵令比長云比之治命官之意其輕重皆在一字間大司徒之職掌邦教而兼土地之圖人民之數小司徒則掌建邦之教灋鄉師則各掌其所治鄉之教而兼聽其治矣若乃六鄉之吏閭胥比長則于政教之事不足稱也不過掌閭之徵令比之治而已鄉大夫州長則詳于教黨正族師則詳于政此政教之所以異也禁令為上政令次之戒令又次之徵令為下比長則于令亦不足稱也以歲時登其夫家之衆寡辨其可任者國中自七尺以至六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歲時入其書征力役之征也舍謂復除不給役事晚征而早免之以國中役事多也早征而晚舍之以野外役事少也入其書謂入于大司徒所舍獨言國中者公卿大夫士及庶人在官者皆聚于國中鄉遂之吏則當官奉職不在弛舍之列鄉遂大夫所屬無府史胥徒又升于司徒者始不征于鄉則賢能在鄕遂者亦不應舍故止以國中言之至老疾則本無可任之理言國中而野可知矣小司徒頒比灋于鄉大夫使簡稽而登諸籍故曰入其數鄉大夫旣登諸籍故曰入其書三年則大比攷其徳行道藝而興賢者能者鄉老及鄕大夫帥其吏與其衆寡以禮禮賓之衆寡謂衆賓葢鄉人來觀禮者多少無定數也興者自是而興起出其曹也厥明鄕老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之厥其也天府掌宗廟之寶藏者退而以鄕射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞凡射衆耦皆合揖讓相先故取其能和勝不勝相形媢嫉易生故取其有容主皮貫革也和容容體比于禮也興舞節比于樂也于獻賢能之書後即以此為詢者所以興起羣士為後舉之本也賢能徳行道藝旣成者故謀于鄉先生五物材質可造者故詢于衆庶此謂使民興賢出使長之使民興能入使治之出謂進而為王朝之官也入謂退而為鄉遂之吏也葢興其才徳之大者而進于王朝則將為公卿大夫以臨長之興其行能之小者而為鄉遂之吏則遂治其比閭族黨之民此三王之世所以不患選舉之不公而百官得其宜萬事得其序也歲終則令六鄉之吏皆㑹政致事㑹政者上財用之計也致事者各致其一歲所治之職事也曰㑹政者舍國政無所用財也小司徒歲終令羣吏正要㑹而致事則兼甸稍縣都之吏也小宰歲終令羣吏致事則兼六官之屬也不及㑹政者小宰月終受月要贊冢宰受歲㑹則㑹政不必言矣正歲令羣吏攷灋于司徒以退各憲之于其所治之國羣吏州長以下曰所治之國者按朝大夫職于都家亦曰每國凡地有分界者通可謂之國也李耜卿曰正月所受止教灋此所攷灋則小司徒職所云征役弛舍祭祀飲食喪紀之禁令皆在焉大詢于衆庶則各帥其鄉之衆寡而致于朝大詢詢國危詢國遷詢立君也曰衆寡者所致必耆徳無定數也國有大故則令民各守其閭以待政令皆聚于閭胥所治處以旌節輔令則達之民雖以徵令行其將之者無節則不得通朱子曰古人學挍教養徳行道藝選舉爵祿宿衛征伐師旅田獵只是一項事州長各掌其州之教治政令之灋正月之吉各屬其州之民而讀灋以攷其徳行道藝而勸之以糾其過惡而戒之讀灋讀教灋也鄉大夫掌政教禁令黨正掌政令教治而州長獨曰掌教治政令之灋何也鄉大夫六􅀸也其于鄉之政教禁令躬為表儀執其總以帥屬而已其灋之詳則州長掌之下經所列是也考徳行道藝勸戒則有灋祭祀禮射喪紀㑹民涖事則有灋師田行役戒令賞罰則有灋大考州里廢興則有灋故鄉大夫職正月受教灋于司徒退而頒之于其鄉吏即頒之州長也蓋鄉大夫董其成黨正以下承其事而掌其灋者則州長耳若以歲時祭祀州社則屬其民而讀灋亦如之春秋以禮㑹民而射于州序以禮㑹民先行鄉飲酒之禮也州黨之學皆名為序凡州之大祭祀大喪皆涖其事大祭祀謂州社稷及山川因國之在其境内者若國作民而師田行役之事則帥而致之掌其戒令與其賞罰致之于司徒也自黨正以下不復言致者皆州長之所帥也掌其戒令賞罰則是于軍因為師帥歲終則㑹其州之政令正歲則讀教灋如初黨正以下皆㑹政致事州長獨㑹政而無致事之文者致所治職事廢興誅賞行焉故使羣吏各自致于鄉大夫㑹政則財用之計苟無侵冒賞罰不行于其間故先㑹而鉤考之然後以達于鄉大夫曰㑹其州之政令者凡用財或以政之常經或出于一時之令也三年大比則大攷州里以贊鄉大夫廢興興者或遷其爵命或重其事任也黨正各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦灋以糾戒之春秋祭禜亦如之彌親民者于教亦彌數也于州曰治教政令于黨曰政令教治者州長掌讀教灋考徳行道藝故先教黨正掌讀邦灋申戒禁作師田行役故先政也邦灋者鄉八刑及師田行役之灋也禜謂雩禜水旱之神國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命而不齒國索鬼神而祭祀謂大蜡也正齒位鄉飲酒義六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也民三時務農將闕于禮故于農隙而教之尊長養老凡射及飲酒鄉民雖為卿大夫必來觀禮齒于鄉里者以年與衆賓相次也齒于父族者異姓雖有老得居其上也不齒者席于尊東所謂僎也鄉飲酒國事也故兼尚爵非私居燕飲之禮朱子曰古人貴貴長長並行不悖雖曰不齒亦不相壓故别設一位凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其戒禁凡作民而師田行役則以其灋治其政事亦于軍因為旅帥歲終則㑹其黨政帥其吏而致事黨正以下不曰政令者凡鄉大夫有令皆州長布之故曰㑹其州之政令黨正以下則奉令承事而已故第曰㑹政也然黨之所統尚多故曰㑹其黨政謂合計五族之政也閭胥以下無復政之可㑹故族師職第曰㑹政致事而不復曰㑹其族政也正歲屬民讀法而書其徳行道藝以歲時涖挍比及大比亦如之挍比族師職所謂邦比之灋也族師挍比而黨正涖之族師各掌其族之戒令政事月吉則屬民而讀邦灋書其孝弟睦婣有學者春秋祭酺亦如之酺或曰為人物烖害之神或曰即挍人職所謂祭馬步或曰祭社畢而民飲酒也族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉族師所掌無教者雖書孝弟睦婣有學者而教事非所能任也觀此則黨正以上掌教治者必徳行道藝足以表衆可知矣記曰能為師然後能為長此古之民所以易于觀感興起而政教無壅也官以師名而曰不足以任教事者凡知其事而相督察皆曰師胥師賈師之類是也以邦比之灋帥四閭之吏以時屬民而挍登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦邦比之灋閭師以下由族師而定黨正以上據族師而行故于此詳言比灋五家為比十家為聨五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋比長之治有罪奇衺相及者五家而已此合四閭八閭而賞罰相共者葢軍政也故旣曰五家為比十家為聨復曰五人為伍十人為聨明後所言乃軍政耳四閭為族八閭為聨不復曰百人為卒二百人為聨者省文也惟軍灋進退有度左右有局故不死乘伍有刑一夫先登而合軍同賞非此不足以致果毅禁冒慢也以受邦職以下則因軍政而連及之耳受邦職則共簡其游惰役國事則衆察其逋逃相葬埋則互糾其避匿非此不足以齊衆非如秦灋鄰里相坐也以八閭為限者過是則難稽也刑罰則相及慶賞則相共王明齋曰苟定于比即為伍家取一人則無居守者葢比閭族黨州鄉教訓其居民之灋伍兩卒旅師軍乃部署其勇力又自㑹而用之小司徒職凡起徒役無過家一人事急役重則然尋常征役必每減可知矣此經聨灋恐即其制也葢聨十家而出五人聨八閭而出百人合羨卒計之乃用其一而存其四使得居守且無廢穡事也其必聨以八閭何也軍旅之伍必以近而合使與其類相依與其長相習然後以守則固以戰則强但役必更番合畿内計之常數十年而後一從徵發故八閭之人亦不以同時並調為困耳若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰亦于軍因為卒長歲終則㑹政致事閭胥各掌其閭之徵令以歲時各數其閭之衆寡辨其施舍凡春秋之祭祀役政喪紀之數聚衆庶旣比則讀灋書其敬敏任恤者祭祀謂州社黨禜族酺也役田役也政力政也喪紀大喪及四閭相葬也閭胥于民尤切但聚衆庶則讀灋不及軍旅者教民在平時軍旅事棘旣徵𤼵則不必復教之矣二十五家人民寡孝友睦婣有學者未易數覯也故第書其敬敏任恤者比耦而耕同井相友則敬敏任恤者迹可驗矣凡事掌其比觵撻罰之事觵用酒撻扑也皆失禮之罰旣舉祭祀役政喪紀而又曰凡事掌其比者上該軍旅徵發下該民間相受相葬相救相賙以及合耦興耡移民救稼之事也比長各掌其比之治五家相受相和親有辠奇衺則相及比長即耦耕之民而曰掌其比之治者五家有所欲治于上上有所治于五家比長必與之俱也徙于國中及郊則從而授之若徙于他則為之旌節而行之若無授無節則惟圜土内之徙于他謂出居異鄉也圜土獄城也鄉中無授出鄉無節所過則呵問繫之圜土封人掌設王之社壝為畿封而樹之大司徒職設其社稷之壝此經于封國亦舉社稷又曰令社稷之職而首言王之社壝獨不舉稷者明祀稷即于社别無壇壝也王國外四面五百里各置畿限畿上有封又樹木為阻固鄭剛中曰王自為立社曰王社為民立社曰大社大社與稷配此獨設社壝謂王社也凡封國設其社稷之壝封其四疆造都邑之封域者亦如之天子封五色土為社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅令社稷之職諸有職事于祭祀者皆冢宰小宰令之封人所令其諸守社稷之壇壝以及修築灑掃之職與凡祭祀飾其牛牲設其楅衡置其絼共其水槀飾刷治潔清之也絼著牛鼻繩楅衡所以持牛令不得抵觸楅設于角衡設于鼻水槀給殺時洗薦之用也歌舞牲及毛炮之豚君牽牲入廟隨而歌舞之以歆神春秋傳奉牲以告曰博碩肥腯毛炮豚者爓去其毛而炮之以備八珍凡喪紀賓客軍旅大盟則飾其牛牲大盟㑹同之盟鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役單出曰聲雜比曰音記曰鼓無當于五聲五聲弗得不和故以節聲樂教為鼓而辨其聲用教為鼓教擊鼓者大小之數又别其聲所用之事或曰教韗人為之以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏雷鼓八面鼓也神祀祀天神靈鼓六面鼓也社祭祭地示路鼓四面鼓也鬼享享宗廟大鼓謂之鼖長八尺鼛鼓長丈二尺晉鼓長六尺六寸磬師掌教編鐘鐘師掌鐘鎛師掌鎛皆金奏也春秋傳魯叔孫豹如晉金奏肆夏之三晉郤至如楚金奏作于下鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賓射亦如之饗食賓射皆賓客之事是金奏用于賓客為多也此經于祭祀軍事役事外别出金奏亦主賓客之事但祭祀之樂雖用雷鼓靈鼓路鼓至中有金奏則亦以晉鼓鼓之耳以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼔錞錞于也圜如碓頭大上小下樂作鳴之鐲鉦也形如小鐘即春秋傳所謂丁寧鐃如鈴無舌有秉執而鳴之鐸大鈴也四金皆師田所用地官與司馬聨事故鼓人兼掌之凡祭祀百物之神鼓兵舞帗舞者兵謂干戚帗列五采繒為之有秉凡軍旅夜鼓鼜軍動則鼓其衆田役亦如之鼜夜戒守鼓也動行也司馬灋曰昏鼓四通為大鼜夜半三通為晨戒明旦五通為𤼵昫救日月則詔王鼓王親鼓者重天變也大喪則詔大僕鼓始崩及窆時也舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事羽析白羽為之形如帗四方之祭祀四望也早暵之事雩也暵熱氣皇析五采羽為之象鳳凰亦如帗四者之舞乃民間所通用故别設舞師以教之凡野舞則皆教之四十人之外有野人學舞者教之以待選用又以備鄉遂州黨祭祀之舞凡小祭祀則不興舞小祭祀王𤣥冕所祭者若宫中七祀等則無舞林澤墳衍百物之祭仍有之牧人掌牧六牲而阜蕃其物以共祭祀之牲牷六牲牛馬羊豕犬雞牷體完具也凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之陽祀南郊及宗廟也隂祀方澤及社稷也望祀五嶽四鎭四瀆也騂赤也黝黑也色以毛别旣列其色而又曰毛之者色雖純毛之美善又各有差等必次敘以待大小祀之所用也凡時祀之牲必用牷物時祀四時常祀也總結上陽祀隂祀望祀并四方山川百物牷物謂體完而色純也凡對犧則牷為體完獨言牷則該色純李耜卿曰天之時祀日月以下地之時祀五祀五嶽以下凡外祭毁事用尨可也外祭謂表貉及王行過用事山川毁謂疈辜候禳毁除殃咎之屬尨雜色也凡祭祀共其犧牲以授充人繫之凡牲不繫者共奉之授充人者殊養之非時而祭祀則牲不繫牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛求牛以授職人而芻之享牛正祭之牛求牛繹祭之牛繹曰索祭故其牲謂之求牛也職人謂牧人充人職當繫牛而養之者凡賓客之事共其牢禮積膳之牛積所以給賓客之用在途則遺人職候館有積是也在館則掌客職上公飱五牢饔餼九牢五積侯伯飱四牢饔餼七牢四積子男飱三牢饔餼五牢三積膳所以間禮賓客公侯伯殷膳皆太牢饗食賓射共其膳羞之牛軍事共其犒牛喪事共其奠牛喪所薦饋曰奠以未葬無尸直薦舍于神前也凡㑹同軍旅行役共其兵車之牛與其牽徬以載公任器牽徬在轅外輓牛也居前曰牽居旁曰徬任猶用也四丘出甲凡卒乘之牛民自共之此兵車以載官用器故官共其牛凡祭祀共其牛牲之互與其盆簝以待事互懸肉格盆以盛血簝受肉籠充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月牢閑也必有閑者防禽獸觸齧凡大祭祀之牲牷皆繫養之特不至三月耳周官言祭祀多首五帝葢舉四時迎氣之祭則圜丘方澤明堂等而上者不必言也享先王亦如之凡散祭祀之牲繫于國門使養之散祭祀謂司中司命山川之屬不言牷者兼用尨也展牲則告牷展牲當在祭之前夕特牲饋食禮曰宗人視牲告充舉獸尾告備李耜卿曰展牲亦兼祭義所云朔月月半君巡牲穀梁子曰郊牛日展斛角而知傷展道盡矣告牷告完具無傷也碩牲則贊贊助也碩牲謂馬牛防其奔駭故助持之按司馬職喪祭奉詔馬牲挍人職凡將事于四海山川則飾黄駒充人亦當助牽經于六牲皆各指其物而此曰碩牲正以兼馬牛二物耳不曰贊王以喪祭並贊司馬也載師掌任土之灋以物地事授地職而待其政令任土者任其力勢所能生育也物物色之以知其所宜也授地職即司徒所分地職謂其地所承于王朝之職事鄉遂公邑都家皆有之知非九職之事者授民以九職閭師所掌也且百工商賈臣妾閒民之所任不得謂地職故經于非九職之事者則以地職别之如郊之日汜埽反道鄉為田燭即六鄉之地職餘可類推雁門馮氏曰任土謂某田當在某地也以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地㕓市中地里民居也宅田或曰居郭外者之宅地以備民之益多或曰致仕者之家所受田也士田所以養升于太學之士也士庶子宿衛王宫者宫伯行其秩而大司樂樂師大胥無及學士之秩者則别有以養之可知矣賈田在市之賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地天子使大夫治之稍縣畺采邑外餘地亦然五百里甸服故鄉遂都家之餘田為公邑者通謂之甸王畿千里積百同九百萬夫之地也山陵林麓川澤溝瀆城郭宫室涂巷三分去一餘六百萬夫又以田不易一易再易相通定受田者三百萬家逺郊之内地居四同三十六萬夫之地也三分去一其餘二十四萬夫六鄉之民七萬五千家通不易一易再易一家受二夫則十五萬夫之地其餘九萬夫㕓里也場圃也宅田也士田也賈田也官田也牛田也賞田也牧田也九者亦通受一夫則半農人也定受田共十二萬家甸稍縣都合居九十六同八百六十四萬夫之地城郭宫室差少涂巷又狹于三分所去六而存一以十八分之十三率之餘六百二十四萬夫之地通上中下六家而受十三夫定受田二百八十八萬家其在甸七萬五千家為六遂餘則公邑凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟漆林之征二十而五上經以㕓里任國中之地國宅謂列居國中者所謂里也故無征與㕓之在市者異征税輕近而重逺近者多役故也漆林加重以自然而生不假人力也論者多以周官甸稍縣都之十二為疑然孟子言三代皆十一特所出粟米外此尚有力役之征禹貢百里賦納􅖽二百里納秷三百里納秸服則外此不輸􅖽秸服輸將者賦必有加可知矣此經所謂近郊十一即公田之入也自逺郊二十而三以及甸稍縣都之十二皆量其力役之繁簡而以他貢物足之其九榖之貢則不過公田所入春秋傳所謂穀出不過藉也角人羽人掌葛職凡山澤之農徵其齒角骨物羽翮葛材草貢以當邦賦之政令則凡九穀及力役之征皆可以他物充凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征宅不毛不種桑麻也故罰以嬪貢之布屋粟三家之税粟也夫家之征一夫百畝之税及其家所出士徒車輦繇役也周之徹灋亦八家同養公田而有屋粟者亦取公田之入以八計而税其三耳以時徵其賦徵賦者閭師遂師而以時令徵者載師也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徵其賦掌六畜之數者農事之本也凡任民任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物草木謂葵韮果蓏之屬曰以時徵其賦而所列皆九職之貢物則貢之外别無賦明矣特以地計則曰九賦以職言則曰九貢耳凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰載師閭師之罰輕重不同朱子謂前以待士大夫之有土者後乃庶民薛氏謂載師所罰乃都家之長公邑之吏皆非也葢載師凡民無職事者出夫家之征謂醫卜巫覡媒妁之類其事不列于九職者也此無職者則閒民雖無常職而未嘗無事故罰止于夫布載師凡宅不毛者有里布荒其園圃者也此獨不樹未嘗不毛故罰止于不椁載師凡田不耕者出屋粟受田而不耕者也此不耕者謂工商藪牧之類本未受田故罰止于無盛其事本異故罰亦異耳獨舉庶民者士大夫有田祿則不在此列縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以攷羣吏而以詔廢置地域田萊之數小司徒掌之鄉遂之吏各掌其夫家人民六畜車輦之稽而復使縣師通掌之且外及于邦國者以有軍旅㑹同田役之戒則受灋于司馬以作衆庶㑹卒伍不可不備知其數也旣掌事則大比因詔廢置所以考羣吏者不厭其詳也縣師雖兼郊里而所專掌則都鄙稍甸故列職先都鄙稍甸而後及郊里猶小司徒雖兼都鄙而所專掌乃國中四郊故列職先國中四郊而後及都鄙也若將有軍旅㑹同田役之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至受灋于司馬者知所當徴衆寡按左傳鄭人受兵于大宫楚人授師孑焉以伐隨又鄭火授兵登陴先儒遂謂甲楯甸丘自具兵器臨時授之然考周官鄉大夫大比考夫屋及其衆寡六畜兵器此職㑹車人之卒伍使皆備旗鼓兵噐以帥而至族師合卒伍則簡兵噐里宰比六畜兵噐而司戈盾軍旅㑹同所授止貳車乘車之戈盾及旅賁虎士之戈盾則卒伍兵噐皆自備可知矣左氏所𫝊或春秋時列國之變灋或所謂授兵者亦止授將挍辭未别白耳凡造都邑量其地辨其物而制其域都謂大都小都邑謂公邑家邑也辨其物即司徒職所謂以土均之灋辨五物九等也山林川澤丘陵墳衍原隰其間穀土多寡不均其穀土又有不易一易再易之分故必辨其物然後可以制其域縣師通掌天下之兵賦而所制地域獨都鄙者六遂之域遂人制之六鄕之域小司徒制之也以歲時徵野之賦貢野謂甸稍縣都載師閭師縣師職事相近而各異載師所掌任土之灋也閭師所掌任民之灋也縣師所掌賦兵之灋也三職皆曰時徵其賦而載師縣師通掌畿内之地事葢掌其徵之令非親徵之也里宰職曰以待有司之政令而征其財賦遂師職曰以徵財賦則知六遂之財賦里宰徵之而遂師執其總矣六鄉之財賦必閭胥徵之而閭師執其總矣公邑都家之財賦必其二十五家之長徵之而公邑之吏都家之宰執其總矣族師酇長職皆曰作民而師田行役則帥而至稍人職曰以縣師之灋作其同徒車輦以帥而至則丘乘卒伍之政縣師亦不親也遺人掌邦之委積以待施惠鄉里之委積以恤民之囏阨門關之委積以養老孤郊里之委積以待賓客野鄙之委積以待羈旅縣都之委積以待凶荒鄉里通鄕遂甸稍縣都而言民之囏阨無地無之故知通乎畿内也縣都之委積最多故以待凶荒且便于内外移用也不言甸稍之委積者委人掌甸稍之聚而軍旅共其委積薪芻則甸稍之委積並掌于委人以共師旅可知矣遺人掌待施惠故軍旅之委積不列也道路之委積又以師役與賓客㑹同並列者共之者委人而遺人掌其頒之令也待賓客羈旅旣列遺人職復列委人職者遺人頒委積委人共薪芻也大府邦中四郊甸稍縣都之賦各有所待而此職郊野縣都之委積委人職甸稍之委積又各有所待何也歲賦不盡輸于王朝其存者各貯其地以為委積凡賓客㑹同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積廬可暫止路室可止宿候館則樓可觀望者也凡委積之事巡而比之以時頒之巡者所掌非一地也六鄕之賦閭師徵之六遂之賦遂師徵之縣都之賦其邑宰徵之甸稍之賦委人斂之則委積各貯于有司以待遺人之比頒可知矣道路之積穀共之者倉人治之者廩人則凡委積可知矣均人掌均地政均地守均地職均人民牛馬車輦之力政均地政者均所征財賦也均地守者司險掌固所頒守法凡民皆有任焉而其事有劇易守者有衆寡故必通計一國一都應守之人或私助財役或輕重其力政賦貢以相準司險職所謂移甲役財用亦其一端也均地職者所承職事雖有常而亦時有劇易也司徒制地貢奠地守分地職而復設均人以均之葢惟恐情事上壅政有偏而不舉也凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉豐年人食四鬴之歲也人食三鬴為中歲人食二鬴為無歲謂歲無贏儲也注易坤為均葢以冬三月用民二十七日大重為疑然十月納禾稼日至而土功畢公私可用之期不過一月公旬用三日葢九日也若以旬為均則第曰用三日可矣凶札則無力政無財賦不收地守地職不均地政財賦即上經所謂地政也旣曰無財賦又曰不均地政者有財賦然後可施均灋旣無財賦則灋亦無所施耳地守曰收則守灋中有相助之財賦益明矣地職亦曰收者設所承浚築輸將供積之職事一歲適寡有必别有所入以當之而寛其劇者之賦貢所謂均地職即此類也三年大比則大均周官集注卷三
