body:
  text: 周官集注卷十一翰林院侍講銜方苞撰周官司空之篇亡漢興購之千金不得河間獻王以考工記續之不知作者何代何人然大抵秦以前書也司空名冬官者四時之有冬積於空虛不用之地而度地居民立城邑治溝洫川梁於農事既畢為宜司空者蓋主於空虛不用之時而使民有興事任力之實用也冬日之閉凍也不固則春夏之長草木也不荗此天道之以虛為實也事典不行則三時之利不能盡四民之業無所基此聖人之以虛為實也故官以司空名而其職則曰以富邦國以養萬民以生百物司空之職居四民時地利工事其末耳今其大經大灋無一存者而所記惟工事何也蓋諸侯惡其害已也而皆去其籍惟工事則民生所習用百工世守之故猶可𫝊述耳匠人營國為溝洫僅具髙濶廣袤之度而所以建立城邑分處四民因山川形勢以辨井牧别疆潦規偃豬町原防者無一及焉蓋記者僅得之工師之𫝊述而未見故府之典籍故也李廣卿曰考工記雖言治器粗迹而毎有盡性至命之文國有六職百工與居一焉司空掌營城郭都邑立宗廟社稷造宫室車服器械故百工屬焉六職即下所列或坐而論道或作而行之或審曲面埶以􅅚五材以辨民器或通四方之珍異以資之或􅅚力以長地財或治絲麻以成之作起也辨猶具也或曰辨其所宜也資以資民用也審曲面埶者審察五材曲直方面形埶之宜及隂陽之背面也五材五方之材也坐而論道謂之王公作而行之謂之士大夫審曲面埶以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功粤無鏄燕無函秦無廬胡無弓車此四地者不置是工也鏄田器詩云痔乃錢鏄又曰其鏄斯趙函鎧也廬謂矛戟柄粤之無鏄也非無鏄也夫人而能為鏄也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也粤地塗泥多草薉而山出金錫鑄冶之業田器尤多燕近强胡習作甲胄秦多細木善作矜柲胡無屋宅田獵畜牧逐水草而居皆知為弓車知者創物巧者述之守之世謂之工父子世以相教百工之事皆聖人之作也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也天有時地有氣材有美工有巧合此四者然後可以為良時寒温也氣剛柔也良善也材美工巧然而不良則不時不得地氣也劉執中曰不言不得天時地氣而曰不時不得地氣者東西南北地氣不均故器有遷乎其地而不能為良者以於地氣有得有不得也若天時則四方所同非有不能得於天而為之不以其時人之過也橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也春秋傳昭二十五年有鸜鵒來巢𫝊曰書所無也貉或為猨汶水在魯北鄭之刀宋之斤魯之削吳粤之劍遷乎其地而弗能為良地氣然也去此地而作之雖用其材與工不能使良燕之角荆之幹妢胡之笴吳粤之金錫此材之美者也荆荆州也幹柘也可以為弓弩之幹妢胡胡子之國在楚旁笴矢幹也禹貢荆州貢杶榦栝柏及箘簵楛天有時以生有時以殺草木有時以生有時以死石有時以泐氷有時以凝有時以澤此天時也石有時以泐謂盛夏易解散不可燒為灰若久而剝落則非天時使然也澤潤澤也氷將解必先見潤澤然後化而為水凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二攻猶治也摶之言拍也埴黏土也故書七為十刮作捖攻木之工輪輿弓廬匠車梓攻金之工築冶鳬㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊梓榎屬也鮑書或為鞄蒼頡篇有鞄􅠙凡工曰某人者若匠人梓人韗人鮑人之類以其事名也曰某氏者義有二或官有世功為氏若韋氏裘氏冶氏之類或族有世業以氏名官若鳬氏㮚氏之類有虞氏上陶夏后氏上匠殷人上梓周人上輿虞氏至質故貴陶器甒泰瓦棺是也夏后氏始治溝洫故上匠殷敬鬼神重禮樂之器故上梓周貴貴尚文以車辨爵等禮儀故上輿故一器而工聚焉者車為多易氏曰攻木之工七弓廬梓匠各居其一而輪人輿人車人乃居其三又有輈人為輈此一器而工多惟車為最陳君舉曰車制用在輪故察車自輪始輪之外輮為圍圍之中直指凑轂者為輻輻之所蓄而利轉者謂之轂轂裏之大穿謂之賢轂外之小穿謂之軹轂中空處謂之藪轂上横通通載者謂之軸軸末以防輪而固謂之舝軸上横伏而納輈者謂之轐轐上所載三面材謂之任正任正之上謂之軫輿前掩軓版謂之隂輿深謂之隧植于輿兩旁謂之輢蔽風塵謂之茀横于兩輢而為人所憑者謂之式中系驂馬内轡處謂之輢式下之植從者謂之轛兩輢之上出于式者謂之較較之下從者謂之軹以革輓式以皮覆式謂之韈以簟衣式謂之車軓納轡之環謂之韈著車之衆環謂之指有曲轐而出從前稍曲而上謂之輈輈前持衡者謂之頸頸下衡者謂之衝衝下兩馬謂之服服外兩馬謂之驂兩服之四轡兩驂之四轡謂之八轡兩驂之内轡系于式其在手者外轡與服馬之四轡謂之六轡前系于衡後系于軫以防驂馬之入者謂之脅驅驂馬之系車四條謂之靷内兩條納于隂者謂之隂靷外系于軸者謂之外靷拘二靷以絆其背者謂之韅背為環以管外内轡謂之游環削革三就當胸謂之繁纓縷金以當盧謂之錫著鈴于兩鑣謂之鸞置鈴于式謂之和兩驂内轡謂之勒車上之履則有葢蓋之斗謂之部蓋上撩謂之弓蓋之小柄謂之達常大扛長八尺謂之桯此車之通制也車有六等之數車有天地之象人在其中六等之數灋易之三才六畫車軫四尺謂之一等戈柲六尺有六寸既建而迤崇于軫四尺謂之二等人長八尺崇于戈四尺謂之三等殳長尋有四尺崇于人四尺謂之四等車㦸常崇于殳四尺謂之五等酋矛常有四尺崇于㦸四尺謂之六等此所謂兵車也軫輿後横木崇髙也八尺曰尋倍尋曰常建樹也戈殳㦸矛皆插車輢迤謂邪倚也矛有二一曰酋一曰夷楊謹仲曰此以軫為輿後横木注以軫為輿故學者惑焉軫正是輿之名蓋四畔各以木加于輿上以閑其所載詩所謂俴收也其四方則象地故曰軫方象地車廣六尺六寸六分其廣以一為軫圍則是輿後横木圍一尺一寸徑三寸三分寸之二軹髙三尺三寸並後軫與轐七寸共髙四尺故指後横木為髙之度軫之義不止後横木也車謂之六等之數上文曰車有六等之數似車之制有六等故申明之見後五等雖非車之數而人在車中戈殳㦸矛建于車上故并謂之車之等數也凡察車之道必自載于地者始也是故察車自輪始李耜卿曰凡車材皆載于輪上惟輪載于地凡察車之道欲其樸屬而微至不樸屬無以為完久也不微至無以為戚速也樸屬附著堅固貌戚疾也齊人語也微至謂至地者少輪圜甚則著地者微而易轉故不微至無以為戚速屬附著無間也凡功粗必待膠漆塗飾而後無間方其為樸而已無間則固可知行山之輪侔則至地者不能少蓋言其功之細緻也功細緻則行戚速矣輪已崇則人不能登也輪已庳則于馬終古登阤也已太也甚也􅋻卑也齊人言終古猶言常阤阪也輪卑則難引故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸此以馬大小為節也兵車革路也田車木路也乘車玉路金路象路也兵車乘車駕國馬田車駕田馬六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節軹轂末也軫輿也轐伏也伏于軸上以納輈而承軫軫與轐共七寸田車宜減焉輪人為輪斬三材必以其時三材所以為轂輻牙也轂宜榆輻宜檀牙宜橿其木在陽則于仲冬斬之在隂則于仲夏斬之三材既具巧者和之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也牙讀為訝謂輪之週遭輮木也俗謂之罔輪敝三材不失職謂之完敝盡而轂輻牙不動望而眡其輪欲其幎爾而下迆也進而眡之欲其微至也無所取之取諸圜也輪謂牙也幎均致貌望遠視也進迫近也曰望而眡者稍遠而視之所以别于甚遠也以幎覆物必中穹四週迆而下輪之中央近轂處向内其四週近牙處向外亦如幎之覆物中穹四週迆而下也曰下迆者輻之菑近轂常在上爪近牙常在下也望其輻欲其揱爾而纖也進而眡之欲其肉稱也無所取之取諸易直也揱纖殺小貌肉謂幹材之豐殺稱豐殺之度如一也易治之熟而滑易也輻與轂第曰望者蒙上省文望其轂欲其眼也進而眡之欲其幬之亷也無所取之取諸急也眼突出貌就牙輪側視轂須略見突出或曰轂中虚而容軸以轉動有似于眼也幬幔轂之革也革之裹木急則亷隅見眡其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡今時車牙外以鐵葉裹之綆之制疑類此謂之綆者形若繩也蚤讀為爪謂輻入牙中者蚤之正以綆視者按今輻爪毎間一鑿而穿牙施綆則疏數左右之度均齊與否不能掩矣菑謂輻入轂中者齒牙參差謂之齵匡矯而正之也菑與爪不相佹則輪雖敝不至于偏挺而無所用其匡凡斬轂之道必矩其隂陽矩謂刻識之也木之向日者為陽背日者為隂木之體圜中分其隂陽以繩墨引之則方而如矩陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則輪雖敝不藃稹密致也理謂木之文理火養其隂炙而堅之也藃當作耗或曰藃暴也疏理而柔者不以火養之久之必削減而幬革暴起轂小而長則柞大而短則摰柞讀為迫唶之唶謂輻間柞狹也摰讀為槷謂輻危槷也或曰小而長則菑中弱大而短則轂末不堅或曰柞窄通摰揑機也車人云行澤欲短轂行山欲長轂大車轂長半柯其圍一柯有半是轂短則圍必小也柏車轂長一柯其圍二柯是轂長則圍必大也若轂長而圍小轂短而圍大則制不稱而不利于行是故六分其輪崇以其一為之牙圍六尺六寸之輪牙圍尺一寸參分其牙圍而漆其二椁其漆内而中詘之以為之轂長以其長為之圍不漆其踐地者也漆者七寸三分寸之一不漆者三寸三分寸之二令牙厚一寸三分寸之二則内外面不漆者各一寸也椁者度兩漆之内相距之尺寸也六尺六寸之輪不漆者兩畔共減去二寸則漆内止六尺四寸中屈而得半則轂長三尺二寸圍三徑一則圍徑一尺三分寸之二也史記平凖書更鑄五銖錢周郭其下令不可磨取鎔蓋古語以週遭為郭而郭椁義並同以其圍之阞捎其藪阞與王制祭用數之仂同蓋十分之一也捎除也藪者衆輻入轂三十孔叢聚處也注疏謂轂徑一尺三分寸之二三分取一以為藪得三寸九分寸之五果爾是以徑之阞計不當曰圍之阞矣蓋圍三尺二寸其阞三寸二分圍徑一尺三分寸之二除三寸二分為藪之深其中為内穿五分其轂之長去一以為賢去三以為軹此轂長謂徑也轂長有以圍徑言者車人轂長半柯其圍一柯有半是也賢内穿軹外穿去一當為去二去二則得六寸五分寸之二凡内穿外穿皆用金為之設金厚一寸則内穿内徑當四寸五分寸之二外穿内徑二寸十五分寸之四如是乃與藪相稱外穿小于内穿者内穿不大則軸之承軫而運轂也無力外穿不小則軸之末必突而出容轂必直陳必正施膠必厚施筋必數幬必負幹容轂者輻菑齊入相抱而轂居其中央也必直者衆輻左右正相對也轂約也陳設也幬負幹者革轂相應無贏不足既摩革色青白謂之轂之善鄭剛中曰以革縵轂訖以骨丸之既乾以石摩之然後漆焉青者東方之陽白者西方之隂革色青白則剛柔適中所以善參分其轂長二在外一在内以置其輻轂長三尺二寸者令輻廣三寸半則輻内九寸半輻外一尺九寸凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也扤搖動也凡柄之廣狹未有不與鑿相得者而輻之廣狹亦必與鑿之淺深相稱鑿有淺深以轂之圍有大小也大車之轂其圍一柯有半柏車之轂其圍二柯使圍小鑿淺而輻廣則鑿之銜輻不固圍大鑿深而輻小則輻之支轂不强大車任重而轂短圍小何也牛駕行平地無馳騁頓撼也故竑共輻廣以為之弱則雖有重任轂不折竑謂度之蒲本在水中者為弱此弱謂菑之入轂深處以漸而殺者度其輻廣以殺其菑之端則轂中肉好相稱而完固否則鑿内受菑處磷薄加重任必折矣折當作坼轂不應有折也參分其輻之長而殺其一則雖有深泥亦弗之溓也殺其向牙者溓讀為黏謂泥不黏著輻也參分其股圍去一以為骹圍謂殺輻之數也股謂近轂者骹謂近牙者人脛近足者細于股謂之骹羊脛亦然揉輻必齊平沈必均舊説以火揉其曲非也輻長不及三尺不宜有曲亦謂以火養其隂而齊諸其陽也蓋木之隂陽有偏久之其力不齊故揉而齊之平沈試輻材也已為輻則骹股異圍必不能平矣或曰已合為輪而沉之也下文水之以視其平沉之均又合兩輪而試之也直以指牙牙得則無槷而固不得則有槷必足見也集韻槷木楔也輻與牙之鑿枘不相得雖加楔久之楔之端必突而出曰足見者以槷施于爪之下而言也六尺有六寸之輪綆参分寸之二謂之輪之固三分寸之二綆之廣也輪有杼有侔而綆皆不及寸者牙侔而綆狹于行無不利也綆廣則于杼者不可施矣或謂三分六寸之二知不然者大車之綆寸則凡車必較狹可知矣曰綆三分寸之二謂之輪之固足矣而冠以六尺有六寸之輪者前言六分其輪崇以其一為之牙圍而未著輪崇之度故因綆而及之且知徑崇則知其圍三之而綆長竟圍故于綆言廣而不言長也又大車之綆寸田車之輪六尺有三寸其綆必較狹綆三分寸之二者惟六尺有六寸之輪耳凡為輪行澤者欲杼行山者欲侔杼謂削薄其踐地者侔上下等杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐于鑿附著也摶圜厚也甐亦敝也牙不下迆則近地處厚雖為石所齧僅甐其兩旁而不能甐中央之鑿凡揉牙外不亷而内不挫旁不腫謂之用火之善古之車輞屈一木為之凡屈木多外亷絶理内挫折中旁腫負起無此三疾是用火之善也李廣卿曰輪所以固者在揉牙之工使外不失理筍簴相入而不挫旁無負起逐段相接皆資火力謂以全木為輪無是理也是故規之以眡其圜也萭之以眡其匡也以規合之固可以求圜而運矩于輪中其四方四角有不圜處亦可因矩以騐之而矯正其偏挺處也或曰既設軸兩輪相對用矩以度其四面相去之分稍偏挺則分不均必矯而正之縣之以眡其輻之直也三十輻上下相直中繩則鑿正輻直水之以眡其平沉之均也量其藪以黍以眡其同也權之以眡其輕重之侔也故可規可萭可水可縣可量可權也謂之國工輪人為蓋輪輻三十蓋弓二十有八器類相似故因使輪人造蓋達常圍三寸桯圍倍之六寸達常斗柄下入杠中者桯杠也圍倍故足以含達常王光遠曰葢之制上為部中為達常下為桯旁為弓達常小于桯桯小于部故非部無以納弓于其旁非桯無以含達常于其中信其桯圍以為部廣部廣六寸部蓋斗也四面鑿孔以納弓廣謂徑也部長二尺此部即達常以入部中遂名部部長當作達常文誤也桯長倍之四尺者二杠長八尺謂達常以下也加達常二尺則蓋髙一丈立乘也十分寸之一謂之枚部尊一枚尊髙也蓋斗上隆髙高一分弓鑿廣四枚鑿上二枚鑿下四枚弓傘骨也漢世名為蓋橑廣當以鑿之上下相去言部髙一寸故鑿之上下相去可容四枚部周圍二十八弓若左右相去四枚則好廣而肉薄不能固矣廣為横而曰以上下言者部之體圜周迴而鑿之則上下似横也鑿深二寸有半下直二枚鑿端一枚部徑六寸鑿深二面相對共五寸是以不傷達常也鑿上二枚鑿下四枚不均下直二枚則近上内畔二枚不鑿而鑿上亦四枚矣蓋必如此而後上下之固同也端内題也鑿端一枚者部之體圜弓鑿非以漸而狹不能容也弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫庇覆也軹轂末也輿廣六尺六寸兩轂并六尺四寸旁減軌内七寸則兩軹之廣凡丈一尺六寸也六尺之弓倍之加部廣凡丈二尺六寸有宇曲之減可覆軹參分弓長而揉其一其穹者二尺下者二尺揉而曲者自髙趨下之二尺也參分其股圍去一以為蚤圍蚤當為爪近部者謂之股宇曲之末謂之爪弓鑿廣四枚設以方圍計之四四十六則股圍一寸六分也三分去一則爪圍一寸十五分之一參分弓長以其一為之尊六尺之弓則以二尺近部為髙上欲尊而宇欲卑上尊而宇卑則吐水疾而霤遠上近部平者隤下曰宇蓋主為雨設乘車無蓋禮所謂潦車其蓋車與鄭剛中曰道右掌前道車王下車以蓋従似不専為雨巾車不言蓋者豈所辨者旗物當建旗之時無所用蓋故不言與蓋已崇則難為門也蓋已卑是蔽目也是故蓋崇十尺蓋十尺宇二尺而人長八尺卑于此則蔽人目良蓋弗冐弗紘殷畝而馳不隊謂之國工隊落也弗冐以衣弗繫以紘中畝橫馳而弓不落則其入鑿者固也輿人為車輪崇車慶衡長參如一謂之參稱車輿也指輿為車者輿乃車之正體軸轂輪輈皆為輿而設也衡兩服所駕參分車廣去一以為隧參分其隧一在前二在後以揉其式隧謂輿之縦也兵車之隧四尺四寸植于輿之兩旁者為輢橫于輢間當車前而為人所憑者為式矯揉所以檠木材也輢陷于隧間式闗于輢間而不可動搖故亦曰揉以其廣之半為之式崇以其隧之半為之較崇兵車之式髙三尺三寸較兩輢上出式者兵車自較以下凡五尺五寸林鬳齋曰吕和叔解詩重較云車箱長四尺四寸以三分之前一後二橫設一木下云車床三尺三寸謂之式又于式上二尺二寸横設一木謂之較古人立乘平常憑較敬則落手下憑式而頭得俯較出式上故云重較較崇自式以上計之式崇自車床以上計之也六分其廣以一為之軫圍參分軫圍去一以為式圍參分式圍去一以為較圍參分較圍去一以為軹圍參分軹圍去一以為轛圍此軹謂較下直䜿者及較下衡者非轂末也轛式之植者衡者也兵車軫圍尺一寸式圍七寸三分寸之一較圍四寸九分寸之八軹圍三寸二十七分寸之七轛圍二寸八十一分寸之十四兩輢者較式之所託也不宜詳言輿制而獨遺輢又不宜較間之木與轂末同名疑軹即輢字剝蝕而誤也疏謂較式之下别有植木橫木未知何据較式宜貫于輢或陷置輢間不宜别有植木較式之下亦不宜别有橫木也疑轛即輢之末上出于較而相對者毛氏謂輈人所謂任正即軫其圍尺有四寸與此不同此言田車之軫非也無為舍乘車兵車而獨言田車又不明著其為田車也鄭康成謂軫為輿後木任正為輿下三面材蓋軫之圍殺于前及左右三面材凡三寸且軫去人立處遠不用力非任正三面材之比也圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉如生如水従地生如附如附枝之𢎞殺也凡居材大與小無并大倚小則摧引之則絶上言治材此乃言居材也居積也生木初斬不可用其置之也必大小各従其類若合并之而以大倚小則小者必摧而曲及材乾欲引而直之其理必絶棧車欲弇飾車欲侈士乘棧車無革鞔易坼壞故車箱微向内為之所謂弇也大夫以上加飾以革鞔故向外所謂侈也輿六尺有六寸縦横深廣一定不移惟箱版當旁者可微向内外耳輈人為輈輈車轅也于三十工無輈人之官但車事是難故車官别主此職也輈有三度軸有三理軸待輈而後運輈待軸而後行其勢相資故兼掌之國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸深謂轅曲中輈之形自軓以前稍曲而上至衡又下其頸以持衡其形穹隆如屋之梁故詩曰五楘梁輈國馬謂種馬戎馬齊馬道馬也國馬髙八尺兵車乘車軹崇三尺有三寸加軫與轐七寸又并此輈深衡髙八尺七寸也除馬之髙則餘七寸為衡頸之間田車軹崇三尺一寸半加軫與轐五寸半并此輈深衡髙七尺七寸田馬髙七尺則衡頸之間亦七寸輪軹與軫轐大小之減率寸半駑馬之車軹崇三尺加軫與轐四寸并此輈深衡髙六尺七寸駑馬髙六尺則衡頸之間亦七寸軸有三理一者以為媺也二者以為久也三者以為利也無節目則美堅刃則久滑密則利軓前十尺而䇿半之軓謂式前也書或作􅓶䇿所以馭也趙氏曰據下文軓中有灂則輿上置隧處乃是軓正在隧之下式之前蓋輈身一丈四尺四寸入輿隧下隧以前只十尺凡任木任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小于度謂之無任凡任木統下任正與衡任也任者用力持載人在車立憑式故輿下前及左右三面材為任正以力持輿之正載處也曰衡任者負輈而引車衡之力也輈長丈四尺四寸則任正之圍尺四寸五分寸之二五分其長謂衡之長也兵車乘車衡長六尺有六寸則衡圍尺三寸五分寸之一無任言不勝也五分其軫間以其一為之軸圍軫間即輿廣則軸圍一尺三寸五分寸之一也十分其輈之長以其一為之當兔之圍輈當伏兔者亦圍尺四寸五分寸之二參分其兔圍去一以為頸圍五分其頸圍去一以為踵圍頸前下持衡者其圍九寸十五分寸之九踵後承軫者其圍七寸七十五分寸之五十一凡揉輈欲其孫而無弧深孫順木之理也輈之曲不得如弓之深如弓則太曲矣今夫大車之轅摰其登又難既克其登其覆車也必易此無故惟轅直且無橈也大車牛車也摰亦當作直以音近而誤也登上阪也克能也既曰轅直又曰且無橈者直言其無穹而上者也無橈言其無曲而下以持衡者也是故大車平地既節軒摰之任及其登阤不伏其轅必縊其牛此無故惟轅直且無橈也軒言其髙而上干摰言其輊而下至既節軒摰之任者所載前後適相稱則髙下適中也阤阪也上經言大車不利于登此言大車雖行平地時多而亦有不能不登阤之時故必使人抑制而伏其轅如不伏其轅則車後仰而牛之吭膺間束絆者必若絞縊矣故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故惟轅直且無橈也倍任謂視行平地所任如加倍也此言下阤尤難必手援輿底之向前者以輕其任然後無崩奔之患若不援其底則任重勢猛其下若崩而緧其牛後矣知舊説不可通者倘人不可輔則制必有宜而不當任其轅之直矣是故輈欲頎典輈深則折淺則負輈注則利凖利凖則久和則安此以下仍言四馬車轅頎典堅刃貌駟馬之轅率尺所一縳頎典似謂此也輈太深則易折淺則若負于馬背而前引無刀惟形如注星則利注張星也注水之管中穹而兩端微下輈之不淺不深似之則馬之引之也利而車行如凖之平久者言輈之難敝也安者言車之無傾也和即利凖之謂輈欲弧而無折經而無絶上言凡揉輈欲其孫而無弧深此申明之言其形亦近于弧但不可太深而折欲其孫必循木之經而毋絶其理也進則與馬謀退則與人謀謀謂與人馬之意相應也車之進以馬行為主故曰與馬謀車之退則人馭之而使然故曰與人謀終日馳騁左不楗行數千里馬不契需終嵗御衣衽不敝此唯輈之和也楗讀為蹇輈調善則馬不蹇或曰書或作劵今倦字也乘車尊者居左輈和則久馳騁而居左者不罷倦契謂蹄不傷也需謂行道濡滯也衽謂裳也輈和則乘者安于輿馬安于駕僕安于馭故無是數者之病鄭剛中曰契者停而相合也需者遲而相待也輈若不和則馬必拘閡而相契或前後而相需勸登馬力馬力既竭輈猶能一取焉登進也馬止輈猶能一前取道所謂勸登也良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈環灂週遭皆漆也凡物之漆者中必被以筋膠故以環灂為良伏兔至軓蓋如式深式深尺四寸三分寸之二灂下至軓七寸則是軓中亦有灂也此下應有脱文不應以此一節而謂之國輈軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也輪象日月者以其運行也日月三十日而合宿龍旂九斿以象大火也交龍為旂諸侯之所建也大火蒼龍宿之心其屬有尾尾九星車上皆建旌旂故並陳其義鳥旟七斿以象鶉火也鳥隼為旟州里所建鶉火朱鳥宿之栁其屬有星星七星熊旗六斿以象伐也熊虎為旗師都所建伐屬白虎宿與參連體而六星龜蛇四斿以象營室也龜蛇為旐縣鄙所建營室元武宿與東壁連體而四星弧旌枉矢以象弧也覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧也弧以張縿之幅有衣謂之韣又畫枉矢焉象弧星之有矢也枉矢妖星蛇行有尾攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量段氏為鏄器桃氏為刄多錫為下齊少錫為上齊鏄器田器錢鏄之屬據下文六等言之四分以上為上齊三分以下為下齊則鳬氏宜入上齊桃氏入下齊其㮚氏段氏亦當入上齊中金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊大刃刀劍之屬所以别于削也鑒燧即司烜職所謂夫遂及鑒也凡金多錫則刃白且明鄭剛中曰攻金之工獨無為鼎為斧斤為鑒燧者鼎亦鍾之屬可附于鳬氏斧斤亦上齊可附于戈㦸鑒燧無可附意者自有其官而記者亡之耳鍾量戈㦸皆有度數惟鼎與斧斤大小輕重無常故不見其制鑒燧則其用至少為官府之守器一成之則不復更造故無其官築氏為削長尺博寸合六而成規削書刀也秦時蒙恬造筆漢時蔡倫造紙古者未有紙筆以削刻字至漢則兼用刀書削之體偃曲若弓之反張故合六而成規也欲新而無窮敝盡而無惡常如新而無窮已謂其利也其金如一雖至鋒鍔敝盡無瑕惡冶氏為殺矢刃長寸圍寸鋌十之重三垸殺矢與戈㦸異齊而同其工似脫誤在此鋌箭足入槀中者垸量名五矢獨舉殺矢者殺矢尚用下齊則餘不必言矣李耜卿曰殺矢一十三字當屬上築氏敝盡無惡之下蓋削殺矢皆下齊築氏所執觀上序可見李廣卿曰殺矢一十三字當在築氏為削合六而成規下欲新而無窮謂殺矢也刃常如新而不繡澀則利而能入敝盡而無惡謂削也鋒鍔敝盡而無惡敗則其用可久冶氏為三字當移置戈廣二寸戈字上削時砥淬無事以常新言矢刃又不宜以敝盡言廣卿此説不可易也戈廣二寸内倍之胡三之援四之戈漢時謂之句孑㦸胡謂矛之旁出者援直上尖頭刺刃也内謂胡以内下接柲處蓋鐵筒納木柄者戈廣二寸總内與援與胡三者皆徑廣二寸也内倍之其長四寸胡三之長六寸援四之長八寸已倨則不入已句則不决長内則折前短内則不疾戈之制進則用其鋒以刺退則用其斜勢以句胡太直則其體橫而刺難入胡太曲則其鋒直前無斜勢而以句則不决句必穿所敵之衣甲而後固鋒直前而以句則不能决穿其衣甲矣胡之句用力與援分内長則胡之折處太近前與援同向而句無力胡之刺貴與援並入内短則胡之去援遠其入緩而人易避矣是故倨句外博重三鋝倨謂胡之上句謂胡之下胡上下近本處皆增之使博自然合于磬折而無四者之病也鋝量名説文云鍰也鍰重六兩倨句謂其形微倨微句而不過也胡之下為内則外謂其上近援處胡本近援處加廣則無折傷㦸廣寸有半寸内三之胡四之援五之倨句中矩與刺重三鋝㦸三鋒並直前胡之橫貫者與直前者同度其形正方故中矩也既中矩而又曰倨句者援長于胡循胡之末至援之末弦之則倨句也鄭司農謂刺即援非也既曰援五之不應復曰與援康成謂著柲直前如鐏者亦非也㦸三鋒直前不應又有物直前如鐏蓋㦸句兵也如圖所載三鋒直前則可刺而不可句豈鋒刃旁有橫而句物者其名為刺而後世失其制與桃氏為劍臘廣二寸有半寸兩従半之臘謂兩刃兩從半之謂自脊分㫁一邊廣一寸四分寸之一也脊之廣必半于刃而特設此文者明脊之居中而無偏倚也脊直上至劍末故曰從以其臘廣為之莖圍長倍之莖謂劍之鋌入夾中者人所把握謂之夾者穿其中以夾鋌也中其莖設其後中其莖者外包以革木也設其後者于後設鐔也參分其臘廣去一以為首廣而圍之劍把接刃處有盤形隋圜疑劍首即謂此圍之謂環于劍外也週遭距劍身皆一寸三分寸之二身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之服佩之也鳧氏為鍾兩欒謂之銑銑鍾口兩角也古者應律之鍾不圜狀如後世之鈴故有兩角銑間謂之于于上謂之鼔鼔上謂之鉦鉦上謂之舞此四名者鍾之正體也于鍾口兩間之中央也鼓所擊處舞上謂之甬甬上謂之衡此二者鍾柄之名也鍾縣謂之旋旋蟲謂之幹旋繋鍾柄以縣者旋蟲旋上作蟲形為飾也若旋上為蟲形不宜别名為幹疑旋蟲乃著于簴以為固者旋則下繫鍾柄而上結于旋蟲鍾帶謂之間謂之枚枚謂之景鍾有銑有于有鼓有鉦有舞其名不可辨乃為之帶以介之凡四名之曰毎處有乳各九名之曰枚枚景一物而二名猶欒銑也于上之攠謂之隧攠所擊之處隧在鼓中窐而生光有似夫燧十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞脩去二分以為舞廣此言鉦之徑居銑徑之八而銑間與鉦之徑相應鼓間又居銑徑之六與舞脩相應舞脩舞徑也舞上下促以橫為脩従為廣鍾之大數以律為度廣長與圍徑假設之耳銑間與上銑間謂之于異止謂兩銑之中央此謂銑與鼓相去之分也鼓間鼓與鉦相去之分也舞廣舞與鉦相去之分也銑間鼓間舞廣皆以従度上下相去言惟舞脩以橫度左右相去言獨無鼓徑者介于鉦銑間不必言也李耜卿曰鍾有三層銑至鼓為一層鼓至鉦為一層鉦至舞為一層假如銑徑一尺則鉦徑八寸舞徑六寸鍾弇上侈下故其分如此以其鉦之長為之甬長并衡之數言之以其甬長為之圍參分其圍去一以為衡圍甬之圍乃環其外而計之非除其内空而計三方之圍也去一以為衡圍亦環其外而計之也若除内空而計三方之圍則衡圍小于左右甬圍視甬體必挍薄于下文三分甬長二在上一在下以設其旋不可通矣甬中設旋向衡處得三分之二不宜反薄于左右二方參分其甬長二在上一在下以設其旋鍾之縣以甬而用力尤在衡一在下甬之附于鍾者雖少薄無虞也二在上乃衡之橫于甬上者非倍其厚則力不强而易至崩折矣薄厚之所震動清濁之所由出侈弇之所由興有説説即下文已厚已薄侈弇之説也厚薄言其體侈弇言其形清濁言其聲謂體之厚薄所震動乃聲之清濁所由出而聲之清濁又或興于形之侈弇故必厚薄侈弇適其宜而後清濁得其分也下文言薄厚侈弇而不及清濁以此鍾已厚則石已薄則播侈則柞弇則鬱長甬則震大厚則聲不𤼵大薄則聲散柞讀為咋聲外大也鬱聲不舒揚也震掉也言其動搖不定也李耜卿曰大鍾宜厚小鍾宜薄上宜狹下宜寛但過則為病不言清濁者不外于此也是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚據上文鼓間鉦間分數同豈鼓間乃銑間之誤與鍾大而短則其聲疾而短聞鍾小而長則其聲舒而遠聞淺則躁躁易竭深則安安難息上文自銑至衡長短詳矣故惟言其不合者以為戒為遂六分其厚以其一為之深而圜之厚鍾厚也深謂窐之也其窐圜或曰隧燧通鍾受擊處為圜形微起光明似鏡深髙也猶覲禮為壇深四尺之深㮚氏為量改煎金錫則不耗㮚古文或作歴改煎者煎而又煎也消涷之精故不復減量當與鍾鼎同齊而異工者大器也不耗然後權之權之然後凖之凖之然後量之凖擊平正之又當齊大小量謂鑄之于法中也凖之謂定其厚薄之分也金錫既不耗然後權取一鈞按鬴身及臋耳之尺度形制計其厚薄則厚薄之制有凖矣量之謂為模範也厚薄有凖然後可為模範量之以為鬴深尺内方尺而圜其外其實一鬴四升為豆四豆曰區四區曰鬴受六斗四升其内四方每方一尺而其外則為圜形也方尺積千寸漢書律歴志自龠而斛皆以十計之殆倍半于周量之數未可與㮚氏同論也其臋一寸其實一豆其耳一寸其實一升重一鈞其聲中黃鍾之宮臋一寸謂覆之其底深一寸也耳在旁所用以舉也不曰中黃鍾之聲而曰之宫者黃鍾之管本具宫商角徴羽五聲所中者特宫聲耳槩而不税官鑄鬴使為量者槩取則焉又禁取税俾典司者不得借以牟利也其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器維則銘刻之也時是也允信也臻至也極中也觀示也則法也言是文徳之君思求可以為民立法者而作此量信至于道之中故以觀示四國永為後世所取則也㮚氏所鑄鬴必藏于王府頒之邦國而副在司市使凡為量者皆取則焉為升者以耳為則為斗者以臋為則非以給市肆之用也古人既知以木為鼓穹則民間通用之量亦或以木為之若必以金錫則鬴重一鈞而實六斗四升難為運矣凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也鑄金之狀不列于鳬氏而列于㮚氏者金石之樂皆天子所賜而量民間所通用故使衆著于鑄之之狀也段氏闕函人為甲犀甲七屬兕甲六屬合甲五屬合甲削革之裏而合其表也不言其物即合犀兕而為之也七屬六屬五屬謂札葉相續之數犀甲壽百年兕甲壽二百年合甲壽三百年凡為甲必先為容然後制革凡造衣甲必先稱服者形容長短豐瘠而為之然後制札之廣袤權其上旅與其下旅而重若一上旅謂衣下旅謂裳春秋傳得其甲裳謂之旅者以札葉衆多也重若一者長短廣狹不能一也以其長為之圍注圍謂札要廣厚蓋以一札葉言之然文承權其上旅下旅之後必通計上旅下旅之長也甲裳之下尚有脛繳則甲裳當下被于膝自肩及膝之長圍之正與腰身相稱鄭剛中謂取一旅之長以為之圍誤矣凡甲鍜不摰則不堅已敝則橈鍛鍛革也摰謂熟之極至也已敝謂熟之過而傷其質也橈柔而易曲也凡察革之道眡其鑽空欲其惌也眡其裏欲其易也眡其朕欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲其無齘也惌小孔貌易者治之精而無敗薉也朕謂革制即線縫處也櫜甲衣也櫜之謂卷置櫜中齘人齒差參貌故以喻札葉眡其鑽空而惌則革堅也眡其裏而易則材更也眡其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也更變化也治革功粗則堅强變而熟易則其材化矣制裁制也周密致也明有光耀或曰札葉相續處分明可觀也變随人身便利鮑人之事望而眡之欲其荼白也進而握之欲其柔而滑也卷而摶之欲其無迆也眡其著欲其淺也察其線欲其藏也荼茅莠也白色握以手煩撋之也摶謂迫卷之也迆斜也若革有厚薄則迫卷之必斜迆而不正著謂革内皴起如絮者著淺則治之熟而筋膜盡矣故曰則革信也線謂革縫之縷革欲其荼白而疾澣之則堅革不宜久居水中趙氏曰甲用生皮鮑人乃熟皮當是為轂約矢箙韠舄之類必柔白皮方可用韋氏似主穿縳皮條及為韋弁等物欲其柔滑而腛脂之則需腛讀如沾渥之渥需如薄其帤則需之需謂柔緩也厚脂之則革柔緩引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也帴狹也覆釋上文而别出此節者水澣脂柔之後正當引而信之也取材正而無緩急則用之無先裂之患而卷而摶之亦不迆矣卷而摶之而不迆則厚薄序也眡其著而淺則革信也察其線而藏則雖敝不甐序舒也謂厚薄均也信無縮緩也甐讀為磨而不磷之磷謂縫縷藏于韋革之中則革雖敝而縷不傷韗人為臯陶長六尺有六寸左右端廣六寸中尺厚三寸韗書或為􅕦臯陶鼓木也版中廣兩端狹為穹隆也穹者三之一鼓腹穹隆者居鼓面三分之一則其鼓四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼓四尺則穹之徑六尺六寸三分寸之二也此鼓言版之廣狹下二鼓言面徑互見也合版之廣狹與面徑計之此鼓應二十版上三正此鼓版長六尺六寸中央穹者二尺二寸兩端各二尺二寸其長短無偏所謂三正也上謂穹而上者舉中以該兩端也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓面徑四尺其圍十二尺加以三分之一四尺則中圍十六尺徑五尺三寸三分寸之一也此鼓亦合二十版一相版穹六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事上穹者三之一據一相之穹此則于面四尺總加三分之一也為臯鼓長尋有四尺鼓四尺倨句磬折以臯鼓鼓役事磬折者觕處近上中曲之不三正也趙氏曰凡磬之折股為二則在上者大而短鼓為三則在下者小而長此鼓丈有二尺則自四尺而上曲而大自八尺而下直而小舊説長六尺有六寸者乃晉鼓以鼓人六鼓四面六面八面者乃祀神之鼓非凡事所通用故不載其制此記下列鼖鼓鼛鼓之制則首所言必晉鼓也但考工不皆周制或六尺六寸者為上下通用之鼓故于後獨舉鼖鼛以明異制耳于鼛鼓曰倨句磬折則上三正兼上二鼓可知矣于鼖鼓曰中圍加三之一則鼛鼓視此矣穹者三之一知為一相者所言鼓木之版也必合二相乃與中尺之圍合也曰中圍加三之一則計圍之共數可知矣厚三寸乃三鼓之所同故鼖鼛不復言厚也凡冐鼓必以啟蟄之日啟蟄孟春之中也蟄虫始聞雷聲而動鼓所以取象也冐蒙鼓以革也良鼓瑕如積環瑕者漆之文理也冐鼓之革苟調而急則漆之也其瑕如累積玉環然瑕隙紋也謂鼓木合縫處鼓二十版兩端狹而中穹取材正直則縫之左右相值者合而視之如環如積環謂衆版之輻輳也惟良鼓為然若材偏斜而工拙則左右縫不相值而望之不如環矣鼓大而短則其聲疾而短聞鼓小而長則其聲舒而遠聞大小長短得宜如上三鼓之制則無此病韋氏闕裘氏闕畫繢之事雜五色下有六色而此第云五色者元與墨類也畫繢見司几筵東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃青與白相次也赤與黑相次也𤣥與黃相次也此言畫繢六色所象及布采之次第趙氏曰注謂此繢于衣者其説恐拘蓋木者金之配故青與白相次火者水之配故赤與黑相次地者天之配故元與黃相次凡布采時必以此二色相對耳青與赤謂之文赤與白謂之章白與黑謂之黼黒與青謂之黻五采備謂之繡此言刺繡采所用繡以為裳凡繡亦須畫乃刺之故畫繡二工共職上言六采之相對者此又以四時相續之義次之易彦祥曰書言六章之裳宗彜藻火粉米黼黻絺繡言藻而繼之以火青與赤之文也言火而繼之以粉米赤與白之章也言粉米而繼之以黼白與黑之黼也言黼而繼之以黻青與黑之黻也惟黃之色無所見而宗彜繡以虎蜼則亦以黃為色兹實五采備之證土以黃其象方天時變上言天謂之元地謂之黃此獨言黃且變地而言土者明黃為中央之色也不言元者元與黑類也其象方天時變為句方與方物出謀發慮之方同蓋承上文言青赤白黑為四方之色而黃為中央之色其象則依倣天時而變如月令四時各服其方色而中央土服黃是也火以圜山以章水以龍鳥獸蛇火以其象水以其物惟山則明章其本質而已蓋即畫為山也鳥獸蛇其毛鱗有文采者所謂華蟲也火在裳餘皆在衣雜四時五色之位以章之謂之巧章明也四時所用車服旗章色各有主而以他時之色間雜成文所謂雜四時五色之位以章之也禮記五色六章十二衣還相為質即謂此蓋如春三月雖衣青衣而其繡繢則雜四采耳凡畫繢之事後素功素白采也後布之為其易漬汚也不言繡繡以絲也鍾氏染羽以朱湛丹秫三月而熾之湛漬也朱硃砂也丹秫赤粟也熾炊也染羽以飾旌旗及王后之車淳而漬之三入為纁五入為緅七入為緇淳沃也湯沃所熾之秫烝之以漬羽也纁赤黃色也緅爵頭色赤多黑少與紺相類爾雅曰一染謂之縓再染謂之竀三染謂之纁凡元色在緅緇之間其六入者與獨言纁緅緇者豈羽可染者獨此三色與鄭剛中曰設色之工五畫繢鍾筐㡛今以天官染人考之春暴練者其㡛氏與夏纁元者其鍾氏與若夫染夏雖不見于考工而經有五采備之文其筐人之職乎筐人闕㡛氏湅絲以涚水漚其絲七日去地尺暴之涚水灰所泲水也漚漸之也楚人曰漚齊人曰涹晝暴諸日夜宿諸井七日七夜是謂水湅宿諸井謂縣井中湅帛以欄為灰渥淳其帛實諸澤器滛之以蜃欄木名似白槿而細黃華渥漬之厚也澤器謂滑澤之器蜃謂灰也滛當為湼書亦或為湛清其灰而盝之而揮之清澄也盝晞之也晞而揮去蜃灰而沃之而盝之而塗之而宿之沃之沃以清水也塗之更塗以蜃灰也宿謂經宿明日沃而盝之晝暴諸日夜宿諸井七日七夜是謂水涷周官集注卷十一
