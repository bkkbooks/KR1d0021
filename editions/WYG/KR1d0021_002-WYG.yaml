body:
  text: 周官集注卷二翰林院侍講銜方苞撰酒正掌酒之政令以式灋授酒材式法作酒之法式也月令乃命大酋秫稻必齊麯糵必時湛饎必潔水泉必香陶器必良火齊必得授酒材以授酒人也凡為公酒者亦如之謂鄉射飲酒以公事作酒者亦以式法及酒材授之使自釀辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊泛者成而滓浮泛泛然醴猶體也成而汁滓相將盎猶翁也成而翁翁然蔥白色緹者成而紅赤沈者成而滓沈自醴以上尤濁以茅縮而酌之盎以下差清謂之齊者每有祭祀以度量節作之辨三酒之物一曰事酒二曰昔酒三曰清酒事酒因事而造旋用之清酒則滓汁少澄昔酒則舊醳之酒也酒酋久則愈明潔記謂明清與醆酒于舊醳之酒則其品尤貴可知矣五齊祭祀所用不致其味故曰辨名三酒人所飲務致其實故曰辨物辨四飲之物一曰清二曰醫三曰漿四曰酏清謂醴之泲者醫内則所謂或以酏為醴也凡醴濁釀酏為之則少清漿舊説亦酒之類漢時名為酨漿或曰梅漿蔗漿之類也内則有黍酏酏飲粥稀者之清也五齊止用醴為飲者取醴恬味不似酒掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒五齊三酒四飲皆酒人漿人所作酒正惟辨其厚薄之齊饌陳設也后世子不言饌亦不言飲與酒之數者不具設也凡祭祀以灋共五齊三酒以實八尊大祭三貳中祭再貳小祭一貳皆有酌數惟齊酒不貳皆有器量大祭王服大裘衮冕所祭也中祭王服鷩冕毳冕所祭也小祭王服希冕𤣥冕所祭也貳副貳也三貳再貳一貳皆謂三酒五齊獻神神有定位獻有定數無副益之尊酌數獻酬之數也三酒雖有貳尊而獻酬則有定數八尊及貳尊所容皆有限量共賔客之禮酒共后之致飲于賔客之禮醫酏糟皆使其士奉之糟醫酏不泲者士謂酒人漿人奄士奉捧持之也凡王之燕飲酒共其計酒正奉之共其計者獻酬多少度當足也鄭剛中曰不參計于禮飲而奉于燕飲使王知戒凡饗士庶子饗耆老孤子皆共其酒無酌數以醉為度掌酒之賜頒皆有灋以行之法尊卑之差凡有秩酒者以書契授之有秩酒者謂老臣王制九十日有秩王介甫曰授以書者使知所得之數授以契者使執以取酒酒正之出日入其成月入其要小宰聽之謂所出之酒日有成月有要也必小宰聴之者治王宫之政令則自后世子夫人嬪御羣王子皆不得妄取矣王介甫曰特謹其出異于餘物毖酒之意也嵗終則㑹惟王及后之飲酒不㑹以酒式誅賞誅賞作酒之美惡者酒人掌為五齊三酒祭祀則共奉之以役世婦獨言以役世婦者王之祼獻冡宰小宰贊之故用此見后之祼獻春官宫卿世婦贊之也知非天官世婦者天官世婦所掌獨女宫之具内羞之物而宫卿世婦則比祭祀之具詔王后之禮事也以給世婦廟中之役故酒人用奄共賔客之禮酒飲酒而奉之禮酒饗燕所用飲酒食時酳口者二者酒人自奉之若王不親饗食而使人以酬幣侑幣致之則共酒以往與陳酒同凡事共酒而入于酒府凡事謂王之三酒之饌燕飲之酒以及后世子之饌士庶子耆老孤子之饗賜頒之行秩酒之授凡酒正所掌者酒府酒正之府也入于酒府以酒正掌其法或自奉之或使屬士或令掌事者及其人自取别于祭祀賔客酒人必自奉之或自共酒以往也凡祭祀共酒以往前曰祭祀則共奉之以役世婦葢王及后所親之祭祀也此共酒以往而不言奉則王所不親賔客之陳酒亦如之謂饔餼之酒自有奉之者以酒從往漿人掌共王之六飲水漿醴涼醫酏入于酒府醴即四飲之清也涼氷水也暑月用之酒正不辨水涼無厚薄之齊也或曰漿以水和米而煮之去滓存汁醫即内則所謂醷梅漿也酏即飴和湯可飲共賔客之稍禮稍禮非飱饔王間以給賔客者共夫人致飲于賔客之禮清醴醫酏糟而奉之醴則清醫酏則糟也注謂后屈于王故無醴夫人不體王得備之非也王之致于賔客者酒也后之致飲于賔客者醫酏之糟也醫酏非酒人所掌故特見其文若漿人職共六飲賔客之稍禮且共之則王燕饗后致飲之正禮不必言矣故獨載夫人致飲之禮也后致飲獨載醫酏者酒正屬士所奉止此也其四飲皆漿人奉之于夫人之致飲奉之則后不必言矣疑后六飲皆致夫人止致其三耳葢王致飱牢委積后致籩豆壺漿凡賔客所需之物無不備矣使水漿醴凉不致賔客安從取之掌客職諸侯相為賔夫人致八壺則不止三飲矣况王后乎既有后致飲之禮復設夫人致飲之禮者或后崩而夫人攝内治則宜有賔客之事又或來朝聘者為夫人父母之邦則雖后在彼此亦得致禮也凡飲共之謂凡禮事之飲凌人掌氷正嵗十有二月令斬氷三其凌係十有二月于正嵗者明為夏正之十有二月也凌氷室也三其凌謂三倍其氷為消釋度也春始治鑑凡外内饔之膳羞鑑焉凡酒漿之酒醴亦如之鑑如甀大口以盛氷置食物于中以禦溫氣酒漿酒人漿人也祭祀共氷鑑賔客共氷不以鑑往嫌使停膳羞大喪共夷槃氷夷之言尸也實氷于夷槃置尸牀下所以寒尸大喪王及后世子也獨言共大喪之氷者賔食皆用氷則宫中之小喪共氷不必言矣頒氷反國之老疾則卿大夫士之喪浴不必言矣經于他事多舉下以該上以舉上則疑于下之不得用也此獨舉上以該下不疑也不曰凡喪共氷者曰凡喪共氷不知大喪之用夷槃也曰大喪共夷槃氷則凡喪共氷而不用夷槃具見矣春秋傳命夫命婦喪浴用氷及孟獻子所稱皆侯國之制也天子之士比侯國卿大夫得用氷可知夷舊説訓尸以義測之夷等也喪大記曰自小斂以往用夷衾葢大斂衣物加多衾必更寛大與相等然後可徧覆夷槃疑亦稱斂衣之多寡而為之制記曰君設大盤造氷焉大夫設夷盤造氷焉則夷不宜以尸訓明矣此統曰夷槃者或以兼后世子或記所稱非周制也夏頒氷掌事秋刷刷除氷室籩人掌四籩之實籩竹器如豆其容實皆四升朝事之籩其實䵄蕡白黑形鹽膴鮑魚鱐戴記建設朝事宗廟薦血腥之事也熬麥曰䵄蕡枲實也稻曰白黍曰黑形鹽築鹽為虎形也春秋傳曰鹽虎形膴䐑生魚為大臠鮑于楅室中糗乾者鱐析乾之饋食之籩其實棗㮚桃乾䕩榛實饋食薦熟也今吉禮存者特牲少牢諸侯之大夫士祭禮也不祼不薦血腥而自薦熟始是以皆云饋食之禮乾䕩乾梅也榛似栗而小加籩之實蔆芡㮚脯蔆芡㮚脯加籩謂尸既食后亞獻尸所加之籩重言之者以四物為八籩也蔆芰也芡雞頭也羞籩之實糗餌粉餈按少牢賔長致爵受酢宰夫羞房中之羞于尸天子之禮賔長受酢後亦當設此内羞以籩盛之故曰羞籩糗熬大豆與米也粉豆屑也或曰此二物皆粉稻米黍米所為合蒸曰餌餅之曰餈或曰餌粉餅也説文餌屑米為粉然後水調之餈稻餅也謂炊米爛而擣之粉餈以豆為粉糝餈上也凡祭祀共其籩薦羞之實凡祭祀謂四時禘祫等薦羞皆進也未食未飲曰薦據朝踐饋獻時未獻前所薦之籩豆羞則尸食後酳尸訖所進即加籩之實也喪事及賔客之事共其薦籩羞籩喪事之籩謂殷奠時祭祀曰籩薦羞之實賔喪則曰薦籩羞籩者天官世婦帥女宫而濯摡則祭祀之籩豆掌于世婦籩人獨掌其實耳若賔喪則并掌其器也知女宫所濯摡不兼賔喪之器者以下曰及祭之日涖陳女宫之具也葢喪事則世婦有著位焉不暇涖濯摡賔客事紛則有司共之可矣内宗薦加籩豆佐傳籩豆兼賔客之饗食何也共薦傳而不共濯摡也且春官世婦職惟大賔客之饗食王后乃與則薦傳之事亦僅矣為王及后世子共其内羞王及后世子或有私親燕賜則為共其内羞也注謂共王后世子飲食則經文當曰共王及后世子之内羞臨川王氏謂王及后世子以此内羞共禮事而籩人醢人為之共又引世婦職以為此内羞所共為祭事果爾則獨為后共而不得曰為王及世子共且祭祀喪紀賔客之事即為后共不應别見此文凡籩事掌之薛氏謂供奉之職官府敬君有素故先王而後祭祀内人朝夕王所故先祭祀而後王非也膳饔所以養生故先言王而後及于祭祀籩豆所以奉鬼神故先言祭祀而後及于王義各有當也且膳夫祭祀徹王之胙俎非以共神也庖人共祭祀之好羞非犧牲之正也内外饔烹人職在掌王后太子朝夕常膳其于祭祀獨掌割烹奉牲獻血登薦之重禮不與也故先言其本職而後及其兼事至酒之肇本為元祀故先五齊醯鹽齊菹並籩豆之實故先祭祀漿非所以共神故六飲皆以奉生人皆于其職事别之而以官府内人為義則不可通矣醢人掌四豆之實有籩人而無豆人者籩實果穀魚鹽脯膴皆易成故統于一官豆實醢物醯物雜而難成非一官所能共而豆實又不盡于醯醢之物也鹽亦籩實而别列一職者共百事之鹽籩實其一耳朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡豆木器薦豆節數與四籩同時皆后設之醓肉汁也昌本昌蒲根三臡亦醢也作醢及臡者必先膊乾其肉然後莝之雜以梁麴及鹽漬以美酒塗置瓶中百日而成有骨為臡無骨為醢凡不言菹者皆韲昌本之類是也菁蔓菁也茆鳧葵即荇菜也凡菹醢皆以氣味相成其詳未聞饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢脾析牛百葉也蜃大蛤拍或曰當為膊豚脇蠃蠯蚳見鼈人職加豆之實芹菹􅇠醢深蒲醓醢箈菹雁醢筍菹魚醢芹楚葵也蒲蒻入水深故曰深蒲箈水中魚衣筍竹萌或曰深蒲蒲始生衣中子箈箭萌羞豆之實酏食糝食酏􅊡也内則曰取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之以稻米二肉一合以為餌煎之凡祭祀共薦羞之豆實賔客喪紀亦如之為王及后世子共其内羞王舉則共醢六十罋以五齊七醢七菹三臡實之齊當為韲五韲昌本脾析蜃豚拍深蒲也七醢醓蠃蠯蚳魚􅇠雁醢七菹韭菁茆葵芹菭筍菹三臡麋鹿麇臡也凡醯醬所和細切為韲全物若䐑為菹菜肉通祭祀不復曰豆薦羞之實賔客喪紀亦不復曰薦豆羞豆者義已具於籩人也此以下與籩人異以王舉不共籩實惟有豆實賔客之禮共醢五十罋按掌客上公之禮醯醢百二十罋侯伯百罋子男八十罋此共醢五十罋并醯人所共為百罋乃侯伯饔餼之禮舉中言之凡事共醢醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賔客亦如之連言醬者合醯與醬而成之物則醯人掌之也下云賔客之禮據饔餼此云賔客據饗食及以幣致之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賔客之禮共醯五十罋凡事共醯曰共齊菹醯物六十罋則知醢人五齊七菹為醬物矣則知醯物之無醢與臡矣鹽人掌鹽之政令以共百事之鹽政令謂斂散收藏之法祭祀共其苦鹽散鹽苦讀為盬謂出于鹽池不湅治而可用者散鹽煮水為之賔客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之飴鹽鹽之恬者凡齊事䰞鹽以待戒令齊事和五味之事煮鹽湅治之幂人掌共巾幂祭祀以疏布巾幂八尊八尊即酒正所實八尊注以疏布者天地之神尚質以畫布巾幂六彜注布畫雲氣宗廟可以文疏天地亦有秬鬯之彜用疏布宗廟亦有八尊用畫布互舉以明義俱未知何據凡王巾皆黼凡四飲三酒籩豆俎簋之屬巾皆用黼黼者繪以斧形近刃白近銎黑宫人掌王之六寢之修路寢一小寢五路寢以治事小寢以燕息修埽除也為其井匽除其不蠲去其􅆨惡井漏井所以受水今之滲坑也匽謂匽豬葢霤下之池受畜水而流之者今之隂溝也蠲猶潔共王之沐浴凡寢中之事埽除執燭共鑪炭凡勞事四方之舍事亦如之從王適四方及會同所舍六寢勞䙝之事皆以士人共之使王出入起居罔有不欽也掌舍掌王之會同之舍設梐枑再重梐枑謂行馬聯三木交互樹之以為遮列再重者以周衛有内外列也車宫壝宫止宿則設之設車宫轅門王行止宿險阻之處備非常次車以為藩則仰車以轅表門為壇壝宫􅁄門王行止宿平地築壇壇邊低垣圍繞者曰壝􅁄門以㦸為門為帷宫設旌門王行晝止有所展肄或食息張帷為宮則樹旌以表門車宫曰設陳列之也壇壝則築土起堳埒帷則置㭬杙繫綱故並曰為于帷宫獨曰設旌門者恐疑帷宫本具旌門故加設以明異事無宫則共人門王行有所逢遇若住遊觀陳列周衛則立長大之人以表門凡舍事則掌之幕人掌帷幕幄帟綬之事王出宮則有是事在旁曰帷在上曰幕幕施于帷上皆以布為之四合象宫室曰幄幄設于帷幕之内王所居之帳也帟王在幕若幄中坐上承塵幄帟皆以繒為之綬絛也凡四物者皆以綬連繫焉王氏曰王在宫則幕人掌其事自朝覲㑹同以下則共之而掌次張焉凡朝覲㑹同軍旅田役祭祀共其帷幕幄帟綬大喪共帷幕帟綬為賔客飾也帷以帷堂或與幕張于庭帟在柩上承塵三公及卿大夫之喪共其帟士無帟王加惠則賜之檀弓君于士有賜帟此舉三公不及諸侯與孤下掌次舉諸侯與孤不及三公者諸侯再重則三公不必言矣孤卿大夫不重見掌次故幕人職畧焉掌次掌王次之灋以待張事法大小丈尺或曰即下所列設張之物與其數也王大旅上帝則掌氊案設皇邸大旅大宗伯職國有故則旅上帝及四望是也舉大旅則圜丘之祭不必言矣氊案設牀于幄内而加氊也邸後版也即屏風染羽象鳯凰色以飾之朝日祀五帝則張大次小次設重帟重案合諸侯亦如之朝日春分拜日于東門之外祀五帝于四郊次謂幄也大幄初往所止居也小幄祭退俟處祭義周人祭日以朝及闇雖有强力孰能支之是以退俟與諸臣代有事焉合諸侯謂殷同為壇于國門外故張次重帟複帟重案牀重席也師田則張幕設重帟重案不張幄者臨衆王或回顧占察諸侯朝覲㑹同則張大次小次大次亦初往所止居小次即宫待事之處亦掌次為諸侯張師田則張幕設案謂諸侯從王師田者孤卿有邦事則張幕設案謂以事從王若以王命出也王之孤三人不言公如諸侯禮凡喪王則張帟三重諸侯再重孤卿大夫不重此諸侯謂三公王子母弟若畿外諸侯非掌次所及也凡祭祀張其旅幕張尸次旅衆也公卿以下即位于所祭祀之門外以待事為之張大幕尸則有幄居以更衣射則張耦次耦俱升射者次在洗東大射禮遂命三耦取弓矢于次天子射皆六耦掌凡邦之張事大府掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府九職之貢曰功者皆民功所成又以别于邦國之九貢也内府都受九貢九賦九功之貨賄則受藏受用之府皆内府也葢貨若金玉丹鉛之類可久藏者賄若布帛皮革之類宜及時以用而久之則朽蠧者故貯之必異所也舊説受用之府為職内或曰外府皆非也職内掌賦入之總辨其用而不受其物外府則所掌惟邦布凡官府都鄙之吏及執事者受財用焉執事謂為官執掌其事有營造合用官物凡頒財以式灋授之關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予待猶給也膳服即羞服也稍秣即芻秣也賜予即好用也大宰九式並言喪荒此獨言喪者荒之用出于三十年之所積故也以九賦待九事亦總其大略可以贍給非截然不相通葢材物泉布可以互易盈歉多寡可以酌劑職内所謂叙其財以待移用是也邦中四郊削甸縣都之賦皆粟米也古者以粟米易百物故匪頒工事幣帛皆用粟米其賔客祭祀稍秣上得轉移而用之者不必言矣凡邦國之貢以待弔用凡萬民之貢以充府庫弔用凶禮之五事也注疏謂九貢之外别有九賦為口出泉据此不知此以邦國之貢而並及之也葢邦國之九貢與畿内九職所貢其物多同彼以待四方之事此則充府庫以待畿内之事即上九式之用也凡式貢之餘財以共玩好之用必禁王之有玩好勢將不行以餘財共之則知不可以耗天下之經費矣凡邦之賦用取具焉賦用用賦也凡邦之賦用如軍旅田役施惠以及百府有司禄廪之類九式所不載者嵗終則以貨賄之入出㑹之玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉戴記大圭長三尺天子服之玉藻天子佩白玉而𤣥組綬詩傳佩玉上有葱衡下有雙璜衝牙蠙珠以納其間珠玉􅅣玉為珠以貫冕弁王五冕旒數不同而玉皆十有二又有皮弁韋弁冠弁其㑹玉亦十二王齊則共食玉王齊食玉屑大喪共含玉復衣裳角枕角柶含玉璧形而小以實口復始死招魂也衣裳生時所服角枕以枕尸角柶角七也以楔齒令可飯含掌王之燕衣服衽席牀第凡䙝器燕衣服謂巾絮寢衣袍襗之屬笫簀也衽席臥席也䙝器清器虎子之屬王之燕衣服凡䙝器皆掌于玉府則冢宰小宰得檢察雖以良貨賄共之而毋敢作淫巧以蕩上心矣若合諸侯則共珠槃玉敦敦槃類珠玉以為飾合諸侯割牛耳取其血歃之以盟珠槃以盛牛耳尸盟者執之敦盛血凡王之獻金玉兵器文織良貨賄之物受而藏之文織畫及錦繡或曰凡織而有文者九貢九賦九功及四方幣獻並入内府故舊説玉府所受乃羣下私獻于王者然聘禮私覿亦幣獻之常未聞别有私獻于王之禮葢内府所受百工所成王命獻之而以為善則藏于玉府以待王用耳曰物者良貨賄所成之物而非貨賄也凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用受受之大府也大用九式及弔用也九賦亦有貨賄者角人羽人掌葛皆徵其物以當邦賦則知周官和通上下備法以利民凡有貨賄者皆得入以代賦不獨山澤之農凡四方之幣獻之金玉齒革兵器凡良貨賄入焉諸侯朝聘所獻國珍先入掌貨賄入其要于大府乃通于内府陳及之曰金玉兵器良貨賄分掌于二官者玉府所掌乃貢式餘材所作及獸人漁人所入之物專以共王玩好及賜予内府則通掌九貢九賦九功之貨賄及四方幣獻以待邦之大用也九貢九賦九功之貨賄不言良者良苦兼受也兵與器獨言良者其不良者司兵及用器者受之也幣獻之貨賄獨言良者庭實非良不薦也貨賄皆良則兵與器不必言矣邦之大用貨賄則良苦各有所待若兵與器之錫則必褒有徳勞有功是以非良不用也聘物好賜必以良貨賄共奉亦此義也凡邦國之貢以待弔用故聘物好賜亦于幣獻取之凡適四方使者共其所受之物而奉之王所以遺諸侯者凡王及冢宰之好賜予則共之冢宰待四方賔客之小治或有所善亦賜予之外府掌邦布之入出以共百物而待邦之用凡有灋者布泉也其藏曰泉其行曰布義取于水泉之流布也共百物者或作之或買之百物有賦貢所不及者則以布市焉布之出者賜予市齎也其入者國所鼓鑄㕓人所斂閭師所入及民當出粟米絲麻而或以布代者共王及后世子之衣服之用王后世子衣服用泉布者按典婦功職共王及后之用者惟内嬪婦之功或有所不能備也邦國之嬪貢九職之婦功成于外工者多矣而不以共何也王后世子之衣服非内嬪婦之功則不用其有不備轉以布市之亦所以示節制防廣侈也凡祭祀賔客喪紀㑹同軍旅共其財用之幣齎賜予之財用齎行道之財用也聘禮問幾月之幣齎幣即布也禹𤼵莊山金鑄幣濟民不曰共其幣齎而曰財用之幣齎者量所應用財物而給之幣以為齎也曰賜予之財用者若王命賜以宫室衣服而無夙成者亦量其所用財物而給以布凡邦之小用皆受焉皆受皆來受也布權百物而通之故小用皆取給于此嵗終則㑹惟王及后之服不㑹司㑹掌邦之六典八灋八則之貳以逆邦國都鄙官府之治以九貢之灋致邦國之財用以九賦之灋令田野之財用以九功之灋令民職之財用以九式之灋均節邦之財用閭師掌國中四郊之賦而所列皆貢物且農之九穀與諸職之物同曰貢明貢之外别無所謂賦也縣師掌邦國都鄙稍甸郊里之貢賦别無任民令貢之法者一同于閭師所掌也注疏謂九賦為口出泉据此既云以九賦之法令田野之財用復云以九功之法令民職之財用似分而為二不知財用之最多者莫如九穀而皆出于田野惟關市幣餘無九穀國中山澤亦有耕者故舉其多而以田野為主皆徵其九穀也至于園圃山澤藪牧關市既非穀土虞衡圃牧工商嬪婦臣妾閒民又非農者所執之業既殊所貢之物亦異不得不别而為二非既徵其貢又責以賦如漢以後口率出泉之制也掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聽其㑹計野甸稍也書記録簿書也契取予斂散所執以為驗也版戸籍圖土地形象田野廣狹以參互攷日成以月要攷月成以嵗㑹攷嵗成以周知四國之治以詔王及冢宰廢置凡事之用財有分用者有總司者並出財者各有簿書所謂參以考之也官有聯事彼此互見所謂互以考之也惟日成紛雜易于抵冐參互以得其實則月要嵗㑹雖大積而無誤矣此承上官府郊野縣都百物財用而為言也而繼以周知四國之治者司㑹掌六典八法八則之貳以逆邦國都鄙官府之治是邦國各上其計于嵗終也月令每嵗季秋制諸侯來嵗所賦于民輕重之法貢職之數則古者邦國之日成月要嵗㑹皆達于天子可知矣葢必知其年之豐凶而後可酌其所賦于民輕重之法必知其國用之多寡而後可定其貢職之數也詔王及冢宰廢置總上羣吏之治四國之治而言之司書掌邦之六典八灋八則九職九正九事邦中之版土地之圖以周知入出百物以敘其財受其幣使入于職幣九正即九職之賦貢也變文言正以著其惟正之供也九事即九式也以用財言之則曰式以用財所為之事言之則曰事敘比次也受其幣謂受録其餘幣而為之簿書也知九正不兼侯國之貢者以下言邦中之版圖及知夫家器械六畜凡掌税斂者受法皆畿内之事也司㑹所掌有九貢而司書無之者邦國之貢其大經該于六典至于民財器械田野夫家六畜之數則非王朝之吏所能及也山林藪澤之數則具在職方矣司㑹統財用之計故九貢九賦九功皆㑹焉其職與司書異矣凡上之用財用必攷于司㑹凡上之用財用謂九式外若王及冢宰好賜予之類必考于司會者司㑹以九式均節財用苟其事不當得執奏三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徵令民之財所積粟米絲麻百物也山林川澤童枯則不税凡逆治狀則以迎受言逆財用則以鉤考言此恐羣吏濫徵故知其本數以鉤考之凡税斂掌事者受灋焉及事成則入要貳焉税斂掌事者若地官閭師旅師等九賦之外别無九貢著于閭師職者甚明舊説乃謂貢賦之外别有税斂誤矣此及小司徒職所謂税斂之事即税斂九賦九貢之事也詳見地官凡邦治攷焉考其法于司書職内掌邦之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用掌賦入者九貢九賦九功之入皆掌之賦乃總名下言賦者皆此類也辨財用之物處之使種類相從總謂簿書之種别與大凡官府財入謂内府外府凡入貨賄者皆是都鄙財入留于郊里野鄙甸稍縣都以待用者其副皆在職内賦入獨曰邦者以入于王朝者言之也賦用曰邦國者九賦所待半用之于侯國也前曰以逆邦國之賦用者預計其當用之數也後曰以逆職嵗與官府財用之出者鉤考其已用之數也凡受財者受其貳令而書之受財受大府之頒而藏之者若内府外府玉府是也大府以其令之貳下職内故受而書之注謂受于職内以給公用非也凡出財用皆受法于職嵗疏謂職内亦有留貨賄之府故得出給益誤矣及㑹以逆職嵗與官府財用之出并鉤考職嵗出財之數及各官府所用之數也財入之數并言官府都鄙而財用之出獨言官府者以守藏言則官府都鄙異所不可以無别以出用言則都鄙之財亦官府出而用之也而敘其財以待邦之移用九式之用各有所當一嵗中九賦之入有盈歉所待之用有多少則移其有餘以濟不足故敘以待之注獨主餘見之財非也葢並本嵗所入之財敘之職嵗掌邦之賦出以貳官府都鄙之財出賜之數以待㑹計而攷之九貢九賦九功之入或藏于官府以待王朝之用或貯于都鄙以待畿内之用出之數九式有經制者下文凡官府都鄙羣吏之出財用受式法者是也賜之數下文凡上之賜予以叙與職幣授之者是也凡官府都鄙羣吏之出財用受式灋于職嵗凡上之賜予以敘與職幣授之及㑹以式灋贊逆㑹助司㑹鉤考羣吏之計職幣掌式灋以斂官府都鄙與凡用邦財者之幣所斂之幣謂給公用之餘振掌事者之餘財振收也掌事謂以王命有所作為上斂幣者日用經費之餘也此振財者有興作之事而餘也皆辨其物而奠其録以書楬之以詔上之小用賜予奠定也録籍也楬標其上也嵗終則㑹其出凡邦之㑹事以式灋贊之司裘掌為大裘以共王祀天之服大裘黑羔裘服以祀天示質也大裘之上又有𤣥衣與裘同色李耜卿曰宋元祐時議北郊皆以五月服大裘為難行按司服職祀昊天上帝則服大裘而冕祀五帝亦如之若以五月祀帝不可服大裘則四月祀赤帝六月祀黄帝又可服乎楊氏曰蒼璧黄琮以象天地之性者不容不異冕服王之所服以事天地者不容不同但夏至不用大裘耳屨人之屨猶辨四時之宜則冕服可知矣中秋獻良裘王乃行羽物良善也中秋鳥獸毛毨因其良時而用之行羽物謂賜羣臣中秋鳩化為鷹中春鷹化為鳩順其始殺與其將止而大頒羽物故羅氏職中春亦行羽物季秋獻功裘以待頒賜功裘人功微觕謂狐青麛裘之屬功裘以待頒賜則良裘王所服不待言矣王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射謂王將有郊廟之事以射擇朝覲諸侯與羣臣及邦國所貢之士以助祭也此經諸侯謂三公及王子弟封于畿内者不言孤孤六命與卿同自大夫以上將祀其先祖亦與其臣射以擇之士不大射無臣可擇也凡大射各于其射宫侯者其所射也以虎熊豹麋之皮飾其側又方制之以為準謂之鵠著于侯中王之大射自射虎侯諸侯射熊侯卿大夫以下射豹侯諸侯之大射自射熊侯羣臣射豹侯卿大夫之大射則君臣共麋侯焉謂之侯者以警不寧之諸侯謂之鵠者取小鳥難中用虎熊豹麋之皮示服猛討迷惑者或曰春秋書多麋害稼之物大喪廞裘飾皮車廞興也若詩之興謂象似而作之凡為神之偶衣物必沽而小或曰與廞樂同義陳之也皮車遣車之革路凡邦之皮事掌之嵗終則㑹惟王之裘與其皮事不㑹以此知婦人之不裘也掌皮掌秋斂皮冬斂革春獻之革需揉治故至冬乃斂皮革踰嵗乾久乃可用獻之謂獻其良者于王以入司裘給王用遂以式灋頒皮革于百工式法作物所用多少故事百工冬官裘氏韋氏函人之類共其毳毛為氊以待邦事毳毛細縟者嵗終則㑹其財齎財謂所入皮革本數及出給所餘齎則出給之數也齎疑謂泉布也經于掌皮曰㑹其財齎于典婦功曰授女功之事齎葢練治皮物絲麻所用物瑣細故給以布使自備之也外府掌邦布凡祭祀賔客喪紀軍旅共其財用之幣齎亦用以通百物與内宰掌書版圖之灋以治王内之政令均其稍食分其人民以居之人民奄奚之屬王内之職惟内小臣奄四人為上士則其餘皆人民也在版之奄奚其執事有常在圖之宫寢其居處有列所謂版圖之法也王之後宫非外臣所得入也故繪其圖然後可以分人民之所居鄭剛中謂小宰所治之王宫乃王之六寢内宰所治之内宫乃后夫人所居非也凡宫正宫伯所掌者王宫之羣吏士庶子或布周廬或次宫内不與嬪婦相接者也内宰所治者奄奚之屬與嬪婦時接者也小宰兼掌之故統之曰王宫内宰分掌之故别之曰王内耳以隂禮教六宫以隂禮教九嬪以婦職之灋教九御使各有屬以作二事正其服禁其奇衺展其功緒隂禮婦人之禮后象王立六宫亦正寢一燕寢五教者不敢斥言之謂之六宫九御女御也九九而御于王因以號焉使各有屬者自夫人下至女御三三為屬二事絲枲之事展録也緒業也三夫人分掌六宫曰教六宫則后夫人兼之矣二十七世婦分屬九嬪曰教九嬪則世婦視此矣特出九御之婦職者以世婦以上無絲枲之功事也内官不列三夫人而漿人掌夫人致飲于賔客之禮則知次于后而居九嬪之上者有夫人矣猶師氏保氏不言教太子而諸子職國有大事帥國子而致于太子惟所用之則知師氏保氏所教國子乃與太子共學者而太子亦在其中矣大祭祀后祼獻則贊瑤爵亦如之大祭祀謂祭宗廟王既祼后乃從後祼也祭統曰君執珪瓉祼尸大宗執璋瓉亞祼乃夫人不與而攝耳獻謂王薦腥薦熟后從後獻瑤爵謂尸卒食王既酳尸后亞獻其爵以瑤為飾鄭剛中謂禮三獻至九獻后皆用瑤爵未知何據正后之服位而詔其禮樂之儀薦徹之禮當與樂相應位謂房中戸内及阼所立處贊九嬪之禮事助九嬪贊后之事九嬪贊后薦玉齍薦徹豆籩凡賔客之祼獻瑤爵皆贊謂王同姓及二王後來朝覲為賔客者后亞王而祼以禮賔獻謂王饗燕亞王獻賔也瑤爵亞王酬賔也坊記曰陽侯殺繆侯而竊其夫人故大饗廢夫人之禮致后之賔客之禮賔客謂諸侯來朝覲及畿内同姓諸侯之夫人㑹見王后者禮如致飲之類凡䘮事佐后使治外内命婦正其服位内命婦謂九嬪世婦女御外命婦卿大夫之妻或曰士妻亦為命婦喪言凡則王及后世子以下皆是注謂使其屬之上士非也葢詔后使春官世婦内宗外宗治之又謂王命其夫后命其婦亦非也記曰夫人之不命于天子自魯昭公始也凡爵命必統于天子凡建國佐后立市設其次置其敘正其肆陳其貨賄出其度量淳制祭之以隂禮王立朝后立市隂陽之義也次謂吏所治思次介次敘市行列也正其肆者物各異肆正之使不雜也淳謂幅廣制謂匹長天子巡守禮制幣丈八尺純四咫隂禮婦人之祭禮始立市體地道以后主之既立則無復與其事夫人過市有罰是也中春詔后帥外内命婦始蠶于北郊以為祭服嵗終則㑹内人之稍食稽其功事内人謂九御佐后而受獻功者比其小大與其麤良而賞罰之獻功者九御之屬典婦功曰及秋獻功王介甫曰小大比其制麤良比其功㑹内宫之財用據膳夫庖人内饔職所共獨王及后世子之飲食膳羞則夫人以下皆各使女奚治之故内宰㑹其財用均其稍食葢必如此然後事不冗而人皆得其節適先王之政所以即人之心而無微不達也内宫當作内官文誤也周語内官不過九御凡内對外而言也無外宫而曰内宫則義無所處矣正嵗均其稍食施其功事憲禁令于王之北宫而紏其守均猶調度也施猶頒也北宫后之六宫謂之北宫者繫于王明用王之禁令令之守宿衛者上春詔王后帥六宫之人而生穜稑之種而獻之于王上春亦謂正嵗以春事將興故曰上春夫人以下分居后之六宫每宫九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后惟其所燕息焉從后者五日而沐其次又上十五日而徧云先種後熟謂之穜後種先熟謂之稑王耕藉后生種而獻之以共郊廟不敢不親且使知稼穡之艱難也鄭剛中曰穜稑該九穀之先種後熟後種先熟者非穀名也内小臣掌王后之命正其服位命謂使令所為或言王后或言后通耳后出入則前驅若有祭祀賔客喪紀則擯詔后之禮事相九嬪之禮事正内人之禮事徹后之俎擯為后傳辭有所求為曰詔曰相曰正異尊卑也俎謂后受尸之爵飲于房中之俎后有好事于四方則使往有好令于卿大夫則亦如之后于其族親所善者使往問遺之好事以物問遺也好令以言問勞也掌王之隂事隂令隂事羣妃御見之事漢時掖庭令晝漏不盡八刻日録所記推當御見者隂令王所求為于北宫閽人掌守王宫之中門之禁王有五門外曰臯門二曰庫門三曰雉門四曰應門五曰路門路門一曰畢門中門于外内為中雉門也序官言每門此言中門者葢舉中以例之或曰每門者中門内之三門也其外二門則虎賁及司𨽻之屬守之鄭剛中曰外二門臣民皆得入雉門内則不得妄入故于此有禁喪服凶器不入宫潛服賊器不入宫奇服怪民不入宫凶器明器也潛服若𠂻甲者賊器器之可以戕人者怪民狂易凡内人公器賔客無帥則幾其出入以時啟閉三者出入當須使者符節乃行時謂漏盡凡外内命夫命婦出入則為之闢辟行人使無干也内命夫卿大夫士之在宫中者掌埽門庭大祭祀喪紀之事設門燎蹕宫門廟門燎地燭也以百葦布纒之蠟塗其上天子百公五十侯伯子男皆三十凡賔客亦如之賔客饗食在廟燕在寢寺人掌王之内人及女宫之戒令相道其出入之事而紏之内人女御也女宫女奚之屬若有喪紀賔客祭祀之事則帥女宫而致于有司佐世婦治禮事掌内人之禁令有司謂春官宫卿世婦佐世婦則二十七世婦也凡内人弔臨于外則帥而往立于其前而詔相之從世婦所弔或自哭其親族立其前者賤也賤而必詔相之者出入于王宫不可闕于禮内豎掌内外之通令凡小事内后六宫外卿大夫所通獨小事之令也知然者王之隂事隂令内小臣掌之不曰掌通内外小事之令而曰掌内外之通令凡小事者所掌不獨内外小事之令而兼給小事也使童豎者以其無與為禮出入便疾若有祭祀賔客喪紀之事則為内人蹕三事為内人蹕者皆謂在廟時祭祀在廟禘祫四時之祭也賔客在廟饗食時也喪紀在廟喪朝廟及祖奠遣奠時也王后之喪遷于宫中則前蹕及葬執䙝器以從遣車喪遷者將葬朝于廟䙝器振飾頮沐之器遣車載遣奠牲體置于椁四隅者九嬪掌婦學之灋以教九御婦德婦言婦容婦功各帥其屬而以時御叙于王所婦徳謂貞順婦容謂婉娩九嬪既習于徳言容功又備于從人之道是以教女御也羣妃御見之法卑者先尊者後女御八十一人當九夕世婦二十七人當三夕九嬪當一夕三夫人當一夕后當一夕十五日而徧自望後反之孔子曰日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀蜀岡陳氏曰女御職掌御敘于王之燕寢乃當夕也此經以時御敘于王所乃時節以禮見或有慶慰九嬪各帥其屬以進見耳曰王所者或于王之燕寢或于后宫無定所也凡祭祀贊玉齍贊后薦徹豆籩玉齍玉敦受黍稷器注謂后進之而不徹非也無徹豆籩而玉齍乃不徹者贊后之文設于贊玉齍之下者如曰贊后玉齍薦徹豆籩則似贊后進玉齍而自薦徹豆籩也若有賔客則從后大喪帥敘哭者亦如之諸侯來朝王親饗燕后從王帥猶道也后哭衆次敘者乃哭世婦掌祭祀賔客喪紀之事帥女宫而濯摡為齍盛摡拭也為猶差擇祭祀黍稷舂人舂之􅐪人炊之皆不使世婦故知為乃差擇也及祭之日涖陳女宫之具凡内羞之物涖臨也内羞房中之羞掌弔臨于卿大夫之喪王后所不親弔則使世婦往不言公孤不必言也后與賔客之事而弔事多不親者入諸臣之家也女巫職若王后弔則與祝前葢若后之父母王之周親則不容不親弔也知非掌王后弔臨之禮事者女御職從世婦而弔于卿大夫之喪女御掌御敘于王之燕寢于王之燕寢則王不息后宫使女御掌御敘卑者不敢專妬也以嵗時獻功事絲枲成功之事凡祭祀贊世婦助其帥涖女宫大喪掌沐浴男子不死于婦人之手王喪之沐浴則止共湯物也后之喪持翣翣棺飾也漢制翣方扇以木為匡廣二尺兩角髙二尺四寸柄長五尺以布覆之天子八翣后同從世婦而弔于卿大夫之喪女祝掌王后之内祭祀凡内禱祠之事内祭祀宫中竈門戸禱疾病求瘳祠報福掌以時招梗禬禳之事以除疾殃以時者謂隨其事時不必要在四時也招謂招取善祥梗捍禦惡之未至也禬猶刮也刮去見在之災禳攘也推却見在之變異鬼神之事婦人信之尤酷聖人因人情之所不能己制為正祀領于禮官則淫祀不禁而自止矣女史掌王后之禮職于后所行之禮命之曰職而女史掌之使朝夕恪勤凛然于職之不易盡則驕肆懈惰之習無自而生矣掌内治之貳以詔后治内政逆内宫書内令内治之法本在内宰書而貳之逆内宮者謂六宫所有功事及所用財物粟米皆鉤考之内令后令也内宫亦當作内官凡后之事以禮從亦如太史之從王典婦功掌婦式之灋以授嬪婦及内人女功之事齎婦式婦人事之模範嬪婦九嬪世婦凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之以共王及后之用頒之于官府作二事者女御授功乃獨言嬪婦者内宰以婦職教九御使各有屬以作二事九御分屬九嬪世婦故授功專責之嬪婦使各監省其屬也苦讀為盬觕也大小長短廣狹也賈估其直也知此職所授受獨内嬪婦之功者以獨共王與后之用又外嬪婦之功典絲典枲受之也非宫中所繅績王與后不用而所用兼苦良亦所以勸内職彰女教也疏謂以待王及后之用故藏于内府非也内府都受九貢九賦九功之貨賄非王及后之私藏也葢凡絲枲布帛皆藏于内府其成于内人者則以共王及后之用若夫邦國所貢九職所入成于外工者則以共邦之百用耳王之燕衣服玉府掌之葢既成而後以入于玉府典絲掌絲入而辨其物以其賈楬之絲入謂九職嬪婦所入及邦國之嬪貢掌其藏與其出以待興功之時時者若溫煖宜縑帛清凉宜文繡頒絲于外内工皆以物授之以物授之者若縑帛則授以素絲文繡則授以綵絲内工注謂女御非也典婦功授嬪婦及内人功則内人即女御可知矣此曰工所以别于内官葢女酒女漿之屬及其奚也列于天官職者奚女近千人其無事之時必頒功而授齎可知矣外工黄氏謂諸侯夫人大夫妻亦非也王禮事所用縑帛組文非内工及外命婦所能具必頒于閭閻之嬪婦故謂之外工凡上之賜予亦如之謂賜以絲物及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜予先鄭謂良當為苦非也典枲受苦功而藏之當為良耳不惟典絲所共喪祭之物宜用良功即典枲所待頒賜亦不宜用苦功也其苦功不言所頒受者内府掌受九貢九賦九功之貨賄而典婦功所楬良苦之功並頒于内府則内府受之不必言矣凡祭祀共黼畫組就之物黼畫衣服及依巾幂也組就以組為就冕旒也白與黑謂之黼采色一成曰就喪紀共其絲纊組文之物絲以給線縷纊以充衣縟組者士喪禮握手𤣥纁裏著組繋内則曰屨著綦綦屨繋是用組之事也青與赤謂之文凡飾邦器者受文織絲組焉謂茵席屏風之屬嵗終則各以其物㑹之典枲掌布絲縷紵之麻草之物以待時頒功而授齎緦十五升布抽其半者白而細疏曰紵縷線也草葛䔛之屬典絲職曰掌絲入者以别于内嬪婦之獻繭也此職不曰枲入者麻草皆九職所貢不必言也曰掌布緦縷紵之麻草之物者麻草之物不獨用于布緦縷紵而典枲所掌惟此也授齎注謂給麻草非也頒功則己給麻草矣葢給以泉布使自具練治麻草之器物兼償其勞也于頒絲曰内外工則枲可知也于頒枲曰授齎則絲可知也及獻功受苦功以其賈楬而藏之以待時頒注謂絲為良功枲為苦功非也果爾則既分二職苐曰受其功可矣頒衣服授之賜予亦如之帛言待有司之政令布言頒衣服互文嵗終則各以其物㑹之内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣縁衣素沙狄當為翟雉名伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰搖王后之服刻繒為之形而采畫之綴于衣以為文章褘衣畫翬者揄狄畫搖者闕狄刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄狄羣小祀則服闕狄鞠衣黄桑服也色如鞠塵象桑葉始生月令季春薦鞠衣于先帝吿桑事展當作襢以禮見王及賔客之服詩曰瑳兮瑳兮其之展也縁當作褖御于王之服亦以燕居褘衣𤣥揄狄青闕狄赤展衣白褖衣黑素沙白縛也六服皆袍制以白縛為之裏王之吉服九韋弁以下常服三與后鞠衣以下三服同但王之祭服六而后惟三翟以天地山川社稷之祀后夫人不與也玉藻王后褘衣夫人揄狄君命闕翟再命鞠衣一命襢衣士褖衣辨外内命婦之服鞠衣展衣縁衣素沙内命婦之服鞠衣九嬪也展衣世婦也褖衣女御也外命婦其夫孤則鞠衣卿大夫則展衣士則褖衣三夫人及公之妻其闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄惟二王後褘衣凡祭祀賔客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之凡命婦謂女御及外命婦也再命受服則下士之妻不共外命婦唯王祭祀賔客以禮佐后得服此上服于其家則降焉外命婦為王服齊衰于后無服九嬪以下及女御于王服斬衰于后服齊衰疏外命婦于后無服據儀禮喪服傳但義有未安春官司服凡喪為天王斬衰為王后齊衰昬義為后服齊衰服母之義也恐宜通内外命婦言之注于其家則降焉据特牲少牢禮大夫妻不服展衣后之喪共其衣服凡内具之物后喪所共衣服襲時十二稱小斂十九稱大斂百二十稱内具紛帨線纊鞶袠之屬縫人掌王宫之縫線之事以役女御以縫王及后之衣服女御裁縫王及后之衣服則為役助之餘則專焉王昭禹謂女御非王宫八十一之數非也王后之衣必内人典司非于八十一女御取之則並謂之女工可矣惟係内人而非女工之比故奄人為之役喪縫棺飾焉喪大記曰飾棺君龍帷三池振容黼荒火三列黻三列素錦楮加帷荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六此諸侯之禮也禮器曰天子八翣諸侯六翣大夫四翣衣翣栁之材栁即帷荒或曰栁車也翣與栁皆先纒衣其材乃以張飾或曰翣亦以栁木為之掌凡内之縫事不獨衣服染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功暴練練其素而暴之纁絳也土託位南方赤與黄共為纁𤣥纁天地之色以為祭服石染當及盛暑熱潤始湛研之三月而後可用染纁術見考工記鍾氏染𤣥無考夏翟羽備五色染以象之掌凡染事追師掌王后之首服為副編次追衡笄為九嬪及外内命婦之首服以待祭祀賔客副之言覆所以覆首為之飾服之以從王祭祀編編列髮為之服之以桑次次第髮長短為之所謂髲髢服以見王王后燕居亦纚笄總而己追猶治也詩云追琢其章衡維持冠者笄卷髮王后之衡笄皆以玉為之唯祭服有衡垂于副之兩旁當耳其下以紞懸瑱外内命婦衣鞠衣展衣者服編衣褖衣者服次非祭祀賔客佐后于其家亦降焉据此則詩曰副笄六珈記曰夫人副褘皆周禮之末失也豈二王之後用之而其後列國皆僭如醆斝之及尸君與曰外内命婦者既舉九嬪則内命婦世婦以下也不可以先公卿之妻内宰職正喪之服位則曰内外命婦者兼夫人及九嬪也凡並舉命夫命婦則曰外内者命夫之貴者多在外也此經不統之曰内外命婦者正服位辨舄屨及出入可統稱内命婦若追師之設本以共后夫人九嬪之首服而因及于外内命婦故别言之也注据少牢饋食禮大夫妻不服編次喪紀共笄絰亦如之屨人掌王及后之服屨為赤舄黑舄赤繶黄繶青句素屨葛屨曰服屨者明服各有屨也複下曰舄襌下曰屨句當為絇著舄屨之頭以為行戒繶縫中紃也凡屨舄皆有繶有絇有純三者同色云赤繶黄繶青絇者雜互言之素屨大祥時所服無絇繶純葛屨自赤舄以下夏則用葛為之冬則用皮列素屨下者見素屨亦用葛與皮也凡屨舄各象其裳之色士冠禮𤣥端黑屨青絇繶純素積白屨緇絇繶純爵弁纁屨黑絇繶純是也王吉服九舄有三等赤舄為上冕服之舄也下有白舄黑舄王后吉服六唯祭服有舄𤣥舄為上褘衣之舄也下有青舄赤舄鞠衣以下皆屨耳凡舄之飾如繢之次赤繶者王黑舄之飾黄繶者王后𤣥舄之飾青絇者王白舄之飾王及后之赤舄皆黑飾后之青舄白飾凡屨之飾如繡次黄屨白飾白屨黑飾黑屨青飾天子諸侯吉事皆舄其餘唯服冕衣翟著舄士爵弁纁屨黑絇繶純尊祭服之屨飾從繢也按詩周公赤舄几几韓侯𤣥衮赤舄豈皆王之加賜與辨外内命夫命婦之命屨功屨散屨自大夫以上有命舄獨言命屨者舉下以包上也命屨與服而俱命者功屨人功細緻若掌裘之功裘散屨則常所服用及喪屨也命夫命婦謂再命以上受服者注疏之説于經無考姑闕疑焉鄭志趙商問司服王后六服之制目不解請圖之答曰大裘衮衣鷩衣毳衣絺衣𤣥衣此六服皆纁裳赤舄韋弁衣以韎皮弁衣以布此二弁皆素裳白舄冠弁服黑衣裳而黑舄冠弁𤣥端褘衣𤣥舄首服副從王見先王揄狄青舄首服副從王見先公闕翟赤舄首服副從王見羣小祀鞠衣黄屨首服編以吿桑襢衣白屨首服編以禮見王褖衣黑屨首服次以御于王后服三翟則著三舄𤣥青赤服鞠衣以下則著三屨黄白黑婦人質不殊裳屨舄皆同裳色也追師職曰為九嬪及外内命婦之首服此職苐曰辨者命屨初命時官給之其後則與功屨散屨皆自為與衡笄用玉石可服上賜以終身者異故苐辨其法式也凡四時之祭祀以宜服之祭祀而有素屨散屨者惟大祥時王光逺曰夏葛冬皮此隨時之宜吉祭用赤舄命屨之等喪祭有素屨散屨此隨事之宜夏采掌大喪以冕服復于太祖以乗車建綏復于四郊太祖始祖廟也乗車玉路綏當作緌以旄牛尾為之注于干首于太廟以冕服不出宫也四郊以綏出國門所建也復者各依命數天子則十二人各服朝服祭僕復于小廟𨽻僕復于小寢大寢而太祖四郊之復則屬夏采者太祖四郊為祭之最尊王涖事贊王者冢宰故特設此職于天官以領復事而他無所掌也復者人之終也春秋傳晉侯有疾秦醫和謂趙孟曰國之大臣榮其寵禄任其大節有災禍興而無改焉必受其咎今君至于淫以生疾將不能圖䘏社稷禍孰大焉主不能禦吾是以云也王之宫寢内外起居飲食無一不關于冢宰必君之身終而後師保之責盡焉此天官之屬所以終于夏采也朱子曰冢宰一官兼領王之膳服嬪御此最設官之深意葢天下之事無重于此又曰冢宰一篇周公輔道成王垂法後世用意最深切處欲知三代人主正心誠意之學于此可見其實李耜卿曰冢宰貳王統百官均四海而諸官所掌不越居處服御財賦絲麻之事嗚呼此聖人之議道自己者也葢飲食男女人之大欲存焉自公卿以下至于庶人或有所制而不敢縱或有所求而未必逞若尊為天子富有四海何求而不應哉何憚而不為哉以是大欲而勢足以恢其邪心于以治天下國家焉吾不知其可也周公知百官之得其統四海之得其均其要在王身是故先以宫室安其身焉次以飲食理其體焉繼以賦式節其用焉終以内宫佐其徳焉析其事則至纖至悉若無關于政治之要而觀其用意本末兼修内外交􅅚以正君身其至醇至備者乎一之以大宰之權分之以小宰内宰之任一起居一飲食一貨用一擇採進御多寡豐約用舍去取大臣皆得與聞之而天子不得以自私女子小人不得以竊惑而司是職者必名徳之選是以上知之君就焉而益正中材之主守焉而寡過葢正心誠意之實功而治天下國家之本統也周官集注卷二
