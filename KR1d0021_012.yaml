body:
  text: 周官集注卷十二翰林院侍講銜方苞撰玉人之事王氏詳説曰玉人一職與典瑞同典瑞言其名以及其用玉人言其名及所制之尺寸然文多缺誤不若典瑞之文有倫理也鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之命圭者王所命之圭也朝覲執焉居則守之子守榖璧男守蒲璧不言者闕文也故書或云命圭五寸謂之躬圭杜子春云當為七寸康成謂五寸者璧文之闕亂存焉天子執冐四寸以朝諸侯趙氏曰冐所以冐諸侯圭以齊信瑞方四寸其形方正而邪刻其下諸侯來朝則輯而合之故諸侯瑞圭邪鋭其首以合天子之冐也天子用全上公用龍侯用瓚伯用將鄭剛中曰凡祼器前有龍口以流注中有瓚如盤以盛鬯後有柄以執持用圭為之謂之將天子則三者用一玉成之故謂之全上公之祼器惟龍得如天子用玉其瓚其將皆石之似玉者侯之祼器惟瓚得如天子用玉其龍其將皆石之似玉者伯之祼器惟將得如天子用玉其龍其瓚皆石之似玉者繼子男執皮帛鄭剛中曰有天子之孤有公之孤大宗伯曰孤執皮帛天子之孤也典命曰公之孤四命以皮帛視小國之君二者皆執皮帛但天子之孤飾以虎皮公之孤飾以豹皮耳天子之孤不當繼子男之後故注謂此公之孤然典命又有諸侯適子未誓則以皮帛繼子男之文此文獨立上無所承意其斷簡失次也天子圭中必必讀如鹿車縪之縪謂以組約其中央也聘禮記五等諸侯及聘使所執圭璋皆有繅藉及絢組絢組所以約圭中央以備失墜若然圭之中必尊卑皆有此獨言天子舉上以明下也蓋羣下皆執圭以將事而天子端拱于上舉諸侯以下則疑于天子之不必然天子且用縪則執以將事者不必言矣四圭尺有二寸以祀天趙氏曰典瑞疏謂用一大玉琢出中央為璧形亦肉倍好四面琢出四圭各尺二寸與鎮圭同其璧為邸徑六寸總三尺與大圭三尺等皆一玉俱成兩圭祀地者亦然㨿此則四圭是就璧平出非植起者邸則于璧中琢成寓穴大圭長三尺杼上終葵首天子服之王所搢大圭也或謂之珽服之者搢于衣帶間也杼殺也終葵椎也圭首六寸方正如椎六寸下則兩畔各減殺以下復方正以文義推之似大圭三尺自下而上漸殺而所殺至葵首而終葵首謂上端不殺之六寸也据注疏終葵為椎則文義俱不可通土圭尺有五寸以致日以土地祼圭尺有二寸有瓚以祀廟惟人道用祼故獨云祀廟琬圭九寸而繅以象徳琰圭九寸判規以除慝以易行趙氏曰琰之為言剡也規圜也半其圜而剡之故曰判規璧羡度尺好三寸以為度好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環餘見典瑞職圭璧五寸以祀日月星辰璧琮九寸諸侯以享天子聘禮享君以璧享夫人以琮此不言后者統于尊也此據上公九命若侯伯當七寸子男當五寸榖圭七寸天子以聘女大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡狩宗祝以前馬祼圭之盛鬯者謂之瓚璋之盛鬯者謂之勺其形略同射四寸剡之以貫勺也邊所雕飾惟邊旁也鼻以前注如瓚之龍口朱中謂鼻内通流處以朱漆飾之也衡橫也勺如盤橫于中央故謂之衡天子巡狩過大山川用事則以大璋灌焉中山川用中璋小山川用邊璋其牲用馬宗祝執勺以先之校人職曰將事于四海山川則飾黃駒大璋亦如之諸侯以聘女陳用之曰以文考之當繼天子以聘女之後亦如之者如榖圭之七寸也蓋聘女天子以圭諸侯以璋以是為降殺之等若以繼邊璋之後則邊璋有勺用酌以灌以加于聘女之束帛何義哉瑑圭璋八寸璧琮八寸以頫聘以瑑圭聘于王而享用璧以瑑璋聘后而享用琮制八寸者上公之臣所執也其自相聘亦然侯伯之臣宜用六寸子男之臣宜用四寸或曰既以瑑異其制不嫌于皆以八寸也天子之下聘諸侯之上交同用之牙璋中璋七寸射二寸厚寸以起軍旅以治兵守二璋皆有鉏牙之飾于剡側但牙璋文飾多故得牙名典瑞文無中璋以大小等故不見也軍多用牙璋軍少用中璋駔琮五寸宗后以為權駔讀為組以組繫之因名焉權稱錘也大琮十有二寸射四寸厚寸是謂内鎮宗后守之如王之鎮圭也琮本八寸兩旁各射二寸故十有二寸宗尊也天子繼世故尊無與並若后則有尊有卑惟祭祀賓客夫婦親之必時王之后若宫中内治王之母若祖母在焉則卑者不敢専也故内鎮必宗后守之而駔琮以為權亦稱宗后焉駔琮七寸鼻寸有半寸天子以為權以為權故有鼻也后權不言鼻者見于此則彼可知也琮或五寸或七寸皆可以為權者以斤兩分寸决于衡也兩圭五寸有邸以祀地以旅四望瑑琮八寸諸侯以享夫人獻于所朝聘君之夫人也不言瑑璧以享君文畧可知也諸侯享后以琮九寸則享夫人降用八寸而瑑焉宜也此亦據上公侯伯當六寸子男則用琥璜四寸若其臣聘瑑圭璋璧琮亦皆降一等而寸數則與君同漿人職主之夫人有致飲于賓客之禮則諸侯亦宜有享夫人之禮三夫人視三公其亦用瑑琮享與案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯案以玉飾案也十有二寸髙廣之數也棗㮚十有二列總該果實之數每列用一案非一案之上具十二列亦非十二案皆列棗㮚也純皆也夫人諸侯之夫人舉下以該上也曰后以勞諸侯則似夫人之禮異舉夫人則后可知矣知后無異禮者上物不過十二無以加也王合諸侯具十有二牢諸侯之長十有再獻蓋二王之後不敢以臣禮待也凡勞以賓客之爵命為等故諸侯之相勞其數同于王夫人之勞諸侯其數同于后三夫人之勞諸侯亦然璋邸射素功以祀山川以致稍餼素功無瑑飾也楖人闕雕人闕磬氏為磬倨句一矩有半必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之大小各以律制此假矩以定倨句非用其度也俞氏曰上曲者為句下直者為倨句即股也倨即鼓也股在上廣而短鼓在下狹而長以長掩短則鼓長于股者半矩是倨得一矩有半也以廣掩長則股廣于鼓者亦半矩是句得一矩有半也其博為一股為二鼓為三博謂股之廣也其長則倍于廣故曰股為二鼓之長又加一焉參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其耑太上聲清也摩其旁則漸薄而就濁太下聲濁也摩其耑則漸短而就清矢人為矢鍭矢參分茀矢參分一在前二在後參訂之而平者前有鐵重也據司弓矢職茀當為殺易彦祥曰三分其槀之三尺則一尺在前二尺在後後二尺之重與前一尺等則槀前之鐵極重故其𤼵遲而近射用焉兵矢田矢五分二在前三在後鐵差短小也兵矢謂枉矢絜矢也此二矢亦可以田田矢謂矰矢易彦祥曰槀前之鐵比殺矢短小故其𤼵遠而火射用焉閷矢七分三在前四在後鐵又差短小也司弓矢職殺當為茀不言矰矢者與茀矢同制也易彦祥曰槀前之鐵比兵矢又短小故其𤼵髙而弋射用焉不言恒矢􅋻矢者亦與茀矢同也鏃之輕至茀矢而極矣參分其長而閷其一五分其長而羽其一矢槀長三尺殺其前一尺令趣鏃也以其笴厚為之羽深笴讀為槀謂矢幹古文假借字厚之數未聞水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽辨正也隂沉陽浮就其浮沉而刻記之比謂括也蓋箭受弦處就隂陽之中間設比則兩畔各有隂陽而其分均否則隂陽各居一偏而矢行不直矣弓矢比在槀兩旁弩矢比在上下其設羽于四角同參分其羽以設其刃則雖有疾風亦弗之能憚矣羽六寸則刃二寸矢之輕重及羽刃皆相稱則其𤼵不可禦弗之能憚言不畏風之震撼也刃長寸圍寸鋌十之重三垸趙氏曰上文三分其羽以設其刃當二寸意者一寸刃也二寸則併鋌之出于槀外者言之前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮俛低也翔迴旋也紆曲也揚髙飄也趮旁掉也上言其灋此又言其不中灋之狀是故夾而搖之以眂其豐殺之節也橈之以眂其鴻殺之稱也趙氏曰以指夾而搖之則羽豐殺之節可見橈其幹而屈之則强弱之稱可知羽欲有節故于豐殺言節笴體欲相稱故于鴻殺言稱凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚相猶擇也摶如摶黍之摶謂圜也生而摶其圜出于自然也欲重者貴其材之實也節欲疏者密則輕重不等也㮚謂縝密而堅也陶人為甗實二鬴厚半寸脣寸甗無底甑也脣寸口邊加厚也盆實二鬴厚半寸脣寸毛氏曰盆以盛物亦以為量荀子曰畝數盆甑實二鬴厚半寸脣寸七穿穿其底使氣上蒸以熟物也然則甗亦必以他物為底如今竹箄之類與鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸鬲盛水于下甑加于上炊以熟物觳讀為斛受三斗或曰豆實三而成觳受斗二升十六斗曰庾旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺崇髙也豆實四升祭宗廟皆用木簋此瓦簋蓋祭天地尚質器用陶匏或外小祀亦用之也凡陶旊之事髺墾薜暴不入市為其不任用也髺讀為刮或讀為跀謂器不正欹邪也墾有傷也薜破裂也暴墳起不堅致也器中膊豆中縣膊崇四尺方四寸膊讀如車輇之輇既拊泥而轉其均尌膊其側以擬度端其器也縣縣繩以正豆之柄膊崇四尺以正其髙也方四寸謂垺拊四畔各一寸以正其厚也凡器髙于此則垺不能勝厚于此則火起不交因取式焉此言髙與厚之所極其卑者薄者分有減殺皆可就此以擬度也梓人為筍虡樂器所縣橫曰筍植曰虡天下之大獸五脂者膏者臝者羽者鱗者脂牛羊屬膏豕屬臝虎豹貔􅣝淺毛者之屬羽鳥屬鱗龍蛇之屬凝者為脂釋者為膏宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡外骨内骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢刻畫祭器博庶物也外骨龜屬内骨蟞屬郤行螾衍之屬仄行蠏屬連行魚屬紆行虵屬脰鳴鼃黽屬注鳴精列屬旁鳴蜩蜺屬翼鳴𤼵皇屬股鳴蚣蝑動股屬胸鳴榮原屬注當作咮蟲喙也厚脣弇口出目短耳大胸燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則于任重宜大聲而宏則于鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴燿讀為哨頎小也哨亦細小之義凡猛獸有力者皆前麄後細由自也鋭喙决吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清陽而遠聞無力而輕則于任輕宜其聲清陽而遠聞于磬宜若是者以為磬虡故擊其所縣而由其虡鳴吻口腃也鳥喙長食物時則以近喙本决之故云决吻數目目數開閉也顅長脰貌莊子曰其脰肩肩小體股脛細也騫騰而上也凡羽物胸腹多向上小首而長摶身而鴻若是者謂之鱗屬以為筍言身圜且鉅也凡攫閷援簭之類必深其爪出其目作其鱗之而攫閷者攫著則殺之援簭者援攬則噬之也之而頰􅝋也作猶起也深其爪出其目作其鱗之而則于眡必撥爾而怒苟撥爾而怒則于任重宜且其匪色必似鳴矣匪采貌與斐通爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣措頓也梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣勺所以酌酒也觚當為觶豆當為斗劉氏曰一獻而三酬者獻以一升酬以三升也并而計之則四升為豆豆雖非飲器其計數則然食一豆肉飲一豆酒中人之食也一豆酒亦當為斗凡試梓飲器鄉衡而實不盡梓師罪之衡平也謂平爵鄉口而酒不盡也梓人為侯廣與崇方參分其廣而鵠居一焉崇髙也方猶等也髙廣等者謂侯中也天子射禮以九為節侯道九十弓弓二寸以為侯中則丈八尺諸侯于其國亦然鵠以皮為之居侯中三分之一則侯中丈八尺者鵠方六尺餘倣此上兩个與其身三下兩个半之个讀若齊人搚幹之幹上个下个皆為舌也身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌然則九節之侯身三丈六尺上个七丈二尺下个五丈四尺其制身夾中个夾身中上下各一幅函之身與个齊焉个或謂之舌者取其出而左右也侯制上廣下狹蓋取象于人也張臂八尺張足六尺是取象率焉上綱與下綱出舌尋縜寸焉綱持侯繩所以繫于植也縜所以聨侯而繫于綱也張皮侯而棲鵠則春以功皮侯以皮飾者司裘職曰王大射則共虎侯熊侯豹侯設其鵠蓋各以其皮為鵠也詩曰射夫既同獻爾𤼵功曰春以功者春祭擇士用此則夏秋冬不必言矣張五采之侯則遠國屬五采之侯謂以五采畫正射人所謂五正之侯也遠國屬者若諸侯朝會王與之射則張此侯所謂賓射也正之方外如鵠内二尺五采者内朱白次之蒼次之黄次之黑次之此九十弓之侯若七十弓者則三正五十弓者則二正遠國對畿内諸侯為遠也張獸侯則王以息燕獸侯畫獸之侯也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質息者休農息老物也燕謂勞使臣若與羣臣飲酒而射祭侯之禮以酒脯醢謂司馬實爵而獻獲者于侯薦脯醢折俎獲者執以祭侯三等射皆同其辭曰惟若寧侯母或若女不寧侯不屬于王所故抗而射女强飲强食詒女曽孫諸侯百福寧安也若如也屬繫也抗舉而張之也詒遺也此假祭侯以警諸侯也祭侯祭先有功徳之侯若射侯則射不寧侯故兩言之廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋柲猶柄也酋矛差短夷矛極長故異名以别之五兵長短皆通柄與刃為尺數于㦸獨曰車者歩卒所用止戈殳為便自㦸以上長用于車上為多也凡兵無過三其身過三其身弗能用也而無已又以害人人長八尺故兵之長極于三尋無已不但已也害人害于用之者故攻國之兵欲短守國之兵欲長攻國之人衆行地遠食飲饑且涉山林之阻是故兵欲短守國之人寡食飲飽行地不遠且不渉山林之阻是故兵欲長按司馬法云弓矢圍殳矛守戈㦸助凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶句兵戈㦸屬刺兵矛屬或曰句兵謂矛刺兵謂戈㦸也彈謂掉也蜎謂橈也齊人謂斧柄為椑則椑為隋圜也彈丸圜而滑易詩曰蜎蜎者蠋蓋蠕動之貌皆以物喻也句兵握之固然後傅人無轉移故以彈為病椑則不慮其彈矣刺兵摶則體圜而力强不慮其蜎矣􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則密是故侵之同强上下同也舉手所操也校疾也傅近也密審也正也操細以擊則運之便而勢疾操重以刺則審而正侵之義如隂陽之道侵謂其分偏勝也舉圍欲重則必増其分使偏强凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍被把中也圍之圜之也殳柲八稜惟把中則圜晉謂柲下銅鐏所以插地及建車上者首殳上鐏也刺矛刃胸也為之被者以物裹之也凡兵把中必圜而以物裹之乃與手相得所握不過數寸而被圍五分之一者以漸而殺乃堅固而無折傷也殳之舉圍在下端而矛之舉圍在一分二分之間者殳􅌛兵也執其下端乃便于􅌛矛句兵也其長二丈舉圍必近中乃便于運矛不言被圍之長短必與殳同也柲身則短者必粗長者必細蓋柲圍與刃廣必相稱戈柲六尺有六寸刃廣二寸則短者必粗可知矣㦸常刃廣寸有半寸則長者必細可知矣殳長于戈則柲必細于戈矛長于㦸則柲必細于㦸然後人力可勝經不明著其圍徑者上士中士下士力各有所勝故柲之長短可制而粗細不可制也不言舉圍之徑亦以人所握為度也殳去三分之一以為晉圍者其柲圍較粗也矛去五分之一以為晉圍者其柲圍本細也更細則過弱而不可建矣凡試廬事置而搖之以眡其蜎也炙諸牆以眡其橈之均也橫而搖之以眡其勁也置猶樹也䜿于地上以手搖之以視其蜎蜎然均否炙猶柱也以柱兩牆之間輓而内之本末勝負可知也橫而搖之謂橫置于膝上以手握其兩端而搖之以視其堅勁與否句兵欲無蜎而此又視其蜎者彼言用以直刺此言樹而搖之也用以直刺則慮其太弱而橈橫搖之而蜎則知其材堅忍而上下强弱之分均矣六建既備車不反覆謂之國工六建五兵與人也車不反覆謂兵之建于車上者馳騁動搖而其柄無偏挺曲橈也匠人建國水地以縣欲造國城必先以器貯水平置地上然后于四角立四柱縣繩以正柱以水遙望其髙下定其則以平地地既平乃可施視景正方之事毛氏曰謂環地之四邊為溝而注水髙下以水為平依水縣繩以為凖水雖乾繩可正也置𣙗以縣眡以景置𣙗立表也于所平之地中央立八尺之表縣繩以正之視以景者視東西南北方位皆以此表之景也為規識日出之景與日入之景河間王氏曰為規畫圜于表周也自日出以至日入記景端于圜周弦其兩端則東西正分中作線以指表則南北亦正晝參諸日中之景夜攷之極星以正朝夕河間王氏曰日中之景最短者也按景作線即南北之正極北辰也北辰無星測近極之星以得北辰之位則南北亦可正司儀凡行人之儀不朝不夕朝夕即東西也不曰東西而曰朝夕者示不獨東西方位可正即日之出入晝夜之永短皆可正也易彦祥曰以日出入之景與日中之景三者相參故曰參復以日中之景與極星之度兩者相考故曰考匠人營國方九里旁三門每方九里而四旁各有三門也舊説此公之城制非也下經内有九室九嬪居之外有九室九卿朝焉又曰宫隅之制以為諸侯之城制環涂以為諸侯經涂則言王城之制明矣方九里者以徑言其週遭則三十六里王氏曰匠人既曰建國又曰營國葢作而立之謂之建言其始也周圍而治之以定其宫室涂巷之制而興造焉謂之營言其終也國中九經九緯經涂九軌經緯謂涂也軌謂轍廣乘車六尺六寸兩旁各加七寸凡八尺是謂轍廣九軌積七十二尺則此涂十二步也不言緯涂者與經同也下經經涂九軌環涂七軌野涂五軌而不及緯涂則與經同可知矣左祖右社面朝後市王宫所居也祖宗廟面猶向也王宫當中經之涂市朝一夫方各百歩或疑一夫地隘不足以容市朝之衆然市有三市者各有所主易期而入則無壅矣大朝雖曰諸侯萬民咸在然不過適來朝之諸侯萬民必耆徳為鄉邑之望者然後致而詢之非必徧致萬民也惟大合諸侯朝廟不足以容然後為壇三成則四時朝覲宗遇無不能容之患明矣夏后氏世室堂修二七廣四修一世室宗廟也修南北之深也夏度以歩如堂修十四歩其廣益以四分修之一則堂廣十七歩半五室三四歩四三尺堂上為五室象五行也三四歩室方也四三尺以益廣也木室于東北火室于東南金室于西南水室于西北其方皆三歩其廣益三尺土室于中央方四歩其廣益四尺此五室居堂南北六丈東西七丈倒其文曰四三尺者接上三四歩明四歩者廣益四尺三歩者廣益三尺也脩餘四歩為堂之前後檐階廣餘五歩六分歩之五為堂之東西屋翼堂之廣過于脩故室所餘廣亦過于脩九階四旁兩夾窻白盛九階南面三三面各二明堂位三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上故知南面三階也窻助户為明每室四户八窻白盛蜃灰也盛之言成也以蜃灰堊牆所以飾成宫室門堂三之二室三之一門堂門側之堂正堂如上制則門堂南北九歩二尺東西十一歩四尺室三之一者兩室與門各居一分爾雅門側之堂謂之塾門堂得正堂三之二而門之左右各隔其半以為室厰其半以為堂則室所占與門與堂校又居三之一也殷人重屋堂修七尋堂崇三尺四阿重屋重屋者王宫正堂若大寢也四阿四面皆注霤也重屋重檐也或曰四面皆重檐不言廣者凖夏制之廣四修一也周制南北七筵東西九筵則不止于四之一矣故特著之周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂者明政教之堂于三代或舉宗廟或舉王寢或舉明堂明一代三者皆同制也曰凡室二筵者夏制三四歩四三尺中央室較深廣周則五室皆同也不言東西廣者凖以堂之廣也舊説四室在四隅按月令四時中月皆居大廟而餘月居左右个則四室當在四面之中今堂深七筵而南北中央三室已占六筵所餘一筵為前後檐階尚苦其狹豈同之五室竟連接為之而中央室之四面即用四室之户牖與殷周制加備而堂室修廣轉約于夏未審何故室中度以几堂上度以筵宫中度以尋野度以歩涂度以軌此記據周而作故詳于周以下皆周制也室中坐時憑几堂上行禮用筵宫中合院之内無几無筵故用手之尋也在野論里數皆以歩故用歩涂有三道車従中央故用車之軌廟門容大扄七个闈門容小扄參个路門不容乘車之五个應門二徹參个大扄牛鼎之扄長三尺廟中之門曰闈門小扄膷鼎之扄長二尺乘車廣六尺六寸言不容者兩門乃容之五个三丈三尺此門半之丈六尺五寸也或曰曰不容五个則自四个以上之數惟所取之但其數大廣理不宜然豈五字乃三之誤與二徹之内八尺參个二丈四尺二門以乘車為度者王乘五路所出入也于廟門度以鼎扄于朝門度以乗車皆因物宜而為之數也内有九室九嬪居之外有九室九卿朝焉内路寢之裏也外路門之表也外九室為朝堂治事處則内九室亦九嬪治事處也六卿三孤為九卿九分其國以為九分九卿治之以九職任萬民各為一類故曰九分三孤佐三公論道六卿治六官之屬王宫門阿之制五雉宫隅之制七雉城隅之制九雉雉長三丈髙一丈阿謂門之屋脊隅者浮思謂小樓也浮思蓋刻畫雲氣并蟲獸者城隅及闕皆有之五雉七雉九雉皆言髙也兼廣則不可通經涂九軌環涂七軌野涂五軌環涂謂環城之道國外謂之野門阿之制以為都城之制宫隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂古周禮説天子城髙七雉隅髙九雉公之城髙五雉隅髙七雉侯伯之城髙三雉隅髙五雉都城之髙皆如子男之城髙據此經都城之制與侯伯等則子男之城不應降于都亦宜與侯伯等然則此經所言獨上公之城制也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之隧古者耜一金兩人併發之其壟中曰􅍒􅍒上曰伐伐之言發也􅍒畎也田中水所流也後世之耜岐頭兩金象古之耦也田首一夫百畝之畔九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮専達于川各載其名載其名者識水所従出先儒謂遂人匠人之法不同蓋以遂人百夫有洫而匠人成間謂之洫乃九百夫之地也遂人千夫有澮而匠人同間謂之澮乃九萬夫之地也不知百夫有洫而九百夫之地不過為洫者八其外始有澮環之千夫有澮而九千夫之地不過為澮者八其外始有川環之積至于九萬夫之地亦不過為澮者七十有二環澮之川九而已其環于百里之外者即環于三十里外之川也同間之澮積數雖多而其實即千夫之澮同間之澮所達之川即千夫之澮所達之川然則遂人匠人之法實一而已曰専達于川者溝洫必由澮以達澮則直達于川而無或旁行側注于溝洫也凡天下之地埶兩山之間必有川焉大川之上必有涂焉遂人萬夫有川人力所為之川也此經兩山之間必有川天作地成之川也天作地成之川或數百里而後有之以人為之川通焉然後尺寸之流皆距四海而無壅漲之患矣凡溝逆地阞謂之不行水屬不理孫謂之不行阞謂脈理屬讀為注孫順也既曰逆地阞又曰水屬不理孫者或强障遏使水注焉而非理之所順終必决溢也曰凡溝凡造溝瀆以引水者皆是也梢溝三十里而廣倍梢謂水潄齧之溝水行潄齧下流必廣凡行奠水磬折以參五奠定也磬折以參五謂溝形當如磬直行三折行五也凡行水欲其行又欲其定太疾則易衝决故必紆曲使少停以定其勢也欲為淵則句于矩大曲則流轉流轉則其下成淵凡溝必因水埶防必因地埶善溝者水潄之善防者水滛之潄猶齧也淫謂侵淫使泥沙淤積助防之厚也凡為防廣與崇方其閷參分去一大防外閷崇髙也方猶等也殺者薄其上外殺謂三分去一之外更去也或曰非更殺其上乃益厚其下也下愈厚則上愈殺矣凡溝防必一日先深之以為式欲造溝築防先按一日所作尺數後則以此程功賦其丈尺步數防言髙而亦曰深之者自上以視下也與聘禮壇十二尋深四尺義同里為式然後可以傅衆力傅附合也既以一日所作為式而又以一里為式者人力有强弱功作有久暫以一里為式則所用非一人所積非一日可以度衆力所能任附合以就功役也凡任索約大汲其版謂之無任任用也索繩也約縮也汲引也築防若牆者用繩縮其版引之大急則版撓而鼓土不堅矣詩曰縮版以載又曰約之閣閣葺屋參分瓦屋四分葺屋草屋也三分屋之南北深以其一為屋脊髙四分亦然草之去水遲瓦之去水疾故其峻之勢宜有差也囷窌倉城逆牆六分囷圜倉穿地曰窌逆郤也築此四者六分其厚郤一分以為殺窌入地中亦為此殺者雖入地口宜寛則牢固也堂涂十有二分堂涂堂前磚甃之道也爾雅曰堂涂謂之陳于兩旁之廣十分取二以為中央之峻則水旁瀉竇其崇三尺宫中水道牆厚三尺崇三之髙厚以是為率足以相勝車人之事半矩謂之宣一宣有半謂之欘一欘有半謂之柯一柯有半謂之磬折矩法也所法者人也人長八尺而大節三頭也腹也脛也以三通率之則矩二尺六寸三分寸之二頭髪皓落曰宣尺三寸三分寸之一人頭之長也欘斵斤柄長二尺伐木之柯柄長三尺人帶以下四尺五寸磬折立則上俛以下造耒云磬折故先列其名車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸庛謂耒下前曲接耜者句謂人手所執處庛上句下為中直以金刺土者曰耨耜前接于耨易曰斵木為耜豈上古以木為之後世乃接以金而謂之耨與自其庛緣其外以至于首以弦其内六尺有六寸與歩相中也縁外六尺有六寸而内弦則六尺應一歩之尺數弦其内謂據庛面至句下直量之耕者以田器為度耜異材故不在數中堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地推者推而前也發者舉而起也中地之耒其庛與直者如磬折則調矣調則弦六尺車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首首謂金刃柯其柄也凡造作用斧因以量物故先論斧柄長短及其刃之大小轂長半柯其圍一柯有半輻長一柯有半其博三寸厚三之一渠三柯者三大車轂徑尺五寸渠車罔也其徑九尺渠二丈七尺輻長一柯有半亦大概言之轂徑九尺尚有轂空壺中輻不應有四尺五寸也行澤者欲短轂行山者欲長轂短轂則利長轂則安澤泥苦其遲重山險慮其傾搖行澤者反輮行山者仄輮反輮則易仄輮則完反輮使木心在外也行澤者杼轥地處薄必用木心乃堅久行山者侔可順面執之所向而為之矣曰仄者輪材必用曲木因其斜仄之勢而輮之也六分其輪崇以其一為之牙圍輪崇輪徑也此大車之輪宜在渠三柯者三之下柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍柏車山車也兩輻相對六尺渠圍丈八尺亦通轂空壺中并數而言不言柏車輪崇之度者大車輻長一柯有半而柏車長一柯大車之渠三柯者三而柏車二柯者三則輪崇六尺不待言矣大車崇三柯綆寸牝服二柯有參分柯之二大車平地任載之車轂長半柯者也牝服見山虞職乘車崇六尺有六寸綆三分寸之二大車輪加崇故綆加廣也羊車柏車不言綆度者凡車之綆皆三分寸之二獨大車較廣耳乘車之軫六尺有六寸又三分去一以為隧者御與左右並乘必衡廣乃能容而従不必長也大車徹廣六尺而牝服則八尺者衡狹而従長然後載物多而車行安也羊車二柯有參分柯之一柏車二柯羊善也羊車漢時謂之定張車宫中所用較長七尺羊車不言輪者與柏車無異也凡為轅三其輪崇參分其長二在前一在後以鑿其鉤鉤轅之鉤心也就其中而鑿之以鉤車箱也徹廣六尺鬲長六尺鬲謂轅端厭牛領者牛車兩轅一牛在轅内故鬲狹也不言四馬車之徹軛者輪崇車廣衡長參如一已見于輿人職也人為弓取六材必以其時六材既聚巧者和之取幹以冬取角以秋絲漆以夏筋膠未聞幹也者以為遠也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也王光遠曰弓所以及遠者其力在幹所以疾發者其勢在角角幹資筋以為堅忍以射則中深三者得膠然後相合結而固之在絲飾而堅之在漆凡取幹之道七柘為上檍次之檿桑次之橘次之木𤓰次之荆次之竹為下爾雅曰杻檍又曰檿桑山桑國語曰檿弧箕箙李耜卿曰檍梓屬葉似杏而尖木𤓰狀如柰凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則遠根陽聲清聲也凡析幹射遠者用埶射深者用直埶謂用木之曲埶反之以為弓也曲埶則宜薄薄則力少直則可厚厚則力多居幹之道菑栗不迤則弓不發菑栗謂以鋸副析幹也迆謂邪行絶理者發起也有發起處則損動居居積也菑當作椔木之立死者栗堅栗也冬析幹而秋合之待其槁也木有生而心不直文理皆邪者初析不覺久槁則必偏挺居幹之道必待槁燥如立枯之木堅栗而不邪迆然後合之永不發動正與下苟有賤工必因幹之濕以為柔善于外而動于内反對如舊説乃析幹必倫之義非居幹之道也凡相角秋閷者厚春閷者薄穉牛之角直而澤老牛之角紾而昔澤潤氣也紾絞纒之紋也昔讀為錯謂其紋絞纒而交錯也疢疾險中瘠牛之角無澤險傷也中角裏角欲青白而豐末夫角之本蹙于􅑠而休于氣是故柔柔故欲其埶也白也者埶之徴也蹙近也休讀為煦欲其埶者欲其形之自曲可反以為弓也春秋傳而或噢休之蓋煦養之義不必易讀夫角之中恒當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也畏讀為隈弓淵也夫角之末遠于􅑠而不休于氣是故脃脃故欲其柔也豐末也者柔之徴也末之大者必腦氣及煦之角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛謂角直一牛凡相膠欲朱色而昔昔也者深瑕而澤紾而摶亷郝仲輿曰色欲其朱文欲其錯其紋瑕深透光澤其質紾密團結亷隅堅利此膠之善也鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃凡昵之類不能方皆煑其皮為之或用角餌粉餅也説文言其堅潔若玉珥魚膠近之昵粘也方比也凡昵之類雖或可用以粘而不能比方六者凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異于其獸竹簡一條為一札謂筋條之直相似也結謂細聚而不散筋之小者貴乎條直而長筋之大者貴乎稹密而潤剽疾也筋欲敝之敝嚼之當熟漆欲測測測度也漆有真偽測之者挹而下注其細如絲而不斷乃無滓穢之雜絲欲沈如在水中時色得此六材之全然後可以為良凡為弓冬析幹而春液角夏治筋秋合三材寒奠體冰析灂液漬也三材謂膠絲漆奠定也至冬膠堅内之檠中定往來體冰凝之時下弓于檠辨析其漆之堅完與否而復内之冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流冰析灂則審環春被弦則一年之事易理滑致也以春和之時液角則其氣浹洽夏則筋緩散故治之不煩流猶移也體既定則張之不至流移審環義未詳舊説審定也其漆之灂環則定後不鼓動或曰囘環而審定之也析幹必倫析角無邪斵目必荼倫謂木之理也荼讀為舒徐也目幹之節目荼之義猶莊子所謂斵輪徐也蓋木之節目强斵之使其分少寛乃不與筋相摩斵木不荼則及其大修也筋代之受病夫目也者必强强者在内而摩其筋夫筋之所由幨恒由此作修猶久也幨絶起也故角三液而幹再液凡木材先以水漬而後乾之則調適而不偏挺先儒多謂以火出其液非也蓋液之再三所以伸其材達其性也將合之而微有偏挺然後以火撟之下經撟角撟幹之法是也厚其帤則木堅薄其帤則需帤謂弓中裨幹雖用整木仍以木片細副之故厚薄有節是故厚其液而節其帤約之不皆約疏數必侔厚猶多也節適中也約謂以絲橫纒之不皆約謂有間也疏數必侔其相間之分必均也斵摰必中膠之必均摰之言致也中謂上下如一均謂厚薄無偏斵摰不中膠之不均則及其大脩也角代之受病夫懷膠于内而摩其角夫角之所由挫恒由此作挫蹵折也前以不中不均並列而後獨言懷膠者明斵幹雖中而施膠不均亦能摩角而使之挫也凡居角長者以次需注疏弓隈謂之需長者當弓之隈短者居簫非也角介于柎而上不達于簫兩畔各一角無所謂長者短者所謂居角亦以居積言蓋弓有上中下三制故居角取其長者以次排列而待用也恒角而短是謂逆橈引之則縱釋之則不校恒讀為㮓竟也竟其角而短于淵幹引之角縱不用力若欲反橈然釋放弦也校疾也橈曲也柎角長短强弱得宜然後引之以漸而曲其體如環順也角短則柎必長柎太長則中央强直而畏之曲也如折是謂逆橈惟畏過曲而如折是以引之則縱釋之則不校也恒角而達譬如終紲非弓之利也注疏謂達于簫頭非也簫與幹異材而逆倳角雖長無上達于簫之理蓋謂直通挺臂也弓之制柎强畏弱兩端微强然後張如流水若角長直通挺臂則中弱挽之則中央先曲而畏與未反直挺而不應弦如紲于䪐近世有通角弓試之良然今夫茭解中有變焉故校于挺臂中有柎焉故剽恒角而達引如終紲非弓之利茭解謂隈與簫相接之處變謂簫臂用力異也引之則臂中用力放矢則簫用力用力異故校挺直也直臂謂人所把握處柎側骨也把處兩畔有側骨助為力故剽疾校言其勢之疾剽言其力之勁舉是二者正釋恒角而達引如終紲之義也蓋角之用兩端不達于簫中央不達于柎乃調順而能助幹以為疾若角達于簫而茭解中無變則送矢不疾角通于敝而挺臂中無柎則負幹無力轉為不利于弓矣再言角長之不利者角短不足用凡工能辨之其或貪角材之長而用之不得其節尤可惜也舊説中有變謂簫與臂用力異果爾則辭不足以指事矣蓋抗弦送矢全力在簫所謂末應也彈弓無簫故引之常縱弓幹盡處忽以簫逆插幹間勾而向前其形制有變故抗弦有力而送矢疾也茭從交弓幹之端析為兩岐而以簫剚入故曰茭簫别一木雖以筋膠合于弓幹而體本兩判故曰解撟幹欲孰于火而無贏撟角欲孰于火而無燂引筋欲盡而無傷其力䰞膠欲角而水火相得然則居旱亦不動居濕亦不動贏過孰也燂炙爛也苟有賤工必因角幹之濕以為之柔善者在外動者在内雖善于外必動于内雖善亦弗可以為良矣濕生用之也凡為弓方其峻而髙其柎長其畏而薄其敝宛之無已應峻謂簫也敝即把握處宛引之也無已應謂引之不休止常應弦不罷需也峻疑當簫隈之中而拄弦者以其隆起故謂之峻簫狹而長不得云方也髙其柎謂于挺臂中置骨穹而隆起也宛疑當作挽以音同而誤也無已應謂引之過度而其體能應不至于折傷也趙氏曰柎與敝人往往不能分别嘗見造弓把處稍細把處上下皆堆起稍髙攙接著角面蓋敝即把處稍細者柎乃把處兩頭兩側畔稍髙接角隈者敝以正面言故云薄柎則置于兩側側目視之故不言厚而言髙下柎之弓末應將興末即簫也興謂把握中搖撼也柎下力弱則簫應弦而動把握中必搖撼為柎而發必動于閷弓而羽閷末應將發閷即接中羽讀為扈緩也接中動則緩簫末應之角幹必至發傷發即興也興者動于内發則暴裂于外也閷當為角之接柎者舊説以為茭解茭解發動則末已發動不應又云末應將發矣蓋柎既搖撼則角之接柎者必發動角之接柎者既發動則弦偏斜而簫必應之而反脱也羽閷者角之兩旁甚薄其暴起有似于羽弓有六材焉維幹强之張如流水幹强而又能張如流水者質堅而柔忍也維體防之引之中參體謂内之檠中定其體防謂淺深所止若王弧之弓往體寡來體多弛之五寸張之則一尺五寸夾庾之弓往體多來體寡弛之一尺五寸張之則五寸唐弓大弓往來體若一弛之一尺張之亦一尺體雖不同及其引之皆三尺以矢長三尺須滿故也維角䟫之欲宛而無負弦引之如環釋之無失體如環角用反勢以掌拄于柎與峻之間故曰䟫之負弦謂不應弦也釋之無失句失謂反脱也弓不調則釋矢時多反脱體如環謂既弛之後材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和有讀為又量其力又三均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺弛其弦以繩緩擐之每加物一石則張一尺九和之弓角與幹權筋三侔膠三鋝絲三邸漆三斞上工以有餘下工以不足權平也侔猶等也角幹既平筋三而又與角幹等也邸斞輕重未聞為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規材良則句少也此㨿弓體之不張者言弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之凡為弓各因其君之躬志慮血氣躬有長短血氣有强弱志慮有緩急豐肉而短骨直以立躬與血氣之異也寛緩以荼忿埶以奔志慮之異也豐肉而短寛緩以荼若是者為之危弓危弓為之安矢骨直以立忿埶以奔若是者為之安弓安弓為之危矢骨直謂强毅忿埶以奔謂埶若有忿而奔赴狀其急也隈狹而簫甚曲者謂之危弓以其易反脱也隈廣而簫微曲則安笴弱而羽殺者謂之危矢以其飄搖難定也笴强而羽豐則安其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以愿中愿慤也三舒則矢行常不及故不能疾中中又不能深三疾則矢行常過故不能確然必中往體多來體寡謂之夾庾之屬利射侯與弋弛之則弓體往張之則弓體來來庾弓之弱者也豻侯與弋皆近射也司弓矢職夾弓庾弓以授射豻侯鳥獸者弋繳射也往體寡來體多謂之王弓之屬利射革與質射深者用直王弓合九而成規則直之極于射堅宜也司弓矢職王弓弧弓以授射甲革椹質者此不言弧弓與王弓同也被弦之度有定而以多寡言者以往體之多而見為寡也以往體之寡而見為多也往體來體若一謂之唐弓之屬利射深射深用直唐弓合七而成規大弓亦然大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂大和尤良者也筋在背角在隈深謂灂在中央而兩邊無有也疏謂兩邊皆有灂而所用薄也角無灂則簫及背皆有之合灂若背手文弓表裏灂合處若人合手背文相應或曰用灂合法則文理如人手背言其細而均也角環灂牛筋蕡灂麋筋㡿蠖灂角滑易故漆文如環筋用牛則漆文如麻子用麋則如斥蠖和弓􅌛摩和猶調也􅌛拂也弓久不用恐其性辟戾故將用必先調之拂摩所以調也大射禮小射正授弓大射正以袂順左右隈上再下一覆之而角至謂之句弓覆之而幹至謂之侯弓覆之而筋至謂之深弓覆猶察也至猶善也弓有六材獨言角幹筋者弓以角幹筋為主膠漆絲則為之輔而已故秋合三材則謂之獻成而良苦可試也三者皆善為上二善為次一善為下不言王弧王弧必六材皆善故也周官集注卷十二
