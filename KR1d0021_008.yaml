body:
  text: 周官集注卷八翰林院侍講銜方苞撰大僕掌正王之服位出入王之大命掌諸侯之復逆周官出入王命及掌諸侯公卿吏民之復逆逹窮者與遽令皆以羣僕而又各分其職防壅蔽也凡治皆决于冡宰而耳目喉舌則寄之夏官之屬且分職以徑逹于王而其長亦不與焉况可得而抑遏乎後世權臣有遏章奏不得上逹者則知聖人之慮逺矣王眡朝則前正位而退入亦如之入亦如之謂王退入路寢聽政時亦前正王位而後却立其次也建路鼓于大寢之門外而掌其政大寢路寢也政即下經所列以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子窮謂寃窮失職遽𫝊也遽令若後世驛馬軍書當急聞者御僕下士十二人而别言御庶子者其直日御于王所者則曰御僕分守路鼓者則曰御庶子蓋大僕與御僕常在大寢之門内而御庶子在門外故大僕聞鼔聲則速御僕使迎受御庶子之所逹速御庶子使迎問鼓者所欲逹也肺石所逹窮民不能自直于鄉里之吏而朝士以逹于司冦也路鼓所達窮者則不能自直于司冦而大僕以達于王也王制司㓂以獄之成質于王王命三公參聼之先王任人不疑惟于刑獄則惟恐其有蔽壅而多方以求逹民隠如此曰窮民乃小民之孤窮者曰窮者則庶官羣吏皆在其中王介甫曰先窮者欲速達甚于遽令祭祀賔客喪紀正王之服位詔灋儀贊王牲事王出入則自左馭而前驅曰前驅則非出入于宫庭也古者無騎自士以上皆乗車而士尚可徒行虎賁旅賁前後左右于王以趨是也大僕不可徒行故乗車以道引以乗王之倅車故不敢曠左以職主于御故居左而自馭也大僕不馭王車者以大馭齊僕道僕戎僕分掌之也注謂不參乗為辟王非也記曰乗君之乗車不敢曠左左必式則自大僕而外乗王之倅車固有不自馭者矣凡軍旅田役贊王鼓救日月亦如之軍旅田役王執路鼓將居鼓下王自擊一面大僕戎右各佐擊一面故二官皆言贊王鼓日食隂侵陽當與鼓神祀同用雷鼓月食當用靈鼓大喪始崩戒鼓𫝊逹于四方窆亦如之戒鼓擊鼓以警衆也縣喪首服之灋于宫門小宗伯所縣男子之衰冠也故縣于大寢之門外以示臣民大僕所縣婦人之首服也故縣于宫門男子之衰冠縣其式可也婦人之首服之式縣之則褻矣故不曰式而曰灋蓋第書其所用之物材與長短廣狹之數而不縣其式也古者祭設同几而無女尸義亦如此掌三公孤卿之弔勞王有故不親則使大僕往王燕飲則相其灋凡與諸侯羣臣燕皆是法謂獻酬升降之灋王射則贊弓矢贊謂授之受之小臣職曰賔射掌事如大僕之灋則此謂大射也王眡燕朝則正位掌擯相王不眡朝則辭于三公及孤卿小臣掌王之小命詔相王之小灋儀掌三公及孤卿之復逆正王之燕服位王之燕出入則前驅玉藻曰王卒食𤣥端而居燕出入若遊于苑囿大祭祀朝覲沃王盥小祭祀賔客饗食賔射掌事如大僕之灋饗食小賔客之饗食也賔射與諸侯来朝者射掌士大夫之弔勞凡大事佐大僕祭僕掌受命于王以眡祭祀而警戒祭祀有司糾百官之戒具謂王有故不親祭也既祭帥羣有司而反命以王命勞之誅其不敬者大喪復于小廟小廟二祧及五廟凡祭祀王之所不與則賜之禽都家亦如之王明齋曰祭祀王所不與謂同姓有服之親其在都家則古帝王及名山大川之在其地者凡祭祀致福者展而受之御僕掌羣吏之逆及庶民之復與其弔勞諸侯之復逆大僕掌之三公孤卿之復逆小臣掌之則御僕所掌大夫庶士之復逆也經所稱羣吏惟小司㓂外朝之位對羣臣而言謂府史外此皆大夫士也蓋非常之變專訊萬民故府史亦與焉若平時則府史以下縱有建白亦各達于其長耳周語自公卿至庶人百工皆得達言于王而不及府史胥徒以各有長故也弔勞承庶民而言其或府史胥徒有死國政者則于庶民之弔勞包之矣大祭祀相盥而登大喪持翣相盥謂奉槃授巾登為王登牲體于俎特牲饋食禮主人降盥出舉入乃七載掌王之燕令以序守路鼓燕令燕居時之令序以次而更代也𨽻僕掌五寢之埽除糞洒之事五寢五廟之寢也天子七廟惟二祧無寢前曰廟後曰寢祭在廟薦在寢氾埽曰埽埽席前曰拚洒灑也黄氏謂五當為王王東巖謂守祧掌寢廟脩除此當為王之小寢皆非也宫人掌王六寢之脩守祧職曰其廟則有司脩除之正謂𨽻僕耳祭祀脩寢王行洗乗石掌蹕宫中之事大喪復于小寢大寢祭祀王將齊故脩寢乗石王登車所履弁師掌王之五冕皆𤣥冕朱裏延紐司服載王之六服而冕則五者大裘與衮同冕也下經所載繅玉皆同而别為五者旒數異也先儒多據禮記謂郊亦服衮非也祀天尚質不宜服衮衮裘字形相類被衮以象天蓋裘字之誤大裘黑象天之色也冕制前低義取于俛故爵弁前後平則别名弁也延者冕之上覆以版為之紐小鼻綴于冕之兩傍垂之武傍孔相當以笄貫之五采繅十有二就皆五采玉十有二玉笄朱紘繅雜文之名也合五采絲為繩垂于延前十有二列就成也就皆五采玉十有二乃各據一繅而言每一玉以繩一匝而結之使不相并十有二玉則結之十有二匝也朱紘以朱紐為紘也繫于左笄遶頤而上屬于右笄餘垂之以為飾繅不言皆者惟衮衣之冕繅十有二列鷩衣之冕則九列毳衣之冕則七列希衣之冕則五列𤣥衣之冕則三列也其玉天子每列皆十有二餘各如其命數諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄侯當為公瑉故書作璑惡玉也三采朱白蒼也其餘謂延紐皆𤣥覆朱裏與王同也玉瑱所以塞耳于王曰五采繅十有二就皆五采玉十有二于諸侯言瑉玉三采而不言其數則所謂繅斿九就者繅以行列言斿以所綴玉數言也既曰繅斿九就又曰繅斿皆就者上所陳獨諸公繅斿之數故復出此文明侯伯子男以下繅之列斿之綴皆各以命數為就也不言侯伯七子男五者典命上公以九為節其下降殺以兩而此經復總言諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之則其數不必言矣孤卿大夫之繅斿不復陳者舉可知也玉之采自三以下無文者以繅斿為等而瑉玉三采無降也于諸侯言玉瑱則王可知矣王之皮弁㑹五采玉璂象邸玉笄㑹縫中也璂即綦結也皮弁之縫中每貫結五采玉十二以為飾謂之綦詩曰㑹弁如星又曰其弁伊綦是也邸下柢也謂弁内上頂輳處以象骨為之王之吉服其弁三眡朝以皮弁兵事以韋弁田獵以冠弁此特言皮弁之制者王日眡朝其用尤數也司服有韋弁冠弁服弁而此職不言者此職所言弁之飾也韋弁冠弁之飾與皮弁同服弁則無飾不必言也王之弁絰弁而加環絰弁如爵弁而素所謂素冠也環絰者大如緦之麻絰纒而不糾諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令各以其等繅斿玉璂如其命數也弁絰之弁其辟積如繅斿之就一命之大夫冕而無旒士爵弁制如冕不前低故以弁稱其韋弁皮弁之㑹無結飾弁絰之弁不辟積庶人弔者素委貌禁令不得僭踰也司甲闕司兵掌五兵五盾各辨其物與其等以待軍事五盾干櫓之屬其名未盡聞等謂材與功之髙下及授兵從司馬之灋以頒之及其受兵輸亦如之及其用兵亦如之周制甸出革車一乗兵器皆具此所頒乃卿大夫士從軍旅㑹同者兵輸謂師還各輸所授兵也用兵注謂出給守衛非也其諸弓矢斧鉞之賜與祭祀授舞者兵司干所授者羽籥之屬也此則朱干玉戚之屬大喪廞五兵軍事建車之五兵㑹同亦如之廞明器之五兵也士喪禮有甲胄干笮凡建兵于車上有鐡器屈之在車較及輿以兵柄插之故有出先刃入後刃之制司戈盾掌戈盾之物而頒之祭祀授旅賁殳故士戈盾授舞者兵亦如之故士王族故士也戈殳司兵之所掌也而復列是職者盾所以衛豈擊刺之戈殳司兵授之擁衛之戈殳則與盾而並授與司兵授舞者兵則此職亦授之戈盾故曰亦如之軍旅㑹同授貳車戈盾建乗車之戈盾授旅賁及虎士戈盾乗車王所乗車也軍旅則革路㑹同則金路兵車及旅賁虎士之戈皆以為衛也故司戈盾掌之古書每以干戈並稱春秋傳狄卒皆抽戈盾冒之以入于衛師豈戈之用亦可以捍冒與及舍設藩盾行則斂之藩盾用以藩衛者司弓矢掌六弓四弩八矢之灋辨其名物而掌其守藏與其出入灋曲直長短强弱之數中春獻弓弩中秋獻矢箙箙盛矢器也以獸皮為之槀人弓弩矢箙皆春獻素秋獻成此中春始獻弓弩何也槀人所掌幹材也秋合三材則形制成矣故書其等而入功于司弓矢矢箙既成則工事無所加故遂獻之弓之形制雖成而寒奠體冰析灂春被弦功乃訖故至仲春始獻之也槀人職所謂獻者工獻于槀人也此所謂獻者獻于王也弓弩之工未訖槀人已試之而行誅賞何也形制既成則可被弦而試之矣紲檠施漆既試而後終事焉耳及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者使者勞者六弓異體見考工記弓人甲革革甲也春秋傳蹲甲而射之或曰革謂干盾質正也樹椹以為射正甲革椹質堅而難入故利用王弧豻侯侯道五十歩及射鳥獸皆近射也故利用夾庾授使者弓使自衛也授勞者以有勞而賜也學射者弓用中然後可强可弱自衛與賜人無取乎偏于强弱故皆以唐大也其矢箙皆從其弓從弓數也每弓一箙百矢凡弩夾庾利攻守唐大利車戰野戰攻守相廹近故用弱弩利其發之疾也車戰野戰倏進倏退非强則不及弩無王弧以弩恒服弦强弓乆不弛則送矢不疾凡矢枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢痺矢用諸散射枉矢殺矢矰矢恒矢弓所用也絜矢鍭矢茀矢痺矢弩所用也枉矢取名天星絜矢象焉二矢前重後㣲輕行疾殺矢言中則死鍭矢象焉二矢前尤重中深而不可逺也結繳于矢謂之矰茀矢象焉二矢前重體㣲輕行不能低恒矢安居之矢也痺矢象焉二矢前後亭均其行平八矢之制見考工記矢人王氏詳説曰上經四弩用于攻守與戰此枉矢絜矢用諸守城車戰則二矢用之四弩明矣其餘六矢當六弓之用上經曰王弧以射甲革椹質甲革椹質軍射也此曰殺矢鍭矢用于田獵軍射田射一事也故考工記兵矢田矢亦同其制則此二矢以當王弧明矣上經曰夾庾以射豻侯鳥獸此曰矰矢茀矢用諸弋射則以當夾庾明矣上經曰唐大授學射者使者勞者即散射也此曰恒矢痺矢用諸散射則以當唐大明矣天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓皆謂不被弦反張合而成圜也凡祭祀共射牲之弓矢澤共射椹質之弓矢澤澤宫也大射以貍歩張三侯不以及逺為賢也此用椹質豈合士于澤宫以考藝則并挍其力之强弱與大射燕射共弓矢如數并夾獨言大射燕射者射者多無定數必如數而共弓矢若賔射惟諸侯與耦數有定所共弓矢亦有定故不言也大喪共明弓矢明器之弓矢也凡師役㑹同頒弓弩各以其物從授兵甲之儀弓矢有利攻守者有利車戰野戰者有利射豻侯鳥獸者有利射甲革椹質者師則或攻或守或車戰或野戰役則田獵㑹同則射豻侯椹質故各以其物頒之司兵授兵從司馬之灋故頒弓矢從授兵之儀也田弋充籠箙矢共矰矢籠竹箙也矰矢不在箙者為其相繞亂將用乃共之凡亡矢者不用則更更償也用而棄之則不償若不用而亡之則償也繕人掌王之用弓弩矢箙矰弋抉拾抉引弦彄也著右手巨指天子以象骨為之拾鞲杆也著左臂裏以韋為之掌詔王射贊王弓矢之事凡乗車充其籠箙載其弓弩告王以當射之節也大僕贊弓矢此又贊者繕人掌弓矢預擇善者付大僕授王及大僕受弓于王繕人又受而藏之也乗車王所乗之車既射則斂之無㑹計槀人掌受財于職金以齎其工齎其工者給市材用之直弓六物為三等弩四物亦如之矢八物皆三等箙亦如之三等者上士中士下士各有所宜弓制見弓人弩及矢箙長短之制未聞春獻素秋獻成書其等以饗工乗其事試其弓弩以下上其食而誅賞乃入功于司弓矢及繕人饗謂以酒肴勞之也乗計也計其事之成功也凡齎財與其出入皆在槀人以待㑹而攷之亡者闕之皆在槀人者所齎工之財及弓弩矢箙出入其簿書皆槀人掌之也闕除其籍也戎右掌戎車之兵革使詔贊王鼓傳王命于陳中革干盾之屬使謂使用兵以刺擊用革以蔽遮也㑹同充革車㑹同王雖乗金路猶以革車從充之者居左也或曰即充革路之右盟則以玉敦辟盟遂役之贊牛耳桃茢辟開也以玉敦奉血告神乃開盟載之書役之者𫝊敦血授當插者助尸盟者割牛耳取血及血在敦中以桃茢拂之又助之齊右掌祭祀㑹同賔客前齊車王乗則持馬行則陪乗王未乗則前馬方乗則持馬既乗而行則陪乗也齊右掌祭祀㑹同賔客則兼玉路金路之右也然則田右不見于經以戎右兼攝可知矣凡有牲事則前馬王見牲則拱而式居馬前却行備驚奔也不曰王式而曰凡牲事者齊行不出朝廟宫庭舍牲事無式也于道右曰王式則下前馬此不言下者王乗則持馬行則陪乗齊右之職也有牲事則王式而車不行右已下持馬不必更言下矣道右掌前道車王出入則持馬陪乗如齊車之儀道車象路也王朝夕燕出入所乗謂之道車無在而非道也自車上諭命于從車詔王之車儀車儀獨道右詔之者朝夕燕出入之儀既習則祭祀㑹同賔客軍旅加謹焉耳王式則下前馬王下則以蓋從以蓋從表尊也王志援曰戎右畧于儀文主武事也齊右缺于傳命則禮法森嚴之地王其肅穆無言也與大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之山行曰軷犯之者封土為山以菩芻棘柏為神主既祭之以車轢之而去喻無險難也春秋傳曰跋渉山川詩曰取羝以軷聘禮曰乃舍軷飲酒于其側蓋將出祖道之祭也王由左馭制馬使不行也此據祭郊壇故有犯軷之禮及祭酌僕僕左執轡右祭兩軹祭軌乃飲軹謂兩轊軌當為􅓶謂軾前也此既祭而酌僕之禮祭之末煇庖翟閽皆有賜焉則不遺僕可知少儀酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲是祭畢君與尸之僕皆授爵也凡馭路行以肆夏趨以采薺凡馭路謂馭五路也行謂大寢至路門趨謂路門至應門此王歩行之節而車行亦用之也凡馭路儀以鸞和為節戎僕掌馭戎車戎車謂王自將所乗革路掌王倅車之政正其服正乗倅車者之服也軍事同服蓋正其不齊者犯軷如玉路之儀凡巡守及兵車之㑹亦如之掌凡戎車之儀巡守乗革車與朝覲㑹同異者王出畿則武衛宜嚴也兵車之㑹謂將有討伐凡戎車之儀謂王在革車之儀也行道按壘禱戰誓師鼓進受愷各有儀灋故以凡該之舊説掌衆兵車歩伐止齊之儀誤矣齊僕掌馭金路以賔朝覲宗遇饗食皆乗金路其灋儀各以其等為車送逆之節節謂王乗車迎賔客及送相去逺近之數上公九十歩侯伯七十歩子男五十歩司儀職曰車逆拜辱及出車送春夏受贄于朝無迎灋受享則有之秋冬受享受贄皆于廟無迎法此經謂因朝覲宗遇而饗食諸侯于廟則有乗金路迎送之灋也道僕掌馭象路以朝夕燕出入其灋儀如齊車掌貳車之政令早朝曰朝暮朝曰夕春秋傳百官承事朝而不夕又曰右尹子革夕是也曰朝夕燕出入者謂朝夕視朝及或以燕遊出入也大馭齊僕無掌副車之文蓋祭祀饗食皆在廟無所用副車也朝夕視朝亦不宜有副車此掌貳車之政令豈謂燕出入與郊祀宜有副車而不言者王出宫則副車從既載犯軷之禮則以副車從不必言矣田僕掌馭田路以田以鄙掌佐車之政設驅逆之車以鄙謂巡行縣鄙令獲者植旌及獻比禽植樹也鄭剛中曰山虞澤虞植虞旌為屬禽此則令獲禽者自植以告獲也比禽謂比次所獻禽種物各相從且别其上殺中殺下殺也凡田王提馬而走諸侯晉大夫馳提猶舉也晉猶抑也使人扣而舉之抑之皆止奔也馳放不扣王介甫曰提節之晉進之馳則亟進之尊者安舒卑者戚速馭夫掌馭貳車從車使車從車謂屬車使車使者所乗分公馬而駕治之謂乗六種之馬挍人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者當以駕玉路駑馬則共雜役也凡頒良馬而養乗之乗馬一師四圉三乗為皁皁一趣馬三皁為繫繫一馭夫六繫為廏廏一僕夫六廏成挍挍有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫四匹為乗圉養馬者麗耦也趣馬下士馭夫中士則僕夫上士也駑馬一物而三良馬之數以充役事為多也領駑馬者止于馭夫而不屬于僕夫以不當王之五路也天子十有二閑馬六種邦國六閑馬四種家四閑馬二種每廏為一閑舊説諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬皆分為三但諸侯不應竟無種馬戎馬特所畜不多故合種馬齊馬為一種戎馬田馬為一種家則良駑各一種耳凡馬特居四之一特牡馬也物同氣則一心三牝一牡欲其乗之性相似也春祭馬祖執駒馬祖天駟也執猶拘也馬二嵗為駒春通淫之時駒弱血氣未定慮其乗匹傷之夏祭先牧頒馬攻特先牧始養馬者其人未聞攻特謂騬之使無蹄齧也疑即後世所謂扇馬然必通淫之後始攻之亦所以盡物之性秋祭馬社臧僕馬社始乗馬者世夲曰相士作乗馬或曰牧地所立之社也僕馭五路者臧僕謂簡馭者令皆善冬祭馬歩獻馬講馭夫馬歩神為災害者獻馬見成馬于王也馭夫馭貳車從車使車者秋臧僕擇其善者而用之也冬講馭夫教以閑習之灋凡大祭祀朝覲㑹同毛馬而頒之毛馬齊其色也頒授乗以從王者毛詩傳宗廟齊毫尚純也戎事齊力尚强也田獵齊足尚疾也飾幣馬執扑而從之凡賔客受其幣馬幣馬與幣並將者聘禮曰馬則北面奠幣于其前大喪飾遣車之馬及葬埋之田獵則帥驅逆之車言埋之則馬乃塗車之芻靈凡將事于四海山川則飾黄駒四海山川四海内之山川也王巡守過大山川有殺駒以祈沈之禮玉人職宗祝以黄金勺邊璋前馬是也凡國之使者共其幣馬使者所用私覿王于畿内亦遣使故以國别之凡軍事物馬而頒之物馬齊其力文不承毛馬之後者自飾幣馬至共幣馬皆齊色也詩曰路車乗黄書曰布乗黄朱是幣馬必齊色也詩曰駟鐵孔阜又曰四黄既駕是田馬亦齊色也遣車之馬以芻靈則齊色不必言矣六月之詩曰比物四驪謂物既比而色又齊見馬之盛也牧野之師用四騵蓋君所乗其餘則皆齊力等馭夫之禄宫中之稍食馭夫于趣馬僕夫為中舉中以見上下也宮官字之誤也他職但有府史此更有師圉之屬故以官中包之趣馬掌贊正良馬而齊其飲食簡其六節正質而定之也挍人辨六馬之屬而趣馬則佐而質定之簡差也節猶量也差擇王馬以為六等劉執中曰目以知其瞻之不驚口以知其性之不悖耳以知其力之不殫鬛以知其血之有餘毛以知其氣之不暴蹄以知其行之不跲六者簡馬之大節也王明齋曰六節謂行止進退馳驟之節鄭剛中曰趣馬下士而周公作立政與任人準夫牧並舉詩刺幽王與司徒卿士連言之其職㣲而所係則重近王故也掌駕説之頒辨四時之居治以聽馭夫頒其駕説之次第所以均勞逸也馬八月以後在廏二月以後在牧其治則執駒攻特獻馬各有時以聽馭夫惟馭夫之所役也巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于挍人乗謂歩驅以發其疾也知所疾乃治之受財謂共祈具及藥直馬死則使其賈粥之入其布于挍人布泉也牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊牧地非一處度其年嵗水草之宜與其馬之衆寡而頒之焚牧地以除陳草也中春隂陽交萬物生可以合馬之牝牡月令季春乃遊牝于牧者秦地寒凉萬物後動也焚萊者山澤之虞贊之令不得燬其應牧之處庾人掌十有二閑之政教以阜馬佚特教駣攻駒及祭馬祖祭閑之先牧及執駒散馬耳圉馬佚當為逸逸特者不使甚勞以安其血氣也馬三嵗曰駣二嵗曰駒教駣始乗習之也攻駒騬其蹄齧者前經攻特俟其乗匹而後騬之也其為駒而已難馴者則早騬之閑之先牧謂先牧始制閑者散馬耳謂以竹括押其兩耳頭動摇則括中物後遂串習不復驚圉馬馬既成則圉之也鄭剛中曰考及字之義當為七事庾人職卑安得主馬祖之祭蓋于挍人祭馬祖之時則祭閑之先牧于挍人命執駒之時則散馬耳圉馬爾正挍人員選王氏曰馭夫以下備員于挍人而中其選者庾人差而正之馬八尺以上為龍七尺以上為騋六尺以上為馬月令曰駕蒼龍詩曰騋牝三千王介甫曰大小異名使各從其類以待乗頒及以為種圉師掌敎圉人養馬春除蓐釁廏始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐馬兹也冬以草藉馬春則除之以去其薉也釁廏辟去邪氣也始牧春草生始出牧也庌廡也所以庇馬使凉椹質以木為之縳草以代侯充居也或曰供也茨蓋也闔苫也圉師庌馬習于苫蓋之事故因而役之圉人掌養馬芻牧之事以役圉師凡賔客喪紀牽馬而入陳廞馬亦如之賔客之馬王所賜予喪紀之馬啓殯後所薦廞馬遣車之禺馬人奉之亦牽而入陳職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害東方曰夷南方曰蠻西方曰戎北方曰貉狄閩蠻之别也四八七九五六周所服國數也必周知其利害然後可以興之除之或曰謂山川江湖之支凑利于設險與要害之處乃辨九州之國使同貫利凡可以生養人者謂之利貫事也事之有條謂之貫數要利害雖蠻夷戎狄必周知之而使同貫利者不越九州之國也東南曰揚州易彦祥曰禹貢揚州之域東距海北據淮殷人以淮入徐故揚州止謂之江南周人復以入揚循禹之舊周起西北去東南絶逺故首列之以志風教之所暨也吳楚有道後服無禮先强終周之世為禍災于中夏故職方所記以險逺為先其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻鎮者其山髙大為一州之望若能鎮壓之也水瀰漫而灘淺草盛者曰藪窪下而鍾水可以為陂灌溉者曰浸㑹稽在浙江紹興府東南具區即禹貢震澤今所稱太湖也三江岷江松江浙江也岷江雖發源于梁州而入揚州之界則合安池宣昇潤真諸州之水而環其北松江合嘉湖蘇常諸州之水居其中浙江合衢徽嚴杭諸州之水在其南揚州之川未有大于此者五湖無考既列具區則以太湖旁五湖當之非也箭竹之小者鳥獸孔雀鸞鵁鶄犀象之屬正南曰荆州易彦祥曰禹貢荆及衡陽惟荆州殷之荆州其北境曰漢南以地志考之荆山在南郡臨沮縣漢水又出其北正屬襄陽言漢南則跨荆山之北至周復以荆門之北屬豫州復禹封域其山鎮曰衡山其澤藪曰雲瞢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻顧景范曰衡山在湖廣衡州府衡山縣西雲夢在湖廣徳安府城南江水發原四川成都府茂州西北之岷山歴梁荆揚三州至今江南揚州府海門縣東入海漢水發原陜西漢中府沔縣西嶓冢山至湖廣漢陽府城東北入江潁水發原河南府登封縣東陽乾山至江南鳳陽府潁州潁上縣入淮湛未詳今河南汝州境内有湛水潁湛本在禹貢豫州之域河南曰豫州易彦祥曰禹貢荆河惟豫州其封在大河之南南條荆山之北故曰荆河殷之豫州則南境據漢北境接河故曰河南周人于豫州亦曰河南而南境則仍禹貢之舊其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種華山在陜西西安府華州華隂縣南十里圃田在開封府中牟縣西北滎滎澤也今開封府鄭州滎澤縣是洛水出陜西西安府商州南冡頂山至河南府鞏縣北入河波舊説讀播禹貢滎播既都今書亦作波通典云出歇馬嶺在今汝州魯山縣西北溠水春秋傳楚子除道梁溠營軍臨隨宜屬荆州通典云在今湖廣襄陽府棗陽縣東北六擾馬牛羊豕犬雞五種黍稷菽麥稻正東曰青州易彦祥曰殷并青于徐而徐兼揚州之淮周復以淮歸揚而并徐于青正在畿東故曰正東其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥淮或為睢沭或為洙顧景范曰沂山在青州府臨朐縣南孟諸在河南歸徳府虞城縣禹貢屬豫州淮水發原河南南陽府唐縣東南桐柏山至江南淮安府安東縣東北入海泗水出兖州府泗水縣東陪尾山至江南淮安府清河縣南入淮今名南清河沂水出青州府莒州沂水縣西北雕厓山至淮安府邳州南入泗沭水出臨朐縣沂山至淮安府安東縣西入淮河東曰兖州易彦祥曰夏殷皆言濟河惟兖州謂東河之東濟水之北也周人以青兼徐而兖州又得越乎濟之東南故徐之岱山職方以為兖之鎮徐之大野職方以為兖之澤藪也其山鎮曰岱山其澤藪曰大野其川河泲其浸廬濰其利蒲魚其民二男三女其畜宜六擾其榖宜四種廬濰當為雷雍禹貢曰雷夏既澤雍沮㑹同四種黍稷稻麥顧景范曰岱泰山也在濟南府泰安州北大野在兖州府濟寧州鉅野縣東河從西域崑崙山至陜西西寧衛積石山乃入中國歴雍豫冀兖四州之域東北入海今從東南合淮入海濟水發原河南懐慶府濟源縣西王屋山至山東濟南府濵州利津縣東入海亦曰大清河盧水在濟南府長清縣西廢盧縣境濰水出青州府莒州西北箕屋山至萊州府濰縣東北入海禹貢屬青州正西曰雍州易彦祥曰禹貢有雍有梁故梁為正西而雍為西北殷周皆省梁入雍故雍州為正西其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷弦或為汧蒲或為浦顧景范曰嶽山在陜西鳳翔府隴州南弦蒲在隴州西涇水出陜西平凉府城西南笄頭山至西安府高陵縣西南入渭汭水出弦蒲藪東北歴平凉府境至西安府邠州長武縣而合于涇渭水出陜西臨洮府渭源縣西鳥䑕山至西安府華州華隂縣北入大河洛水出慶陽府城東北廢洛源縣南流合漆沮二水至西安府同州朝邑縣南入渭通典曰洛即漆沮也東北曰幽州易彦祥曰舜十二州本有幽州水土既平以冀為帝都省幽入冀殷人南都河南之亳復設幽州周人又以幽州兼殷之營州實禹貢青州隔海東北之境其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其榖宜三種四擾馬牛羊豕三種黍稷稻顧景范曰醫無閭山在遼東廣寧衛西貕養在山東登州府萊陽縣在禹貢宜屬青州菑水在濟南府淄川縣東南時水在青州府臨朐縣西易彦祥曰幽川雖東北跨遼水而西南實越海兼有青州之東北境所以瑯琊郡之貕養澤泰山郡之淄水千乗郡之時水皆在幽州之域漢光武十三年以遼東屬青州二十四年還屬幽州王璜張揖云九河陷海中是九河未陷之先凡登萊海岸及濵滄二州之東境皆在幽州之地與兖州東西分界故二州並曰其川河泲河内曰冀州易彦祥曰水土既平舜省幽并二州入冀東西南三面距河而北境則越常山今之燕雲營平諸州皆其地也殷人復以冀之北境為幽州而東西南皆禹迹之舊周人又分冀而復并州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其榖宜黍稷顧景范曰霍山在今山西平陽府霍州東南之三十里爾雅秦有楊紆此屬冀州未詳漳水有二濁漳出山西潞安府長子縣西發鳩山清漳出太原府平定州樂平縣西南少山至河南彰徳府臨漳縣西合焉其下流復分為二或從直隷河間府獻縣合滹沱河或從山東東昌府館陶縣合衛水汾水出太原府静樂縣北管涔山至平陽府蒲州榮河縣西入大河潞水闞駰曰即濁漳也今潞安府城西南二十里濁漳經焉土人猶呼為潞水通典曰潞河在密雲縣即今順天府境内之白河也春秋傳載晉所兼國曰狄楊韓魏又曰邘晉應韓武之穆也楊為晉所兼豈邘亦在冀州之域以音同而誤紆與正北曰并州易彦祥曰以天下之勢言之冀州在西河之東雍州在西河之西并州介雍冀之間故曰正北其山鎮曰恒山其澤藪曰昭餘祁其川虖池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種五擾馬牛羊犬豕凡九州及山鎮澤藪言曰者以其非一指目其大者職方州界揚荆豫兖雍冀與禹貢略同青州則徐州地也幽則青之北也并則冀之北也顧景范曰恒山在直𨽻真定府定州曲陽縣西北昭餘祁在太原府祁縣東虖池水出太原代州繁畤縣東北秦戲山至直𨽻河間府静海縣北小直沽入海嘔夷水出山西大同府蔚州靈丘縣西北高是山一名唐河至直𨽻保定府安州北合于易水淶水在保定府易州淶水縣東北亦名北易水易水在保定府安州城北名南易水陳氏曰九州山川藪澤各在職方不屬諸侯之版觀詩不以圃田係鄭春秋不以沙麓係晉略可覩矣周季齊幹山海而桃林之塞郇瑕氏之地晉實私之此諸侯所以僭侈王室所以衰微也乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服服服事天子也詩曰侯服于周凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下約計以方千里封公則可四封侯則可六封伯則可十一封子則可二十五封男則可百云七伯者字之誤也朱子曰陳君舉進制度説周禮封疆方五百里是周圍方五百里徑止百二十五里自竒其説與王制等語相合然本文方千里之地以封公則四公其地已有定數此説如何可通况男國二十五里則國君即今之一耆長耳何以為國凡邦國大小相維大國比小國小國事大國各有屬相維聯也王制云五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯王設其牧牧謂公侯伯子男守土以牧民者制其職各以其所能屬長連帥卒正州伯其能有大小則職之所任有輕重也制其貢各以其所有觀此經則大行人六服所貢各主一物乃入見時所貢而非嵗貢之常可知矣王將巡狩則戒于四方曰各修平乃守攷乃職事無敢不敬戒國有大刑守謂其國竟職事謂所當共具者及王之所行先道帥其屬而巡戒令先道前王而行也王殷國亦如之殷國即大宗伯職所謂殷見也其戒四方諸侯與巡守同土方氏掌土圭之灋以致日景以土地相宅而建邦國都鄙灋見大司徒職以辨土宜土化之灋而授任地者土宜謂九榖稙穉所宜也土化地之輕重糞種所宜用也任地者載師之屬黄文叔曰所謂景短多寒景長多暑景朝多隂景夕多風土宜土化由是而有其灋焉王巡守則樹王舍王所止宿掌舍設梐枑則此官于外周帀樹藩籬懐方氏掌來逺方之民致方貢致逺物而送逆之達之以節逺方之民謂四夷也逺物九州之外無貢灋而至者達民以旌節達貨以璽節李耜卿曰逺方之民非直四夷也自他州而來者皆是逺物非直藩國之貨也凡貿遷有無者皆是治其委積館舍飲食委積館舍飲食遺人所掌也而懐方氏又為逺人經紀之合方氏掌達天下之道路通其財利同其數器壹其度量除其怨惡同其好善逹天下之道路謂津梁相凑不使陷絶李耜卿曰此官皆柔逺人之事除其怨惡者禁土著為孤客患同其好善者彼此地産交相好善則貿遷者利其息故其文承通財利同數器壹度量之後也上懐方氏來逺方之民此官達其道路以濟不通也懐方氏致逺物此官為之均平使樂徃來也訓方氏掌道四方之政事與其上下之志誦四方之傳道正歲則布而訓四方而觀新物道猶言也蓋為王道之傳道所傳説往古之事也有新物出則可知其民志所好惡志淫好辟則當以政教化正之司徒之屬有誦訓而復設此職者誦訓所掌獨其國故事此則周知其國政人心俗尚而使王知所以紀其政教也誦訓所掌獨巡狩之事而此則布訓于四方也惟此職所誦四方之傳道即誦訓所道方志蓋此職采而逹之而後誦訓道之司徒所布于邦國者敎典之常也此所布之訓則因其國政人心俗尚之有偏而矯革化誘之者也形方氏掌制邦國之地域而正其封疆無有華離之地華析也離麗也地勢應屬此國而披于他國則在此國為華在彼國為離而統攝難爭端起矣故正之使小國事大國大國比小國無疆埸之爭故小大和山師掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物山林之名與物若岱畎絲枲嶧陽孤桐之類利其物産中人用者害毒物及螫噬之蟲獸名山大澤不以頒其餘山林川澤仍頒之于邦國特使王官遥掌之而致其珍異之物耳原師掌辨丘陵墳衍原隰之名物以建國邑與山師川師之職異故不言所致之物川師掌川澤之名辨其物與其利害而頒之于邦國使致其珍異之物川澤之名與物若泗濵浮磬淮夷蠙珠之類聖王不貴異物而使致其珍異者非常之物可以禦災療疾及為服飾器用亦有國者所宜夙儲非以供玩好也邍師掌四方之地名辨其丘陵墳衍邍隰之名物之可以封邑者辨其丘陵下十七字為句大司徒辨山林川澤丘陵墳衍原隰之名物以制邦國都鄙之畿疆而制畿封國列職于司馬故原師復掌之以輔成司徒之事也封建國也邑制都鄙也五土獨掌其三者丘陵墳衍皆有榖土可計賦以建國邑山林川澤則領于王官而不以頒非獨制其要塞以為險固亦榖土少不足以建國邑耳匡人掌逹灋則匡邦國而觀其慝使無敢反側以聽王命法則冡宰所建而使司馬之屬達之且觀其慝所以警不聽命者逹灋則遂足以匡邦國者使其國之臣皆禀王朝之灋鄙之吏皆守王朝之則諸侯雖欲反側而勢不能行矣撢人掌誦王志道國之政事以巡天下之邦國而語之使萬民和説而正王面正王面所謂四面而内鄉也匡人達灋則而邦國之臣皆凛承乎王吏撢人誦王志而天下之民皆内鄉于京師此先王養諸侯而兵不試之道也齊魯之衰民不知君而陪臣各固其私以成簒奪之漸則知止邪于未形周官之所慮逺矣都司馬掌都之士庶子及其衆庶車馬甲兵之戒令士卿大夫士之適子為學士者庶子其支子也戒令謂王朝有軍事而徴兵于都鄙也以國灋掌其政學以聽國司馬政若諸子宫伯掌固之所掌學若大司樂之所掌是即所謂國灋也都家士庶子之政學一以王國教胄子之灋治之以聽國司馬者有軍事則聽于諸子有守政則聽于掌固也家司馬亦如之大夫家臣為司馬者春秋傳叔孫氏之司馬􅎦戾李耜卿曰大司馬掌邦政統六師故凡兵甲車馬之政𨽻僕御從之官九州邦國之形勝阨塞要害皆屬焉軍無賞士不往故首司勲軍行以馬故馬質次之軍舍有壘故量人次之師行以順為武故小子斬牲狥陳次之羊人共羊牲又次之繼以司爟者火政兵事之要也設險守固制勝于未形故掌固司險掌疆候人次之譏察非常簫勺羣慝故環人之察巡挈壺之序柝又次之射以習戰兵事所急故射人次之服不射鳥羅氏掌畜四職皆因射而及之也司馬辨論官材司士佐之六官之師旅得其人則六軍之將帥得其任諸子之治國子司右之治戎右皆此意也自是以下至圉人數十職則詳衛王之政虎賁旅賁夾衛王車節服氏以衛王車而及之也方相氏以衛室神而連類及之也大僕小臣祭僕御僕𨽻僕王之出入或駟乗或先後皆武衛之官又次之王車有五路乗車之冕弁各有宜故弁師次之車中甲兵戈盾弓矢具故司甲司兵司戈盾司弓矢繕人槀人次之戎右齊右道右為車右者所謂勇士也大馭戎僕齊僕道僕田僕馭夫御車者所謂僕夫也馬以駕車挍人趣馬巫馬牧師庾人圉師圉人皆馬官也不次于馬質之後者馬質所給者軍馬此所共者王馬也職方土方懐方合方訓方形方以及山師川師原師匡人撢人皆所以柔逺人懐諸侯且秉天下之土地形勢山川林澤原埜之險易而遏其僭侈施訓道匡正之灋以釋其悖心所以銷兵于未形止亂于未萌也都家司馬以國灋掌其政學以聽國司馬故以是終焉周官集注卷八
