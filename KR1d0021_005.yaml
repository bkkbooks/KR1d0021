body:
  text: 周官集注卷五翰林院侍講銜方苞撰春官宗伯第三天地中和之氣備于春宗伯掌禮以教民中掌樂以教民和故曰春官宗尊也伯長也惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國禮謂五禮其别三十有六舜命伯夷典三禮曰汝作秩宗國語曰使名姓之後能知四時之生犧牲之物玉帛之類采服之宜彞器之量次主之度屏攝之位壇場之所上下之神祇氏姓之所出而率舊典者為之宗禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛鬱人下士二人府二人史一人徒八人鬱鬱金香草也以和鬯鬯人下士二人府一人史一人徒八人鬯釀秬為酒芬芳條暢于上下也秬如黑黍一稃二米雞人下士一人史一人徒四人司尊彞下士二人府四人史二人胥二人徒二十人彞亦尊也實鬱鬯者曰彞彞法也言為尊之法也司几筵下士二人府二人史一人徒八人筵亦席也鋪陳曰筵藉之曰席尚書敷重底席禮記天子之席三重則筵亦可通謂之席天府上士一人中士二人府四人史二人胥二人徒二十人府以天名尊所藏若天物然典瑞中士二人府二人史二人胥一人徒十人瑞信節也其職曰掌玉瑞玉器之藏事神所用為多故列于禮官典命中士二人府二人史二人胥一人徒十人命謂王命官册書古者命賜羣下必于祖廟故冢宰詔王以爵祿馭羣臣而典命司服則列于禮官司服中士二人府二人史一人胥一人徒十人典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧每廟二人奚四人遠廟曰祧藏遷主焉廟祧之辨鄭氏王氏説詳見禮記王制孔疏守祧用奄與女奚者豈祭祀雖無女尸而先后朝祭服及遺器亦藏于祧與疏天子七廟通薑嫄廟為八奄每廟一人世婦每宮卿二人下大夫四人中士八人女府二人女史二人奚十有六人此女官設府于內以掌后宮之禮者上自王后下及內外宗皆其所教以外命婦有齒德者為之所謂女傳也內宰自外而治內春官世婦自內而達外必如此法制乃備或以為即天官之世婦誤矣內宗凡內女之有爵者內女王同姓之女有爵適大夫及士者曰凡無常數也外宗凡外女之有爵者外女王諸姑姊妹之女九嬪世婦女御為治官之屬內外宗為禮官之屬皆制禮之精意冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人冢封土為邱隴象冢而為之爾雅山頂曰冢墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人職主也莊渠魏氏曰孝子荒迷中弗能如禮故特設官相之先王之體羣臣可謂至矣大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人大胥中士四人小胥下士八人府二人史四人徒四十人大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人視瞭三百人府四人史八人胥十有六人徒百有二十人無目眹謂之瞽有目眹而無見謂之矇有目無眸子謂之瞍瞭目明者樂歌必用瞽者以其審于聽也典同中士二人府一人史一人胥二人徒二十人同隂律也不以陽律名官者同者同于律也曰典律不足以包同曰典同則律可知矣磬師中士四人下士八人府四人史二人胥四人徒四十人鍾師中士四人下士八人府二人史二人胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鎛師中士二人下士四人府二人史二人胥二人徒二十人鎛如編鍾而大視大鏞則小獨在一簴國語曰細鈞有鍾無鎛尚大故也大鈞有鎛無鍾尚細故也韎師下士二人府一人史一人舞者十有六人徒四十人韎東夷之樂韙鞻氏掌四夷之樂而特設韎師蓋周起岐雍其化先行于南次及于北而東方獨阻風教商奄既誅淮夷徐戎尚為魯患故特設一官肄東夷之樂以志王化之難成職方首揚州亦此義也旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人旄旄牛尾舞者所持以指麾籥師中士四人府二人史二人胥二人徒二十人籥舞者所吹籥章中士二人下士四人府一人史一人胥二人徒二十人吹籥以為詩章韙鞻氏下士四人府一人史一人胥二人徒二十人鞻讀如屨韙鞻四夷舞者之所屝也典庸器下士四人府四人史二人胥八人徒八十人庸功也古者有功多鑄器以銘之春秋傳季武子以所得于齊之兵作林鐘而銘魯功焉司干下士二人府二人史二人徒二十人干舞者所持謂楯也春秋傳萬者何干舞也大卜下大夫二人卜師上士二人卜人中士八人下士十有六人府二人史二人胥四人徒四十人問龜曰卜龜人中士二人府二人史二人工四人胥四人徒四十人工攻龜菙氏下士二人史一人徒八人燋焌用荆菙之類即士喪禮所謂楚焞也占人下士八人府一人史二人徒八人占蓍龜之卦兆吉凶簭人中士二人府一人史二人徒四人問蓍曰簭其占易占夢中士二人史二人徒四人視祲中士二人史二人徒四人祲隂陽相侵漸成祥者春秋傳魯梓慎曰吾見赤黑之祲大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人詛祝下士二人府一人史一人徒四人司巫中士二人府一人史一人胥一人徒十人古者民之精爽不擕二者神明降之在男曰覡在女曰巫聖人用之使制神之處位次主男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人王氏詳説曰玉藻曰左史書動右史書言以左傳考之左史即大史右史即內史襄二十五年載齊太史書崔杼之事非書動乎僖二十八年載王命內史策命晉侯非書言乎馮相氏中士二人下士四人府二人史四人徒八人馮乘也相視也世登髙臺以視天文之次序天文屬太史月令曰乃命太史司天日月星辰之行保章氏中士二人下士四人府二人史四人徒八人保守也世守天文之變內史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人孫偉夫曰史官為宗伯之屬以宗廟典籍具存非博通之士莫能勝任也外史上士四人中士八人下士十有六人胥二人徒二十人御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人巾猶衣也典路中士二人下士四人府二人史二人胥二人徒二十人路王所乘車車僕中士二人下士四人府二人史二人胥二人徒二十人王志長曰戎僕已列五僕中而春官復設車僕專掌戎路之政意者先王以禮齊天下而師旅之事強力先發為尚故特以屬禮官與司常中士二人下士四人府二人史二人胥四人徒四十人都宗人上士二人中士四人府二人史四人胥四人徒四十人家宗人如都宗人之數凡以神士者無數以其藝為之貴賤之等王氏曰藝即掌三辰之法以猶鬼神示之居辨其名物大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國李耜卿曰邦禮有五獨言掌吉禮者禮有五經莫重于祭舉首以該終也建立也保安也正倫理則立篤恩義則安上下各得其所而皆安故曰建保邦國也以吉禮事邦國之鬼神示國家無故上下和睦以事天地宗廟百神乃人事之最吉者故曰吉禮喪疾禍亂則祀事不能舉矣都家鄉邑皆有鬼神示之祀此不言者統于邦國也邱氏曰上言神鬼示上下也此言鬼神示內外也以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師禋之言煙周人尚臭煙氣之臭聞者實柴實牛柴上也槱積也詩曰芃芃棫朴薪之槱之司中三能三階也司命文昌宮星或曰虛宿下有司命星主人壽夭飌師箕也雨師畢也三祀皆積柴實牲體燔燎而升煙各舉其一互相備也冢宰司徒所􅊩祀事皆首五帝者舉五帝則昊天上帝不必言矣此不及五帝者舉昊天上帝則五帝可知也司寇職禋祀五帝則戒日程子曰天與帝一也天言其體帝言其主朱子曰説上帝是總説帝説五帝是五方帝説昊天上帝只是説天張氏曰尚書曰明禋國語精意以享曰禋鄭氏取義于升煙誤矣以血祭祭社稷五祀五嶽以貍沉祭山林川澤以疈辜祭四方百物不言祭地此皆地示祭地可知也隂祀自血起貴氣臭也社稷土穀之神有德者配食焉共工氏之子曰句龍食于社厲山氏之子曰柱食于稷湯遷之而祀棄五祀者五官之神四時迎五行之氣于四郊而祭五德之帝亦食此神焉少昊氏之子曰重為句芒食于木該為蓐收食于金修及熙為元冥食于水顓頊氏之子曰黎為祝融食于火句龍為后土食于土五嶽東曰岱宗南曰衡山西曰華山北曰恆山中曰嵩高山祭山林曰貍川澤曰沉順其性之含藏也疈剖牲胸也疈而磔之謂磔攘及蠟祭郊特牲曰八蠟以記四方又曰蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也李耜卿曰祀天神祭地示其時其地詳見大司樂而此經以蒼璧禮天以黃琮禮地典瑞職四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望王制天子祭天地諸侯祭社禝則地示之祭自不得以社當之然此經序祭有社無示司徒鼓人職以雷鼓鼓神祀以靈鼓鼓社祭亦言社而不及示典瑞職以圭璧禮諸神祀地之外不著社稷大司樂分樂以祭亦不别著社稷于祭地之後二者又言示而不及社似乎彼此互見而示祭社祭禮無殊也勉齋黃氏曰社祭土稷祭榖土穀之祭達于上下故方丘與社皆祭地也而宗伯序祭有社無示舉社則其禮達于上下舉示則天子獨用之鼓人職不曰祭示而曰社祭亦以其禮達乎上下也大司樂靈鼓靈鼗以祭地示則示祭社祭其用同矣此説較之賈疏所謂以小該大者尤為長于理而合于經也祭法王有大社又有王社張子曰大社祭天下之地示王社祭京師之地示説本白虎通竊意大社立于王宮乃祭京師之地示京大也師衆也京師之社固可稱大王者無外社繫以王則祭天下之地示也此禮惟王有之諸侯以下則否王社所在書傳無文其即澤中之方丘與王志長曰五祀在社稷之下五嶽之上則非門戶等可知但鄭氏注五官之神從五帝而祀于四郊則天神之屬不宜血祭祀則首舉昊天上帝而不及五帝祭則不言地示而首社稷者五帝之祀已前見矣而昊天上帝未見故舉之以見其為天神之首祀地示則上經巳見故獨舉社稷以下也不及四瀆者上舉五嶽下及山林川澤則四瀆從五嶽之禮不必言矣在天為四時在地為五行豈四郊迎氣祀五帝于上而用禋祀祭五官于下而用血祭與抑别祭而不于迎氣之日與以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王舊説宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦熟時也獻獻醴謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也祫言肆獻禘言饋食互相僃也四時常祭之外莫重于祫禘莫多于月祭肆獻謂祫也祼謂禘也不曰祫而曰肆獻者時祭亦有祫惟大祫遍獻及毁廟之主也不曰禘而曰祼者獻之屬莫重于祼周道也求神于隂于極遠之祖尤以祼為合莫之主也凡祭皆有祼而獨以言禘者猶六宗皆禋而獨于昊天上帝言禋祀凡祭皆有血腥爓熟而曰郊血大饗腥也饋食疑即周語所謂月祀戴記所謂月祭也薦新朔奠其禮略故自饋食始而薦血燔膋之節不僃如注疏則當曰以祼肆獻饋食享先王不當分而為二矣且小宰贊祼將司徒奉牛牲羞其肆籩人掌饋食之籩皆巳前見無為復舉于此以見祭之有此三節也蓋舉祫則無以别于時祭之祫舉月祭則不足以該朔奠與薦新既以肆獻言大祫以饋食言月祭故于禘亦不得獨舉祭名而稱祼耳饋奠之禮所以仁死喪以三虞後即為吉祭故朔奠可入吉禮肆陳也列也而考尚書眚災肆赦春秋肆大眚韓非子慮事廣肆似兼周遍之義大祫遍于列祖故曰肆獻大祝肆享亦謂大祫也以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀寇亂喪禮親者服焉疏者含禭凶歲凶札疫厲禍災謂水火春秋傳宋大水魯使人弔許不弔災君子譏之禬者使鄰國會合貨財以恤之小行人職若國師役則命犒禬之是也寇如春秋傳晉欒盈宋魚石自外入而為賊者亂如魯慶父齊無知自內而作者恤者與之同憂而匡救之也以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同六服之內以時分來遞更而遍來以春則曰朝來以秋則曰覲無四方之别時見無常期王將有征討之事特召其州方伯連帥為壇于國外而命事焉春秋傳有事而會是也殷衆也舊説十二歲王如不巡守則六服盡朝四時分來歲終而遍王亦為壇而命政焉所命之政如王巡守辨見秋官掌客職時聘曰問殷俯曰視時聘無常期諸侯或以故不得朝則遣問起居殷俯則王室有故慶喜弔憂而六服皆使人來視也以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也同謂威其不協僭差者簡衆稽閲車徒之數也合衆者地有定域民有常主所以合其志大均屬軍禮惟均乃可以作師徒賦馬牛車輦也大役屬軍禮古者城築即屬役于師旅也大封屬軍禮示侵敗王略則六師及之也春秋傳魯賦于吳八百乘邾賦六百乘若為子男則將半邾以屬于吳而如邾以事晉蓋不獨徵兵以車乘為差田役貢賦之數亦如之故大均屬軍禮平丘之會子産爭承曰鄭伯男也而使從公侯之貢懼不給也則不均之病衆明矣以嘉禮親萬民以飲食之禮親宗族兄弟以昏冠之禮親成男女以賔射之禮親故舊朋友以饗燕之禮親四方之賔客以脤膰之禮親兄弟之國以慶賀之禮親異姓之國嘉善也因人心所善而為之制飲食之禮謂族食也文王世子篇族食世降一等親謂昏禮成謂冠禮射禮雖王亦立賔主王之故舊為世子時共在學者脤膰社稷宗廟之祭肉也雖主賜兄弟之國二王後及異姓有大勳勞者亦得賜春秋傳王使宰孔賜齊侯胙又曰宋先代之後天子有事燔焉大行人云賀慶以贊諸侯之喜則亦兼同姓可知饗燕脤膰賀慶之禮達乎諸侯賔射之禮達乎卿大夫士惟飲食昏冠之禮下逮庶人而統曰以親萬民者詩曰爾之教矣民胥效矣凡用于朝廷邦國者皆所以使民觀感而親睦也古者君之于臣皆謂之朋友詩曰我有嘉賔又曰朋友攸攝書曰太史友是也以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯每命異儀貴賤之位乃正一命始命為正吏也列國之士于子男為大夫王之下士亦一命受職治職事也列國之大夫再命于子男為卿卿大夫自玄冕而下如孤之服王之中士亦再命則爵辨服列國之卿三命始有列位于王為王臣王之上士亦三命公之孤四命始得具祭器禮運曰大夫祭器不假非禮也王之下大夫亦四命則者地未成國之名王之下大夫四命出封為子男加一等五命賜以方百里二百里之地或曰為寰內諸侯賜以八則也王之卿六命得自置其臣治家邑如諸侯王之卿六命出封加一等七命為侯伯方三百里以上為成國侯伯有功德者加命得專征伐為州牧王之三公亦八命上公有功德者加命為二伯得征五侯九伯李耜卿曰職服位器皆曰受者自下言之則與官國皆曰賜者自上言之牧與伯皆曰作者必有過人之功德乃可作而居此位也春秋傳管仲辭卿禮曰有天子之二守髙國在欒盈之奔曰陪臣盈得罪于王之守臣晉鞏朔獻捷于周王使詰曰未有職司于王室以是知列國之卿必受命于王然後為有位也以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧瑞信也等差之也鎮安也圭長尺有二寸以四鎮之山為瑑飾王祭時所執公二王之後及三公雙植謂之桓圭長九寸以桓為瑑飾象宮室之有桓楹所以安其上也信當為身信圭躬圭皆長七寸象人形為瑑飾而以屈伸為之别穀所以養人蒲為席所以安人二璧皆徑五寸而瑑飾異李耜卿曰雜記贊大行云博三寸厚半寸剡上左右各寸半圭之形也璧形圜內有孔謂之好孔外謂之肉肉倍好謂之璧以禽作六摯以等諸臣孤執皮帛卿執羔大夫執雁士執雉庶人執鶩工商執雞摰之言至所執以自致也皮帛者束帛而表以虎豹之皮羔取其羣而不失其類雁取其候時而行雉取其耿介而文明鶩取其不飛遷雞取其知時曲禮曰飾羔雁者以繪士相見禮卿大夫執摰以布而不言繪蓋諸侯之臣與王臣異也然則天子之孤飾摰以虎皮公之孤以豹皮與自雉以下執之無飾爵同則摰同不以命數故士相見禮侯國卿大夫士所摰與此同但飾異耳凡摰無庭實雁非家禽不時得又不可畜蓋舒雁也取其安舒而潔白膳夫受摰以為膳則皆恆用之物可知矣以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其器之色禮謂始告神時薦于神坐書金縢周公植璧秉圭是也宗廟薦玉與祼同節祭天宜當實柴之節也此圜丘方澤及四郊迎氣之祭所用璧圜象天琮八方象地圭鋭象春物始生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物惟天半見幣以從爵若人飲酒有酬幣不曰四郊而曰四方疑五嶽四鎮四瀆禮神之玉及牲幣皆然以天産作隂德以中禮防之以地産作陽德以和樂防之天産六牲之屬地産九穀之屬祭之始薦血燔膋以求神于幽所以作隂德也此近于鬼道故以禮儀為節所以防其過薦黍稷內羞以養神于顯所以作陽德也此純乎人道故以和聲合莫所以防其過以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物李耜卿曰此推言禮樂之功用也人君建中和之極萬民服中和之教則氣之所感天地欣合隂陽相得煦嫗覆育萬物草木茂句萌達羽翼奮角觡生蟄蟲昭蘇胎生者不殰卵生者不殈所謂合天地之化百物之産也致百物謂致物産之祥以禮樂合天地之化如春禘秋嘗春合舞秋合聲之類合百物之産如上經所謂以天産作隂德以地産作陽德及菹醢以水草陸産相間之類致百物大司樂六變而諸物皆致是也凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮玉鬯所以灌也玉齍所以盛黍稷也二者惟宗廟社稷用之注以玉為禮神之玉非也知然者大宰職祀五帝贊玉幣爵之事祀大神示亦如之則禮神之玉贊奉者大宰也其職于享先王後特言贊玉几玉爵蓋惟以人道享之乃有几與玉爵也大宰既贊玉几玉爵故宗伯所掌惟玉鬯玉齍也于玉齍曰奉子玉鬯曰涖者小宰贊祼宗伯惟涖玉鬯而已鑊所以烹牲大號六號之大者以詔大祝為祝辭治猶簡習也宿祭之前夕也注訓申戒似因大宰視滌濯然不害宗伯與大宰並視也若王不與祭祀則攝位攝代也王不與祭祀謂疾與喪凡大祭祀王后不與則攝而薦豆籩徹外祀后不與曰大祭祀者禘祫及四時之祭也大賔客則攝而載果載為也果宜作祼君無酌臣之禮故王拜送而代王酌獻大行人職曰上分之禮再祼而酢則后祼亦攝為之或曰惟后不與則攝也朝覲會同則為上相大喪亦如之王哭諸侯亦如之出接賔曰檳入詔禮曰相相者五人卿為上相或王或嗣王為喪主拜賔宗伯亦為上相哭諸侯謂薨于其國為位而哭之若來朝而薨則王為之緦麻檀弓天子之哭諸侯也爵辨絰䊷衣王命諸侯則儐儐進之也王將出命假于祖廟立依前南鄉儐者進當命者使登內史由王右以策命之降再拜稽首登受策以出諸侯爵祿其臣則于祭焉國有大故則旅上帝及四望故謂凶災曰上帝該昊天上帝與五方帝也旅陳也陳其祭事以祈焉禮不如祀之備旅山祭也上帝而曰旅者遍用事于四郊所祭非一帝也春秋傳鄭子産禳火祈于四鄘蓋其遺制王大封則先告后土后土土神也乃頒祀于邦國都家鄉邑頒其所當祀及其禮鄉邑公邑也鄉邑之祀如社禜酺之類先邦國次都家次鄉邑舉外以及內也宗伯職獨無正月之吉始和布禮于邦國都鄙云云者治教政刑隨時損益禮則一定而不可易無事每歲和而布之也禮不下庶人閨門鄉黨之禮則夫人而習之矣若郊廟朝廷邦國之禮則當官者自肄之無事縣于象魏使萬民觀之也小宗伯之職掌建國之神位右社稷左宗廟庫門內雉門外之左右兆五帝于四郊四望四類亦如之兆為壇之營域黃帝亦于南郊類有事而特祭也依四郊四望之禮故曰四類即大宗伯職所謂旅上帝及四望也社稷宗廟非時而祭皆曰類則四郊四望亦可類明矣兆山川丘陵墳衍各因其方山該林川該澤無原隰之兆者原隰平土也社通于上下為土祭之最盛矣掌五禮之禁令與其用等用等牲器尊卑之等辨廟祧之昭穆自始祖之後父曰昭子曰穆辨吉凶之五服車旗宮室之禁丘氏曰九章七章五章三章一章此吉服也斬衰齊衰錫衰緦衰疑衰此凶服也掌三族之别以辨親疏其正室皆謂之門子掌其政令三族謂父子孫喪服小記曰親親以三為五以五為九正室適子也將代父當門故謂之門子政令謂分族屬明宗法不得以卑代尊以孽代宗之類毛六牲辨其名物而頒之于五官使共奉之毛擇毛也惟大宰不奉牲總贊王牲事辨六齍之名物與其用使六宮之人共奉之六齍即六穀祭有大小則用有多寡辨六彝之名物以待果將辨六尊之名物以待祭祀賔客六彝雞彝鳥彝斚彝黃彝虎彝蜼彝果讀為祼六尊獻尊象尊壺尊著尊大尊山尊按司尊彝惟祭祀陳六彝六尊此兼言賔客則饗賔客于廟陳六尊亦依祭禮四時所用若在野外饗則不用祭祀之尊故春秋傳云犧象不出門也六彝專以待祭祀賔客之祼故别言之項氏曰名六者之名物所實之物掌衣服車旗宮室之賞賜掌四時祭祀之序事與其禮序事序六官之屬所當執之事也若國大貞則奉玉帛以詔號問事之正曰貞國語貞于陽卜大貞謂卜立君卜大封也玉帛所以禮神詔詔大祝也號神號幣號大祭祀省牲視滌濯祭之日逆齍省鑊告時于王告備于王逆齍受饎人之盛以入也省鑊視烹腥熟凡祭祀賔客以時將瓚果將送也猶奉也祭祀以時奉而授王賔客以時奉而授宗伯天子圭瓚諸侯璋瓚小宰贊祼將之事實鬱鬯以授王也小宗伯將瓚祼送瓚于小宰使實之以祼也舊説小宗伯以瓚授王王以授尸則無所用小宰之贊矣詔相祭祀之小禮凡大禮佐大宗伯小禮謂王有故不親而使大宰宗伯攝者或曰大禮交神之大節小禮又其中之節目也未至職末輒言此者以此下皆小宗伯專行事不佐大宗伯故于中言之以結上也賜卿大夫士爵則儐賜猶命也小祭祀掌事如大宗伯之禮大賔客受其將幣之齎謂所齎來貢獻之財物也凡朝覲禮畢于廟致貢行三享之禮以玉幣致享既訖其庭實之物小宗伯受之大宰贊王受玉小宰受幣其以幣將之財物則小宗伯受之財物而使禮官受者庭實旅百皆所以享宗廟禮器所載大饗之禮各以其國之所有而無常貨是也此經之齎與賫同義若大師則帥有司而立軍社奉主車有司大祝也王出軍必先有事于社及遷廟載其主以行春秋傳軍行祓社釁鼓祝奉以從禮記曾子問篇天子巡守以遷廟主行載于齊車是也社之主用石為之鄢陵之戰晉張幕虔卜于先君以主車在軍故也若軍將有事則與祭有司將事于四望若軍將有事則與祭句蓋軍中之祭小宗伯與焉若所征之地近五嶽四瀆則使有司將事而不親也非遍祭四望如有事于東方則祭海岱即肆師職祭兵于山川是也若大甸則帥有司而饁獸于郊遂頒禽甸讀為田有司甸祝也饁饋也以禽饋四方之神于郊郊有羣神之兆也頒禽謂以豫羣臣禮記頒禽隆諸長者詩傳禽雖多取三十焉其餘以豫大夫士以習射于澤宮而分之以禮官與軍事者軍旅不可以無禮也以禮官與甸事者田獵不可以無禮也大宗伯不行者天地宗廟社稷之事為重也太災及執事禱祠于上下神示曰有司者專司其事者也曰執事者非一官之屬求福曰禱得求曰祠王崩大肆以秬鬯渳大肆大浴也或曰始陳尸伸之渳或讀為泯謂浴尸也大祝以肆鬯渳小祝贊渳小宗伯蓋察其不如儀及執事涖大斂小斂率異族而佐執事大祝之屬涖臨也親斂者當為事官之屬異族佐斂同姓當序哭也縣衰冠之式于路門之外及執事視葬獻器遂哭之視葬視其地也器明器也獻素獻成皆于殯門外王哭則獻器者亦哭卜葬兆甫竁亦如之既葬詔相喪祭之禮兆墓塋域甫始也竁謂穿壙喪祭虞祔也成葬而祭墓為位祭墓祭其地之土神也位壇位也凡王之會同軍旅甸役之禱祠肄儀為位國有禍災則亦如之肄習也李耜卿曰禱祠即上文將事四望饁獸于郊之類肄儀為位至此始言之者文相足也禍災即上文所謂大災上言禱祠此言肄儀為位亦文相足也凡天地之大災類社稷宗廟則為位類依其正禮而為之無祭天地之文者與篇首所謂四類互相僃也因天地之災而類及社禝宗廟則四郊四望之類不必言矣凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀凡言大禮者王親之小禮羣臣攝肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲此立侯國之祀也王國天神地示人鬼之禮則大宗伯建之矣其曰佐者立之者肆師定而頒之者大宗伯也此三事雖侯國之禮而立之者肆師故首列焉以歲時序其祭祀以下則王朝之祭祀奉宗伯所建之成法而宣布焉耳諸侯不祭天地則無實柴之祀其宗廟之祭無旅幣無方之奠未賜圭瓚則不敢為鬯雖賜樂不敢備六代之舞故大祀止于玉帛牲牷若天子則圭璧以祀日月星辰璋邸射以祀山川不得云次祀用牲幣矣以歲時序其祭祀及其祈珥易彥祥曰小子職珥于社稷祈于五祀羊人職祈珥共羊牲與此文同至秋官士師職則曰凡刉珥奉犬牲後鄭並改祈為刉且以珥當從血為衈引雜記釁羊之説然羊人小子職釁積釁邦器軍器皆直謂之釁不應宮兆始成之釁獨謂之祈珥劉中義云珥弭字之誤也祈謂小祝之祈福祥弭謂小祝之弭兵災今從之大祭祀展犧牲繫于牢頒于職人職人謂充人及監門職當繫牲而養之者凡祭祀之卜日宿為期詔相其禮視滌濯亦如之滌濯溉拭各有節次故亦詔相之祭之日表齍盛告潔展器陳告備及果築煮相治小禮誅其怠慢者簠以盛稻粱簋以盛黍稷有蓋不知其實故以徽識表之陳陳列也築煮築鬱金煮之以和鬯築與築防築城之築同義掌兆中廟中之禁令凡祭祀禮成則告事畢兆壇塋域大賔客涖几筵築煮贊果將酌鬱鬯授大宗伯載祼大朝覲佐儐共設匪甕之禮饗食授祭大朝覲謂大會同時之朝覲也若四時常朝則小行人為承儐公食大夫禮若不親食使大夫以侑幣致之豆實實于甕簋實實于筐匪或筐字之誤也肆師不掌飲食蓋掌其禮而使掌客等共設之授祭授賔祭肺也大宰職大朝覲與會同並列則為四時常朝者衆此不言會同則為大會同時之朝覲也與祝侯禳于疆及郊侯禳小祝職也侯候迎善氣大喪大渳以鬯則築煮后世子喪浴皆以鬯令外內命婦序哭禁外內命男女之衰不中法者且授之杖外命男六鄉以出也內命男朝廷卿大夫士也其妻為外命女喪服為夫之君齊衰不杖內命女王之三夫人以下諸侯喪禮三日授子杖五日授大夫杖七日授士杖天子之喪禮未聞凡師甸用牲于社宗則為位社軍社也宗遷主也李耜卿曰甸字疑衍類造上帝封于大神祭兵于山川亦如之造即也為兆以類禮即祭上帝也封謂壇也大神社及方嶽也山川蓋軍之所依止上經用牲于社宗據在軍下云師不功據敗退後則此經其克勝後告天及社之事與凡師不功則助牽主車助大司馬凡四時之大甸獵祭表貉則為位貉師祭也于立表之處祭始造軍法者其神蓋蚩尤或曰黃帝四時之田獵有曰大者豈王或不親而使司馬即事則為小與王之會同軍旅甸役之禱祠小宗伯為位而肆師復為師甸祭祀之位者小宗伯所掌者特有祈請肆師所掌則師甸之常祭也將戰而用牲于社宗既勝而告于上帝大神山川田獵而祭表貉皆常祭也特有祈請則其禮宜簡于常祭而乃使小宗伯為位者其事非常則所以斟酌其儀位者非禮官之師不敢專也肆師則遵循故典而已師甸大宗伯不與故小宗伯專其禮嘗之日涖卜來歲之芟剃草而預卜之何也月令大雨時行燒剃行水利以殺草稻人職以涉揚其芟作田蓋雨行以時則所芟之草可化為糞故預卜之獮之日涖卜來歲之戒問後歲兵寇之備社之日涖卜來歲之稼卜來歲之稼則社宜為秋祭若國有大故則令國人祭歲時之祭祀亦如之大故謂水旱凶荒所令祭者社及禜酺國人鄉遂都邑之有司及其民也歲時之祭祀月令仲春命民社之類凡卿大夫之喪相其禮易氏曰非相其家禮相國之喪禮職喪聽之者凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮統言宗伯者或佐大宗伯或佐小宗伯也國之大事小宗伯既佐大宗伯而肆師復佐之何也肆師兼治禮儀又或小宗伯有故不得與則攝而佐大宗伯也國之小事小宗伯掌之而肆師復掌之何也亦攝小宗伯也如大師小宗伯一人在行一人在喪與疾則祭祀賔客不得不以肆師攝矣不曰大事佐大宗伯小事佐小宗伯何也設王有疾而大宗伯攝祭則大宗伯之事不得不以小宗伯攝大宗伯有喪與疾亦然設小宗伯各有事故則小宗伯之事亦或以大宗伯攝鬱人掌祼器謂彝及舟與瓚凡祭祀賔客之祼事和鬱鬯以實彝而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節祼玉謂圭瓚璋瓚凡祼事沃盥上經既言濯祼玉則此主共祼者沃盥之水與器也大喪之渳共其肆器肆器陳尸之器喪大記君設大盤造氷焉設牀禪笫有枕此之謂肆器及葬共其祼器遂貍之遣奠之彝與瓚也貍于祖廟階間明奠終于此或曰乃明器納之壙中者大祭祀與量人受舉斚之卒爵而飲之斚受福之嘏聲誤也王酳尸尸嘏王此其卒爵也受飲卒爵必與量人者鬱人贊祼時量人制從獻之脯膰事相成鬯人掌共秬鬯而飾之秬鬯未和鬱者飾之謂設巾凡祭祀社壝用大罍禜門用瓢齎廟用修凡山川四方用蜃凡祼事用概凡疈事用散罍瓦器春秋傳日月星辰之神則雪霜風雨之不時于是乎禜之山川之神則水旱厲疫之災于是乎禜之門國門也瓢謂瓢蠡也齎讀為齊取甘瓢割去抵以齊為尊修蜃概散皆漆尊也修或讀為卣蜃飾以蜃者概尊以朱帶者無飾曰散首社壝天地之祀無鬯也灌鬯以求神也天地之神無所不在社有主則可以人道求之矣先儒以大宗伯有涖玉鬯之文遂謂天地亦用鬯非也大宰職祀五帝及大神示贊玉幣爵之事故宗伯職特出涖玉鬯奉玉齍以法所掌玉事獨此二者乃宗廟社稷所用不得據此謂天地亦用鬯也其文總承祀大神享大鬼祭大示之後者以卜日宿視滌濯省鑊詔號乃三禮之所同耳凡祼事謂賔客之祼事也不曰賔客用概者王弔臨共介鬯則弔臨亦用祼也鬱人統言祭祀賔客之祼事則凡祼事沃盥謂祭祀賔客也此經既條列祭祀所用而又曰凡祼事用概則謂賔客弔臨之祼可知矣冠禮亦有祼故以凡該之廟疑當作望廟用六彝已見司尊彝職而此經僃列諸祼事不宜遺五嶽四瀆舊説祼當為埋非也上列四望下列山川則埋祭已具矣李耜卿曰以疈辜祭四方百物今既有四方又曰疈事者蓋專指百物以用器有異故别言之耳表記天子親耕粢盛秬鬯以事上帝或因郊祀以稷配降神用鬯連類而及之尤不足據大喪之大渳設斗共其釁鬯斗所以沃尸也釁鬯釁尸之鬯酒也凡王之齊事共其秬鬯給淬浴凡王弔臨共介鬯以尊適卑曰臨曲禮摰天子鬯王至尊介為致之檀弓曰臨諸侯畛于鬼神曰有天王某甫蓋王適四方舍諸侯祖廟祝告其神之辭介于是進鬯雞人掌共雞牲辨其物大祭祀夜呼旦以􅑧百官凡國之大賔客會同軍旅喪紀亦如之凡國事為期則告之時告其有司主事者不曰告之日而曰告之時者用事有早暮如春朝朝日秋暮夕月之類凡祭祀面禳釁共其雞牲面禳者侯禳于疆及郊四方皆用事焉釁釁廟之屬司尊彝掌六尊六彝之位詔其酌辨其用與其實位所陳之處酌泲之使可酌即下經鬱齊獻酌等用謂四時祭祀所用各異實鬱及醴齊之屬春祠夏禴祼用雞彝鳥彝皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸祼用斝彝黃彝皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彝蜼彝皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也朝踐謂薦血腥酌醴始行祭事后于是薦朝事之豆籩既又酌獻朝獻謂尸卒食王酳之其變朝踐為朝獻者尊相因也再獻者王酳尸之後后酌亞獻諸臣為賔又次后酌盎齊備卒食之三獻饋獻謂薦熟時后薦饋食之豆籩其變再獻為饋獻亦尊相因也凡此九酌王及后各四諸臣一祭之正也雞彝鳥彝謂刻畫其形舟尊下臺獻讀為犧犧尊飾以翡翠或曰畫犧牛形象尊飾以象骨明堂位犧象周尊也昨讀為酢尊以獻神罍則諸臣獻尸後所酌以自酢者尸酢王后即用醴齊盎齊尊故也斝讀為稼斝彝畫禾稼也黃彝以黃金為目明堂位夏后氏以雞彝殷以斝周以黃目郊特牲黃目鬱氣之上尊也著尊著地無足明堂位著殷尊也壺者以壺為尊春秋傳尊以魯壺追享禘祫也朝享月朔之祭春秋傳閠月不告月猶朝于廟蜼禺屬卬鼻而長尾大尊大古之瓦尊山尊山罍也亦刻畫為雲山之形彝與尊各用二者鬱鬯與齊皆配以明水或曰王與后各酌其一也追享謂大祫及禘皆追逺之祭即宗伯職所謂肆獻祼也朝享謂月朔朝廟之祭即宗伯職所謂饋食也但此經朝享亦有朝踐而宗伯職獨言饋食似從饋食始豈月朔之祭自饋食以下禮皆備而朝踐之禮減略遂獨舉饋食以為名猶凡祭皆有血腥爓孰而曰郊血大饗腥三獻爓一獻孰與周官每同事而異詞所以互發其義也蓋因此經以見宗伯職所謂肆獻祼乃大祫與禘追享逺祖之祭所謂饋食乃月朔朝廟之祭又因宗伯職以見大祫異于時祫以遍陳毁廟之主及禘以祼為主月祭以饋食為主之義也五齊以實彝尊則罍之實為三酒可知矣罍為諸臣所自酢則尸酢王與后即用所獻之齊諸臣獻尸亦得以齊可知矣曰鬱齊獻酌則鬱合鬯而仍和以齊可知矣舊説惟大事于太廟備五齊三酒非也酒正職凡祭祀以法共五齊三酒以實八尊以義推之祼用鬱齊朝踐饋食所用者其四齊也祼用二彝器異而齊同也朝踐饋食各用二尊器同而齊異也每用二者禮器君西酌犧象夫人東酌罍尊夫婦不相襲也三酒亦當用三罍賔禮九獻不數祼則祭祀可知疑朝踐饋食及酳尸皆王后各一獻諸臣各一獻也諸臣之三獻當以同姓異姓嗣舉奠為次故用三酒如舊説王與后各四獻諸臣一獻則于皆有罍之義不可通矣凡六彝六尊之酌凡如凡其死生鮮薧之凡謂别而次之也下有凡酒而此不言罍者省文也鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌禮運玄酒在室醴盞在戶粢醍在堂澄酒在下以五齊次之則盞酒盎齊也獻讀為摩莎之莎煮鬱和秬鬯以盎齊摩莎泲之出其香汁郊特牲所謂汁獻涗于盞酒也醴齊尤濁和以明酌泲之以茅縮去滓所謂縮酌用茅也盎齊差清和以清酒泲之所謂盞酒涗于清也其餘三齊泛從醴緹沉從盎凡酒謂三酒也修讀如滌濯之滌滌酌以水和而泲之祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒大喪存奠彝大旅亦如之存省也謂大遣時奠者朝設夕乃徹天地至尊不祼此得用彝者亦奠之而已文義與國子存遊倅同蓋存而不用也虞而立尸始以神道事焉魄體尚在殯故不忍遽以神道求之四望本宜用祼以與五帝同祀且遍于上下百神故不用祼此禮義之所以深而通也司几筵掌五几五席之名物辨其用與其位凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几依制如屏風黼依者以絳帛為質繡斧于依前左右設几優至尊也紛白繡也純緣也莞細葦也繅讀為藻率之藻削蒲蒻展之編以五采畫畫雲氣也次席桃枝席有次列成文祀先王昨席亦如之昨讀為酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王于是席王于戶內諸侯祭祀席蒲筵繢純加莞席紛純右雕几繢畫文也昨席莞筵紛純加繅席畫純筵國賔于牖前亦如之左彤几别言左彤几于筵國賔之後者示昨席無几也人道尚左鬼神尚右王昭禹曰分布采色曰繢摹成物體曰畫考工記曰青與白相次赤與黑相次所謂繢也又曰山以章水以龍所謂畫也于諸侯言祭席酢席之異則王之祭酢同席可知矣于諸侯言祭席賔筵之異則王之賔祭同席可知矣于諸侯舉賔筵于王不言者諸侯之席再重知諸侯相為賔之筵則王之筵諸侯可知矣于王先舉朝覲饗射封國命諸侯而後及祭席酢席文當然也若先列祭席而曰酢亦如之朝覲饗射封國命諸侯亦如之則贅矣禮器鬼神單席豈異代之禮與甸役則設熊席右漆几謂有司祭表貉所設席也凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几喪事謂凡奠也萑如葦而細柏席迫地之席葦加其上或曰載黍稷之席或曰柏椁字之訛椁席藏中神坐之席也敦讀為燾燾覆也棺在殯則椁燾周禮雖合葬若同時在殯則異几故曰每敦一几也黼純兼上三席諸侯則以紛别之凡吉事變几凶事仍几仍因也吉事謂王祭宗廟祼于室饋食于堂繹于祊每事易几凶事謂凡奠朝夕相因天府掌祖廟之守藏與其禁令始祖之廟也禁令謂防守及陳藏之法凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之大祭禘祫也凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治治中治職事之簿書謂之中者示合于經制也上春釁寶鎮及寶器凡吉凶之事祖廟之中沃盥執燭季冬陳玉以貞來歲之媺惡陳玉以禮神也若遷寶則奉之若國遷則奉寶以之新廟也若祭天之司民司祿而獻民數穀數則受而藏之司民軒轅角也司祿文昌第四星或曰下能也地官獻賢能之書秋官計獄弊訟及邦之盟書皆登于天府而不見于本職何也此職載受藏治中以詔王察羣吏之治也載受藏民數穀數以祭天之司民司祿陳玉而與執事也若賢能之書獄訟之計盟約之文其得失當否天府既不糾察又不與執事是以散見于二官而不詳于本職耳李耜卿曰秋官有司民之職孟冬祀司民司寇獻民數于王然則地官有司祿之職獻榖數者必司徒也典瑞掌玉瑞玉器之藏辨其名物與其用事設其服飾人執以見曰瑞禮神曰器瑞符信也服飾謂繅藉天府所藏玉先王之遺物典瑞所藏則時王所用王晉大圭執鎮圭繅藉五采五就以朝日晉讀為搢插于衣帶間繅所以藉玉也木為中幹用韋衣而畫之或曰冕繅織絲為之圭繅亦然一匝為一就五就五匝也天子春分朝日秋分夕月圭制俱見玉人職公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王諸侯相見亦如之三采朱白蒼二采朱緑也覲禮曰侯氏入門右坐奠圭再拜稽首于王舉朝日則祀天地宗廟不必言矣于諸侯舉朝覲宗遇會同則祭祀不必言矣瑑圭璋璧琮繅皆二采一就以俯聘璋以聘后夫人以琮享之瑑有圻鄂瑑起遣臣聘不得執君之圭璧無桓信躬與蒲榖之文直瑑之而巳四圭有邸以祀天旅上帝邸本也于中央為璧圭本著于璧而其末四出一玉俱成祀天圜丘之祭不曰旅五帝而曰旅上帝者四時迎氣及國有大故遍祀五帝孟春之郊季秋明堂之享皆用之也兩圭有邸以祀地旅四望祀地方澤之祭也李耜卿曰大宗伯六器與六瑞六摰相次則蒼璧黃琮或初致其神奠玉而禮之如執摰以見者故曰禮天禮地此四圭有邸兩圭有邸與祼圭有瓚為類則邸當亦瓚屬表記曰秬鬯以祀上帝則此邸疑或注秬鬯者雖不以祼而奠以享神故曰祀天祀地推之下文圭璧者是于圭頭為器如璧璋邸射者是于璋頭為器如邸而射皆挹鬯爵也鄭氏見大宗伯有蒼璧黃琮之文此官無之而别云四圭有邸兩圭有邸遂以蒼璧所禮者冬至圜丘之祀四圭則夏正郊天黃琮所禮者崑崙之祭兩圭則神州之神又合而一之曰蒼璧為邸四圭託焉黃琮為邸兩圭託焉更無他據今且闕之祼圭有瓚以肆先王以祼賔客于圭頭為器可以挹鬯祼祭謂之瓚于先王言肆于賔客言祼者宗伯職以肆獻祼享先王以祼代禘故于此言肆以明凡祭皆有祼也祭之祼灌地以降神故直言祼賔客以示無灌地之禮圭璧以祀日月星辰圭其邸為璧取殺于上帝璋邸射以祀山川以造贈賔客射剡也璋有邸而射取殺于四望造贈賔客謂致稍餼時造館贈之使還贈賄亦執以將命或以周官每以四望與山川並舉疑非五嶽四瀆非也山林川澤丘陵墳衍皆有兆而五嶽四鎮四瀆尤地示之尊者故别言之小宗伯職有司將事于四望曰于則以地言之而不得泛指他神示明矣土圭以致四時日月封國則以土地珍圭以徵守以恤凶荒珍故書或為鎮以徵守者以徵召守國諸侯恤者開府庫振救之亦謂侯國之有凶荒者李耜卿曰掌節之節守國行道之用也典瑞之瑞作事之信也先儒或謂瑞即節誤矣牙璋以起軍旅以治兵守牙璋瑑以為牙齒牙兵象璧羡以起度羡隋圓也此璧本徑九寸旁減一寸以益上下故高一尺橫徑八寸十寸之尺十之則為丈八寸之尺十之則為尋從橫皆可為度駔圭璋璧琮琥璜之渠眉疏璧琮以斂尸駔當為組渠眉玉飾之溝瑑也以組穿聨六玉溝瑑之中于大斂加焉圭在左璋在首琥在右璜在足璧在背琮在腹蓋取象于方明神之也六玉兩頭皆有孔又于孔間為溝渠于溝之兩畔稍高為眉瑑疏璧琮義未詳穀圭以和難以聘女榖善也其飾若粟文然和難如春秋魯宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王其聘女則以納徵焉琬圭以治德以結好諸侯有德王命賜之大行人職時聘以結諸侯之好所條列無學校之事則以治德者豈視學養老之所執與琰圭以易行以除慝使易惡行而為善則以此圭責讓喻告之大行人職殷俯以除邦國之慝大祭祀大旅凡賔客之事共其玉器而奉之玉器四圭祼圭之屬大喪共飯玉含玉贈玉飯玉碎玉以雜米含玉柱左右齻及在口中者贈玉蓋璧也贈用玄纁束帛天子加以璧凡玉器出則共奉之玉器出謂王所好賜也奉之送以往遠則送于使者祭祀賔客則始終奉之俟事畢而藏焉若王所好賜及聘使所執有司所用喪紀所需則惟出之時共奉之以付其人其應反者則俟其人之事畢而自反之也典命掌諸侯之五儀諸臣之五等之命五儀公侯伯子男之儀五等謂孤以下四命三命再命一命不命也或言儀或言命互文也上公九命為伯其國家宮室車旗衣服禮儀皆以九為節侯伯七命其國家宮室車旗衣服禮儀皆以七為節子男五命其國家宮室車旗衣服禮儀皆以五為節上公謂王之三公加命為二伯與二王之後國家謂城與宮之制公之城方九里宮方九百步侯伯子男降殺以兩餘見司服巾車大行人職王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宮室車旗衣服禮儀亦如之四命中下大夫也王之上士三命中士再命下士一命凡諸侯之適子誓于天子攝其君則下其君之禮一等未誓則以皮帛繼子男誓命而戒之也誓與未誓皆據父在而言若父卒後得誓者得與諸侯序明齋王氏曰立適周之達禮然猶兼象賢之意必賢足以繼世天子乃命為世子而不得擅易也公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其宮室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宮室車旗衣服禮儀各視其命之數視小國之君者列于卿大夫之位而禮如子男也周官公孤不列職而其名散見于他職此曰公之孤則知凡曰孤卿者乃王之三孤矣司服掌王之吉凶衣服辨其名物與其用事王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則玄冕六服同冕首飾尊也先公謂稷之後太王之先不窋至諸盩羣小祀丘陵墳衍四方百物之屬大裘羔裘也衮卷龍衣也古者冕服十二章益稷日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡至周以日月星辰畫于旌旗春秋傳所謂三辰旗旗是也冕服止九章登龍于山登火于宗彝尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡衮之衣五章裳四章凡九鷩畫以雉謂華蟲也衣三章裳四章凡七毳畫虎蜼衣三章裳二章凡五希刺粉米無畫衣一章裳二章凡三玄者衣無文裳刺黻而巳凡冕服皆玄衣纁裳希讀為絺或作黹字之誤也劉執中曰書稱舜曰豫欲觀古人之象則天子衣裳之章十有二其來遠矣且交龍為旗周之衣不去龍熊虎為旗周之裳不去虎蜼何獨日月為常而去衣章之日月星辰乎典命上公九命以九為節推而上之天子衮冕十有二章明矣享先王以衮冕則祀天地之服備十二章可知矣不敢服日月星辰之章以祀先王與不敢以衮祀先公其義一也凡兵事韋辨服以靺韋為辨又以為衣裳視朝則皮辨服皮辨服十五升白布衣積素以為裳王受諸侯朝覲于廟則衮冕凡甸冠辨服甸田獵也冠辨委貌即玄冠也其服緇布衣亦積素以為裳諸侯則以視朝凡凶事服辨服服辨喪冠也其服斬衰齊衰凡弔事辨絰服辨絰者如爵辨而素加環絰其服錫衰緦衰疑衰凡喪為天王斬衰為王后齊衰王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆辨絰君為臣服弔服也錫麻之滑易者十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升疑之言擬擬于吉也不見婦人弔服者與夫同喪服大夫弔于命婦錫衰命婦弔于大夫亦錫衰喪服注凡婦人弔服吉笄無首素總王為士服蓋同姓五服內及故舊大札大荒大災素服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自玄冕而下如孤之服其凶服加以大功小功士之服自皮辨而下如大夫之服其凶服亦如之其齊服有玄端素端自公之衮冕至卿大夫之玄冕皆其朝聘天子及助祭之服諸侯非二王後皆玄冕而祭于已雜記曰大夫冕而祭于公辨而祭于已士辨而祭于公冠而祭于已大夫爵辨自祭家廟惟孤耳其餘皆玄冠與士同玄冠自祭其廟者其服朝服玄端諸侯之自相朝聘皆服皮辨乃天子日視朝之服也喪服天子諸侯齊斬而已卿大夫加以大功小功士亦如之又加緦焉齊服自公以下至士同吉則玄衣凶則素衣皆謂之端言其幅之正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之蓋半而益一焉鄭剛中曰子男毳而下如侯伯則上不服鷩可知侯伯自鷩而下如公則上不服衮可知公自衮而下如王則上不服日月星辰可知經文謂自衮而下如王之服則衮冕而上之章非日月星辰而何凡大祭祀大賔客共其衣服而奉之大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序奠衣服如後世坐上魂衣廞陳也廞衣服藏于槨中者周官之文多舉下以該上惟喪浴之氷及復斂奠廞之服獨舉上以該下者不疑于小喪之不共也典祀掌外祀之兆守皆有域掌其禁令外祀即小宗伯所兆四郊已下若以時祭祀則帥其屬而修除徵役于司𨽻而役之及祭帥其屬而守其厲禁而蹕之守祧掌守先王先公之廟祧其遺衣服藏焉先公之遷主藏于后稷之廟先王之遷主藏于文武之廟遺衣服大斂之餘也若將祭祀則各以其服授尸尸當服卒者之上服程子曰古人祭祀用尸極有意人之魂氣既散必求其類而依之人與人既為類骨月又為一家之類已與尸各既心齊潔至誠相通以此求神宜其享之後世直以尊卑之勢遂不肯行朱子曰神主之位東鄉尸在神主之北其廟則有司修除之其祧則守祧黝堊之修除黝堊互相備有司恆主修除守祧恆主黝堊黝黑也堊白也爾雅曰地謂之黝牆謂之堊近廟每祔則新之故止于修除祧遠歲久漫漶故黝堊祖廟遠宜從祧既祭則藏其隋與其服隋尸所祭肺脊黍稷之屬藏之以依神世婦掌女宮之宿戒及祭祀比其具天官世婦祭之日涖陳女宮之具此職又挍比之詔王后之禮事帥六宮之人共齍盛天官世婦帥女宮濯溉為齍盛所帥女奚也此則帥世婦女御而共之于正祭之日相外內宗之禮事外宗佐后薦徹豆籩內宗佐傳豆籩大賔客之饗食亦如之大喪比外內命婦之朝莫哭不敬者而苛罰之苛譴也凡王后有􅉔事于婦人則詔相春秋傳二王後天子有喪拜焉設其夫人家在畿內值王喪赴弔及后之母王之世母叔母姑姊妹王師傅之妻以禮見后皆當答拜凡內事有達于外官者世婦掌之以是知為公卿大夫士之妻有齒德者備官王宮而非王之妃嬪也內宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩薦加爵之豆籩也尸既食后亞獻為加爵佐傳佐外宗賔客之饗食亦如之王后有事則從大喪序哭者次序內外宗及命婦也哭諸侯亦如之天子雖絶期然王之伯叔兄弟之喪則宮中必為位而哭也疏泛言諸侯來朝而薨未安內宗所序六宮之哭位非王之周親王哭之而已非內宗職之所及也凡卿大夫之喪掌其弔臨注疏卿大夫卑王后不弔臨故遣內宗掌之非也若王之尊屬周親后之父母無問爵之尊卑后必弔臨其餘卿大夫之喪為王之同姓姻親者則使世婦往弔而內宗掌其禮事以佐之也王后之弔僅一見于女巫職而他無及焉何也內宰正后之服位而詔其禮樂之儀內小臣祭祀賔客喪紀擯詔后之禮事則后之弔事具矣外宗掌宗廟之祭祀佐王后薦玉豆視豆籩及以樂徹亦如之王后以樂羞齍則贊凡王之豆籩皆玉飾之不言籩文略也視豆籩者謂在堂東未設時視其實也齍黍稷也齍不言贊徹者豆籩且贊徹則齍可知矣薦徹豆籩九嬪內外宗三職俱佐后者九嬪始徹內宗受之以傳于外宗然後以授有司故內宗職曰佐傳豆籩也不曰及徹亦如之而曰及以樂徹不曰王后羞齍則贊而曰王后以樂羞齍則贊者明羣小祀不用樂則薦豆羞齍后或不親而外宗亦不贊也凡王后之獻亦如之王后不與則贊宗伯獻獻酒于尸小祭祀掌事賔客之事亦如之小祭祀謂宮中門戶竈之類賔客謂女賔客之進見于后宮者若外賔客饗食之事則內宰掌之大喪則敘外內朝莫哭者哭諸侯亦如之內內外宗外外命婦若內命婦則九嬪敘之序內哭者與內宗聨事外則其專職也注及字乃外字之誤冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右此昭穆謂繼世而王者凡諸侯居左右以前卿大夫士居後各以其族謂王子孫為畿內諸侯王朝卿大夫士者舊説居王墓前後之左右非也王以昭穆序葬于大祖之左右其兆域有定而子孫無窮將無地以容且君臣同域非所以為禮也蓋一王之子孫各為兆域雖以昭穆分左右而諸侯之兆則稍前卿大夫士則稍後耳凡死于兵者不入兆域死于兵謂罪在大辟及身為不義而見戕者若執干戈以衛社稷可轉絶其兆域乎凡有功者居前前者昭穆之中央以爵等為丘封之度與其樹數王公曰丘諸臣曰封大喪既有日請度甫竁遂為之尸請度請所穿廣袤之度也甫始也始起土為竁祭土神則為之尸及竁以度為丘隧共喪之窆器隧羡道也丘與隧大小廣袤各有度窆器所以下棺豐碑之屬及葬言鸞車象人遣車亦設鸞旗象人俑也語巾車之官將鸞車及象人向壙及窆執斧以涖遂入藏凶器正墓位蹕墓域守墓禁鄉師執斧以涖匠師則此亦涖匠師葬事大故二官共臨凶器明器也禁所為塋限凡祭墓為尸或始竁或復土後祭墓域之土示皆冢人為尸也先儒以是徵古有墓祭誤矣凡祭祖考無以異姓為尸者以其氣不相屬也以冢人為尸則外祀可知矣凡諸侯及諸臣葬于墓者授之兆為之蹕均其禁此即王子孫之為諸侯卿大夫者疏謂統同異姓誤矣外諸侯則自有冢人畿內異姓卿大夫則彼各有祖宗兆域依昭穆而葬墓大夫之所掌也墓大夫職獨言令國民族葬而不及卿大夫者卿大夫之祖宗皆國民也以貴而立廟尚不敢自主其祭而使宗子主之况敢去先人之兆域而别葬哉墓大夫職正其位掌其度數則兼卿大夫士而非獨庶人可知矣變卿大夫士而曰諸臣者兼王族之無爵者而言也以葬于王墓之左右故無尊卑皆為之蹕墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令族葬謂五服之內共葬一所遠者别塋春秋傳同族于禰廟禮記絶族無移服親者屬也故知以服內為限正其位掌其度數使皆有私地域凡爭墓地者聽其獄訟私地域者萬民墓地同處而分之使各有區域得以族葬也帥其屬而巡墓厲居其中之室以守之厲塋限遮列處中之室官寺在墓中者職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事喪禮令存者喪服士喪既夕士虞餘亡事謂小斂大斂葬曰國之喪禮者自士以上國皆致禮焉與庶人異也凡國有司以王命有事焉則詔贊主人有事謂含禭贈賵之屬國有司謂奉王命以至者凡其喪祭詔其號治其禮凡公有司之所共職喪令之趣其事公有司公家之有司也喪在鄉則鄉之有司共其物在國則國中之有司共其物各有定制不待王命者則職喪以其制令之趣之大司樂掌成均之法以治建國之學政而合國之子弟焉董子曰成均五帝之學法謂教之簡之之法曰治建者國之學政如鄉三物則司徒所建大司樂特治之而已其絃誦之時歌舞之節教學之數則大司樂建之而又治之也曰合國之子弟者王子弟公卿大夫之適子國子之倅國之俊選皆造也國子之教于虎門國子之倅掌于諸子者春秋合舞合聲皆入于成均惟士庶子宿衛者宮正教之道藝宮伯行其秩序不復𨽻大司樂耳竊疑王宮之士庶子即國子與其倅始常入于成均者考其德行道藝上不足任卿大夫而下不至與不帥教者等故使宿衛于王宮所以因材而任其力也凡有道者有德者使教焉死則以為樂祖祭于瞽宗必有道德乃使為大司樂以主教而凡有道德者皆使為之佐也以樂德教國子中和祗庸孝友興賢能以進于王要其學之成也故必備六德六行始學樂者自養其德性則以中和為先而知仁聖義不可遽求也以孝友為先而睦姻任恤不能遍及也不敬則心不一無恆則業不精故合祗庸以為六德焉以樂語教國子興道諷誦言語疏引作詩之義以詁六語非也曰以樂德教國子者非謂樂有此六德謂以樂教人所以養其六德也以樂語教國子者非謂樂之語有此六類謂以樂教人欲其達此六語也興者引彼物以興此事如春秋傳趙孟曰吾兄弟比以安尨也可使毋吠穆叔曰小國為蘩大國省穡而用之是也道者述古而道其義如德正應和曰類故能載周以至于今之類是也諷者微吟誦者朗讀言者賦詩以自言其情語者賦詩以答人之意也古之人不必親相與言也以禮樂相示而已觀春秋傳列國君臣賦詩贈答彼此各喻其意非達于六語何能相應如響耶故曰不學詩無以言以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武雲門大卷黃帝樂也大咸咸池堯樂也大㲈舜樂也大夏禹樂也大濩湯樂也大武武王樂也獨不及文王之樂者六樂皆陳帝王功德故用之于祭祀二南所稱多后夫人之事故用之閨門鄉黨邦國以化天下也蓋以騶虞采蘋采蘩為射節而諸侯之射也先行燕禮卿大夫士之射也先行鄉飲酒之禮其合樂皆終于二南則無地而不用無人而不聞視六樂之用尤切以遍矣以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以説遠人以作動物六律合陽聲者六同合隂聲者十二律以銅為管轉而相生黃鐘為首其長九寸各因而三分之上生者益一分下生者去一焉國語曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾言以中聲定律以律立鍾之均也動物羽裸之屬大合樂乃成均習樂之事其用之則可以格鬼神動民物如下文所列祭祀饗燕之類是也乃分樂而序之以祭以享以祀乃奏黃鍾歌大呂舞雲門以祀天神以黃鍾之鍾大呂之聲為均者黃鍾為陽聲之首大呂為之合乃奏大蔟歌應鍾舞咸池以祭地示大蔟陽聲第二應鍾為之合地示謂大社乃奏姑洗歌南呂舞大㲈以祀四望姑洗陽聲第三南呂為之合祀當為祭典瑞職兩圭有邸以祀地旅四望尚書望于山川春秋傳江漢睢漳楚之望也則不得為天神之祀明矣祀天神之樂一而祭地示之樂三者神之在天者無形不可以分示之在地者異所不容無辨也六樂所致地示五而天神則一義亦如此乃奏蕤賔歌函鍾舞大夏以祭山川蕤賔陽聲第四函鍾為之合函鍾一名林鍾乃奏夷則歌小呂舞大濩以享先妣夷則陽聲第五小呂為之合先妣薑嫄也周特立廟祀薑嫄謂之閟宮蓋諸侯不敢祖天子也商頌推契之自出而舉有娀義亦如此乃奏無射歌夾鍾舞大武以享先祖無射陽聲之終夾鍾為之合夾鍾一名圜鍾曰奏者用樂器也曰歌者用人聲也凡六樂者文之以五聲播之以八音言六者其均皆待五聲八音乃成也播被也清溪李氏曰每二律歌奏則成二調然通謂之一樂者所用同也凡此二律者特為宮耳其餘四聲蓋各以其律從以成一調而為八音之節六樂者調也五聲者聲也知聲調之分則知古人作樂之法矣凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及邱陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神變猶更也樂成則更奏也象物舊説麟鳳龜龍或曰日月星辰成象于天者或曰風雲雷雨之類每變所感各異其義未聞凡樂圜鍾為宮黃鍾為角大蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宮大蔟為角姑洗為徵南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鍾為宮大呂為角大蔟為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞于宗廟之中奏之若樂九變則人鬼可得而禮矣先奏是樂以致其神禮之以玉而祼焉然後合樂而祭之孤竹竹特生者孫竹竹枝根之末生者隂竹生于山北者雲和空桑龍門皆山名春秋傳六府三事謂之九功九功之德皆可歌也謂之九歌朱子曰五音無一則不成樂周禮祭祀非無商音但無商調先儒謂商調是殺聲鬼神畏商調管子曰商聲如離羣羊然則其音最悲非祭祀所宜也天之體動故其感較速地之體靜故其感較遲然天地皆見在之氣而人鬼則已屈之氣故致之為尤難也上言五變而致土示此言八變而地示皆出何也上經列序五地土示者原隰之示耳記曰大旅具矣不足以饗帝則方澤之祭挍之原隰之示其感召必有難易可知矣或謂上分樂而為六用之分祭時此合六而為三用之合祭時非也圜丘方澤專禮天地無合祭衆神示之義所謂天神皆降地示皆出者謂和氣足以動天地則神示無不來格耳所用樂與上異其義未聞凡樂事大祭祀宿縣遂以聲展之宿縣前夕豫縣樂器也以聲展者省其完否善惡也獨舉大祭祀者視瞭掌大師之縣則凡事用樂以聲展者皆大師而大司樂弗親也王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏三夏皆樂章名獨令奏三夏者祭祀之樂大師令奏帥國子而舞當用舞者則帥而往大司樂帥國子而舞非貴遊子弟弗用也樂師帥學士而歌徹凡學士皆得與也大胥職凡祭祀之用樂者以鼓徵學士則學士蓋兼國子與俊選大饗不入牲其他皆如祭祀此賔客之大饗也牲殺于廟門外烹之升鼎乃入故曰不入牲大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞騶虞召南之卒章舞謂執弓挾矢揖讓進退之儀此諸侯來朝將助祭預于大射者王大食三侑皆令奏鍾鼓王師大獻則令奏愷樂大食朔月月半之饋大獻獻捷于祖愷獻功之樂凡日月食四鎮五嶽崩大傀異災諸侯薨令去樂大札大凶大災大臣死凡國之大憂令弛縣四鎮謂揚州之會稽青州之沂山幽州之醫無閭冀州之霍山五嶽岱在兖州衡在荆州嵩在豫州華在雍州恆在并州傀猶怪也大傀異災謂天地竒變若星辰奔霣地震裂之類大災水火也疏去樂據廟中而言弛縣據路寢常縣之樂而言恐未安去樂者屏而不作其日暫也弛縣者日久也知然者諸侯之喪衆多去樂不能久也大臣則數少而情戚春秋傳知悼子未葬杜蕢諫鼓鍾雜記君于卿大夫比卒哭不舉樂是以弛縣也日月食四鎮五嶽崩大傀異災變雖大一日之事也大札大凶大憂非可一日而弭也則屏樂期有久暫必矣侯國卿大夫數少故皆以卒哭為期此經所謂大臣乃孤卿以上注疏兼大夫亦未安凡建國禁其淫聲過聲凶聲慢聲過謂髙躁之聲慢謂懈惰之聲凶謂殺伐之聲大喪涖廞樂器及葬藏樂器亦如之樂器明器也廞興也笙師鎛師籥師司干及視瞭各主興作所掌樂器而大司樂涖之也樂師掌國學之政以教國子小舞小舞即下帗舞以下是也分教以一節故謂之小合之即以舞六樂凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞帗舞羽舞皇舞見舞師職旄旄牛之尾干兵器皆舞者所執人舞無所執以手袖為儀社稷以帗辟雍以旄四方以羽宗廟以人山川以干旱暵以皇鄭剛中曰旄即旄人所教之舞也夷樂散樂賔客之燕樂用之辟雍用旄無所考教樂儀行以肆夏趨以采齊車亦如之環拜以鍾鼓為節樂儀凡行趨登車環拜其節應乎樂者皆是也肆夏采齊皆樂名人君行步以肆夏為節趨疾于步以采齊為節爾雅曰堂上謂之行門外謂之趨然則王出至堂而肆夏作出路門而采齊作其反入至應門路門亦如之此謂步迎賔客若車出則登車于大寢西階之前反降于阼階之前尚書傳曰天子將出撞黃鍾之鍾右五鍾皆應入則撞蕤賔之鍾左五鍾皆應大師于是奏樂環拜謂羣臣環列而拜也朝位東西及南三面環向天子凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節采蘋采蘩見召南貍首見射義皆樂章射義曰騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也其節見射人職凡樂掌其序事治其樂政凡國之小事用樂者令奏鍾鼓大事則大司樂令奏凡樂成則告備凡奏樂八音皆備一曲終則為一成詔來瞽臯舞及徹帥學士而歌徹令相來瞽詔視瞭扶瞽者來入也臯之言號告國子當舞者舞也令相令視瞭扶工以退也樂師帥學士而歌徹承上文小事用樂而言也小師歌徹承上文大祭祀而言也曰帥則樂師不自歌也小事故使學士即事以習聲容饗食諸侯序其樂事令奏鍾鼓令相如祭之儀不曰饗食亦如之而覆舉序樂事令奏鍾鼓令相者明歌徹則不與也蓋小師職之燕射率射夫以弓矢舞樂出入令奏鍾鼓總上祭祀饗食燕射凡其樂之出入皆令奏鼓鍾凡軍大獻教愷歌遂倡之師還未至預教瞽矇愷歌入祖廟則倡之凡喪陳樂器則帥樂官及序哭亦如之哭此樂器亦序而帥之凡樂官掌其政令聽其治訟周官集注卷五
