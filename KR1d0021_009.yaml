body:
  text: 周官集注卷九翰林院侍講銜方苞撰秋官司寇第五寇害也刑之設以除民害天地之氣春生秋殺故司寇為秋官惟王建國辨方正位體國經野設官分職以為民極乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國孝經說曰刑者侀也過出罪施王制曰侀者成也一成而不可變故君子盡心焉刑官之屬大司寇卿一人小司寇中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人士察也主察獄訟之事遂士縣士方士皆别設官而鄉士即用司寇之屬士者所受國中之獄訟其治在國中也諸官皆上士八人中士十有六人以給官中之事而司寇之屬士獨兼受國中之獄訟者諸官之事紛秋官則所掌惟獄訟而四郊之獄訟鄉師聽之而後達于鄉士遂之獄訟遂大夫遂師聽之而後達于遂士公邑都家之獄訟守土者聽之而後達于縣士方士其獄辭皆已定矣其上達則士師察其辭小司寇附其法大司寇斷而行其令故司寇之屬士雖使兼受國中之獄訟而不患其不暇給也四官之事有司分治之使官中之士兼之則侵官也則離局也司寇聽獄訟羣士司刑皆在各麗其法獻其議雖他人所上獄訟亦公聽而共成之則雖使兼受國中之獄訟而非侵官無離局也且四郊之獄訟鄉師聽之必內達于鄉士者以獄之成必取決于司寇也國中之獄訟無外訴于鄉師之理故使司寇之屬士受之觀此類則聖人精義致用之學見矣遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人方士中士十有六人府八人史十有六人胥十有六人徒百有六十人訝士中士八人府四人史八人胥八人徒八十人掌訝乃迎賓客此迎受四方獄訟故以士名朝士中士六人府三人史六人胥六人徒六十人司民中士六人府三人史六人胥三人徒三十人司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人刺者探問亷察之意官主詢察而行赦宥故以刺名後世設刺史亦義取詢察舊說刺殺非也司約下士二人府一人史二人徒四人薛平仲曰或疑司約司盟非盛世事然世變益降使私為約私為盟以紛紛于下孰若設官于上以司之使不可逾乎盟約不逾則訟獄可息此先王之不得已也司盟下士二人府一人史二人徒四人盟者約辭告神殺牲歃血明著其信也曲禮曰涖牲曰盟書載苖民罔中于信以覆詛盟則五帝之世已有此事第苖民覆之故數以為罪耳春秋傳成王勞周公太公而賜之盟穀梁子謂盟詛不及三王非也學者不察或以周官設司盟而信何休戰國隂謀之說誤矣職金上士二人下士四人府二人史四人胥八人徒八十人司厲下士二人史一人徒十有二人犯政為惡曰厲犬人下士二人府一人史二人賈四人徒十有六人司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人掌囚下士十有二人府六人史十有二人徒百有二十人掌戮下士二人史一人徒十有二人司𨽻中士二人下士十有二人府五人史十人胥二十人徒二百人𨽻給勞辱之役者罪𨽻百有二十人蠻𨽻百有二十人閩𨽻百有二十人夷𨽻百有二十人貉𨽻百有二十人皆征伐所獲也此選以為役員者餘謂之𨽻民王次㸃曰南方曰蠻閩東南之别種也東方曰夷貉東北之聚落也獨不見西戎北狄之𨽻者蓋自文王時西有昆夷之患北有玁狁之難而道化先被于南至武王通道于九夷八蠻其服屬有素故帥以為𨽻四翟之𨽻皆慕義而來願留中夏者故因其能而各任以事焉謂之𨽻者王宮宿衛宮伯所掌士庶子也旅賁皆命士也虎賁所掌謂之虎士必粗知道㙯而有異于胥徒者故于司𨽻所掌稱𨽻以别之春秋傳人有十等𨽻班在六非甚賤也盜賊之子亦使班于四𨽻者非其身之惡也不使列于齊民者恐其習為匪僻也布憲中士二人下士四人府二人史四人胥四人徒四十人禁殺戮下士二人史一人徒十有二人禁暴氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百有二十人蠟氏下士四人徒四十人蠟骨肉腐臭蠅蟲所蠟也蠟祭以息老物掩骼埋胔又死者之終也或取義於此雍氏下士二人徒八人雍謂隄防止水者萍氏下士二人徒八人萍氏主水禁萍草無根而浮義取于不沉溺也司寤氏下士二人徒八人寤覺也主夜覺者司烜氏下士六人徒十有二人烜火也條狼氏下士六人胥六人徒六十人條當為滌滌除狼扈道上者修閭氏下士二人史一人徒十有二人閭謂里門冥氏下士二人徒八人冥以繩縻取禽獸之名蓋攻猛獸必使冥然不覺然後可獲或曰猛獸旦晝多伏藏設弧張為阱擭每以暮夜昏冥之時而得之薛平仲曰自修閭達布憲官十有一皆先王所以盡乎人也自冥氏至庭氏官十有二皆先王所以盡乎物也人事之害既除而物之為人害者亦消則先王之用刑通乎天地矣王氏曰觀周禮所載一草木一鳥獸一昆蟲小小利害必為民興之除之而凡興利則地官主之凡除害則秋官主之庶氏下士一人徒四人庶讀如藥煮之煮驅除毒蠱之言鄭剛中曰南中為蠱者合衆毒蠱于一器使自相啖其一獨存則為蠱官以庶名豈義取于此與劉執中曰毒蠱蠱病人非一種而僅設下士一人者蓋掌其方書治禁之法穴氏下士一人徒四人翨氏下士二人徒八人柞氏下士八人徒二十人柞除木之名除木者必先刋剝之詩云載芟載柞芟為除草則柞為除木可知剃氏下士二人徒二十人剃剪草也或作夷或曰讀如剃小兒頭之剃月令曰燒剃行水謂燒所芟草乃水之硩蔟氏下士一人徒二人硩讀為擲蔟謂鳥巢剪氏下士一人徒二人赤叐氏下士一人徒二人赤叐猶捇拔謂除去之也蟈氏下士一人徒二人蟈蝦蟇也壺涿氏下士一人徒二人壺謂瓦鼓涿擊之也庭氏下士一人徒二人主射妖鳥令國中潔清如庭內也銜枚氏下士二人徒八人枚狀如箸橫銜之為之繣結于項以止言語伊耆氏下士一人徒二人伊耆古王者號始為蠟祭以息老物此掌共杖函故以名官秋物成而養老故列于秋官大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人環人中士四人史四人胥四人徒四十人象胥每翟上士一人中士二人下士八人徒二十人通四裔之言者東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之德先致南方也掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人史四人胥四人徒四十人掌交中士八人府二人史四人徒三十有二人掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人此王之士也使主都家之治而命之曰朝大夫所以尊王朝也庶子在府史之下蓋其宫長所自辟除也都家之司馬既掌其士庶子之政學以聽國司馬而此職及都則復設庶子者豈掌鄉八刑以紏都家之民者與其以庶子稱者教刑本為士庶子設而因以下逮于庶民也都則中士一人下士二人府一人史二人庶子四人徒八十人都則主都家之八則者當言每都如朝大夫及都司馬云易彥祥曰八則都家所同守也然謂之都則而不言家則何也王之大夫四命雖馭之以八則而未與賜則之數也故大宰以八則治都鄙亦以都為主都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之亦當言每都秋官卿大夫上士共三十三人而中士下士四百有二人蓋位卑則不敢怙勢以枉人職分乃易于悉心以體物也大司寇之職掌建邦之三典以佐王刑邦國詰四方刑邦國即下經用三典于三等之國是也蓋刑邦國之民若諸侯之不率者則九伐施焉非五刑所及也既曰刑邦國又曰詰四方蓋詰四方邦國之用刑而不率三典者大宰以刑典詰邦國即此義也一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典新建之國民未習教故用法輕亂國俗狃于惡非重法不足以革之平國則但用常行之法王介甫曰用輕典以柔乂也用中典以正直乂也用重典以剛乂也故曰惟敬五刑以成三德以五刑糾萬民一曰野刑上功糾力二曰軍刑上命糾守三曰鄉刑上德糾孝四曰官刑上能糾職五曰國刑上願糾㬥功功程也命將命也守部分也願慤慎也國刑謂國中之刑曰野曰鄉曰國非以地别之以事别之也水土力役之政野刑也故曰上功糾力不孝不友不睦不姻不任不恤鄉刑也故曰上德糾孝吏之作奸民之為暴勢家之滅義國刑也故曰上願糾暴雖國中野外之人所犯鄉刑也則以鄉刑弊之易地皆然以圜土聚教罷民凡害人者置之圜土而施職事焉以明刑恥之民不昏作勞故謂之罷害人謂為邪惡已有過失麗于法者民罷于作業則必放辟邪侈而有害于人置之圜土欲其困而悔也施以職事欲其勞而思也其能改者反于中國不齒三年其不能改而出圜土者殺中國謂故鄉里也不齒者不得以年次列于平民出逃亡也反其鄉里而曰中國者使終不改則當屏之逺方也以兩造禁民訟入束矢于朝然後聽之古者一弓百矢束矢百矢也先入百矢不實則沒入官注造至也不至則是自服不直非也無論所訟虛實未有被訟而不自質辨者果自知不直而不至為吏者當致其人平其事而後可以息爭未有置而不聽者蓋造者作事之端兩造者各陳其致爭之由也書曰兩造具備則不可以至訓明矣曰禁民訟者或事端微細或曲直顯然則立使解散而不復致于朝也以兩劑禁民獄入鈞金三日乃致于朝然後聽之劑劵書也三十斤為鈞訟是非可立決者也兩造具備則曲直可判矣獄遲久而後決者也或負財物或背㛰姻其約劑有真僞左證有存亡未可以一言而決必致于獄然後其罪可定故所入加重又緩其期然後聽之舊說以罪相證非也以罪相證無緣有兩劑若官司所守彼此爭執則各于其長訴之附于刑而後歸于士以嘉石平罷民凡萬民之有罪過而未麗于法而害于州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之嘉石文石也樹之外朝門左平成也成之使入于善任保也此曰未麗于法則圜土之罷民為已麗于法者可知矣圜土之罷民曰害人是實有被其害之人此曰害于州里則頑嚚酗肆為州里所患苦耳李耜卿曰過大內于圜土過小坐諸嘉石刑戮之事為類至多大司寇獨舉此二者蓋辟以止辟莫善于此以肺石達窮民凡逺近惸獨老幼之欲有復于上而其長弗達者立于肺石三日士聽其辭以告于上而罪其長肺石赤石也無兄弟曰惸無子孫曰獨復猶報也正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之凡邦之大盟約涖其盟書而登之于天府大史內史司㑹及六官皆受其二而藏之大盟約謂因大㑹同而賜諸侯以盟或使約誓也邦之大盟約有或背之則征討必行六官皆有事焉故並藏其二又使邦人及諸侯知所約之必不可犯也凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之邦典六典也邦法八法也邦成八成也諸侯之獄訟如虞芮質成之類非九伐之法所及也故以邦典定之如疆埸之爭則所犯教典政典也㛰姻相負則所犯禮典也川防之閉縱則所犯事典也本無重輕一定之法必隨事而酌定之卿大夫之獄訟以八法斷之者官職之不舉官聨之不㑹官常之不修官成之不守官法之不遵官刑之不當官計之不實國有常刑也若卿大夫而有土地財物之訟亦當以八成弊之大祭祀奉犬牲若禋祀五帝則戒之日涖誓百官戒于百族戒之日即卜之日也百族王之族姓也郊特牲獻命庫門之內戒百官也大廟之內戒百姓也則為王之族姓明矣冢宰司徒職首言祀五帝後皆曰享先王亦如之下此不與也宗伯職則備言祀大神享大鬼祭大示司馬職總言大祭祀此既總言大祭祀又特舉禋祀五帝豈凡祭祀之戒誓大宰小宰掌之司寇不涖惟祀五帝即事于郊野其事尤嚴故兼使刑官之長涖之猶朝覲㑹同司寇必前王大賓客小司寇前王而辟王燕出入士師前驅而辟之義與小司寇及士師職皆特舉祀五帝蓋刑官之正二及考皆從而蹕者又其屬聖人慮事之詳如此王氏曰百族從祭而不預于執事所以不聽誓而聽戒也及納亨前王祭之日亦如之奉其明水火納亨致牲也其節在將祭之辰祭之日謂旦明也明火見春官菙氏以隂鑑取水于月謂之明水水以配鬱鬯與五齊火以給爨烹秋氣清明日至此而燥烈月至此而皎潔故明水火使秋官奉之以致其清明之德也凡朝覲㑹同前王大喪亦如之大喪所前或嗣王或時王大軍旅涖戮于社社謂社主在軍者凡邦之大事使其屬蹕屬士師以下也王介甫曰小司寇凡國之大事使其屬蹕則事在國中而已大司寇邦之大事使其屬蹕則通國野焉小司寇之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君外朝在雉門之外詢謀也國危謂有兵寇之難也立君謂無冢適選于庶也司徒掌萬民而使刑官致之者三者皆國之變事以刑官涖之則進而陳其憸謀退而動以浮言者不禁而自戢矣其不以大司寇何也其職擯而叙進以傳語王與六卿並聽之秋官之長不得獨去其列而為擯也其位王南鄉三公及州長百姓北面羣臣西面羣吏東面經言羣吏即庶官也惟此經及朝士職羣吏為府史以對羣臣羣士而言也百姓北面答君也三公州長北面帥民也羣吏在羣臣之右以主于詢萬民也六鄉之官莫尊于鄉老其親民事者莫尊于州長故使帥焉不及鄉大夫者鄉大夫六卿也孤卿大夫士皆包于羣臣小司寇擯以敘進而問焉以衆輔志而弊謀敘進以次而進之使言也王介甫曰以王志為主而輔之以衆以衆謀為稽而弊之于王以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法五刑野刑軍刑鄉刑官刑國刑也附于刑墨劓宮刖殺也羣士士師所議既附于刑小司寇復用情訊之用情者記所謂悉其聰明致其忠愛以盡之也書者所書犯法之由即獄辭也讀之而囚無不服衆以為宜然後法可用凡命夫命婦不躬坐獄訟不身坐者使其屬與子弟代之也春秋傳王叔之宰與伯輿之大夫禽瑕坐獄于王庭凡王之同族有罪不即市刑于甸師氏以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽四者非聲而要以聲為本故總之曰五聲凡中不直者其言必煩其色必赧其息必喘其聽必惑其視必眊然以是聽之則可以得其無徵之情以八辟麗邦法附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賓之辟麗附也賓謂三恪二代之後辟有以法訓者有以刑訓者曰以辟麗法則當以刑訓明矣既曰麗邦水又曰附刑罰者以八等人之刑當特議者附著于邦水之中而用刑罰時則以是附比之也特議之者輕則赦宥重則末減也賢而罹于罰者如僨軍喪邑之類或厄于事勢而非其罪也以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏二曰訊萬民刺探取其情實也中成獄之書辭也謂之中者用刑貴得中也訊問也凡獄訟皆應有刺獨言庶民者賤者尚刺則等而上者可知聽民之所刺宥以施上服下服之刑三訊並用而要以民為斷者民所探取乃其情之實也蓋民之所刺而以為可宥者末減可也其不可宥者則權其情罪之輕重而施上服下服之刑即呂刑所謂上刑適輕下服下刑適重上服也司刺言三刺三宥三赦而此不言赦者凡宥必酌于民言若幼弱老耄憃愚之應赦者不必刺於民而後得其情也及大比登民數自生齒以上登于天府內史司㑹冢宰二之以制國用大比三年大數民之衆寡也人生齒而體備男八月而生齒女七月而生齒國用出于民故得民數乃制國用周官登書于天府者四民數則冢宰司㑹二之者以制國用也內史二之者執國法國令之二以逆㑹計也賢能之書獨內史二之者以詔王廢置爵祿也盟約之書六官皆二者邦之大盟約若有畔者則禮樂征伐不行于天下六官皆有責也太史內史司㑹復二之者太史掌約劑內史掌八柄其有㑹同征伐則財用計要司㑹之所職也獄訟之登不書其二者自鄉遂都鄙之吏達于羣士羣士達于士師小司寇訊而弊之大司寇聽之士師受中而致于下書之者不一而足矣第登中于天府以示罪皆天討而無事復書其二也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之實鑊水以滌牲也及納亨亦實其水大賓客前王而辟后世子之喪亦如之小師涖戮凡國之大事使其屬蹕孟冬祀司民獻民數于王王拜受之以圖國用而進退之司民星名軒轅角也民之夫家老幼衆寡鄉師遂師鄉大夫遂大夫既以歲時登之稽之而復設司民于秋官以登其數至獻數于王則不以司徒而以司寇者必服教而不罹于刑然後為天民之良王始得而有之也王氏曰民之輕生觸法皆由于貧民之貧以國用無節故必使司寇獻民數而制國用也李耜卿曰孟冬獻民數者一歲之中或民氣安樂或荒札間作因民之登耗可知生斂之豐匱賦入之多少以之圖度國用量入以為出也三年又大比以制國用者天道豐凶之數至此齊矣公私出入之經上下可較矣民之少者則已壯未老者則既老矣故大比之而凡受田歸田之令或征或舍之差耕三餘一之法可斟酌而更定之矣蓋圖者隨分而營度制者總成而經畫義各有指焉李世美曰漢文帝一歲斷獄四百而武帝時乃數萬周官司寇主獻民數使王知生齒不可耗于刑殺而使民逺罪宜有道也歲終則令羣士計獄弊訟登中于天府獄已成辭而附于罪者歲終則總計其數訟之可立決者則遂斷之也必登斷獄之書于天府者使神監之正歲帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士乃宣布于四方憲刑禁宣遍也令羣士舊讀屬上文不可通蓋使鄉士布于鄉遂士布于遂縣士布于野方士布于都家訝士布于四方也乃命其屬入㑹乃致事㑹者用財之計事者所承職事入之致之並于冢宰冢宰職令百官府各正其治受其㑹聽其致事而詔王廢置是也惟地官秋官有入㑹致事之文者惟二官用財紛雜而纖細必各㑹之以入于冢宰若禮官政官所用之財則各有經式冢宰司徒之屬共之不必其官自㑹也惟二官之職事積日纍月而成其案牘或因于前其得失有考于後故歲終致之而後冢宰聽之若禮事軍事則時過而事畢無可致也李耜卿曰此九字當在登中于天府之下蓋小宰小司徒文皆言考成受㑹致事方繼以正歲帥屬云云應同士師之職掌國之五禁之法以左右刑罰一曰宮禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭左右輔也刑罰禁民為非預施五禁所以輔之徇于朝示貴者縣于門閭示賤者巷門曰閭以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于㑹同三曰禁用諸田後四曰糾用諸國中五曰憲用諸都鄙誓用于軍旅者賞罪用命不用命必出矢言使知必行也誥用于㑹同者宣諭以禮義也禁用于田役者使衆守法而不敢踰也國中用糾者其民聚可舍致而申警之也都鄙用憲者其地逺必分布而表懸之也曰用之于者以事言也曰用諸者以地言也掌鄉合州黨族閭比之聨與其人民之什伍使之相安相受以比追胥之事以施刑罰慶賞每鄉而合其聨與什伍也合其聨使之相安相受也合其什伍以比追胥之事也言鄉則遂與都鄙公邑可知矣追胥之事司寇所專掌也因使士師每鄉而合其聨以簡罷民又所以清盜賊之原也其不相安者則不相受而收之圜土坐諸嘉石必能改而州里任之然後舍之掌官中之政令察獄訟之辭以詔司寇斷獄弊訟致邦令官中大司寇之官府中也獄訟之辭鄉士遂士縣士方士所議也諸官之司惟此掌宮中之政令者宰夫所掌則通六官之事鄉師分掌其鄉肆師則掌禮事之小者以佐宗伯惟士師則獄訟之上察其辭以詔司寇獄訟之成致其令以付羣士凡官中之政令無不待之以定由之以達者故特文以著之掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰嬌邦令六曰為邦盜七曰為邦朋八曰為邦誣士之八成獄官斷事之成式有此八品也邦賊為逆亂者邦諜異國人來反間者如衛禮至仕邢晉殺秦諜之類嬌邦令詐稱以有為者為邦朋朋黨以亂政者為邦誣誣上以行私者三代盛時列國分土君臣同體無所為刺探國事者爾雅井一有水一無水曰瀱汋集韻汋挹取也其諸聚斂掊克之臣浚民之生以虧邦本者與故列于邦賊邦諜之上也若邦凶荒則以荒辨之法治之其歲之祲有差等其地之民有衆寡其民之困有淺深其財之用有多寡其事之施有緩急故曰荒辨之法令移民通財糾守緩刑糾守備盜賊也移民通財地官所掌而又使刑官令之者移民則慮有顛越不恭暫遇姦宄者通財而使刑官董之則富者知必償而無匿財矣後世救荒有使富民出貸而官為之責者法古之善也凡以財獄訟者正之以傅别約劑若祭勝國之社稷則為之尸易彥祥曰亳社以隂為主故隂訟于是乎聽焉祭祀以刑官為尸從其類也王燕出入則前驅而辟燕出入偶以遊燕出入也恐侍御僕從或以邪僻導王故使刑官糾之且示王不當數遊燕也若宮中燕出入必從則無暇理邦之刑禁矣祀五帝則沃尸及王盥洎鑊水洎謂增其沃汁按特牲少牢尸盥不就洗入門北面盥以盤匜則王將獻尸宜就洗以盥鑊水小司寇實之故士師增之小祝職大祭祀沃尸盥小臣職大祭祀沃王盥鬱人職凡祼事沃盥而祀五帝之沃盥獨以士師共之凡祭祀亨人實鑊水而祀五帝獨小司寇實之士師增之豈以即事于郊野刑官之正二及司皆前後左右于王以致其嚴而因使共近王之職事與張子曰節服氏郊祀有尸不害為稷尸用此推之凡有尸者皆人鬼也此經祀五帝有尸五人帝之尸也社稷有尸柱與稷之尸也春秋傳晉祀夏郊董伯為尸鯀之尸也虞夏傳舜入唐郊丹朱為尸嚳之尸也儀禮周公祭泰山以太公為尸古者嶽瀆配公侯國語山川之靈足以紀綱天下其守為神汪芒氏之君守封隅之山者也春秋傳臺駘汾神也則亦為人鬼之尸明矣五祀有尸行神則世傳為黃帝之子中霤門井戶竈必始為是者也若迎貓迎虎則或以木禺芻靈記亦未言以人為尸由是言之非人鬼無尸決矣凡刉珥則奉犬牲鄭剛中曰刉當為刲釁禮也珥當為弭即小祝之弭兵災注曰羽者為衈此奉犬牲不宜言羽諸侯為賓則帥其屬而蹕于王宮大喪亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之逆軍旅如春秋傳荀吳之嬖人不肯即卒晉侯之弟揚干亂行于曲梁之類犯師禁尚書費誓寇攘踰垣牆竊馬牛誘臣妾之類歲終則令正要㑹正歲帥其屬而憲禁令于國及郊野士師先令正要㑹然後小司寇命入㑹小司寇令羣士憲刑禁則士師帥而憲之易刑禁為禁令者懸刑禁並小司寇之令也正要㑹在歲終憲禁令在正歲則小司寇職乃命其屬入㑹乃致事宜在登中于天府之下益明矣鄉士掌國中各掌其鄉之民數而糾戒之掌國中者其治所在國中也四郊之獄訟鄉師聽之而後達于鄉士國中之獄訟則鄉士自受之國中四郊之民數則並掌而糾戒之注鄉士八人言各者四人而各主三鄉恐未安豈二人主國中而六人各主一鄉中士則四人主國中而十二人分主六鄉與聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽于朝要之取其獄辭之要者為斷也既曰聽其獄訟又曰辨其獄訟者聽之以探其情辨之以附于法也凡爭訟之附于刑者歸于士則不附于刑者鄉師遂大夫之屬已聽斷使解散矣其附于刑者士又聽之察之辨之三日而後致于司寇公聽于朝其死刑則又别異其要加審慎也職聽于朝者司寇弊訟斷獄羣士皆在各麗其法獻其議而主六鄉之獄訟者則鄉士也遂士以下皆然春秋傳使王叔之宰與伯輿合要王叔氏不能舉其契司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟麗附也恐專或有濫故公聽之使各以所見附其法獻其議而後司寇酌度之獄訟成士師受中汁日刑殺肆之三日受中謂受獄訟之成也古者司寇行戮君為不舉故必纍犯法者同日而刑殺也肆陳其尸也據死者而言其生刑即釋之若欲免之則王㑹其期所欲免親故之等在八議者㑹其期謂司寇聽獄之日王親往議之也必王就議于外朝者刑人于市與衆棄之非王所得專也大祭祀大喪紀大軍旅大賓客則各掌其鄉之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之大祭祀若祀天四時迎氣于四郊喪紀軍旅賓客所經殊方故各掌其鄉之禁令凡國有大事則戮其犯命者大事即上大祭祀大喪紀大軍旅大賓客也戮有以刑殺言者秋官掌戮是也有以辱言者司市凡有罪者撻戮而罰之是也此戮犯命者重輕皆有之舊說誤遂士掌四郊各掌其遂之民數而糾其戒令遂士掌遂之獄訟而治所則在四郊也逺郊乃六鄉之地而遂士居之者近于遂則民隱可聞不逺于國中則獄訟易達也鄉士各掌其鄉之民數而糾戒之者鄉大夫不與民治故鄉士自糾戒也遂士縣士則各掌其民數而糾其戒令蓋戒令其民遂大夫公邑吏之職也遂士縣士特糾之耳聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽于朝去王城漸逺恐多枉濫故至二旬容其反覆也司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中汁日就郊而刑殺各于其遂肆之三日刑殺于郊者就遂士之治所也肆各于其遂者與衆棄之以懲其未也若欲免之則王令三公㑹其期若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕黃文叔曰大事即大祭祀大喪紀大軍旅大賓客鄉詳其目遂舉其凡也邦之大事遂未必盡與政令及之而聚其衆庶則掌其禁令六卿若有邦事則為之前驅而辟其喪亦如之六鄉近則使三公六遂差逺則使六鄉凡郊有大事則戮其犯命者遂獄在郊故也縣士掌野各掌其縣之民數糾其戒令距王城二百里以外至三百里曰野縣士通掌五百里內公邑而言掌野者包內外而言之也縣士三十二人豈每方三等公邑各以八人分主之與而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽于朝司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中汁日刑殺各就其縣肆之三日若欲免之則王命六卿㑹其期若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者方士掌都家不言掌其民數者其數自有都士家士掌之聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國鄉士遂士縣士皆聽其獄訟察其辭者鄉遂公邑之吏雖以獄辭上而未成議附法也故親聽其獄訟而察其所上之辭都家之獄訟則已成議附法矣故第聽其獄訟之辭而不復親聽其獄訟也死刑之罪獨曰辨者以未嘗親聽其獄訟辨之尤不可以不審也司寇聽其成于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中書其刑殺之成與其聽獄訟者不曰聽獄訟而曰聽其成者鄉師遂大夫遂師職皆曰聽其治訟蓋以獄情上達于士而不自附其法也都家各有士以掌獄訟必與其君定議附法而後上于國故變文言成所以别于鄉遂公邑之未成者書其獄訟之成與其聽之者以議成于下倘失實而有反覆則罪其人也疑都家之獄訟質其成而犯者不與之俱故方士第聽其辭司寇第聽其成書其成而已蓋民訟以地比正之慮牽連佐證者因此失業也凡都家之大事聚衆庶則各掌其方之禁令方士十有六人言各掌其方者四人而主一方也以時修其縣法若歲終則省之而誅賞焉縣法縣師之法也縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽方士以四時修此法歲終又省之方士每歲行其誅賞三年大比則縣師以考羣吏而詔廢置焉凡都家之士所上治則主之所上治謂獄訟之小事不附罪者主之方士自主聽斷注謂告于司寇聽平之非也既曰三月而上其獄訟于國司寇聽其成而復設此文何義哉蓋鄉師遂師遂大夫皆王官也故獄訟之小者俾得自決都邑小獄訟雖其君與士共成之而必取決于王官然後政有本統也或謂上治猶上計主之謂據所上治廉察都家士之能否益誤矣羣吏之治上于冢宰考之者宰夫與方士無與也訝士掌四方之獄訟諭罪刑于邦國告曉以麗罪及制刑之本意也凡四方之有治于士者造焉士士師也謂讞疑辨事先詣訝士乃達于士師也四方有亂獄則往而成之亂獄若君臣宣淫親戚相賊必往而成之者就其地然後可以刺羣言得情實也邦有賓客則與行人送逆之入于國則為之前驅而辟野亦如之居館則率其屬而為之蹕誅戮暴客者客出入則道之有治則贊之凡邦之大事聚衆庶則讀其誓禁誓禁不及賓客恐其徒有犯者故使訝士讀而為之備朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉視小司寇職所列增公侯伯子男者諸侯適來朝則與也帥其屬而以鞭呼趨且辟禁慢朝錯立族談者呼趨呼朝者各趨其位也錯立違其位也族談羣聚而談也凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之人民謂刑人奴𨽻逃亡者大者公之官收之以待求索也若雞豚劒帶之細過時而不索則失者已棄置矣故使得者私之曰庶民私之者設士大夫得獲亦不私而貯于官也凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽王志長曰期外不聽者謂鄉士遂士等不能決及弊而不服赴訴于士者非鄉士遂士等所上之獄成也踰期而獄成不上則宜誅責有司而速聽之豈得漫付之不聽哉凡有責者有判書以治則聽判書分半而合者即傅别也凡民同貨財者令以國法行之犯令者刑罰之同貨財即士師職所謂凶荒令民通財也天灾流行令民通貨財以相濟而以國法行之為責其償與其息則富者樂于出財而民常不困矣犯令謂多取息與能償而過期不償者士師令之朝士又令之犯者加刑罰焉所以使出者無顧惜而貸者不敢背也鄭司農謂司市為節以遣之凡商賈皆以節行不必同貨財也康成謂富人蓄積乏時出之價不得過騰躍平市禁貴儥者司市之職也二說並誤凡屬責者以其地傅而聽其辭謂身亡而親屬執傅别以責者蓋或妻子軟弱或族屬疏逺欺其不知故抵冒也若轉責使人歸之則必别有契約證者而無從抵冒矣地傅謂𫝊别有土人佐證者小司徒聽民訟所該者廣獨以其地附近之人正之不必有傅别故曰地比凡盜賊軍鄉邑及家人殺之無罪軍攻也春秋傳鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後又羅與盧戎兩軍之又鄭子罕宵軍之蓋盜賊攻剽鄉邑及家人禦而殺之者無罪也不曰剽掠而曰軍者聚徒有兵異于劫請之盜也凡報仇讎者書于士殺之無罪若仇在本國既書于士則有司者當治之不宜聽其私殺矣蓋仇在異國將往報之先言其情于本國之士士核得其實而書之他日殺仇于異國而自首其情則異國之士得訊于本國而釋其罪此王禁也通天下而統于王故有此法若邦凶荒札喪寇戎之故則令邦國都家縣鄙慮刑貶慮謀也貶猶減也劉迎曰凶荒札喪寇戎之際法不寬減則民滋不安而盜賊之變起先儒以為減用則非朝士所當慮也司民掌登萬民之數自生齒以上皆書于版辨其國中與其都鄙及其郊野異其男女歲登下其死生登上也下去也及三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數于王王拜受之登於天府內史司㑹冢宰二之以贊王治小司寇職曰內史司㑹冢宰二之以制國用者以民數之登耗而制國用之多少也此職曰以贊王治者以民數之登耗而考政治之得失也司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宮罪五百刖罪五百殺罪五百墨黥也先刻其面以墨窒之劓截其鼻也宮者丈夫則割其勢女子閉于宮中刖斷足也周改臏作刖殺死刑也書傳曰決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宮觸易君命革輿服制度姦宄盜攘傷人者其刑劓非事而事之出入不以道義而誦不詳之辭者其刑墨降畔寇賊劫略奪攘矯䖍者其罪死此二千五百罪之目略也其刑書則亡夏刑大辟二百臏辟三百宮辟五百劓墨各千周則變焉至穆王作呂刑其數又變漢文帝除墨劓刖三刑宮刑至隋乃除若司寇斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重司刺掌三刺三宥三赦之法以贊司寇聽獄訟宥少寬之也赦全舍之也一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民必疑獄將行赦宥而後訊于衆也三訊而後決者非惟慮其失入亦慮其失出也一宥曰不識再宥曰過失三宥曰遺忘李耜卿曰不識謂僻陋之人未識國法非下文生而憃愚之比也過失謂無心遺忘謂疏狂之夫健忘者凡赦宥乃誤公事失官物及失誤而遺害于人者注引殺人以證之非也凡過而殺傷人物者乃調人之所掌一赦曰幼弱再赦曰老耄三赦曰憃愚王介甫曰幼而不弱老而不耄愚而非憃則不在所赦以此三法求民情斷民中而施上服下服之刑然後刑殺三刺所以求民情也三宥三赦亦曰以求民情者求其情而不在可宥可赦之列然後罪無所疑而中可斷刑可施司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之摯當作贄六約据注疏皆典法則之所頒也不宜有約劑約劑者兩相爭而質成于上者也故書于宗彜丹圖而有訟則辟藏神民地邦國之約也治神之約如山川為兩國之望而巡狩柴望所供犧牲玉帛之賦不齊治民之約如兩國接壤而相要毋受逋亡毋掠邊鄙故達其約于王室也治地之約如春秋傳鄭宋之間有隙地為成而虛之或江河移徙壤地或進或蹙而定其疆植者功器贄萬民之約也功功役也春秋傳城成周宋仲幾不受功如洫澮畛涂比邑共之而功役不齊地所産器比邑皆上供而為數不齊故達其約于官府也治贄之約如昏姻既入幣以死喪遷徙易期恐後有變而預聞于官六者皆事之變也若典法則之常則何約劑之有不分邦國萬民而統言之者治神之小者萬民或有之治功之大者邦國或有之凡大約劑書于宗彜小約劑書于丹圖此經所謂宗彜與尚書異蓋宗廟之典冊也約劑至衆非六彜所能備載且有訟者則辟藏數啓宗廟而視祭器非義所安也其義與鼎之有銘異銘祖考之功德于祭器宜也邦國萬民之約劑而書于天子祭器何義乎况祭器有定數而約劑日增將因約劑而别增祭器乎其不可通明矣丹圖如春秋傳著于丹書之類亦冊籍也若有訟者則珥而辟藏其不信者服墨刑訟謂訟所約如春秋傳宋仲幾薛宰之爭是也辟藏開府視約書珥讀為衈謂殺雞取血釁其户若大亂則六官辟藏其不信者殺大亂謂僭約凡邦之大盟約六官皆受其二故皆辟藏司盟掌盟載之法載盟辭也盟者載其所要之事于策謂之載書加于牲上而埋之凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神既盟則二之有疑不協也明神謂其無不鑒照也詔讀載書以告之也二之者寫副當以授六官覲禮設方明之木著六玉以依日月山川之神盟萬民之犯命者詛其不信者亦如之犯命犯君之教令也不信違約也春秋傳臧紇犯門斬關以出乃盟臧氏又鄭伯使卒出豭行出犬雞以詛射潁考叔者凡民之有約劑者其二在司盟有獄訟者則使之盟詛約劑之二乃司約以入于司盟司約辟藏不信者服墨刑而此復使之盟詛何也司約所謂不信者所訟與約劑不符者也或約劑符而歷年久逺别有詐僞則使要言于神以懼之凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯祈者司盟為之祈明神使不信者必凶使其地域之人共牲與酒脯則或有知其實而相質證者且使為變詐者懼不見直于鄉里而他日不相保受也李耜卿曰邦國之間或有讒人交搆小將相惡大將相暴欲以王法正之則彼此各有其是欲和之則終懷猜忌使詔于明神則雖有大疑亦兩釋矣若夫萬民之獄訟或情事曖昧無佐證可成其罪欲赦之則受害者不甘欲罰之則為惡者不服計惟有盟詛對明神而生愧懼且降祥降殃理實不爽乃所以佐王法之窮而養民心之直也職金掌凡金玉錫石丹青之戒令青空青也此數者同出于山地官丱人掌之此又掌之者彼主取此主受也受其入征者辨其物之媺惡與其數量楬而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府入其要入征謂采金玉錫石丹青者之租稅也兵戈劍之屬器鍾量之屬守藏者玉府內府要凡數也入之于大府鄭剛中曰受其入則取諸地而官所自入者受其征則取諸民而官所稅賦者掌受士之金罰貨罰入于司兵貨泉貝也金罰即入鈞金而理曲遂罰之者貨罰或以泉貝代金也入于司兵給治兵及工直旅于上帝則共其金版饗諸侯亦如之鉼金謂之版所施未聞凡國有大故而用金石則掌其令主其取之令也大故寇戎也蓋用為槍雷椎椁之屬司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入于司兵其奴男子入于罪𨽻女子入于舂稿盜賊之妻子沒為奴者以充罪𨽻共舂稿也古者罪人不孥謂凡有罪者盜賊極惡罪及其男女所以重纍其心且懲其未也凡有爵者與七十者與未齔者皆不為奴盜賊之親戚惟三者免為奴犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之伏伏犬以王車轢之即軷祭也聘禮云其牲用犬羊瘞謂埋祭也爾雅祭地曰瘞埋凡幾珥沈辜用駹可也幾讀為刉珥讀為衈大宗伯職以埋沈祭山川林澤以疈辜祭四方百物凡相犬牽犬者屬焉掌其政治司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒不使冠飾著墨幪凡圜土之刑人也不虧體其罰人也不虧財不虧體疑即掌戮職所謂髠謂既改而髮仍可蓄也惟髠故無冠飾若但加明刑不得曰刑人掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪桎王之同族拲有爵者桎以待弊罪凡囚者謂非盜賊以他罪拘者也在手曰梏在足曰桎拲者兩手共一木也或曰梏者校也在首猶牛之有梏及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之士羣士也加明梏謂書其姓名及罪于梏也自遂以外已各著刑殺之所惟六鄉無文故特著其適市也凡有爵者與王之同族奉而適甸師氏以待刑殺掌戮掌斬殺賊諜而搏之斬以鈇鉞要斬也殺以刀刃斷首領也搏當為膊謂去其衣也春秋傳殺而膊諸城上言賊則盜可知矣凡殺其親者焚之殺王之親者辜之親有服者辜謂磔之凡殺人者踣諸市肆之三日刑盜于市踣僵尸也李耜卿曰殺罪就市其餘四刑宮就蠶室餘刑就屛處所云五服三就也若盜則刑亦于市異于平人之犯罪者凡罪之麗于法者亦如之惟王之同族與有爵者殺之于甸師氏李耜卿曰亦如之者死者亦踣之刑者亦各就其處也殺之于甸師氏者謂不踣也踣者使衆見之也既刑于隱故不踣而肆之凡軍旅田役斬殺刑戮亦如之黃文叔曰注以戮為膊焚辜肆非也即下所謂髠者全其體而戮辱之耳墨者使守門劓者使守關宮者使守內刖者使守囿髠者使守積五刑無髠或曰公族以髠首代宮刑但宮降為髠而劓刖者不獲減非所安也或曰髠當為完蓋居作三年不虧體者觀此經則公家未嘗不畜刑人但君子不近耳司隸掌五隸之法辨其物而掌其政令物衣服兵器之屬帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事曰民者五隸皆百二十員員外則民也任猶用也除兵器外家具之器皆是積為之聚也邦有祭祀賓客喪紀之事則役其煩辱之事士喪禮下篇曰𨽻人涅厠掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宮與野舍之厲禁野舍王行所止舍也厲遮列也翟𨽻守禁司𨽻正掌其事師氏又使其屬董之罪𨽻掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽倣牛助謂國以牛助轉徙也車轅內一牛前亦一牛用二𨽻前牽而倣御之其守王宮與其厲禁者如蠻𨽻之事王明齊曰十四字宜屬閩𨽻以文義詳之不應未言蠻𨽻而曰如蠻𨽻之事蠻𨽻掌役校人養馬其在王宮者執其國之兵以守王宮在野外則守厲禁校人職有師圉而不見𨽻者蓋給其雜役閩𨽻掌役畜養鳥而阜蕃教擾之李耜卿曰役畜謂為掌畜之役也閩𨽻所養非畜鳥也貉𨽻所養非常獸也珍禽竒獸不育于國乃列職以養之何也一切禁之則側媚之臣轉得居為竒貨以啖其上故列于六職以示其物為無竒掌于裔𨽻以示其役為甚賤正所以止邪于未形也掌子則取𨽻焉舊說俱不可通文有闕誤也三𨽻皆有守王宮與厲禁如蠻𨽻之文而此獨無則闕誤可知夷𨽻掌役牧人養牛馬與鳥言其守王宮與其守厲禁者如蠻𨽻之事春秋傳曰介葛盧聞牛鳴曰是生三犧皆用之矣其音云貉𨽻掌役服不氏而養獸而教擾之掌與獸言其守王宮者與其守厲禁者如蠻𨽻之事與禽獸言即所謂教擾之也能言之鳥必人與之言而調習之猛獸媚養已者命以起伏動躍則應焉蓋久而習于人言耳周官集注卷九
