body:
  text: 周官集注卷十翰林院侍講銜方苞撰布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達于四海刑司寇五刑禁士師五禁也再言憲邦之刑禁者上所言懸于畿內下所言懸于四方也曰及其都鄙謂侯國之都鄙凡邦之大事合衆庶則以刑禁號令大事合衆庶者謂征伐巡狩田獵禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之掌司斬殺戮者謂伺察行刑者使不得為姦惡以取利也近世􅣭殺絞縊行刑者能遲速其死以要賄主梏朴者亦能輕重其傷聖人知周萬物必早慮及此矣若吏民相殺不得云斬戮攘猶拒也謂法當獄而攘拒不受捕遏訟遏止欲訟者使不得達也禁暴氏掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之正者使人懾伏而從已也亂暴之民以力求正而不依于理法戰國秦漢任俠姦人是也凡國聚衆庶則戮其犯禁者以徇凡奚𨽻聚而出入者則司牧之戮其犯禁者男女以國事聚于一所則必伺察而馴擾之野廬氏掌達國道路至于四畿比國郊及野之道路宿息井樹國郊謂近郊逺郊野謂百里外至畿宿息謂止宿及暫息之地井共飲食樹為蕃蔽若有賓客則令守塗地之人聚柝之有相翔者則誅之掌固修城郭溝池樹渠之固頒其士庶子及其衆庶之守所謂守塗地之人也聚柝之聚擊柝以衛之也相翔猶昌翔謂觀伺也凡道路之舟車轚互者敘而行之轚者相值而礙也互者交互而不行也凡有節者及有爵者至則為之辟亦使守塗地者禁野之橫行徑踰者橫行妄由田中徑踰射邪趨疾越隄渠也凡國之大事比修除道路者掌凡道禁道禁若漢時絶蒙布巾持兵杖之類邦之大師則令掃道路且以幾禁行作不時者不物者國之大事既修除道路復特言大師掃道路者修除特平治之掃則凡餘糧之栖畝芻薪之露積雞豚之布路者一切掃清之以絶寇攘爭奪之端也蠟氏掌除胔胔死人骨也月令曰掩骼埋胔胔骨之尚有肉者人獸同凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賓客亦如之蠲潔也任人司圜所收教罷民任之以事者言郊及野者天地壇兆在郊師賓則至畿郊外曰野總言之也李耜卿曰此掌其除之事若有死于道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人掌凡國之胔禁有地之官主此地之吏也胔禁若孟春掩骼埋胔之屬李耜卿曰此掌其胔之事雍氏掌溝瀆澮池之禁凡害于國稼者春令為阱擭溝瀆之利于民者秋令塞阱杜擭瀆水之竇也池陂障之水道也凡旱而壅水以溉潦則築隄自固皆害于他人之稼故禁之曰國稼者溝瀆澮池本以利通國之稼也阱穿地為􅢾以禦禽獸擭柞鄂也地堅阱淺則設柞鄂于其中春為阱擭防禽獸之害稼也故秋則塞之杜之禁山之為苑澤之沈者苑囿也澤地水至則陷未至既過皆可耕種若規為汙池則其地永沉沒矣故同于山之為苑而禁之以作無益害有益也萍氏掌國之水禁幾酒謹酒禁川遊者水禁謂水中害人之處及入水捕魚鱉不時周制鄉飲蠟酺皆有司及時量造所謂公酒是也則民間祭祀冠婚必及時量造可知矣老疾則官給之所謂秩酒及頒賜之酒是也幾酒謂苛察無事作酒及市沽者謹酒謂戒毖其因事而多作者浮水曰遊淺水可浮川則波洋卒至恐至沉溺也司寤氏掌夜時以星分夜以詔夜士夜禁星見為夜沒則為晝夜士主行夜徼候者禦晨行者禁宵行者夜遊者晨先明也宵定昏也晨則門關已啓故見行者而禦之宵則遮閉以禁遏而已司烜氏掌以夫遂取明火于日以鑒取明水于月以共祭祀之明齍明燭共明水夫遂陽遂也鑒鏡屬世謂之方諸明齍以明水修滌粢盛黍稷明燭以照陳饌明水以配鬱鬯五齊與玄酒别玄酒井水也以配三酒然以明水與玄酒對舉則有異散文通謂之玄酒凡邦之大事共墳燭庭燎墳讀為蕡麻也或曰大也樹于門外曰大燭于門內曰庭燎中春以木鐸修火禁于國中軍旅修火禁邦若屋誅則為明竁焉屋誅不殺于市而以適甸師氏者凡殺人皆肆之三日明暴其罪因不肆諸市而壙埋之故楬其罪于竁上或曰宮刑以下不可以風故于屋中誅之即勝國之社屋也屋中幽暗恐行刑者難見故穿屋以霤光謂之明竁南方火位也故司爟通掌四時改火出納火之令職主于布火之利而不掌火禁其曰國失火野焚萊則有刑罰焉蓋因布令而及之使民知避其害非火禁也火禁如用火之地救火之法以及夏毋燒灰昆蟲未蟄不以火田之類以刑官之屬掌之使民不敢犯也軍旅之火禁以刑官修之者非軍刑所及也司烜掌明火故并共墳燭庭燎以為刑官之屬故并為屋誅之竁焉條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人趨辟趨而辟行人序官下士六人豈文誤與凡誓執鞭以趨于前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨前謂所誓衆之前行也命之者有司讀誓辭則大言其刑以警所誓也士師五戒一曰誓用之于軍旅注兼祭祀非也祭祀之誓戒無所用殺轘之刑且大宰掌之大司徒涖之非條狼氏所及也僕右不用命則敗績故其法重既曰僕右又曰馭蓋制馭一軍者即軍帥也發命不衷出謀不審則以國豫敵故其刑更重于僕右大夫則輿帥也事有當關白而不關者則鞭之鞭作官刑故也師族師以下衆士也有當關而不關者法末減于大夫太史小史不掌軍事而其刑殺墨者古者行軍重天時覘風雲物色以卜勝敗故其責亦重也曰邦之太史小史者恐疑禮官不宜在軍軍行别有太史小史如辟司徒公司馬之類故特文出之以見即邦之太史小史也王介甫以殺與車轘之刑過重又鞭不宜加于大夫遂謂此皆誓其屬不知軍事威克春秋傳田于孟諸楚申無畏抶宋公之僕戎僕大夫也晉侯之弟揚干亂行于曲梁魏絳戮其僕辭于晉侯曰至于用鉞則古者軍刑之重可知矣修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之國中城中也宿宿衛也互謂行馬所以障禁止人也凡吏士皆有常餼而宿衛守互擊柝者中夜巡徼閔其勞故官行糜粥以食之追胥者則但比其事行其賞罰而已行夜者飯之則非時飲之以酒則慮其號呶使自為粥則擾矣故官行之先王之政所以即人之心而盡物之理也禁徑踰者與以兵革趨行者與馳騁于國中者邦有故則令守其閭互惟執節者不幾令閭胥里宰之屬閭亦有互王政之周于守禦如此冥氏掌設弧張為阱擭以攻猛獸以靈鼓驅之弧張罿罦之屬所以扄絹禽獸或曰機弩也驅之使驚趨阱擭若得其獸則獻其皮革齒須備須謂頤下須備謂搔也庶氏掌除毒蠱以攻説禬之嘉草攻之攻説祈諸神以求去之也禬除也或曰宜讀為潰嘉草藥物其狀未聞或曰柳宗元白蘘荷詩庶氏有嘉草攻説事久泯豈嘉草即蘘荷與凡驅蠱則令之比之此官僅下士一人故人有能驅蠱者則令之而比次其術之高下穴氏掌攻蟄獸各以其物火之蟄獸熊羆之屬穴居者也將攻之必先燒其所食之物以誘出之穴伏而必誘取之者恐其時出而乘人之隙也以時獻其珍異皮革珍異可備膳羞者如熊掌之類翨氏掌攻猛鳥各以其物為媒而掎之以時獻其羽翮猛鳥鷹隼之屬置其所食之物于絹中鳥下來則掎其腳或曰以其類為招也蟄獸猛鳥各設官以攻之者非獨慮其害于人亦所以安衆鳥獸而使之生息蕃滋也柞氏掌攻草木及林麓草字疑衍或曰草之與木叢生者則并除之祚氏攻木剃氏攻草皆主苑囿之官若畿內林麓欲化為穀土或以奠民居則第掌其政令下經凡攻木者掌其政令是也夏日至令刋陽木而火之冬日至令剝隂木而水之刋剝皆謂斫去次地之皮火之水之則其肄不生既斬去其木而後以水火焚漬其根株也若欲其化也則春秋變其水火凡攻木者掌其政令化猶生也謂時以種穀也所水則火之所火則水之則其土和美王介甫曰先王之于林麓欲用其材則為之厲禁以養之欲用其地以居民興穯則刋剝而化之此虞衡柞氏之職所以並設也郝京山曰謂化木而為土也剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之春草始萌以鎡基絶之夏草盛聚其族而刈之故曰夷秋百榖皆熟恐以剃草傷頴實故引繩以遮列而後芟其甽中之草冬則以耜反其土草根在上則春不復生若欲其化也則以水火變之掌凡殺草之政令謂以火燒其所芟之草已而水之則其土和美月令燒剃行水利以殺草可以糞田疇美土疆王明齋曰掌殺草者主公家之草剃氏自為之掌凡殺草之政令者主場圃田疇之草教民為之硩蔟氏掌覆夭鳥之巢以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣其巢上則去之夭鳥惡鳴之鳥若梟鵩方版也鄭剛中曰鵲忌庚燕避戊巳蟅逢申日則過街鵲作巢則避太歲狐潛上伏不越度阡陌虎豹知衝破然則夭鳥避此五者必實有是理也唐子西云聖惠方言有鳥夜飛謂之無辜小兒衣服遭之輒成疾歐陽永叔鬼車詩言其血汚人家其家必破然則聖人設官以驅夭鳥豈可謂不急之務與翦氏掌除蠧物以攻禜攻之以莽草薰之蠧物穿食人器物者攻禜六祈之二凡庶蠱之事庶氏掌除毒蠱蠱之病人者也此職庶蠱蠱之病物者也赤叐氏掌除牆屋以蜃炭攻之以灰灑毒之除牆屋隙罅間之蟲豸也搗其炭坌之則走淳之以灑之則死凡隙屋除其貍蟲隙屋人所不居埋藏之蟲尤易伏故特言之貍蟲蟅肌蛷之屬蟈氏掌去蛙黽焚牡蘜以灰灑之則死以其煙被之則凡水蟲無聲牡蘜蘜不華者齊魯之間謂蛙為蟈黽耿黽也以煙被者順風而揚之也或以灰灑或以煙被者郊廟朝廷學校嚴閟之地乃絶其類若會同師田所暫止則使之無聲可矣曰凡水蟲不獨蛙黽也壺涿氏掌除氷蟲以炮土之鼓驅之以焚石投之水蟲狐蜮之屬炮土之鼓瓦鼓也焚石得水作聲則驚而避去王振聲曰黿鼉之屬穿穴堤防以焚石投之則死若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵水之神龍罔象橭榆木名午貫者十字為之淵有神而欲殺之必變見震驚于民者庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢射之救日之弓救月之矢謂日月食所用弓矢專言國中者若山林田野則不必禦也曰鳥獸者既不見其形則不辨其為鳥與獸也若神也則以大隂之弓與枉矢射之神謂非鳥獸之聲若春秋傳或呌于宋大廟嘻嘻出出者大隂之弓即救月之弓枉矢即救日之矢互言也救日用枉矢則救月以恆矢可知銜枚氏掌司囂國之大祭祀令禁無囂軍旅田役令銜枚囂歡也禁􅑧呼歎嗚于國中者行歌哭于國中之道者野外則不必禁且不能遍也劉氏曰聲大而急曰􅑧聲高而緩曰呼聲嗟而怨曰歎聲悲而傷曰嗚伊耆氏掌國之大祭祀共其杖咸咸讀為函老臣雖杖于朝祭祀則去杖有司函藏之既事乃授焉軍旅授有爵者杖將軍杖鉞羣帥皆執兵其有事于軍中而不親甲兵者如小宗伯肆帥大師大史小史師氏之類則不論其年齒皆授以杖用以别于即戎者軍中自主將至公司馬皆各有所統之人所司之局故不任軍事則别之曰有爵者共王之齒杖王賜老者之杖也大行人掌大賓之禮及大客之儀以親諸侯大賓要服以內諸侯大客其孤卿也禮必有儀互言之且以别尊卑也春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政六者皆諸侯入見之禮謨謀也時會即時見也禁謂九伐之法殷同即殷見也政謂邦國之九法圖事比功陳謨協慮不宜有一定之期而分四時以制法者亦舉其大略非截然不相通也春者事之方始秋則功可以成夏則事既始而功未成故使陳其謀猷冬則此歲既終而來歲更始百事皆宜計慮協諸侯之慮非使諸侯協其慮謂諸侯所慮王與之協也如諸侯慮凶祲則王為之議賑發諸侯慮寇戎則王為之計備禦也時聘以結諸侯之好殷眺以除邦國之慝此二者諸侯使其臣入聘之禮邦國有交相惡者當衆聘其國卿皆在故諭使解除先儒或謂大宗伯職時聘殷眺乃諸侯所以事天子此則天子所以答諸侯非也行人掌大賓之禮及大客之儀若此為王臣出聘眺則無所為大客之儀矣間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災此四者王臣出使之禮也間問者間歲一問諸侯謂存省之屬諭諸侯之志使皆曉然于天子之意也交者上下同之天子賜諸侯以脤而諸侯亦得以致福于天子也贊助也致禬凶禮之弔禮禬禮也補其災謂歸以貨財以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客于諸侯言命其命尊也于諸臣言爵其命微也諸臣之爵曰等者有卿大夫士之等又以大國次國小國為之等使各有所當而後待之之禮可同也上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其它皆如諸侯之禮諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賓主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其它皆如諸子之禮常旌旗也斿其屬縿垂者二副也三牲備為一牢禮謂饔餼也朝位謂大門外賓下車及王車出迎所立之處也王始立大門內交擯三辭乃乘車出迎軹轂末也疾謂車轅曲中在軹之前衡之後衡在輈下當服之領更前于疾以諸侯所立推之則王立其當軫與廟受命祖之廟也三享三獻也皆束帛加璧庭實惟國所有朝先享不言朝者朝禮無等不必言也王禮王以鬱鬯禮賓也王使宗伯攝酌圭瓚而祼王拜送爵又攝酌璋瓚而祼后拜送爵是謂再祼再祼賓乃酢王一祼后不祼也饗設盛禮以飲賓也以飲為主故以獻為節九舉舉牲體九飯也以食為主故以舉為節出入謂從來訖去也每積有牢禮米禾芻薪問問不恙也勞苦倦之也按覲禮記偏駕不入王門偏駕者諸侯所受上車同姓金路異姓象路四衛革路蕃國木路皆舍于館而乘墨車以朝蓋覲禮天子不下堂而見諸侯故諸侯不敢乘上車春夏受贄在朝亦無迎法惟朝後行三享在廟天子乘車出迎故諸侯並得乘上車所以有繁纓九就之等也服物采章諸侯之所服也牢禮饗食王所以禮賓也非各用其命數不可惟擯者之數則用其半以示在天子所則有所屈也凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其它皆視小國之君此以君命來聘也孤尊既聘享更自以其贄見執束帛表以豹皮繼小國之君言次之也朝聘之禮每一國畢乃前不交擯者不使介傳辭交于王之擯而親自對擯也廟中無相介皆入門西上而立不前相禮酒齊酒也以酒禮之謂不和鬱鬯以祼也其他謂二車及介牢禮賓主之間擯者將幣饗食之數知此為更以贄見者若正聘則執瑑圭璋八寸不得執皮帛也孤視小國之君以五為節而公之卿乃七介者卿奉君命故七介孤自特見故五介也孤出入三積一勞與小國同而特文見之者卿亦三積一勞故不得以視小國該之也凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之此亦以君命來聘者所下其君之禮介與朝位賓主之間也其餘則自以其爵聘義曰上公七介侯伯五介子男三介謂使卿聘之數也然則朝位亦以七十步五十步三十步為節與及其大夫士皆如之者大夫又各自下其卿二等也聘禮曰小聘使大夫其禮如為介士無聘之介數而曰如之者士雖無介與步數至于牢禮之等又降殺大夫邦畿方千里其外方五百里謂之侯服歲一見其貢祀物又其外方五百里謂之甸服二歲一見其貢嬪物又其外方五百里謂之男服三歲一見其貢器物又其外方五百里謂之采服四歲一見其貢服物又其外方五百里謂之衛服五歲一見其貢材物又其外方五百里謂之要服六歲一見其貢貨物要服即蠻服也大司徒職歲之常貢不宜有成器此職器物則或兼尊彛之屬材物亦宜兼齒角羽毛之屬也舊説虞夏之制天子巡狩之明年諸侯各以其方歲見四載而遍此經注其朝貢之歲四方各四分趨四時而來皆非也果爾則或一歲而空一方之諸侯或一歲而空一服之諸侯其國或大喪大札水旱寇戎將棄而不理乎竊意周制侯服最近故每歲一見而遍甸服地較逺分國較多兩歲中各以其時其事一見而遍男采衛要地愈逺分國愈多則期愈寬所以順人情便國事也虞夏之制亦大槩類此成王之崩事在旬日而康王之立太保率西方諸侯入應門左畢公率東方諸侯入應門右則六服皆有朝者可知矣舜典日覲四嶽羣牧班瑞于羣后則非一方之諸侯可知矣尚書六年五服一朝言六年中五服皆朝以遍非謂僅一朝也其不言六服者以遍朝為言故侯服每歲一朝者不數也與周禮本可通春秋傳叔向所言乃雜舉古制及文襄之憲令耳九州之外謂之蕃國世一見各以其所貴寶為贄九州之外夷服鎮服蕃服也世一見謂父死子立及嗣王即位乃一來朝王之所以撫邦國諸侯者歲遍存三歲遍眺五歲遍省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聽聲音十有一歲達瑞節同度量成牢禮同數器修法則十有二歲王巡守殷國撫猶安也曰撫邦國諸侯者撫諸侯乃所以撫邦國也存問其安否也眺視其治效也省察其風化也三者皆所謂間問也歲者巡守之明歲以為始也屬猶聚也召其象胥瞽史聚于王朝而教習之也辭命者畛于鬼及邦交之禮辭也數器銓衡也法八法也則八則也達同修皆謂齎其法式行至則齊等之也成平也蓋平其僭踰者小行人職適四方達六節成六瑞則十有一歲前王而巡者其小行人與凡諸侯之王事辨其位正其等協其禮賓而見之若有大喪則詔相諸侯之禮若有四方之大事則受其幣聽其辭四方之大事謂國有兵寇來告急也亦有贄幣以崇敬也聘禮曰若有言則以束帛如享禮凡諸侯之邦交歲相問也殷相聘也世相朝也小聘曰問殷中也中間久無事則大聘諸侯同方嶽則有相朝之禮皆所以考禮一德以尊天子也大國聘于小國小國朝于大國敵國則兩君相朝故司儀于諸公諸侯皆言相為賓是也小行人掌邦國賓客之禮籍以待四方之使者通掌其禮籍而所待獨使臣也令諸侯春入貢秋獻功王親受之各以其國之籍禮之職貢雖有常而必時其歲之豐凶以為贏縮故往歲之貢至春而後入之月令制諸侯職貢之數以季秋蓋農收備入而後數可定也功謂治國家之狀至秋則歲功成刑獄決凡治之狀可按驗矣故獻之凡諸侯入王則逆勞于畿及郊勞視館將幣為承而擯入王朝于王也春秋傳曰宋公不王又曰諸侯有王王有巡守視館致館也承猶丞也三者皆為丞而擯之賔將幣大宗伯為上擯郊勞舊説使大行人視館使卿大夫凡四方之使者大客則擯小客則受其幣而聽其辭擯者擯而見之王受其幣而聽其辭則代之入告也大客要服以內使臣小客蕃國使臣或曰孤卿為大客大夫為小客或曰以國之大小為别也使適四方協九儀賓客之禮朝覲宗遇會同君之禮也存眺省聘問臣之禮也適之也協合也黃文叔曰朝覲宗遇會同諸侯所以尊天子也而通乎兩君之相朝亦君禮也存眺省聘問天子所以撫諸侯也而邦交之歲相問殷相聘亦臣禮也達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之此謂邦國之節也達之者亦齎式法以齊等之虎人龍三者諸侯使臣出聘所執旌符管三者在國所用都鄙者公之子弟及卿大夫之采地也凡邦國之民出至他邦他邦之民來入門關為之節其以徵令及家徙者鄉遂大夫及采地之吏為之節皆使人執節以將之有期以反節此與掌節有異同者天子使于諸侯諸侯使于天子其為節異則不合門關道路節異則不通此五節所以同也天子之都鄙與諸侯之都鄙守之者爵等懸殊此管節角節所以異也無玉節者行人所達惟使節邦國所守非所及也無貨賄之璽節者國中所用亦非行人所及也疏引司關職謂貨賄同用符節非也司關掌國貨之節以聨門市即璽節也果同用符節則璽節何所用乎成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用穀璧男用蒲璧成平也此適四方之事而首舉王用鎮圭者典瑞職鎮圭以徵守則亦應使邦國知其形制也合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故合者兩相配也五等諸侯享天子並用璧享后用琮其大各如其瑞皆有庭實惟二王後用圭璋其于諸侯則用琮璧子男之于諸侯則用琥璜凡二王後諸侯相享之玉大小各降其瑞一等其使卿大夫眺聘亦如之馬皮非幣而總云六幣者謂用之以當幣也王光逺曰以其通情而來則謂之好以其因事而來則謂之故若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令慶賀之若國有禍災則令哀弔之凡此五物者治其事故此五者其四大宗伯所掌凶禮其一嘉禮也復列于此者設所至之國有此則令鄰國供具而後以復于王故其文次于使適四方之後也蓋凶荒之賙委師役之稿禬必待奏請則緩不及事即適遇其國札喪禍災福事亦必于常禮有加禮意乃洽且札喪禍災福事之小者或不敢以聞于王朝而王使適遇之則不得為弗聞也者而過之也治其事故者酌財用多少之宜施行緩急之節以及興發調移之法也不見恤禮蓋于師役中兼之王光逺曰所作謂之事所遭謂之故及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故慝惡也猶圖也康樂謂民氣安樂和親謂鄰國交歡安平謂上下寧輯司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節出接賓曰擯入贊禮曰相以詔者以禮告王將合諸侯則令為壇三成宮旁一門合諸侯謂有事而會也為壇於國外以命事三成三重也此宮壝土以為牆所謂壇壝宮也天子春帥諸侯拜日于東郊則為壇于國東夏禮日于南郊則為壇于國南秋禮山川丘陵于西郊則為壇于國西冬禮月四瀆于北郊則為壇于國北既拜禮而還加方明于壇上而祀焉所以教尊尊也覲禮曰諸侯覲于天子為宮方三百步四門壇十有二尋深四尺王巡守殷國為宮應亦如此令令封人也詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓王既祀方明諸侯上介皆奉其君之旗置于宮乃詔王升壇諸侯皆就其旗而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者異姓昏姻之國也土揖者不舉手即向下揖時揖則略舉手而後向下天揖則高揭手而後向下也及其擯之各以其禮公於上等侯伯於中等子男於下等謂執玉而前見于王也擯之各以其禮者謂擯公者五人侯伯四人子男三人也上等中等下等謂奠玉處也壇三成深四尺則每等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各于其等奠玉降拜升成拜明臣禮也既乃升堂授王玉下云將幣據三享故知此擯之為執玉見王其將幣亦如之其禮亦如之禮謂以鬱鬯祼之亦如之者皆于其等之上王燕則諸侯毛毛謂不問爵之尊卑以年齒相先後也朝事尊尊尚爵燕則親親尚齒凡諸公相為賓主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送相為賓謂相朝也賓所停止則積間闊則問行道則勞其禮皆使卿大夫致之從來至去數如此也積問不言登受之于庭也旅讀如鴻臚之臚謂陳之也賓之介九人使者七人皆陳擯位不傳辭賓之上介出請使者則前對拜送送使者據下經主君郊勞則逺郊及勞于境當使卿聘禮宰夫朝服設飱致飱于國客之禮也此諸侯相賓則飱當使卿飱積同禮則積亦當使卿惟問為小禮使卿與大夫無考主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜交擯者各陳九介使傳辭也前三辭辭主君之親出也後三辭辭郊勞之幣物也卿大夫聘及郊主君使卿以束帛勞夫人使大夫以棗栗勞則國君相為賓郊勞必有幣玉籩豆之屬故曰三辭拜受也三還主君還辭賓再拜賓拜送也致館亦如之致飱如致積之禮館舍也使大夫授之君又以禮親致焉凡云致者皆有幣以致之及將幣交擯三辭車逆拜辱賓車進答拜三揖三讓每門止一相及廟惟上相入賓三揖三讓登再拜授幣賓拜送幣每事如初賓亦如之及出車送三請三進再拜賓三還三辭告辟三揖者朝位相去九十步揖之使前也至而三讓讓入門也每門止一相彌相親也賓三揖三讓讓升也賓亦如之當為儐謂以鬱鬯禮賓也上于下曰禮敵者曰儐三請三進請賓就車也每一請車一進欲逺送也三還三辭者主君一請賓亦一還一辭至三請賓三辭則主君再拜以送賓而賓告已辟去也注授幣當為受幣非也未有置賓之送幣而先言主君之受幣者蓋再拜句斷賓三揖三讓而升堂則主君拜其至也授幣賓拜送幣言授幣時賓拜而送之也授幣非國君所親必上相授之而君拜送以致敬耳每事如初謂享及有言主賓皆交拜也致饔餼還圭饗食致贈郊送皆如將幣之儀六禮皆主君所親故兩君相見之禮同也惟饗食速賓其餘主君親往賓之拜禮拜饔餼拜饗食賓繼主君皆如主國之禮拜禮者拜郊勞之禮也主君郊勞以禮于賓次日賓入將幣所以答主君之禮也其致饔餼及饗食之次日賓亦入拜蓋主君既親之則賓無不答也所謂賓繼主君即此謂隨而答其禮也不言拜還圭者還圭與致饔餼同時也不言拜致贈郊送者賓入辭而主君出贈送則遂行矣諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀賓主相待之儀與諸公同其饔餼饗食之禮則有降殺諸公之臣相為國客則三積皆三辭拜受不言登受者受之于庭也注謂侯伯之臣不致積據聘禮無致積之文然此經曰凡侯伯子男之臣相為客而相禮其儀亦如之則不應無積可知矣豈道路共積無以束帛致積之禮而記者遂略之與及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賓使者如初之儀及退拜送登聽命賓登堂以聽主君之命也賓使者亦當為儐蓋主國以束帛勞而賓以束錦儐使者也如初之儀使者亦三辭而後拜受也按聘禮侯伯之臣受勞于庭致館亦于庭此並登聽命公之臣尊也致館如初之儀如郊勞也按聘禮致館無束帛賓亦無儐不言致飱者君于聘大夫不致飱也聘禮曰飱不致賓不拜及將幣旅擯三辭拜逆客辟三揖每門止一相及廟惟君相入三讓客登拜客三辟授幣下出每事如初之儀三辭辭主君以大客禮當巳也客辟不敢答禮也惟君相入客相不敢入也拜主君拜客至也客三辟三退負序也三讓客登與上經賓三揖三讓登同拜與上經再拜同客三辟而後授幣則未授幣不宜預設受幣之文益明矣不敢拜送者奉君命以將事非已所專也故私面私獻皆再拜稽首及禮私面私獻皆再拜稽首君答拜禮以醴禮客也私面私覿也既覿則或有私獻者此三者皆于聘之日行之故并言之春秋傳楚公棄疾見鄭伯以其乘馬私面出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟中門之外即大門之內也問君曰君不恙乎對曰使臣之來寡君命臣于庭問大夫曰二三子不恙乎對曰寡君命使臣于庭二三子皆在勞客曰道路悠逺客甚勞勞介則曰二三子甚勞既曰再拜對又曰辟而對者前對問不恙後對或别問君之所為也後曰君答拜前第曰君拜者非答客也聞其君之起居不恙則如親見而拜以致敬也必出中門而後問者諸侯相為賓則主君郊勞今郊勞不親故出廟而後問示不敢即安若欲就客而問之也或謂廟中禮敬不可及其餘非也私面私獻皆于廟而反不可問君大夫乎致饔餼如勞之禮饗食還圭如將幣之儀注謂饗食亦君不親而使大夫以幣致者非也所以如將幣之儀而異于郊勞者正謂君親饗食故與將幣見君之儀同耳若大夫致之則當如郊勞之禮矣還圭主君弗親而亦如將幣之儀者將幣以圭則還圭者兩國相答之正禮也雖大夫致之若主君之臨而以不敢答禮焉故據聘禮迎于門外而不拜猶將幣時主君拜至客辟而不敢答拜異于郊勞之拜辱也聽命受圭負右房而立猶授幣不拜而下異于郊勞之聽命下拜登受也其儀與將幣不同而曰如將幣之儀謂不敢答禮如親見主君而受命耳郊勞曰禮者有儐使者之幣故兼儀與物而言之君館客客辟介受命遂送客從拜辱于朝君館客者客將去就省之也遂送君拜以送客也明日客拜禮賜遂行如入之積客將行總拜主君之禮賜也如入之積亦三積也凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之不曰以其爵而曰以其國之爵者記曰次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫凡四方之賓客禮儀辭命餼牢賜獻以二等從其爵而上下之二等謂降殺以兩即大行人職所謂諸侯之卿各下其君二等大夫士亦如之也上言爵等同者相為賓客之禮此則言爵等不同者相為賓客之禮凡賓客送逆同禮凡諸侯之交各稱其邦而為之幣以其幣為之禮幣享幣也大國則豐小國則殺主國如其豐殺而禮之凡行人之儀不朝不夕不正其主面亦不背客謂擯相傳辭時也不正東鄉不正西鄉常視賓主之前却得兩鄉之司儀掌擯相之禮以詔儀容辭令揖讓之節故行人受儀法焉行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達傳遽若後世馳驛而使者媺吉事也惡凶事也無禮禮籍所不載也道有難謂遭疾病他故也其大事有禮者有故則介傳命不嫌不達不曰吉凶而曰美惡者如王小有問勞雖美而不得謂之吉小有詰讓雖惡而不得謂之凶也居于其國則掌行人之勞辱事焉使則介之先儒謂使必大小行人非也大行人二人小行人四人掌賓客之禮事豈能供聘眺存省問喪荒弔禬恤以及脤膰慶賀之役哉司士職曰作士適四方為介者凡國使之介也此曰使則介之者惟十有一年小行人使適四方以協禮事則行夫為之介也居于其國謂介行人而居所適之國也不先言介者文當然也如曰行人使則介之居于其國掌行人之勞辱事則贅矣環人掌送逆邦國之通賓客以路節達諸四方舍則授館令聚柝有任器則令環之凡門關無幾送逆及疆路節旌節也四方圻上也逆賓于疆及宿令柝歸送亦如之掌訝之職也而又設環人所以待過賓于王畿而之列國者故曰通賓客又曰以路節達諸四方又曰門關無幾送逆及疆則非止而有事者明矣曰環人者環四境而待過賓以達之于四方也象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之若以時入賓則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賓相之幣帛王所賜豫也辭令告諭之辭也賓相為擯而相侑其禮儀也凡國之大喪詔相國客之禮儀而正其位凡軍旅會同受國客幣而賓禮之凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子凡國之大喪以下乃掌客職錯簡蓋象胥之職前所列已備矣而掌客未及大喪詔相國客儀位軍旅會同受幣賓禮國客則職事有缺也卿大夫士庶子謂從諸侯而來賓者喪紀軍旅會同之大事使諸侯次事小事并及諸侯之卿大夫士庶子使觀禮且周事也諸子職會同賓客士庶子必從春秋傳同盟于戲六卿及大夫門子皆從鄭伯則于王事可知矣若王朝之卿大夫士則贊王命而戒之者冢宰王朝之士庶子則作之者諸子非掌客所及也既曰凡作事又曰王之大事者正以見所作卿大夫士皆侯國之人而事則王朝之事耳惟諸侯之從者故所任止上士若王臣則中下士與事者多矣掌客掌四方賓客之牢禮餼獻飲食之等數與其政治政治邦新殺禮之屬王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻大合諸侯則其長必二王之後也故備天子儀物示賓而不臣王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公視上公之禮卿視侯伯之禮大夫視子男之禮士視諸侯之卿禮庶子一視其大夫之禮犢角繭栗者牲孕則天子不食令者掌客令主國也大行人職曰十有二歲王巡守殷國此職又曰王巡守殷國而下載諸侯膳王之禮則殷同即巡守而會諸侯于方嶽所謂施天下之政者即尚書王制所載巡守諸大政舊説王不巡守而六服盡朝非也春秋傳曰先王卜征五年而歲其祥祥習則行不習則增修德而改卜設王當巡守之歲以喪疾不行自可于疾已喪畢之後行之不宜更曠其期至十有二年之久且王果喪疾又不應日覲四方之諸侯也況巡守者巡所守也豈可以諸侯之朝代哉六服之君無歲不朝以圖事比功而又一歲而遍召之義無所取當以經文正之不曰諸侯膳以牲犢而曰國君者惟所至之國然也凡諸侯之禮上公五積皆視飱牽三問皆修羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十甕車皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆視飱牽再問皆修飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍􅬘皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆視飱牽一問以修飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十甕皆東米二十車􅬘三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛積皆視飱牽謂所共如飱而牽牲以往不殺也生而致之以一夕遷次不盡用也不殺則無鉶鼎簠簋之實其米實于筐豆實實于甕壺之有無未聞修脯也飱客始至致小禮也公侯伯子男飱皆飪一牢其餘牢則腥食謂庶羞美可食者簠稻粱器也豆菹醢器也鉶羮器也禮之大數鉶少于豆公鉶宜三十八侯伯二十八子男十八壺酒器也鼎牲器也簋黍稷器也合言鼎簋者牲與黍稷乃食之主也故公侯伯子男其數皆十有二無加損焉牲當作腥謂腥鼎也于侯伯云腥二十有七乃本字也諸侯禮盛腥鼎有鮮魚鮮臘每牢皆九為列公腥鼎三十六腥四牢也侯伯二十七腥三牢也子男十八腥二牢也皆陳皆陳列也凡此皆飱門內之實也其車米禾芻薪則陳于門外饔餼既相見致大禮也死牢如飱之陳亦飪一牢餘腥牽生牢也車皆陳車字衍米車載米之車也聘禮曰十斗曰斛十六斗曰籔十籔曰秉每車秉有五籔則二十四斛也禾稿實并刈者聘禮曰四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也稯猶束也米禾之秉筥字同數異禾之秉手把耳筥讀為棟梠之梠謂一穧也乘禽乘行羣處之禽謂雉雁之屬于禮以雙為數殷中也中又致膳亦念賓也若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之凡介行人宰史衆臣從賓者也以其爵等為其牢禮之陳數大行人職所謂諸侯之卿各下其君二等及其大夫士亦如之也夫人致禮助君養賓也致之皆使下大夫于子男曰膳視致饗則是不復饗也卿皆見者見于賓也既見之又膳之亦助君養賓也于子男曰親見卿皆膳特牛見卿于小國之君有不特造館見者其造見者乃致膳也此經獨言諸侯相朝主國待賓之禮者天子待諸侯之禮亦然故舉下以包上也飱禮不言米禾芻薪者以積視飱牽則飱有米禾芻薪不必言矣疏謂君用修臣用牢非禮疑有誤非也羣介行人宰史皆有牢致積之牢也其文係于三問皆修之下者問君以修則不疑于牢為臣之問也不曰皆有積何也曰有牢則致積可知曰有積則嫌于君之積有牢而臣之積無牢也曰羣介行人宰史皆有飱饔餼又曰各以其爵等為牢禮之陳數亦此義也注謂諸臣牢禮之數惟以爵不以命數亦非也果爾則子男之卿陳數與君同矣注牢禮陳設之位與數皆約聘禮言之他無所見凡諸侯之卿大夫士為國客則如其介之禮以待之謂特來聘問待之如為介之禮也凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮環人職凡國之大喪節應次此節下凡賓客死致禮以喪用賓客有喪惟芻稍之受死則主人為之具而殯矣喪用者饋奠之物賓客有喪謂父母或君死也芻給馬牛稍人廪也遭主國之喪不受饗食受牲禮牲禮腥致者饗食則全不受飱饔餼亦止受腥牢有喪不忍煎烹也禮不當受則主人不以熟致非致而不受掌訝掌邦國之等籍以待賓客若將有國賓客至則戒官修委積與士逆賓于疆為前驅而入士訝士也及宿則令聚柝及委則致積至于國賓入館次于舍門外待事于客及將幣為前驅至于朝詔其位入復及退亦如之入復入告王以客至也退亦如之仍為前驅也凡賓客之治令訝訝治之注謂賓客之治為正貢賦理國事非也邦國之貢冢宰制之其典冢宰施之地法司徒頒之禮事宗伯令之獄訟司寇定之而又使司馬兼董焉非訝士所得治明矣訝士掌四方之獄訟邦有賓客則誅戮暴客者客出入則導之有治則贊之蓋或賓客之僕𨽻厮輿與邦人有爭或賓客之屬自犯法禁其在王朝皆不敢自治而以歸于掌訝掌訝使訝士治之訝士職曰有治則贊之者即贊掌訝也晉人執宋仲幾于京師春秋以為非常而志之則周之舊典可知矣凡從者出則使人道之及歸送亦如之從者凡介以下也人其屬胥徒也送至于境如其前驅聚柝待事之屬凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝此謂朝覲聘問之日王所使迎賓客于館之訝也不曰則而曰有者大國之君有卿訝而小國之君則大夫訝大國之卿有大夫訝而小國之卿則士訝若小國之大夫及列國之士則雖有訝者而非命士矣知然者列國之士天子無使命士往訝之義也司士職會同賓客作士從諸子職會同賓客作羣子從則訝列國之士者其諸王朝未授職之士與庶子與凡訝者賓客至而往詔相其事而掌其治令凡訝者謂上所云卿大夫士皆待賓客至館而後往非若掌訝之逆于疆也掌訝惟至于朝詔其位而巳此訝者則詔相其禮事掌訝及退為之前驅而已若賓有治王有令于賓則此訝者通掌之掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之萬民之所聚者謂大都會也辟讀如辟忌之辟謂使知王之所好者而為之知王之所惡者辟而不為列職八人而能遍巡邦國者各主其方而不限以程期也使和諸侯之好達萬民之説説所喜也達者達之于王若其國君掌邦國之通事而結其交好注通事謂朝覲聘問非也朝覲聘問禮有常經無為别設官以掌之蓋非朝聘之期而鄰國有事欲相通則因王官之巡行而達其意也其事如通防交糴聨婚姻詰逋逃之類以諭九稅之利九禮之親九牧之維九禁之難九戎之威九稅司徒所掌也九禮宗伯所頒也九牧冢宰所建也九禁九戎司馬所專也而使刑官之屬諭之者蓋邦國不能率由典常則刑禁及之刑禁不能施則兵戎詰之與司馬九法兼備五官之職其義略同獨無冬官之法者居四民時地利惟始立國用之建國之後未有無故而變冬官之法者故不之及也掌察闕掌貨賄闕朝大夫掌都家之國治日朝以聽國事故以告其君長序官曰每國上士二人下士二人則國治即都家之治也國有政令則令其朝大夫李耜卿曰上文國事故乃天子日所施為者聽之以告其君長使知王之所好惡而辟行之也此政令乃當施于都家者凡都家之治于國者必因其朝大夫然後聽之惟大事弗因都家所有治事上王國必因朝大夫以通然後受而聽之若大事如寇戎荒喪之類則直達凡都家之治有不及者則誅其朝大夫在軍旅則誅其有司不及謂有稽滯有司都司馬家司馬也都則闕都士闕家士闕李耜卿曰自大司寇小司寇士師而下鄉士主國獄遂士主郊縣士主野方士主都家畿內也訝士主四方畿外也次以朝士者斷獄弊訟皆于外朝也次以司民者見民者天之所司王之所敬刑罰不可以不中也獄訟既弊有五刑以麗其辟故次司刑有刺宥以議其輕重故次司刺有大亂獄則故府之藏可覆視故次司約有疑獄不決則明神可鑒故次司盟于是罪輕而贖刑者則職金受其入罪重而拏戮者則司厲執其法稍重而未麗于法者則司圜主收教之已在刑者則囚而刑殺故掌囚掌戮又次之從坐者恕其死因任以事故司𨽻罪𨽻又次之征伐四夷所得蠻閩夷貉四𨽻又次之繼犬人于司厲者司厲治盜犬能逐盜者也雖然刑非得已也禁于未發則民安而上不煩故布憲禁于天下禁殺戮禁暴氏禁于國中野廬氏蠟氏雍氏萍氏司寤氏所以使行者無害死者有主陸走者無險阻水浮者不沒溺時其宵晝行止以節皆道路之禁也司烜氏條狼氏修閭氏皆祭祀軍旅之禁也自冥氏至庭氏十二職草木鳥獸為民害者驅而除之義之盡也繼以銜枚氏司囂者無端歌哭雜氣妖聲不祥也于是刑事畢矣次以伊耆氏者秋養耆老故也次以大行人小行人諸職者賓位于西北天地之義氣也又儀禮凡諸侯朝覲會同禮畢則降而肉袒請刑故以屬刑官賓客見王則有儀故司儀次之而行夫掌小事環人掌送逆象胥掌四夷國使以類屬焉賓客朝見既畢有饔飱牢禮之歸故掌客次之賓客自來至去皆有訝故掌訝次之掌交所以喻王志于天下之邦國也朝大夫所以達王事于畿內之都家也故以是終焉其掌察掌貨賄都則都士家士文闕義無所考周官集注卷十
