body:
  text: 周官集注卷一翰林院侍講銜方苞撰漢河間獻王好古書購得周官五篇武帝求遺書得之藏于祕府諸儒皆莫之見哀帝時劉歆校理祕書始著于録略以考工記補冬官之闕歆門人河南杜子春能通其讀鄭衆賈逵受業于杜漢末馬融傳鄭康成康成所注行世周官最後出而起于劉歆故後儒或疑為偽作然漢文帝得魏文侯時樂工獻春官大司樂章而太史公封禪書引周官冬日至祀天于南郊迎長日之至夏日至祭祗皆用樂舞而神乃可得而禮則為周人之書明矣北宋程子張子皆尊信之朱子謂此經周公所作但當時行之恐未能盡後聖雖復損益可也若肆為排抵則愚陋無知之人耳天官冢宰第一冢大也宰主也天統萬物冢宰統衆官故曰天官不言司者不主一官之事也宗伯亦不言司鬼神非人所主故也惟王建國辨方正位體國經野設官分職以為民極建立也辨東西南北之方以正左祖右社面朝後市之位體國中之廣狹以經野外都邑郊關溝塗之界設六官之屬而分以職事皆所以安民生定民志而使遵王之道所謂為之極也左祖右社面朝後市乃正位之事非體國也王城面九里畿內面五百里近郊遠郊甸稍縣疆之地各有所任人有所宜事取其便皆量國中之體勢以定野外之經制五等之國以次而殺則其野外都邑郊關溝塗大小逺近必與相稱蓋辨方以正位體國以經野設官以分職文雖對立而義則相承也乃立天官冢宰使帥其屬而掌邦治以佐王均邦國總治六官之職故曰邦治均者使上下尊卑貧富逺邇各得其平也凡經連言邦國者據諸侯也特言邦或言國者多據王國也不先言均王國而言均邦國者言王國恐不兼諸侯故舉外以包內也治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人百官總焉則謂之冢列職于王則稱大義各有當也旅衆也下士治衆事者自大宰至旅下士轉相副二皆王臣也府掌官契以治藏史掌官書以贊治皆其官長所自辟除胥掌官敘以治敘徒掌官令以徵令乃民給徭役者胥讀如諝謂其有才知為什長諸官皆府少而史多府常在史上唯御史百有二十人且在府上以凡治者受法令事繁且要也凡有府兼有史者各共其事也或有史而無府無所藏也角人羽人等則有府而無史以藏稅物而當職文書少事可兼也臘人食醫等府史俱無專官行事更無所須也惟天府府多于史所藏物重也自大宰至旅下士凡六十三人而府史胥徒止百五十人五官亦然蓋吏省則其祿易給吏有祿則人知自愛漢猶倣此意故賢人君子往往出于其間後世吏胥日衆以天下之事付之遊手之民而又奪其庸是授以具而教之為姦也李耜卿曰典命大夫同四命而此分為中下蓋若侯伯同七命子男同五命而爵則有髙下耳典命公之卿三命掌客職士視諸侯之卿禮注言士以三命而下為差似據此宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人正長也序官不以尊卑為先後而以緩急為次第故宫正𨽻前內宰等𨽻後凡命官曰正者總其政也曰司者察其事也曰典者守其法也曰職者主其業也曰掌者專其任也曰師者訓其徒也曰氏者世其官也曰人者稱其材也其餘如宫伯膳夫山虞林衡之類則各因其職事以起義也宫伯中士二人下士四人府一人史二人胥二人徒二十人膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人美物曰珍膳膳夫食官之長庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人庖之為言苞也裹肉曰苞苴賈主市買知物價內饔中士四人下士八人府二人史四人胥十人徒百人饔和也熟食須調和故曰饔外饔中士四人下士八人府二人史四人胥十人徒百人亨人下士四人府一人史二人胥五人徒五十人甸師下士二人府一人史二人胥三十人徒三百人郊外曰甸天子藉田在甸故稱甸師此官主地事而不列地官者以天子躬耕又共野薦給薪蒸故次亨人也徒三百人者用以耕耨周語所謂庶人終畝也獸人中士四人下士八人府二人史四人胥四人徒四十人漁人中士二人下士四人府二人史四人胥三十人徒三百人鱉人下士四人府二人史二人徒十有六人臘人下士四人府二人史二人徒二十人獸肉乾曰臘醫師上士二人下士四人府二人史二人徒二十人食醫中士二人疾醫中士八人瘍醫下士八人獸醫下士四人酒正中士四人下士八人府二人史八人胥八人徒八十人酒人奄十人女酒三十人奚三百人凡奄不稱士者皆府史之類也女酒與奚為什長若胥徒皆庶人之妻願給事而受廪餼者注引漢法以為女奴非也為齍盛齊酒籩豆之實以事天地宗廟不宜用罪人秋官司厲惟盜賊之女子謂之奴入于舂稿則女奴不共他職而他職之女奚不得為奴明矣女酒及奚凡三百三十人舂稿事校繁重而女舂抌止二人奚五人女稿十有六人奚四十人蓋給役者司厲所入女奴而女舂女稿及其奚特監視教導之二職不列女奴及其數者以司厲職有明文且以罪入數不可定也漿人奄五人女漿十有五人奚百有五十人凌人下士二人府二人史二人胥八人徒八十人籩人奄一人女籩十人奚二十人醢人奄一人女醢二十人奚四十人豆實不盡于醢醢人所掌惟四豆之實故主醢而不謂之豆人也醯人奄二人女醯二十人奚四十人鹽人奄二人女鹽二十人奚四十人幂人奄一人女幂十人奚二十人巾幂以覆飲食之物故次飲食後宫人中士四人下士八人府二人史四人胥八人徒八十人掌舍下士四人府二人史四人徒四十人舍行所解止之處幕人下士一人府二人史二人徒四十人掌次下士四人府四人史二人徒八十人大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人內府中士二人府一人史二人徒十人外府中士二人府一人史二人徒十人司會中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人會大計也日計曰成月計曰要嵗計曰會司書上士二人中士四人府二人史四人徒八人主會計之簿書職內上士二人中士四人府四人史四人徒二十人職嵗上士四人中士八人府四人史八人徒二十人不曰職出而曰職嵗者嵗有豐凶所出一以嵗為準而不得過也職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人司裘中士二人下士四人府二人史四人徒四十人掌皮下士四人府二人史四人徒四十人內宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人內小臣奄上士四人史二人徒八人奄人通內外之令領女奚之屬其事有斷不可缺者然考周官內小臣四人寺人五人其餘司服用者通天地二官四十五人數既甚少而爵以士者又不過四人其上有內宰宫正小宰大宰層纍而督察之則亦安能為國患哉或又以刑人不宜近嬪御亦非也士大夫他行皆善而獨不能自戒于聲色者多矣若少動于邪既服刑而自懲艾安在其不可改行遷善也刑人多矣而為奄者不過四十五人其近王后者不過九人則必簡其能補前行之惡者可知矣諸職稱奄言其精氣之閉藏而己惟王之正內謂之寺人言能侍御于王必其才行之出類者也至內小臣稱士則非有士行者不足以充之閽人王宫每門四人囿遊亦如之墨者使守門寺人王之正內五人正內注路寢也疏謂后之正寢若王之路寢不得稱內春秋傳寺人披自稱刑臣則寺人奄也王志長曰冢宰一官凡閽寺嬪御之職服膳管庫之司皆屬焉自冢宰失職而後有女寵之禍有閹寺之變有內藏之私有宫市之患有奢僭百出之弊凡先王治天下之本莫不廢壞焉內豎倍寺人之數童稚未有遽犯宫刑者按春秋傳庚宗婦人之子叔孫以為豎又孔氏之豎渾良夫長而美通于伯姬則豎非刑人也其選入及出之于外必有定期豎為未冠之稱則將冠而出之可知矣寺人五而豎倍之者正內日近王后職事親要刑餘之人善良者不多覯故取童稚之純一者備焉九嬪嬪婦也昏義曰天子后立六宫三夫人九嬪二十七世婦八十一御妻夫人不列職者夫人之于后猶三公之于王坐而論婦禮無官職或曰以九嬪德優者攝如三公之攝以六卿而無分職也世婦不言數者君子不苟于色有婦德者充之無則闕女御昏義所謂御妻御猶進也侍也蜀岡陳氏曰世婦女御不言數者有其人乃有其位故其數不可常也以名官之義推之世婦謂有子而可以為王繼世之婦人也古者婦人無子則出卿大夫之妻名世婦亦必有子以繼世者也女御謂宫中女子為王所幸御者蓋聖王之治內無怨女外無曠夫宫中女子必有限年出嫁之制而世婦則義不可出女御亦不便遽出故列職而任之以事必至易世之後然後世婦之有子者或出從其子或别宫以居之女御則少者出嫁而老者歸其母家戴媯有子既立而弒猶大歸于陳則古制可知矣女祝四人奚八人女史八人奚十有六人其職掌王后之禮職內治之二以詔后治內政則非有道藝而知禮法者莫能任也其諸擇嬪婦之賢者而為之與典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人典主也典絲下士二人府二人史二人賈四人徒十有二人典枲下士二人府二人史二人徒二十人內司服奄一人女御二人奚八人有女御者以衣服進或當于王廣其禮使無色過縫人奄二人女御八人女工八十人奚三十人染人下士二人府二人史二人徒二十人追師下士二人府一人史二人工二人徒四人追治玉石之名詩云追琢其章男子首服在夏官辨師者夏時陽盛萬物長大長大乃冠婦人直取首服配衣故與衣連類列此屨人下士二人府一人史一人工八人徒四人夏采下士四人史一人徒四人夏翟羽色禹貢徐州貢夏翟之羽後世或無故染鳥羽象而用之謂之夏采大學之道治國平天下必本于修身齊家而其原又在格物致知誠意正心蓋必如此而後表裏無隔細大畢貫冢宰之屬驟視之若紛雜瑣細而究其所以設官之意則天子誠意正心修身齊家治國平天下之事皆統焉所以為父師之任而非五官之比也至于格物致知之學則師氏保氏導養有素而隨事而究察焉者皆是也大宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以糾萬民六曰事典以富邦國以任百官以生萬民典常也經也法也六典治教禮政刑事之書也大宰總六官故並建之經理之使畫一也紀詳理而不遺也擾猶馴也統合而率之也詰告而戒之也糾約而束之也府以藏貨賄器物故惟天地二官曰官府府亦云教者稽其良苦時其燥濕謹其出入皆有教也春官雖有天府而所掌者祖廟之守藏與天地二官之府異故不言府而苐舉百官也師田之禮昭文章明貴賤順少長習威儀進退有度左右有局故曰正百官四丘出甲更番征役故曰均萬民刑不上大夫而曰以刑百官者刑不為大夫設而有罪亦不能廢刑也任者屬之事以盡其力也獨于冬官言任者水土之政尤勞且繁以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以會官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治官屬六官之屬也官職六職也官聯六聯也官成八成也官計六計也俱見小宰職官常所領之事各有故常也官法小宰職所謂以法掌祭祀朝覲會同賔客之戒具也官刑司冦職所謂四曰官刑上能糾職也弊斷也以分之所守言則曰官職以事之所服言則曰官常其實一也上分職以授下故曰辨下服常以報上故曰聽官府八成有一定條格故曰經七事之法有施舍治訟故曰正聯與常獨曰官治主于核其人也餘皆曰邦治主于舉其事也以八則治都鄙一曰祭祀以馭其神二曰法則以馭其官三曰廢置以馭其吏四曰祿位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆則亦法也都鄙公卿大夫采地王子弟食邑在畿內者以有邑故曰都在國之鄙故曰鄙祭祀有廢置毋得僭差都家祭祀必致福于國國有大故則令禱祠所以馭其神也廢猶退也退其不能者舉賢而置之吏即服官者若府史之屬則其長所自辟除非王朝廢置所及也法則示以職之所守也故曰官廢置核其人之所堪也故曰吏士學士也賦農田所入貢其餘諸職之貢物也私邑之用王朝之供各有定分而又時其嵗之豐凶事之繁簡是都鄙之用皆王朝所制也故曰以馭其用其封內刑賞得自專恐妄作威福故都家之獄訟必上于國則賞亦不敢專行可知雖假以威福之柄而仍操之自上故曰以馭其威以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過詔告也奪奪其田祿也廢罷黜也誅責讓也于爵祿後即繼以馭幸者人君于嬖幸而濫以爵祿最亂政之大者故先之人之行能各有所宜三宅六事百司置之必當其位所以馭也古者刑不上大夫故獨言宥之以生者而不及于殺也刑典曰以刑百官示王章之不可犯也而非以是馭之也故八柄止于廢與誅然曰生以馭其福則罪大惡極而不免于刑禍者不必言矣春秋傳曰淫而無罰福也故有罪而赦宥可以謂之福古者人臣去國三年然後收其田里則在國者雖奪其田祿必不使至于甚困故曰以馭其貧以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賔統者統合于上而繫屬于下也敬故不慢舊也賢有德行者能通道藝者保庸安有功者達吏府史胥徒才行特出則達之使為王官也禮賔賔禮諸侯所以示民親仁善鄰朱子曰通道藝則識得許多事物之理所以屬能以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰間民無常職轉移執事三農上中下之等也九穀或曰黍稷秫稻麻大小豆大小麥或曰無秫大麥有粱苽樹果蓏曰圃園其樊也掌山澤之官曰虞掌川林之官曰衡並舉虞衡示所作之材兼川林也山澤之民無名號故借虞衡以表之澤無水曰藪牧地之不可田而利畜牧者八材八方之材也金玉曰貨布帛曰賄化者變其形以為器物也行曰商處曰賈阜積之也通轉之也八材曰飭者引以繩墨式以模範也絲枲曰治者漚椎煮練以達其性也嬪有夫之婦也不曰女婦而曰嬪婦者非有夫之婦雖蠶績而不責以布帛之貢也故閭師職曰任嬪以女事貢布帛疏材草木根實可食者古所謂臣妾後世之僕婢也春秋傳皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦邦中在城郭者四郊去國百里邦甸二百里家削三百里邦縣四百里邦都五百里按閭師掌國中四郊之賦任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物則農即以穀為貢餘七者即以所貢之物為賦明矣此職邦郊甸稍縣都之田賦則農所貢公田之九穀也其餘賦則圃牧嬪婦之貢也關市之賦即商賈百工之貢也山澤之賦即虞衡之貢也園圃藪牧即邦郊甸稍縣都之地農工商賈嬪婦臣妾間民即邦郊甸稍縣都關市山澤之民以九職制九賦以九賦待九式貢物之外别無所謂賦其義甚明康成乃謂口率出泉節卿鄭氏又謂即百畝私田制賦皆未詳考經文故也幣餘即職幣所斂餘幣也餘幣乃邦物而謂之賦者既已給之又振之以歸于國故亦云賦也家稍縣都皆有賦者其地不盡為采也都家則各有貢司徒職制地貢而頒職事是也關市譏而不征乃文王治岐之政或以九賦及關市證周禮為偽非也孟子市廛而不征則市有賦矣春秋傳逼介之關暴征其私則逺關有常賦矣以九式均節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式式謂用財之節度芻秣養馬牛禾穀也匪頒王所分賜羣臣好用燕好所賜豫大府九賦各有所待用之多少必與賦相稱所以節之也職內敘其財以待邦之移用所以均之也用三餘一以三十年之通制國用尤均節之大者九式無軍旅蓋甲出丘甸無養兵之費有事則遺人致道路之委積出畿則侯國共其資糧此古者所以薄取于民而財不匱也先九賦次九式而後及于九貢者大府九式之用皆以九賦待之而九貢則别以待弔用也李世美曰九式皆有常制者惟軍旅之用無常故不頒為式古之師行未有用饋餉者齊桓東伐主魯西伐主衛傳曰師出陳鄭之間共其資糧屝屨當時所過雖以為苦而齊師嵗出力常沛乎有餘實由于此若王師之出則山澤間田之所入方伯連帥之所共其儲偫必有素矣以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢邦國獨致貢以粟米皆取之畿內所以用利而民不勞也祀貢凡可共祭祀之用及旅幣記曰其餘無常貨各以其國之所有是也器貢銀鐵石磬丹漆也幣貢玉馬皮帛也材貢櫄幹栝柏篠簜也貨貢金玉龜貝也服貢織文絺紵也斿貢羽毛也物貢雜物魚鹽橘柚之屬大行人六服因朝而貢物各有定此則每嵗常貢以當其田賦所宜上供者楚于周當在要服而苞茅祀貢也桃弧棘矢器貢也則各以其國之所有而物非一類可知矣以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民兩猶耦也民各有耦所以繫之也牧者侯伯有土之君故曰以地得民長者一官之尹得自辟屬吏故曰以貴得民師有德行者儒通道藝者宗者厯代故家如懷姓九宗殷民七族故曰以族得民主者卿大夫之家有采邑而畜徒𨽻者地非所專食其土利而己故曰以利得民吏者鄉邑小吏位雖卑當官行法則民受其約束故曰以治得民友者四民皆有之任即任恤之任彼此相倚賴則各以類從故曰以任得民山林川澤皆有民而獨舉藪者財物衆而聚民多也九兩得民都鄙之所同也而獨曰繫邦國之民者畿內公卿不世國其民皆天子之民也外諸侯則得私其民矣故以九兩繫之示牧長不過為天子繫屬此民與師儒以下等耳正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之正月周正建子之月吉朔日也和調改也先王通變宜民議事以制故每于嵗終調制所當改易即堯典所謂平在朔易也象魏闕也從甲至甲謂之挾日曰象者非惟書其事且揭其圖使觀者易辨也不曰治法之象而曰治象之法者曰治法之象則似專縣其象曰治象之法然後知并書其法也太宰職不條列所以治邦國者以六典八法八則八柄八統九職九賦九式九貢九兩天子所以治諸侯與諸侯所以自治其臣民者皆具于是矣布治于邦國即以典法則柄統職賦式貢兩頒之也乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔牧公侯伯子男守土以牧民者監方伯連帥相監臨者參謂三卿伍謂五大夫殷衆也謂衆士也輔府史胥徒庶人在官者五大夫二三卿者各一其二則小宗人小司冦也見于春秋傳者魯季孫為司徒叔孫為司馬孟孫為司空宗人則夏父弗忌釁夏嘗為之司冦則臧孫紇嘗為之其不言小僭也冢宰職尊任重常以上卿兼攝而不别設大夫故魯人謂季氏為冢卿鄭備六卿有冢宰僭也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫王子弟食采邑者立兩卿殺于外諸侯也宗伯職六命賜官大夫四命不合立官而得與公卿並稱長王子弟食邑與三公同者在五百里疆地與六卿同者在四百里縣地與大夫同者在三百里稍地大夫量設家吏不得備兩卿五大夫與公卿等乃施法于官府而建其正立其二設其考陳其殷置其輔正謂冢宰司徒宗伯司馬司冦司空也二謂小宰小司徒小宗伯小司馬小司冦小司空也考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賔客之治待謂法具于此待事至而應之也禮賔禮也祀五帝則掌百官之誓戒與其具修祀五帝四時迎氣各祭其方之帝並中央之帝為五也誓戒百官廢職者有刑重失禮也具所當供修掃除糞灑冢宰司徒所涖祀事皆首五帝者四時迎氣之祭且涖則昊天上帝不必言矣知然者宗伯以吉禮事邦國之鬼神示首曰以禋祀祀昊天上帝小宗伯兆五帝于四郊司服職祀昊天上帝則服大裘而冕祀五帝亦如之參伍其文則其義顯然矣司士職孤卿特揖而不言三公與此經不言昊天上帝義同易大傳帝出乎震則四時迎氣各祭其方之帝而以人帝配之固有此義屈原九章令五帝以折中戒六神與嚮服則祭五帝而以六佐配之秦以前固有其制非吕氏月令之臆説也先儒或以鄭氏據緯書之妄遂謂五帝之稱漢以後始有之而疑周官為偽誤矣前期十日帥執事而卜日遂戒前期前所諏之日也十日散齊七日致齊三日執事宗伯大卜之屬既卜遂戒百官以始齊及執事視滌濯及納亨贊王牲事及祀之日贊玉幣爵之事滌濯謂祭之前夕溉祭器及甑甗之屬此執祀事之始也納亨謂鄉祭之晨納牲告殺既殺以授亨人凡大祭祀君親牽牲大夫贊之祭天無祼故先迎牲若宗廟之祭則既祼而後迎牲也日旦明也玉幣所以禮神各如其方之色爵所以獻齊酒不用玉爵尚質也三者執以從王至而授之祀大神示亦如之享先王亦如之贊玉几玉爵祀大神朝日夕月之類祀大示則方澤大社也注以大神示為天地是别有五帝之祭列于天地宗廟之上誤矣蓋上帝之尊非羣祀可匹故特言之而後以大神大示並列焉玉几所以依神亦如之下别言贊玉几玉爵則天地不用玉几玉爵也享先王不言大者六享皆然大朝覲會同贊玉幣玉獻玉几玉爵時見曰會殷見曰同大朝覲謂同時而至者適衆多也若至者少則冢宰不與小宰職凡賓客贊受爵受幣之事是也玉幣諸侯享幣也玉獻獻國珍異亦執玉以致之玉几王所依也玉爵諸侯酢王之爵也王祼諸侯大宗伯攝非冢宰所贊大喪贊贈玉含玉助嗣王也贈玉既窆所以送先王含玉死者口實天子以玉作大事則戒于百官贊王命春秋傳曰國之大事在祀與戎祭祀已前見此戎事也贊王命謂助王為教令王視治朝則贊聽治王有三朝外朝斷疑獄內朝在路寢圖宗人嘉事惟治朝為正朝在路門外司士所掌也視四方之聽朝亦如之謂王巡狩在外時凡邦之小治則冢宰聽之待四方之賓客之小治重出冢宰見不復決于王也如曰凡邦之小治聽之雖謂仍復于王可也春秋傳趙武欲一獻曰武請于冢宰矣以得專賓客之小治也嵗終則令百官府各正其治受其會謂各明正其所治之事也會計簿也聽其致事而詔王廢置正其治者正其所當為之事也聽其致事者聽其所己為之事也廢退不職者置仍使居職任事三嵗則大計羣吏之治而誅賞之誅有以刑辟言者司烜職邦若屋誅則為明竁是也有以詰責言者八柄誅以馭其過是也此兼二者蓋羣吏之不職者每嵗之終己廢之矣至三嵗大計任職而有過差者則詰責之若姦惡久而後著則非惟廢之或不免於刑辟也有功止于賞者古者能其職則終守焉非大才德不得驟進而居公卿之位故惟加爵命厚祿賜以為勸也小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁宫刑在王宫中者之刑刑典太宰所建而小宰復建宫刑者以治王宫之政令而習察其事情故刑之輕重出入得與大宰共酌定也大司冦所掌五刑無宫刑以小宰建之也糾糾其失也禁禁其邪也王宫之政令宫中之事也凡宫之糾禁事在宫外而關涉于宫中者如世婦之弔事則有蹕衛儀法內外宗春官世婦下及女奚之出入于王宫則有班次期會皆有糾禁舊説凡宫為后宫非也曰王宫則后宫該之矣正嵗以宫刑憲禁于王宫是也宫刑使大宰之二掌之則雖天子不得私喜怒而妃妾專妬虐下之患不禁而自弭矣葉氏曰小宰二太宰首王宫之刑禁蓋侍御僕從一有不正出入起居一有不欽皆足以害治故宫刑雖以為王宫之禁而實以格君心之非湯制官刑警于有位三風十愆備及于宫室之隱微伊尹引以為訓而繼之曰嗣王祗厥身念哉正此義也掌邦之六典八法八則之二以逆邦國都鄙官府之治執邦之九貢九賦九式之二以均財節邦用二副也逆迎受也太宰職賦先于貢者論敷政之次第則由內而達外也此貢先于賦者綜財用之大凡則舉逺以及近也以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聽其情敘尊卑秩次也治功狀也情或身家之私或職業功緒有當以情白于上者以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則專達二曰地官其屬六十掌邦教大事則從其長小事則專達三曰春官其屬六十掌邦禮大事則從其長小事則專達四曰夏官其屬六十掌邦政大事則從其長小事則專達五曰秋官其屬六十掌邦刑大事則從其長小事則專達六曰冬官其屬六十掌邦事大事則從其長小事則專達達決也如祭祀齊喪賔客饗食之陳數庖人內外饔之屬必稟于膳夫若辨腥臊羶香之物及割烹煎和則得專決也以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物太宰所建之六典即小宰所辨之六職六典所以治官府百官六職不覆列者以職即官府之所守也六職所謂節財用懷賔客事鬼神聚百物除盜賊生百物皆典之所該也故于典略之而職則詳焉治典曰以經邦國以紀萬民職則曰以平邦國以均萬民何也有經邦國之典奉職者守經而不失使各得其分願則邦國所以平也有紀萬民之典奉職者循紀而不違使各致其力庸則萬民所以均也教典曰以安邦國以擾萬民職則曰以安邦國以寧萬民何也邦國式于教而安無異義也上之施教曰擾故于典言之民能服教則寧故于職言之政典曰以平邦國以均萬民職則曰以服邦國以正萬民何也平者輯大字小而無所私故于典言之服者建威銷萌而不敢犯故于職言之均者賦役有式畨代有常故于典言之正者進退有度左右有局故于職言之事典曰以富邦國以生萬民職則曰以富邦國以養萬民何也邦國承其事而富無異義也生則著其所以生之理故于典言之養則備其所以養之事故于職言之春秋二官典與職無異辭者禮有常經刑有彛敘邦國萬民守典奉職無異義也治職平邦國均萬民與政典同辭者政典就軍旅一事而言治職則兼禮樂政刑而言也六典及六職皆不及都鄙者以邦國該之所以治官府萬民者邦國都鄙之所同也懷賔客宜列于禮職乃列于教職者朝覲會同聘俯之賔客則禮職和邦國之事該之矣此所謂懷者專主于教也如諸侯嵗所貢士及四方之商旅則使慕王朝風教之隆裔荒之貢使則使知中國禮義之美也聚百物列于政職者司馬主九畿職方制貢各以其所有以官府之六聯合邦治一曰祭祀之聯事二曰賔客之聯事三曰喪荒之聯事四曰軍旅之聯事五曰田役之聯事六曰斂弛之聯事凡小事皆有聯聯事者一事而諸官共舉之也六者惟斂弛事不紛然稅斂地官之事也而受法于司書入于大府則天官亦有事焉征役之施舍亦地官之事也而國正不及國子凡國之政事諸子存遊倅則夏官亦有事焉以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽賣買以質劑八曰聽出入以要會成謂有成籍可覆按也聽者或以待其治或以決其爭政賦也役均人所掌力政也比居五家為比之籍也簡稽簡册可稽考者謂卒伍馬牛車輦兵器之要簿也版戶籍圖地圖稱責謂貸豫傅謂附近鄰比為證佐别謂劵書兩分朝士職凡屬責者以地傅聽其辭是也舊説禮命為九命之差等非也官成待萬民之治其諸閭師鄼長以下就鄉民而授以祿位者與書契謂出豫入受之凡要質劑亦兩書一扎同而别之大市以質小市以劑掌于質人取豫以一物言出入以總數言八成聽政役師田閭里而不及賦稅者公田之入有常且時其豐凶以出稅法其他征斂皆有經式無爭訟也李耜卿曰取豫如司徒散利遺人施惠宫豫之民取之也出入如泉府賒貸旅師春頒秋斂之類以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨官府上羣吏之治狀而小宰聽之斷以六計也善德教洽也能政令行也敬不懈于位正行無傾邪法守法不失辨臨事不惑鄧氏曰善德之本能德之用敬正善之則法辨能之施而其介在亷善敬正非亷不能能法辨非亷無取以法掌祭祀朝覲會同賓客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聽其治訟祭祀賓客軍旅三合田役荒喪為七事朝覲會同即賓客之事不得别為二故聯事以賓客該之也六聯言賓客而不言朝覲會同此言朝覲會同而復言賓客者賓客所該甚廣如小司徒職所謂賓客則諸侯之聘使也王燕羣臣鄉大夫州長興賢才皆賓客之事官之聯事細大畢舉故以賓客該之至小宰所令不過朝覲會同之戒具其他賓客之小治有司供之不令于小宰故特出朝覲會同以示小宰所令賓客之戒具獨此二者猶祭祀之戒具小宰通掌之而大宰所掌獨祀五帝祀大神示享先王之戒具也施舍治訟之事紛非小宰所能遍也蓋亦令百官府治之聽之王氏曰七事即六聯獨不見斂弛令百官府共其財用治其施舍則斂弛亦在其中矣王介甫曰理其事謂之治爭其事謂之訟凡祭祀贊玉幣爵之事祼將之事將送也王酌鬱鬯獻尸尸受而灌地以降神故謂之祼天地至尊無灌宗廟社稷山川四方皆有之曰凡祭祀者祀五帝祀大神示享先王冢宰贊玉幣爵之事餘祭祀則小宰贊也祼將乃小宰通贊知然者大祭祀宗伯涖玉鬯省具以示虔也凡祭祀小宗伯將瓉祼奉器以待用也他職無及祼事者則贊王祼者惟小宰明矣其不曰小祭祀者以贊祼兼大祭祀又或冢宰以喪與疾不得與則大祭祀之玉幣爵亦得攝贊故以凡祭祀該之凡賔客贊祼凡受爵之事凡受幣之事宗伯職大賔客攝而載祼則所贊宗伯也王不酌賔客而有受酢贊者受爵于賔以奉王曰凡賔客者大朝覲會同則受爵與幣皆冢宰贊也不曰小賔客者以贊祼兼大賔客又冢宰有故則大賔客之爵與幣亦得攝贊故以凡賔客該之喪荒受其含襚幣玉之事春秋傳曰口實曰含衣服曰襚凶荒有幣玉者賔客所助以禮神月終則以官府之敘受羣吏之要贊冢宰受嵗會要會見序官司會嵗終則令羣吏致事正嵗帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑凌人職正嵗十有二月令斬氷則正嵗夏之正月也冢宰縣治象之法于正月嵗將終民方無事也小宰帥羣吏觀治象之法于正嵗嵗更始吏將有事也注據此謂縣治象亦以正嵗誤矣吏觀法于官府不必于縣之日小司徒正嵗令羣吏考法于司徒以退各憲之于其所治則吏觀法于官府明矣古者將有新令必奮鐸以警衆文事以木鐸武事以金鐸乃退以宫刑憲禁于王宫令于百官府曰各修乃職考乃法待乃事以聽王命其有不共則國有大刑憲謂表縣之百官府謂給事于王宫者若師氏大僕等不獨治官之屬也大刑非特常刑也宫禁宜嚴故刑有加宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令其位司士掌焉宰夫察其不如儀敘羣吏之治以待賔客之令諸臣之復萬民之逆恆次敘諸吏之職事三者之來則使辨理之復反報于王也逆謂上書自下而上故謂之逆治有以供狀言者小宰以敘進其治以六計弊羣吏之治是也有以職業言者宰夫敘羣吏之治考百官府羣都縣鄙之治是也蓋職業者所當治之事功狀者所己治之迹故通以治言之注謂宰夫主諸臣萬民之復逆疏謂宰夫恆次敘太僕小臣御僕等使辨理此復逆之事皆非也諸臣萬民之復逆王與冢宰聽斷之其事施行必下于羣吏故敘羣吏之治以待之其文與賔客之令相次則謂羣吏待其事而非宰夫主辨次敘復逆之事可知矣掌百官府之徵令辨其八職一曰正掌官法以治要二曰師掌官成以治凡三曰司掌官法以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官敘以治敘八曰徒掌官令以徵令王有徵召命令宰夫辨而施之或下于其正長或下于其屬旅也正即所建之正也師即所立之二也司即所設之考也旅即所陳之殷也要大綱也凡者衆目之總數則一目中之科條也治藏藏文書器物也贊治書法令以助上布治也治敘次敘官中當先後之事及徒之應驅役者徵令趨走給呼召正與司同曰法者法之定則正下于司以布之法之行則司報于正以質之也掌治法以考百官府羣都縣鄙之治乘其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之羣都衆采邑也六遂五百家為鄙五鄙為縣不及六鄉者舉外以包內也乘猶計也失所藏之財賄謂之失財非所宜用而用之謂之失用所失之物非貨賄謂之失物辟名謂詐為文書以自隱避也足用所用無乏長財所藏有餘善物物無虧損王氏曰欲知其總數則宜言會欲知其别數則宜言乘此欲知失財用物與足用長財善物者故言乘而不言會也以式法掌祭祀之戒具與其薦羞從大宰而視滌濯薦脯醢也羞庶羞內羞小宰以法掌祭祀之戒具而宰夫復以式法掌之者小宰所令特物所當供耳宰夫則並詳其用財之多寡故曰式法凡禮事贊小宰比官府之具比挍次之凡禮事謂賔客軍旅田役荒喪之事也祭祀則兼掌其戒而六事則獨比其具者祭祀多王所親蒞也故小宰戒事而宰夫申之惟恐其不豫也六事小宰戒之則承事者知庀矣財用之式出于冢宰故供具必宰夫比之凡朝覲會同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數牢禮委積若大行人五牢五積四牢四積三牢三積之屬膳獻殷膳大牢及上介禽獻之屬饗禮九獻主飲食禮九舉主食賔賜謂中間加賜故特文以别之凡邦之弔事掌其戒令與其幣器財用凡所共者大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之大喪王后世子小喪夫人以下小官士也于宰夫所掌戒令曰小官則冢宰所戒令獨大官可知矣于三公六卿之喪曰官有司則旅所帥為家有司可知矣嵗終則令羣吏正嵗會月終則令羣吏正月要旬終則令正日成而以考其治治不以時舉者以告而誅之嵗終周季冬建亥之月正定也旬十日也治不時舉者謂違時令失期會正嵗則以法警戒羣吏令修宫中之職事書其能者與其良者而以告于上贊小宰警戒宫中之羣吏也良猶善也上謂小宰大宰也嵗終冢宰詔王廢置三年大計羣吏之治而誅賞之凡有位者皆不遺矣此能者良者蓋王宫宿衛之士庶子宫伯所掌也故因令宫中之職事而及之士庶子雖未仕以衛王宫則亦有職事宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待戒戒其怠逸也令令所當為也糾糾其過惡也禁禁其未然也官府之在宫中若膳夫玉府內宰內史之屬次入直處舍退休處官府次舍執事宿衛之人有衆寡宫正以時挍次之版其人名籍也待待戒令及比夕擊柝而比之國有故則令宿其比亦如之有故非常也文王世子曰公若有出疆之政庶子以公族之無事者守于公宫夏官諸子職國有大事則帥國子而致于太子惟所用之既曰夕擊柝而比之又曰國有故則令宿者平時當夕者番代有故則盡入宿衛也辨外內而時禁稽其功緒糾其德行幾其出入均其稍食去其淫怠與其奇邪之民興事造業為功功事有倫為緒稍食祿稟也民宫中吏之家人及司𨽻所掌皆是淫放濫也邪惡也曰奇邪者政教之行人皆良正有獨為邪惡者則奇單而無與為伍也既辨外內而禁其非時出入復幾其出入之犯禁者會其什伍而教之道藝月終則會其稍食嵗終則會其行事凡邦之大事令于王宫之官府次舍無去守而聽政令去守離部署也春秋以木鐸修火禁火星以春出以秋入故因天時以戒此修宫中之火禁也司烜所修則國中之火禁凡邦之事蹕宫中廟中則執燭蹕禁止行者凡邦事王出則蹕宫中廟中無蹕則執燭也社稷五祀之祭在宫中先王先公之祭在廟中大喪則授廬舍辨其親疏貴賤之居廬倚廬也舍堊室也親貴居廬疏賤居堊室雜記大夫居廬士居堊室官府羣吏所居次舍士庶子宿衛者所居也自辨內外而時禁至去其淫怠與其奇邪之民謂羣吏也以執事于宫中故辨外內而譏其出入以有職守故稽其功緒以有徒𨽻故去其淫怠奇邪之民會其什伍教之道藝謂士庶子也以羣萃于周廬故會其什伍以無職守故教之道藝月終會其稍食嵗終會其行事則羣吏士庶子之所同也均其稍食者時其事之煩簡勞逸而上下之也會其稍食者總而計之也于士庶子不言均其稍食者月終則均秩于宫伯職見之矣宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事秩祿廪也敘才等也魏氏謂師氏保民教之已詳故宫伯惟掌其政令非也師氏保氏所教乃與太子共學者宫正宫伯所掌則宿衛之士庶子也宫正既教之道藝故宫伯不復掌耳授八次八舍之職事衛王宫者必居四角四中便徼候也若邦有大事作宫衆則令之作宫衆使從太子以守衛也月終則均秩嵗終則均敘王介甫曰秩秩酒秩膳之類日月有焉故月終均之勞逸劇易之敘宜以嵗時更焉故嵗終則均之王明齋曰秩謂祿之髙下一事而功有勤惰則為之上下其食敘謂位之等級一官而才有升降則為之先後其次月終均秩則祿有不同故宫正因而會其稍食嵗終均敘則能有不同故宫正因而會其行事此即所謂行其秩敘以時頒其衣裘掌其誅賞葉氏曰宫正宫伯所掌如漢之郎衛大僕虎賁司𨽻所掌如漢之兵衛宫正兼掌羣吏士庶子故曰官府次舍統宫內之直廬也宫伯掌士庶子之宿衛者故曰八次八舍獨宫外之周廬也宫正之職在會其什伍教之道藝稽其功緒糾其德行會其行事幾其出入均其稍食宫伯之職在授以職事行其秩敘作其徒役頒其衣裘行其誅賞如六官之有二其事必相須而成正之職繁則獨舉其綱二之職專則并詳其目也獨士庶子有授職事之文者羣吏當官有常職無俟于特授也宫正不行誅賞者羣吏之誅賞則冢宰詔之士庶子之誅賞則宫伯行之而宫正所謂會其行事者正冢宰誅賞之所憑也宫伯專行誅賞者士庶子無官守其為誅賞也微必以達于冢宰則煩且瀆矣若有位者之誅賞雖冢宰必以詔王而不敢專也古所謂誅多以譴訶責讓而言記曰齒路馬有誅春秋傳誅屢于徒人費不得鞭之見血是也膳夫掌王之食飲膳羞以養王及后世子凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十甕六穀稌黍稷粱麥苽苽雕胡也六清水漿醴䣼醫酏羞出于牲及禽獸以備滋味謂之庶羞珍謂淳熬淳母炮豚炮牂搗珍漬熬肝膋也醬謂醯醢此總言饋食之物有此數非一日而盡用之也王安石謂人主當享備物以康成注此經辭不别白而康成之誤則因醢人職王舉則共醢六十甕醯人職王舉則共醯物六十甕遂謂王日一舉備用此數不知醯醢二職所共乃朔月月半舉盛饌時以備擇用內饔職選百羞醬物珍物以俟饋是也在禮王與后同庖日中而餕不敢暴天物也乃日備百有二十品之羞罄百有二十甕之醢與醯物乎况籩豆有數豈能盡陳百有二十品之羞而醯醢以甕共則貯以待嵗時之需而非一朝而罄之明矣王日一舉鼎十有二物皆有俎殺牲曰舉王日一舉以朝食也鼎十有二牢鼎九牛一羊一豕一魚一臘一腸胃一膚一鮮魚一鮮臘一陪鼎三臐一膷一膮一牲肉熟于各鼎升于各俎陪鼎之實即庶羞在豆者無俎鼎實經無明文疑疏所列乃朔月月半之饋常日雖十有二鼎而所用不過少牢玉藻天子日食少牢朔月大牢是也記曰天子無故不殺牛又曰天子社稷皆大牢則羣小祀不敢用也而乃日以自奉乎以樂侑食膳夫授祭品嘗食王乃食侑猶勸也祭謂刌肺脊以祭也禮飲食必祭示有所先品嘗者每物皆嘗之以導尊者也卒食以樂徹于造徹于造食之處殽羞所未遍尚可共日中之餕也王齊日三舉或曰不食餕餘也或曰三當作不文誤也大喪則不舉大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉大故冦戎之事及刑殺也傳曰司冦行戮君為之不舉王燕食則奉膳贊祭燕食謂日中與夕食奉朝之餘膳所祭者牢肉凡王祭祀賔客食則徹王之胙俎賔客食謂王與諸侯禮食于廟也胙俎最尊餘則其屬徹之凡王之稍事設薦脯醢稍事謂小事而飲酒王燕飲酒則為獻主龜山楊氏曰説者謂君臣之義不可以燕廢故以膳夫為主非也禮受爵于君前則降而再拜燕所以安羣臣嘉賔也而使有登降拜揖之勞是以犬馬畜之矣故膳夫為主而王不自獻酬焉廪人繼粟庖人繼肉此孟子所謂養君子之道也掌后及世子之膳羞王則親饋后世子則主其饌之數而內饔饋焉凡肉修之頒賜皆掌之修脯也加薑桂鍛治為修以鹽乾之者謂之脯凡祭祀之致福者受而膳之春秋傳受脤歸脤受脤謂君祭以肉賜大夫歸脤謂大夫祭歸肉于公王臣亦然致福謂歸胙于王也王氏曰若畿內都鄙山川及四海五嶽四瀆古帝王之在其國都或王五服之親凡以王命而祭者皆歸胙于王以摰見者亦如之摰羔鴈之屬嵗終則會惟王及后世子之膳不會王后世子之膳不會非凡用皆不會也蓋品味有常不敢以異物供無所用其會非恣其欲而不為之限度也故王后之服不會飲酒不會膳禽不會皆以有常式也世子則服不敢備多寡惟王命而服會矣飲無常期疏數惟王命而酒會矣食無加獻有無惟王命而膳禽會矣惟膳則朝夕有常故與王后同也比事以觀則其義顯然矣庖人掌共六畜六獸六禽辨其名物六獸麋鹿熊麕野豕兔或曰獸人冬獻狼又內則無熊當有狼而熊不屬六禽雁鶉鷃雉鳩鴿凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞凡謂計數之薦亦進也鮮生肉薧乾肉于王之薦羞獨曰物者如天子牲孕不食之類其祭祀之好羞若荆州之鮺魚青州之蟹胥非常物也或曰若文王之菖歜曾晳之羊棗之類共喪紀之庶羞賔客之禽獻喪紀謂虞祔禽獻之數見掌客職凡令禽獻以法授之其出入亦如之令令獸人也出以付將命者入賔客不盡用禮終而以歸于有司者其出也以法授將命者其入也仍以法授獸人凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮羽膳膏羶用禽獻謂煎和以獻于王也行及時而用之也牛脂香大膏臊雞膏腥羊脂羶腒乾雉鱐乾魚犢牛子麛鹿子鮮魚也羽雁也羔豚物生而肥犢麛物成而充腒鱐暵熱而乾魚雁水涸而性定此八物者得四時之氣尤盛故又用休廢之脂膏以煎和之嵗終則會惟王及后之膳禽不會膳夫所掌正膳也故王后世子皆不會禽獻為加則世子亦會焉內饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物體名脊脅肩臂臑之屬肉物胾燔之屬詳見少牢及公食大夫禮王舉則陳其鼎俎以牲體實之初陳鼎于鑊西取牲體于鑊以實鼎後陳鼎于阼階下其俎皆陳于鼎西南取于鼎以實俎實鼎曰脀實俎曰載選百羞醬物珍物以俟饋選以俟饋則知醢人醯人所共百二十甕乃奉以待饔人之選而非一朝而罄之矣共后及世子之膳羞辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲視而交睫腥馬黑脊而般臂螻庮朽木臭也泠謂毛長毳謂總結也皫色無澤也沙澌也貍氣鬱也般臂臂毛有文螻螻蛄臭也盲視戴記作望視凡宗廟之祭祀掌割亨之事止言割亨者煎和所以致味鬼神尚質不貴褻味凡燕飲食亦如之凡掌共羞修刑膴胖骨鱐以待共膳燕飲與諸臣燕燕食日中及夕食也掌共共當為具刑鉶羮也胖如脯而腥者膴䐑肉大臠用以祭者魚亦有之骨牲體也凡王之好賜肉修則饔人共之外饔掌外祭祀之割亨共其膴修刑膴陳其鼎俎實之牲體魚臘視內饔所共少胖骨鱐者于牲體魚臘該之也凡賔客之飱饔饗食之事亦如之飱客始至之禮饔既將幣之禮饗食之禮獻舉各以命數邦饗耆老孤子則掌其割亨之事饗士庶子亦如之耆老謂國老庶老及死事者之父祖孤子死事者之子師役則掌共其獻賜脯肉之事獻謂酌其長帥凡小喪紀陳其鼎俎而實之亨人掌共鼎鑊以給水火之齊齊多少之量職外內饔之㸑亨煮辨膳羞之物職主也辨膳羞之物以為㸑亨煮久暫緩急之齊也其物之美惡則饔者辨之矣祭祀共大羮鉶羮賔客亦如之大羮肉汁不致五味鉶羮加鹽菜鉶羮皆陪鼎膷臐膮牛用藿羊用苦豕用薇調以五味盛之鉶器即謂鉶羮于豆即謂庶羞甸師掌帥其屬而耕耨王藉以時入之以共齍盛王以孟春躬耕帝藉王三推三公五推卿諸侯九推庶人終千畝即甸師所帥胥徒也齍讀為粢稷也穀以稷為長在器曰盛祭祀共蕭茅蕭香蒿也詩取蕭祭脂郊特牲蕭合黍稷臭陽達於牆屋茅以共祭之苴亦以縮酒士虞禮束茅長五寸立于几東謂之苴戴記縮酌用茅共野果蓏之薦場人凡祭祀共果蓏此則專薦宗廟與喪事代王受眚災既殯大祝作禱辭授甸人使以禱藉田之神代王受眚災周官惟此條義難明蓋周公以嗣王生長富貴必知稼穡之艱難乃能知小民之依而所其無逸故特為此禮以示不躬耕帝藉以事上帝神示則王宜受眚災今以喪廢藉非得己也故甸師可代受焉則無故而不親耕以共粢盛其為神示所不享明矣王之同姓有罪則死刑焉刑人于市而王族則刑殺于甸師氏記曰刑于隱者不與國人慮兄弟也帥其徒以薪蒸役外內饔之事役為給役也木大曰薪小曰蒸獸人掌罟田獸辨其名物于田中設罟以除野獸害人物及稼者冬獻狼夏獻麋春秋獻獸物狼殘物麋害稼故以時罟而獻之獸物凡野獸皆可獻無定物也李耜卿曰狼膏溫故于冬獻之麋膏涼故于夏獻之時田則守罟及幣田令禽注于虞中守罟備獸觸攫弊止也虞中虞人所植虞旗之中也注聚也凡祭祀喪紀賔客共其死獸生獸共其完者于庖人凡獸入于臘人皮毛筋角入于玉府乾之以為脯修不必皆完凡田獸者掌其政令凡田獸謂百姓之獵者王制四時之田天子諸侯大夫既殺縱民使獵民居山澤間者亦不禁其取獸角人以時徵齒角凡骨物于山澤之農是也其所獲或當獻于公及爭禽之訟皆獸人掌之蓋天子諸侯搜狩之政令掌于司馬而獸人所掌則百姓田獵之政令也漁人掌以時漁為梁梁謂偃水兩畔中央為關空以笱承之月令季冬命漁師為梁春獻王鮪王鮪鮪之大者出河南鞏縣至春浮陽乃入西河至漆沮上龍門故周人取以獻新獻所無也月令季春薦鮪于寢廟辨魚物為鮮薧以共王膳羞凡祭祀賔客喪紀共其魚之鮮薨凡漁者掌其政令凡漁征入于玉府漁征謂鬚骨可飾器物者鱉人掌取互物互謂有甲相交互也㒼胡龜鱉之屬介物龜為長而以鱉命官主食獻也以時簎魚鱉龜蜃凡貍物簎謂以杈刺泥中搏取之兼言魚者簎互物而適得魚亦不棄也貍物藏伏于泥中者若鱴刀含漿之屬春獻鱉蜃秋獻龜魚祭祀共蠯螺蚳以授醢人蠯蛤也或曰蚌也螺䗂蝓或曰螺通蚳蟻子白者可為醢國語曰蟲舍蚳蝝掌凡邦之簎事凡有取于水中皆掌之臘人掌乾肉凡田獸之脯臘膴胖之事大物解肆乾之謂之乾肉臘小物全乾凡祭祀共豆脯薦脯膴胖凡臘物賔客喪紀共其脯臘凡乾肉之事田獵一為乾豆則祭祀宜有豆脯李耜卿曰胖半體也少牢曰司馬升羊右胖司士升豕右胖醫師掌醫之政令聚毒藥以共醫事藥之物恆多毒人氣不和必用偏勝之物以攻之用之不當則反害于人曰聚毒藥使醫者慎所用也凡邦之有疾病者疕瘍者造焉則使醫分而治之疕頭瘍及秃疾甚曰病疾醫職曰凡民之有疾病者分而治之而此職曰邦蓋雖統萬民而以王宫百官府為主也以是推之則王后世子及公孤六卿之疾必醫師親治可知矣嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下十全非謂十人皆愈但知可治不可治者十人皆中則為上耳食醫掌和王之六食六飲六膳百羞百醬八珍之齊食飲膳羞醬珍製作有常法而食醫和其齊者酌天時與王氣體之所宜也凡食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時飯宜溫羮宜熱醬宜涼飲宜寒凡和春多酸夏多苦秋多辛冬多鹹調以滑甘內則棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽會成也謂其味相成或曰合也凡君子之食恆放焉放依也齊和雖以王為主大夫以上亦依之疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾痟酸削也首疾頭痛也嗽咳也上氣逆喘也以五味五穀五藥養其病五味醯酒飴蜜薑桂之屬五穀麻黍稷麥豆五藥草木蟲石穀以五氣五聲五色視其死生五氣五臟所出氣也肺氣熱心氣次之肝氣涼脾氣溫腎氣寒五聲言語宫商角徵羽也五色面貌青赤白黑黃也察其盈虛休王吉凶可知兩之以九竅之變參之以九藏之動陽竅七隂竅二竅之變謂開閉非常正藏五又有胃旁胱大腸小腸藏之動謂脈至與不至也兩者謂九竅與所視為兩兩與九藏為三易氏曰九竅見于外睹其證之變而有通塞之二候故曰兩九藏藏于內察其脈之動而有浮中沉之三部故曰參凡民之有疾病者分而治之死終則各書其所以而入于醫師少者曰死老者曰終疾醫瘍醫各八人以共王宫百官府之醫事猶懼不給豈能遍及萬民疑萬民之疾大且危者然後醫士治焉其餘則受方于醫師而未列職者皆使分治其有功效亦官給之食也先王之世不獨爵必當賢即醫者亦不能幸而得食所以能制百事之宜而盡萬物之性也王明齋曰先王立醫師使掌衆醫分治民疾計其功而制其食使醫者無求于病家則心清而業精病者不必酬醫則藥之所及者廣而活者衆矣瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊腫瘍瘰􅐇瘤壅腫而不散者潰瘍癰疽之類金瘍刀創也折瘍踠跌者祝當為注謂附著藥也劀刮去膿血殺謂以藥食其惡肉或曰祝素問所謂祝由也後世有以氣封瘍而徙之者蓋其遺法李耜卿曰此官有獸醫夏官又有巫馬祝藥並行牛馬且然則人可知凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之五毒五藥之有毒者節之節成其藥之力也舊説五氣當為五穀或曰五氣播于四時必順時氣人之氣乃可養疾醫職曰以五氣五聲五色視其死生則知為五臟之氣矣此曰以五氣養之則知為五行之氣矣疾醫不及此者以首列四時皆有癘疾則養之宜順時氣不必言矣或曰疾醫職所云亦五行之氣也凡症順于時氣則生逆則死凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以甘養肉以滑養竅以類相養也酸木味木根著地中似骨辛金味金纒合異物似筋鹹水味水流行地中似脈苦火味火出入無形似氣甘土味土含載四者似肉滑物通利往來似竅凡有瘍者受其藥焉獸醫掌療獸病療獸瘍畜賤于人故病與瘍同醫凡療獸病灌而行之以節之以動其氣觀其所發而養之節之視其驟趨之節也其氣動于內則病之形發見于外然後可以得養之之宜凡療獸瘍灌而劀之以發其惡然後藥之養之食之既曰灌之而又曰藥之以藥傅其外也獸病則苐以藥灌而遂養之凡獸之有病者有瘍者使療之死則計其數以進退之周官集注卷一
